entities:
  metal-stress:
    label: Metal stress
    kind: concept
    definition: Growth or fitness pressure caused by exposure to metals such as cobalt, nickel, copper, zinc, aluminum, uranium, chromium, and related ions.
    aliases:
      - entity:metal-stress
      - metal-stress
      - metal tolerance
      - metal-tolerance
      - entity:metal-tolerance
      - metal resistance
  core-genome:
    label: Core genome
    kind: concept
    definition: The portion of a pangenome shared broadly across members of a species or clade.
    aliases:
      - entity:core-genome
      - core-genome
      - core genome
      - core-genes
  accessory-genome:
    label: Accessory genome
    kind: concept
    definition: Genes present in only some genomes of a species — the variable, often niche-associated portion of the pangenome.
    aliases:
      - entity:accessory-genome
      - accessory-genome
      - accessory genes
      - auxiliary-genome
  pangenome:
    label: Pangenome
    kind: dataset
    definition: The full set of core, accessory, and singleton genes observed across genomes in a species or clade.
    aliases:
      - entity:pangenome
      - pangenome
      - kbase_ke_pangenome
    url: https://docs.kbase.us/
  pangenome-openness:
    label: Pangenome openness
    kind: concept
    definition: Whether a species keeps gaining new genes as more genomes are sampled (open) or saturates (closed), often summarized by a Heaps'-law exponent.
    aliases:
      - entity:pangenome-openness
      - pangenome-openness
      - openness
      - heaps-law
  fitness-browser:
    label: Fitness Browser
    kind: dataset
    definition: A BERDL collection of RB-TnSeq fitness experiments used to measure gene-level fitness under many conditions.
    aliases:
      - entity:fitness-browser
      - kescience_fitnessbrowser
      - Fitness Browser
      - genefitness
  rb-tnseq:
    label: RB-TnSeq
    kind: method
    definition: Random-barcode transposon sequencing — a pooled mutant fitness assay that quantifies each gene's contribution to growth across conditions.
    aliases:
      - entity:rb-tnseq
      - rb-tnseq
      - rbtnseq
      - tnseq
  cofitness:
    label: Cofitness
    kind: method
    definition: Correlation between genes' fitness profiles across conditions, used to infer shared function or co-dependence.
    aliases:
      - entity:cofitness
      - cofitness
      - co-fitness
  fitness-modules:
    label: Fitness modules
    kind: concept
    definition: Groups of genes with coherent, correlated fitness behavior, often recovered by decomposing a gene-by-condition fitness matrix.
    aliases:
      - entity:fitness-modules
      - fitness-modules
      - ica-fitness-modules
      - entity:ica-fitness-modules
  cross-resistance:
    label: Metal cross-resistance
    kind: concept
    definition: Shared genetic response to more than one metal, measured here by correlations between gene fitness profiles for metal pairs.
    aliases:
      - entity:cross-resistance
      - cross-resistance
      - metal cross-resistance
  metal-specific-genes:
    label: Metal-specific genes
    kind: concept
    definition: Genes whose fitness defects are specific to metal stress rather than broadly sick across many non-metal conditions.
    aliases:
      - entity:metal-specific-genes
      - metal-specific genes
      - metal-specific
  essential-genes:
    label: Essential genes
    kind: concept
    definition: Genes required for growth under a given condition; their essentiality is often condition-dependent rather than absolute.
