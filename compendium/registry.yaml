topics:
  metal-resistance:
    label: Metal Resistance & Critical Minerals
    definition: Cross-project synthesis of bacterial metal tolerance, metal cross-resistance, and the core-versus-accessory architecture of metal fitness genes.
    aliases:
      - topic:metal-resistance
      - metal-resistance
      - metal_fitness
      - metal-fitness
      - metal-specificity
      - metal-cross-resistance
  microbial-ecotypes:
    label: Microbial Ecotypes & Niche Differentiation
    definition: Cross-project synthesis of within-species bacterial gene-content structure, environmental association, and functional differentiation between ecotypes.
    aliases:
      - topic:microbial-ecotypes
      - microbial-ecotypes
      - ecotype
      - ecotypes
      - gene-content-ecotypes
      - niche-differentiation

entities:
  metal-stress:
    label: Metal stress
    kind: concept
    definition: Growth or fitness pressure caused by exposure to metals such as cobalt, nickel, copper, zinc, aluminum, uranium, chromium, and related ions.
    aliases:
      - entity:metal-stress
      - metal-stress
      - metal tolerance
      - metal resistance
  core-genome:
    label: Core genome
    kind: concept
    definition: The portion of a pangenome shared broadly across members of a species or clade.
    aliases:
      - entity:core-genome
      - core-genome
      - core genome
  pangenome:
    label: Pangenome
    kind: dataset
    definition: The full set of core, accessory, and singleton genes observed across genomes in a species or clade.
    aliases:
      - entity:pangenome
      - pangenome
      - kbase_ke_pangenome
    url: https://docs.kbase.us/
  fitness-browser:
    label: Fitness Browser
    kind: dataset
    definition: A BERDL collection of RB-TnSeq fitness experiments used to measure gene-level fitness under many conditions.
    aliases:
      - entity:fitness-browser
      - kescience_fitnessbrowser
      - Fitness Browser
  cross-resistance:
    label: Metal cross-resistance
    kind: concept
    definition: Shared genetic response to more than one metal, measured here by correlations between gene fitness profiles for metal pairs.
    aliases:
      - entity:cross-resistance
      - cross-resistance
      - metal cross-resistance
  metal-specific-genes:
    label: Metal-specific genes
    kind: concept
    definition: Genes whose fitness defects are specific to metal stress rather than broadly sick across many non-metal conditions.
    aliases:
      - entity:metal-specific-genes
      - metal-specific genes
      - metal-specific
  gene-family:
    label: Conserved gene family
    kind: gene_or_pathway
    definition: An ortholog group or gene family that can carry comparable fitness evidence across multiple organisms.
    aliases:
      - entity:gene-family
      - gene family
      - ortholog group
  bacdive:
    label: BacDive
    kind: dataset
    definition: A bacterial phenotype and isolation metadata resource used here for external validation of metal-environment predictions.
    aliases:
      - entity:bacdive
      - kescience_bacdive
      - BacDive
    url: https://bacdive.dsmz.de/
  ecotype:
    label: Microbial ecotype
    kind: concept
    definition: A within-species subpopulation with distinct gene-content, functional, or ecological tendencies.
    aliases:
      - entity:ecotype
      - ecotype
      - gene-content ecotype
      - microbial ecotype
  alphaearth:
    label: AlphaEarth embeddings
    kind: dataset
    definition: Environmental embedding features used to represent geographic habitat context for genomes with coordinates.
    aliases:
      - entity:alphaearth
      - alphaearth
      - alphaearth_embeddings
      - alphaearth_embeddings_all_years
  cog-category:
    label: COG functional category
    kind: concept
    definition: A broad functional class from the Clusters of Orthologous Groups system, used here to compare ecotype gene content.
    aliases:
      - entity:cog-category
      - COG
      - COG category
      - cog-category
  mobile-elements:
    label: Mobile genetic elements
    kind: gene_or_pathway
    definition: Transposases, integrases, and related machinery that move genes within or between genomes.
    aliases:
      - entity:mobile-elements
      - mobile elements
      - mobile genetic elements
  unknown-function:
    label: Unknown-function genes
    kind: concept
    definition: Genes or functional categories whose biological roles remain poorly annotated.
    aliases:
      - entity:unknown-function
      - unknown function
      - function unknown
