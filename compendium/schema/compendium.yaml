id: https://w3id.org/beril/compendium
name: compendium
title: Compendium KG schema (BERIL Research Observatory)
description: >-
  Schema for the deterministic, KG-centered scientific aggregation wiki. Two layers: synthesis
  units (Layer A, subclasses of biolink:InformationContentEntity) and biology entities (Layer B,
  Biolink classes). Every assertion carries an evidence-bearing edge with a deterministic, entities-only
  tier (grounded/asserted/conflict) — no tier claims the relation is true.
license: MIT
default_prefix: compendium
default_range: string

prefixes:
  compendium: https://w3id.org/beril/compendium/
  linkml: https://w3id.org/linkml/
  biolink: https://w3id.org/biolink/vocab/
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  GO: http://purl.obolibrary.org/obo/GO_
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  Pfam: http://purl.obolibrary.org/obo/PF
  KEGG: https://identifiers.org/kegg/
  PMID: http://www.ncbi.nlm.nih.gov/pubmed/

imports:
  - linkml:types

enums:
  TierEnum:
    description: Deterministic, entities-only assertion tier.
    permissible_values:
      grounded: {description: entities grounded + located at the cited span}
      asserted: {description: ungrounded / weak span / low confidence — flagged unverified}
      conflict: {description: a grounded assertion that contradicts another grounded assertion}
  EntityType:
    permissible_values:
      Topic: {}
      Claim: {}
      Conflict: {}
      Opportunity: {}
      Direction: {}
      Hypothesis: {}
      Finding: {}
      DerivedProduct: {}
      Method: {}
      Organism: {is_a_biolink: biolink:OrganismTaxon}
      Gene: {is_a_biolink: biolink:Gene}
      GeneCluster: {}
      KO: {}
      OrthologGroup: {}
      Pathway: {is_a_biolink: biolink:Pathway}
      Function: {is_a_biolink: biolink:BiologicalProcess}
      Metabolite: {is_a_biolink: biolink:ChemicalEntity}
      Phenotype: {is_a_biolink: biolink:PhenotypicFeature}
      Condition: {}
      Environment: {is_a_biolink: biolink:EnvironmentalFeature}
      Dataset: {is_a_biolink: biolink:Dataset}
      Notebook: {}
      Project: {is_a_biolink: biolink:Study}
      Publication: {is_a_biolink: biolink:Publication}
  PredicateEnum:
    permissible_values:
      in_taxon: {}
      enables: {}
      participates_in: {}
      genetically_interacts_with: {}
      has_phenotype: {}
      associated_with: {}
      supported_by: {}
      refuted_by: {}
      contradicts: {}
      has_evidence: {}
      motivates: {}
      advances: {}
      produced_by: {}
      uses: {}

classes:
  Span:
    attributes:
      file: {required: true}
      char: {multivalued: true, range: integer}
      heading: {}
      quote: {}
  Mention:
    attributes:
      id: {identifier: true}
      label: {required: true}
      type: {range: EntityType, required: true}
      span: {range: Span, inlined: true}
  Entity:
    description: A canonical KG node (content-addressed). CURIE grounding is an alias, not identity.
    attributes:
      node: {identifier: true}
      type: {range: EntityType, required: true}
      label: {required: true}
      curie: {}
      mentions: {multivalued: true}
      confidence: {range: float}
      tier: {range: TierEnum}
  Evidence:
    attributes:
      span: {range: Span, inlined: true}
      notebook: {}
      figure: {}
      dataset: {}
      p_value: {range: float}
  Assertion:
    description: A typed, sourced, tiered statement (content-addressed id).
    attributes:
      id: {identifier: true}
      kind: {required: true}
      s: {description: subject node id}
      p: {range: PredicateEnum}
      o: {description: object node id}
      polarity: {}
      statement: {}
      supported_by: {multivalued: true}
      entities: {multivalued: true}
      evidence: {range: Evidence, inlined: true}
      knowledge_level: {}
      agent_type: {description: manual_agent | automated_agent}
      confidence: {range: float}
      tier: {range: TierEnum, required: true}
  ProjectKG:
    tree_root: true
    attributes:
      project: {}
      mentions: {multivalued: true, range: Mention, inlined_as_list: true}
      entities: {multivalued: true, range: Entity, inlined_as_list: true}
      assertions: {multivalued: true, range: Assertion, inlined_as_list: true}
  Correction:
    attributes:
      id: {identifier: true}
      targets: {multivalued: true}
      kind: {required: true}
      value: {}
      scope: {}
      proposed_rule: {}
      rationale: {}
      author: {}
      timestamp: {}
