    contradicts: []
    refines: []
  evidence:
  - source_project: bacdive_phenotype_metal_tolerance
    source_doc: REPORT.md
    source_section: The Phylogenetic Confounding Wall
    quote: classical microbiology phenotypes (Gram stain, oxygen tolerance, enzyme activities) capture real biological differences in metal tolerance, but these differences are entirely explained by phylogenetic structure
