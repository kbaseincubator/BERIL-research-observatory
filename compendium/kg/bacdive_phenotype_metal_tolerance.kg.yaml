    contradicts: []
    refines: []
  evidence:
  - source_project: bacdive_phenotype_metal_tolerance
    source_doc: REPORT.md
    source_section: What Does Predict Metal Tolerance
    quote: The genome's metal resistance gene content (`n_metal_clusters` from the Metal Fitness Atlas) explains more variance than all phenotype features combined, and substantially more than taxonomy alone. The full model (taxonomy + phenotype + gene count) achieves R² = 0.63
  - source_project: bacdive_phenotype_metal_tolerance
    source_doc: REPORT.md
    source_section: 3. Phenotype Features Add Nothing Beyond Taxonomy (Delta R² = -0.009)
    quote: Adding the number of metal resistance gene clusters (`n_metal_clusters`) boosts the full model to R² = 0.63, demonstrating that genome-encoded metal resistance repertoire is the true predictor.
    notebook: 04_multivariate_model.ipynb
- id: stmt:shap-taxonomy-gene-count-dominate
  kind: finding
  text: SHAP importance from the full XGBoost model is dominated by taxonomic class/order codes and metal resistance gene count, while phenotype features contribute minimally once taxonomy is included.
  confidence: high
  topics:
  - topic:metal-resistance
