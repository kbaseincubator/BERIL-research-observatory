project:
  id: bacdive_phenotype_metal_tolerance
  title: 'Report: BacDive Phenotype Signatures of Metal Tolerance'
statements:
- id: stmt:phenotypes-add-nothing-beyond-taxonomy
  kind: finding
  text: Classical BacDive phenotype features add no predictive power for bacterial metal tolerance beyond taxonomy, with the combined taxonomy-plus-phenotype model performing slightly worse than taxonomy alone (delta R-squared = -0.009).
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:microbial-ecotypes
  entities:
  - entity:bacdive
  - entity:metal-tolerance
  - entity:taxonomy
  - entity:phylogenetic-confounding
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: bacdive_phenotype_metal_tolerance
    source_doc: REPORT.md
    source_section: 3. Phenotype Features Add Nothing Beyond Taxonomy (Delta R² = -0.009)
    quote: taxonomy alone (phylum/class/order) explains 35.4% of metal tolerance variance, and phenotype features alone explain 16.3%, but combining taxonomy + phenotype yields R² = 34.5% — slightly *worse* than taxonomy alone. The phenotype signal is entirely captured by phylogenetic structure.
    notebook: 04_multivariate_model.ipynb
    figure: figures/model_comparison.png
- id: stmt:gram-negative-higher-tolerance
  kind: finding
  text: Gram-negative species show the largest univariate phenotype effect on metal tolerance, scoring higher than Gram-positive species (Cohen's d = -0.61, p < 1e-60, n = 3,272 species).
  confidence: high
  topics:
  - topic:metal-resistance
  entities:
  - entity:bacdive
  - entity:gram-stain
  - entity:metal-tolerance
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: bacdive_phenotype_metal_tolerance
    source_doc: REPORT.md
    source_section: 1. Gram-Negative Bacteria Have Significantly Higher Metal Tolerance Scores (d=-0.61)
    quote: Gram-negative species have higher metal tolerance scores than Gram-positive species (Cohen's d = -0.61, p < 1e-60, n = 3,272 species). This is the largest effect among all phenotype features tested.
    notebook: 03_univariate_associations.ipynb
    figure: figures/univariate_effect_sizes.png
- id: stmt:seven-of-ten-features-significant
  kind: finding
  text: Seven of ten BacDive phenotype features (Gram stain, oxidase, motility, urease, enzyme breadth, nitrate reduction, and catalase) are individually significant predictors of metal tolerance after FDR correction at q < 0.05.
  confidence: high
  topics:
  - topic:metal-resistance
  entities:
  - entity:bacdive
  - entity:metal-tolerance
  - entity:fdr-correction
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:phenotypes-add-nothing-beyond-taxonomy
  evidence:
  - source_project: bacdive_phenotype_metal_tolerance
    source_doc: REPORT.md
    source_section: 2. Seven of Ten Phenotype Features Are Individually Significant After FDR Correction
    quote: 'Seven features pass FDR correction at q < 0.05: Gram stain (d = -0.61), oxidase (d = +0.53), motility (d = +0.35), urease (d = -0.18), enzyme breadth (rho = -0.06), nitrate reduction (d = +0.10), and catalase (d = +0.10).'
    notebook: 03_univariate_associations.ipynb
- id: stmt:gene-content-is-true-predictor
  kind: finding
  text: Genome-encoded metal resistance gene content (n_metal_clusters from the Metal Fitness Atlas) is the true predictor of metal tolerance, raising the full model to R-squared = 0.63 and explaining more variance than all phenotype features combined.
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:gene-fitness
  entities:
  - entity:metal-fitness-atlas
  - entity:metal-resistance-genes
  - entity:metal-tolerance
  - entity:pangenome
  links:
