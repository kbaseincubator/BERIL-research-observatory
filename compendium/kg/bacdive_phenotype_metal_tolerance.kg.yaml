    contradicts: []
    refines: []
  evidence:
  - source_project: bacdive_phenotype_metal_tolerance
    source_doc: REPORT.md
    source_section: Why Phenotypes Fail as Metal Tolerance Predictors
    quote: The overall catalase effect is d = +0.10 (catalase-positive species have slightly higher metal scores), marginally supporting H1d. But class-stratified analysis reveals the *opposite* within every major class
- id: stmt:phylogenetic-confounding-claim
  kind: claim
  text: Classical microbiology phenotypes capture real biological differences in metal tolerance, but those differences are entirely explained by phylogenetic structure, making the phenotypes noisier proxies for taxonomy rather than independent predictors.
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:microbial-ecotypes
  entities:
  - entity:phylogenetic-confounding
  - entity:metal-tolerance
  - entity:taxonomy
  links:
