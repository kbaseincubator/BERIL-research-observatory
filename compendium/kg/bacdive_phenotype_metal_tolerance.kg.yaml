    source_doc: REPORT.md
    source_section: Limitations
    quote: BacDive species name matching achieves only 38.4%** (5,647/27,702 GTDB species). GCA accession matching could recover additional links but was not implemented.
- id: stmt:caveat-h2s-underpowered
  kind: caveat
  text: The H2S production signal is unreliable because only 8 H2S-negative species are in the matched set, making the large effect size (d = -0.87) likely inflated by small-sample bias.
  confidence: high
  topics:
  - topic:metal-resistance
  entities:
  - entity:h2s-production
  - entity:metal-tolerance
  links:
    supports: []
    contradicts: []
    refines: []
