    source_doc: REPORT.md
    source_section: Limitations
    quote: Metal Fitness Atlas scores are genome-based predictions**, not direct metal tolerance measurements.
- id: stmt:caveat-species-name-matching
  kind: caveat
  text: BacDive-to-pangenome linkage relies on species name matching that recovers only 38.4% of GTDB species (5,647/27,702), with GCA accession matching left unimplemented.
  confidence: high
  topics:
  - topic:metal-resistance
  entities:
  - entity:bacdive
  - entity:pangenome
  - entity:gtdb
  links:
    supports: []
