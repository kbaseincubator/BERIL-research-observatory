    source_doc: REPORT.md
    source_section: 6. SHAP Analysis Confirms Taxonomy and Gene Count Dominate
    quote: SHAP feature importance from the full XGBoost model shows that taxonomic class/order codes and `n_metal_clusters` are the top predictors. Phenotype features contribute minimally to individual predictions once taxonomy is included.
    notebook: 04_multivariate_model.ipynb
    figure: figures/shap_summary.png
- id: stmt:urease-reversal
  kind: finding
  text: Contrary to the prediction that urease-positive organisms tolerate nickel better, urease-positive species have significantly lower metal tolerance (d = -0.18, p < 1e-5), a reversal driven by lineage composition rather than nickel biology.
  confidence: medium
  topics:
  - topic:metal-resistance
  entities:
  - entity:urease
  - entity:nickel
  - entity:metal-tolerance
  - entity:actinomycetes
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:phenotypes-add-nothing-beyond-taxonomy
  evidence:
  - source_project: bacdive_phenotype_metal_tolerance
    source_doc: REPORT.md
    source_section: 4. Urease-Positive Organisms Have *Lower* Metal Tolerance (H1e Reversed)
    quote: Urease-positive species have significantly lower metal tolerance scores (d = -0.18, p < 1e-5), opposite to the prediction that urease positivity (requiring nickel import machinery) would confer nickel tolerance.
    notebook: 03_univariate_associations.ipynb
- id: stmt:anaerobe-aerobe-negligible
  kind: finding
  text: The anaerobe-versus-aerobe difference in metal tolerance is negligible (d = -0.016, p = 0.55) despite 3,751 species with oxygen tolerance data, failing to support the hypothesis that redox lifestyle confers metal tolerance.
  confidence: high
  topics:
  - topic:metal-resistance
  entities:
  - entity:bacdive
  - entity:oxygen-tolerance
  - entity:metal-tolerance
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: bacdive_phenotype_metal_tolerance
    source_doc: REPORT.md
    source_section: 5. Anaerobe vs Aerobe Difference Is Negligible (H1b Not Supported)
    quote: Despite 3,751 species with oxygen tolerance data, the anaerobe-aerobe difference in metal tolerance is negligible (d = -0.016, p = 0.55).
    notebook: 03_univariate_associations.ipynb
    figure: figures/feature_completeness.png
- id: stmt:catalase-simpsons-paradox
  kind: finding
  text: 'Catalase exhibits Simpson''s paradox: the marginally positive overall effect (d = +0.10) reverses within every major class, where catalase-negative species score higher, exposing the apparent association as a between-class artifact.'
  confidence: medium
  topics:
  - topic:metal-resistance
  entities:
