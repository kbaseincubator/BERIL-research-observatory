- id: stmt:caveat-genome-based-scores
  kind: caveat
  text: Metal tolerance scores from the Metal Fitness Atlas are genome-based predictions rather than direct metal tolerance measurements, so phenotype-score associations are ultimately phenotype-to-genome correlations.
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:gene-fitness
  entities:
