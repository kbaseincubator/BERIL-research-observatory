- id: stmt:caveat-strain-name-collision
  kind: caveat
  text: 'Linking ENIGMA field isolates to reference databases by short strain identifiers is hazardous: names like MT20 matched unrelated NCBI organisms such as Streptococcus pneumoniae and injected 1,751 spurious clinical genomes into environmental profiles before being corrected with GTDB-Tk taxonomy.'
  confidence: high
