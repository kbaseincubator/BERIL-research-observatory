    quote: 'Environmental characterization of these clusters across 464K global 16S samples reveals a striking pH gradient: Cluster B environments average pH 5.4 (1.35 units more acidic than Cluster A''s 6.8) and are 6.9 degrees C warmer.'
    notebook: NB04_environmental_context.ipynb
    figure: figures/NB04_cluster_env_comparison.png
- id: stmt:condition-specific-catabolic-genes
  kind: finding
  text: With 46K training pairs the full-corpus SHAP analysis surfaces condition-specific catabolic genes such as rbsC (K10440, ribose transporter), proP (K03762, proline/betaine transporter), and pcaB (K01857, protocatechuate cycloisomerase), the mechanistically correct transporters and enzymes for each substrate.
  confidence: high
