- id: stmt:global-ph-niche-partition
  kind: finding
  text: A global pH-driven niche partition across 464K worldwide 16S samples explains local Oak Ridge co-occurrence, with the acid-tolerant Cluster B (Rhodanobacter-Ralstonia-Dyella) occupying environments averaging pH 5.4, about 1.35 units more acidic and 6.9 degrees C warmer than neutral-preferring Cluster A.
  confidence: high
  topics:
