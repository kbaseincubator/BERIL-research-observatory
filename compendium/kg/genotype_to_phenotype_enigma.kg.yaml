- id: stmt:enigma-strains-environmental-outliers
  kind: finding
  text: All ENIGMA Pseudomonas isolates belong to the environmental Pseudomonas_E (fluorescens/protegens) clade rather than the clinically dominant lineage, meaning these subsurface field isolates occupy environmental niches underrepresented in NCBI genome collections.
  confidence: medium
