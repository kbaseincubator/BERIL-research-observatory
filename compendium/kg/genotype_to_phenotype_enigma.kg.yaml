- id: stmt:growth-vs-metabolite-different-features
  kind: claim
  text: Growth-predictive KOs across genera and metabolite-production-associated KOs within genus are essentially uncorrelated feature sets (Spearman rho=0.043) that answer different biological questions, yet gene content explains both when analyzed with the method appropriate to the sample size.
  confidence: medium
