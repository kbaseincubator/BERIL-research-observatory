    quote: '**Continuous growth parameters (µmax, lag, yield) are NOT predictable** from KO content or bulk genomic features under cross-genus holdout. This is a fundamental biological limitation — gene presence encodes capability, not kinetic rate.'
    notebook: NB07_full_corpus_prediction.ipynb
    figure: figures/NB07_bulk_vs_continuous.png
