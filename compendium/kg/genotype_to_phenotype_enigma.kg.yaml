- id: stmt:binary-growth-predictable-aa-nucleosides
  kind: finding
  text: Binary bacterial growth is predictable from KO gene presence/absence on amino acids (AUC 0.775) and nucleosides (0.780) and moderately on carbon sources (0.695), but is not predictable on metals, antibiotics, or nitrogen from KO content alone.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:metabolic-pathways
  entities:
  - entity:kegg-orthologs
  - entity:binary-growth-prediction
  - entity:enigma-growth-curves
  - entity:amino-acids
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: genotype_to_phenotype_enigma
    source_doc: REPORT.md
    source_section: Executive Summary
    quote: '**Binary growth IS predictable** on amino acids (AUC 0.775, tryptophan 0.933) and nucleosides (0.780) from KO presence/absence; moderately predictable on carbon sources (0.695); **not predictable** on metals, antibiotics, or nitrogen from KO content alone.'
    notebook: NB07_full_corpus_prediction.ipynb
    figure: figures/NB07_full_corpus_results.png
- id: stmt:continuous-params-not-predictable
  kind: finding
  text: Continuous growth parameters (maximum growth rate, lag time, and yield) are not predictable from KO content or bulk genomic features under cross-genus holdout, a fundamental biological limitation because gene presence encodes metabolic capability rather than kinetic rate.
  confidence: high
  topics:
