- id: stmt:exometabolomic-univariate-recovery
  kind: finding
  text: Multivariate GBDT fails to predict exometabolomic output at n=6 strains, but univariate per-metabolite point-biserial correlation recovers 940 strong gene-metabolite associations (454 production, 486 consumption) across all 62 variable metabolites.
  confidence: medium
