    contradicts: []
    refines: []
  evidence:
  - source_project: prophage_amr_comobilization
    source_doc: REPORT.md
    source_section: Literature Context
    quote: Our work extends this by demonstrating the prophage-AMR correlation at much larger scale (4,770 species vs ~100) and showing it persists after controlling for genome count rather than capsule presence.
- id: stmt:caveat-keyword-prophage-detection
  kind: caveat
  text: Prophages were identified by keyword/Pfam matching rather than dedicated prediction tools, which may include false positives like phage-defense systems and miss divergent prophages.
  confidence: high
  topics:
  - topic:mobile-genetic-elements
  - topic:functional-dark-matter
  entities:
  - entity:prophage-markers
  - entity:bakta-annotations
  - entity:phage-defense-systems
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:amr-prophage-contig-sharing
  evidence:
  - source_project: prophage_amr_comobilization
    source_doc: REPORT.md
    source_section: Limitations
    quote: Uses keyword/Pfam matching on bakta_annotations rather than dedicated prophage prediction tools (e.g., PHASTER, geNomad). May include false positives (e.g., phage-defense systems) and miss divergent prophages.
- id: stmt:caveat-correlation-not-causation
  kind: caveat
  text: The species-level association does not prove phage-mediated AMR transfer, since species with open pangenomes may independently accumulate both prophages and AMR genes.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:pangenome-architecture
  entities:
  - entity:prophages
  - entity:amr-genes
  - entity:open-pangenome
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:prophage-density-predicts-amr-breadth
  evidence:
  - source_project: prophage_amr_comobilization
    source_doc: REPORT.md
    source_section: Limitations
    quote: The H2 association does not prove phage-mediated AMR transfer; species with open pangenomes may independently accumulate both prophages and AMR genes.
- id: stmt:caveat-fitness-data-gap
  kind: caveat
  text: The fitness cost hypothesis could not be tested because the RB-TnSeq fitness browser covers only a few dozen model organisms that do not overlap well with the GTDB pangenome species analyzed.
  confidence: high
  topics:
