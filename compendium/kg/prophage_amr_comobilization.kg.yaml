    source_section: Novel Contribution
    quote: This is the first pangenome-scale analysis of prophage-AMR gene-neighborhood co-localization across 100 species (1,953 genomes, 36,041 AMR gene instances).
- id: stmt:extends-rendueles-correlation
  kind: claim
  text: The breadth finding extends prior capsule-pangenome work by demonstrating the prophage-AMR correlation at much larger scale and showing it persists after controlling for genome count rather than capsule presence.
  confidence: medium
  topics:
  - topic:amr-resistome
  - topic:mobile-genetic-elements
  entities:
  - entity:prophages
  - entity:amr-genes
  - entity:capsules
  links:
