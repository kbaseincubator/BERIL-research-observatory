    source_section: Finding 2 — The "anaerobic toolkit" signal is real but largely phylum-driven; only sulfate reduction is genuinely clay-deep enriched after phylogenetic control (H2, partially supported)
    quote: Within Bacillota_B, deep cohort vs baseline comparisons for WL (5/5 vs 15/19, p=0.54) and NiFe (5/5 vs 14/19, p=0.54) are not significant — these markers track the Bacillota_B lineage, not deep-clay habitat per se.
    notebook: 05_h2_anaerobic_toolkit.ipynb
- id: stmt:sr-survives-phylo-control
  kind: finding
  text: Only dissimilatory sulfate reduction (dsrAB-aprAB-sat) survives within-phylum control, being enriched in 5/5 deep Bacillota_B isolates versus 4/19 soil-baseline Bacillota_B isolates (OR=infinity, p=0.003, p_BH=0.04).
  confidence: high
