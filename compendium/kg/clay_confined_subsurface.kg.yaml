    quote: 'Because all 8 Opalinus genomes in BERDL trace to BRC-3 or BIC-A1 borehole isolation sources, this is a **direct, quantitative diagnostic of cultivation bias**: BERDL captures the porewater fraction, not the rock-attached fraction.'
