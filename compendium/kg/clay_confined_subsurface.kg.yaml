    source_section: Limitations
    quote: Because the cohort is cultured-only, all conclusions apply to "cultivable porewater-cultured deep-clay isolates," not to the full Mont Terri / bentonite microbial community. CPR / DPANN episymbionts (Bell 2022) and rock-attached *Geobacter* / *Geothrix* lineages are essentially absent.
- id: stmt:gapmind-ceiling-caveat
  kind: caveat
  text: The 18-pathway GapMind amino-acid universe saturates near 18 for most cultivable bacteria, limiting the resolving power of the self-sufficiency metric at the upper end.
