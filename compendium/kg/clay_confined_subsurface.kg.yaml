  evidence:
  - source_project: clay_confined_subsurface
    source_doc: REPORT.md
    source_section: Cohort
    quote: 'Anchor_deep genera include exactly the lineages Bagnoud (2016) identified as recurrent across 7 Mont Terri boreholes: **Desulfosporosinus** (×2), **BRH-c8a** (Peptococcaceae c8a in Bagnoud''s nomenclature; ×2), **BRH-c4a** (Desulfotomaculales), **Lutibacter** + **BRH-c54** (Bacteroidota), **Roseovarius** (Rhodobacterales), and **Stenotrophomonas** (the bentonite isolate).'
- id: stmt:cohort-cultured-only-caveat
  kind: caveat
  text: All conclusions apply only to cultivable porewater-cultured deep-clay isolates rather than the full Mont Terri or bentonite community, since CPR/DPANN episymbionts and rock-attached Geobacter/Geothrix lineages are essentially absent.
  confidence: high
