  kind: opportunity
  text: The SR/IR marker-rate cultivation-bias diagnostic can be rapidly applied to other subsurface cohorts (granite-hosted Olkiluoto, basalt-hosted Oak Ridge, salt-cavern) to quantify porewater bias across BERDL or future ingests.
