    quote: Compared against the Mitzscherling et al. (2023) rock-attached null distribution (SRB ~0.2%, IRB ~7% of community), SR enrichment is overwhelming (binomial p = 4.0×10⁻¹²; observed 5 vs expected 0.018 of 9).
    notebook: 06_h3_porewater_bias.ipynb
- id: stmt:cultivation-bias-diagnostic
  kind: claim
  text: Because all eight Opalinus genomes trace to BRC-3 or BIC-A1 boreholes, the cohort's marker profile provides a direct, quantitative diagnostic that BERDL captures the porewater fraction rather than the rock-attached fraction.
  confidence: high
