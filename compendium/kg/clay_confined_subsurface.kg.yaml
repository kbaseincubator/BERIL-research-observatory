    source_section: Finding 1 — Cultured clay-confined genomes carry the Bagnoud Mont Terri porewater signature, not the Mitzscherling rock-attached signature (H3, supported)
    quote: 'the marker-class profiles are mirror-image: anchor_deep is dominated by **SR_only** (5/9), anchor_shallow by **IR_only** (15/30) — a Fisher''s exact OR=∞, p=2×10⁻⁴ for SR_complete and 3.7-fold IR enrichment in shallow versus the broader soil baseline (p=0.0025).'
    notebook: 06_h3_porewater_bias.ipynb
- id: stmt:anaerobic-toolkit-enriched
  kind: finding
  text: At the cohort level, deep-confined clay isolates jointly carry the Wood-Ljungdahl + group 1 [NiFe]-hydrogenase + dissimilatory sulfate-reduction toolkit at much higher rates than soil baseline or shallow-clay cohorts (mean toolkit score 1.89 vs 0.39 vs 0.03 of 3 modules).
  confidence: high
  topics:
