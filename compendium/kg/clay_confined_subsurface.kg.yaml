- id: stmt:bagnoud-lineage-overlap
  kind: finding
  text: Anchor_deep genera include exactly the recurrent Mont Terri lineages Bagnoud identified across seven boreholes, including Desulfosporosinus and BRH-c8a (Peptococcaceae c8a), providing cross-platform validation of indigeneity.
  confidence: medium
  topics:
