- id: stmt:self-sufficient-lineages-uncultivated
  kind: claim
  text: The negative self-sufficiency result reflects that BERDL's cultured cohort excludes the extreme self-sufficient lineages (e.g. Ca. Desulforudis audaxviator) the literature highlights, which are characteristically uncultivated and recovered as MAGs or single-cell genomes.
  confidence: medium
