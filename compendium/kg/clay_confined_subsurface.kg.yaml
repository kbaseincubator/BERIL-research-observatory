- id: stmt:porewater-signature-h3
  kind: finding
  text: BERDL's cultured clay-confined deep-subsurface genomes carry the Bagnoud Mont Terri porewater signature (sulfate-reduction-rich), not the Mitzscherling rock-attached signature (iron-reduction-rich).
  confidence: high
