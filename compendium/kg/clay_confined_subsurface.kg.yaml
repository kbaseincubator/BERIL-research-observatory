    source_doc: REPORT.md
    source_section: Finding 1 — Cultured clay-confined genomes carry the Bagnoud Mont Terri porewater signature, not the Mitzscherling rock-attached signature (H3, supported)
    quote: The 9 BERDL genomes traceable to clay-confined deep-subsurface biosamples (8 from Mont Terri Opalinus boreholes, 1 from a bentonite formation) are **strongly enriched for dissimilatory sulfate-reduction (SR) markers** (5/9 = 56%) and depleted for iron-reduction (IR) markers (1/9 = 11%).
    notebook: 06_h3_porewater_bias.ipynb
    figure: figures/h3_porewater_vs_rock.png
- id: stmt:sr-enrichment-binomial
  kind: finding
  text: Sulfate-reduction marker enrichment in the clay-confined cohort is overwhelming relative to the Mitzscherling rock-attached null distribution (binomial p = 4.0x10^-12).
  confidence: high
