    source_doc: REPORT.md
    source_section: Finding 2 — The "anaerobic toolkit" signal is real but largely phylum-driven; only sulfate reduction is genuinely clay-deep enriched after phylogenetic control (H2, partially supported)
    quote: deep-confined clay isolates jointly carry the Bagnoud Wood–Ljungdahl + group 1 [NiFe]-hydrogenase + dissimilatory sulfate-reduction toolkit at strikingly higher rates than soil baseline or shallow-clay cohorts (mean toolkit score 1.89 vs 0.39 vs 0.03 of 3 modules).
    notebook: 05_h2_anaerobic_toolkit.ipynb
    figure: figures/h2_toolkit_by_cohort.png
- id: stmt:toolkit-phylum-confound
  kind: caveat
  text: 'Within-phylum control reveals the toolkit signal is largely phylogenetic: Wood-Ljungdahl and [NiFe]-hydrogenase track the Bacillota_B lineage rather than deep-clay habitat, since these markers are carried at high background rates even in soil Bacillota_B.'
  confidence: high
