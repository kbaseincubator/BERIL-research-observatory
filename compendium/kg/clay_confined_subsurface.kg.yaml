- id: stmt:self-sufficiency-not-supported
  kind: finding
  text: 'Biosynthetic self-sufficiency does not generalize to BERDL''s cultured cohort: deep-clay GapMind amino-acid pathway completeness is comparable to or slightly below the soil baseline (CheckM-filtered mean 15.5/18 vs 17.1/18, p=0.009, Cohen''s d=-0.84).'
  confidence: high
