- id: stmt:deep-shallow-mirror-image
  kind: finding
  text: Deep clay-confined isolates are dominated by sulfate-reduction-only marker profiles while shallow-clay isolates are dominated by iron-reduction-only profiles, a mirror-image contrast (Fisher OR=infinity, p=2x10^-4 for SR_complete).
  confidence: high
