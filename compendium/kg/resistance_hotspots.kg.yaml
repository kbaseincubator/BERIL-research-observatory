- id: stmt:keyword-arg-caveat
  kind: caveat
  text: The planned ARG identification by keyword matching of gene descriptions is underspecified and is expected to yield high false-positive and false-negative rates, with no defined validation strategy to confirm true resistance genes.
  confidence: medium
  topics:
  - topic:amr-resistome
  - topic:functional-dark-matter
  entities:
  - entity:antibiotic-resistance-genes
  - entity:keyword-matching
  - entity:card
  - entity:gene-annotation
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: resistance_hotspots
    source_doc: REVIEW.md
    source_section: Research Question and Approach
    quote: '**ARG identification methodology is underspecified**: The approach relies on "keyword matching" of gene descriptions, which will have high false positive/negative rates. No validation strategy is defined for confirming that matched genes are true ARGs'
- id: stmt:sequence-similarity-opportunity
  kind: opportunity
  text: ARG detection could be made more robust by using sequence similarity (BLAST/DIAMOND) against CARD protein sequences with an identity threshold rather than relying on keyword matching of annotations.
  confidence: medium
  topics:
  - topic:amr-resistome
  entities:
  - entity:card
  - entity:sequence-similarity
  - entity:antibiotic-resistance-genes
  links:
    supports: []
    contradicts:
    - stmt:keyword-arg-caveat
    refines:
    - stmt:keyword-arg-caveat
  evidence:
  - source_project: resistance_hotspots
    source_doc: REVIEW.md
    source_section: Critical Issues (Must Fix Before Implementation)
    quote: '**Recommendation**: Download CARD database ARO ontology, use sequence similarity (BLAST/DIAMOND) against CARD protein sequences, set identity threshold (≥80% for close homologs)'
- id: stmt:fitness-mapping-caveat
  kind: caveat
  text: Mapping pangenome ARG genes to fitness data is problematic because the Fitness Browser uses different model organisms (e.g., E. coli K12) and gene ID schemes than the wild-type strains in the pangenome collection.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:amr-resistome
  entities:
  - entity:fitness-browser
  - entity:gene-id-mapping
  - entity:escherichia-coli
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:fitness-tradeoff-plan
  evidence:
  - source_project: resistance_hotspots
    source_doc: REVIEW.md
    source_section: Critical Issues (Must Fix Before Implementation)
    quote: "Fitness browser uses different organisms (model organisms like E. coli K12) than pangenome (wild-type strains)\n   - Gene ID formats don't match between databases"
- id: stmt:eggnog-orthogroup-inaccessible
  kind: finding
  text: Validation against the BERDL API revealed that the eggnog_mapper_annotations table times out via REST API and the orthogroup table does not exist or is inaccessible, blocking the planned ARG-annotation queries.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:pangenome-architecture
  entities:
  - entity:eggnog-annotations
  - entity:orthogroup
  - entity:berdl
  - entity:gene-cluster
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: resistance_hotspots
    source_doc: REVIEW.md
    source_section: Data Sources
    quote: '**eggNOG annotations table inaccessible**: BERDL_VALIDATION_REAL.md reveals this critical table times out via REST API, but notebooks don''t account for this

      - **orthogroup table missing**: Validation shows this table doesn''t exist or is inaccessible, yet notebook 01 queries it'
- id: stmt:count-query-timeout
  kind: caveat
  text: COUNT(*) and SHOW TABLES queries on the billion-row pangenome tables time out, so large-table exploration must rely on LIMIT-based sampling run inside JupyterHub with Spark SQL rather than the REST API.
  confidence: high
  topics:
  - topic:pangenome-architecture
  entities:
  - entity:berdl
  - entity:spark-sql
  - entity:pangenome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: resistance_hotspots
    source_doc: REVIEW.md
    source_section: SQL Queries
    quote: '- ❌ `SHOW TABLES IN kbase_ke_pangenome` will timeout (55 seconds)

      - ❌ `COUNT(*)` queries on billion-row tables will timeout'
- id: stmt:gene-cluster-join-key
  kind: finding
  text: eggNOG functional annotations join on gene_cluster_id rather than gene_id and gene clusters are species-specific, so the recommended approach is to use the gene_cluster table with species-level grouping instead of the non-existent orthogroup table.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:microbial-ecotypes
  entities:
  - entity:gene-cluster
  - entity:eggnog-annotations
  - entity:orthogroup
  links:
