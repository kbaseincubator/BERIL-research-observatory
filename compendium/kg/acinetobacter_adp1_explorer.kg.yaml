    source_section: '2. Strong BERDL Connectivity: 4 of 5 Connection Types at >90% Match'
    quote: ADP1 is absent from the Fitness Browser, making the mutant growth data in this database a unique resource not available elsewhere in BERDL.
    notebook: 02_berdl_connection_scan.ipynb
- id: stmt:cluster-id-bridge
  kind: finding
  text: A gene junction table provided a complete bridge between the ADP1 database's mmseqs2-style cluster IDs and BERDL centroid gene IDs, mapping all 4,891 BERDL clusters to 4,081 unique ADP1 clusters despite 0% direct string match.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:adp1-model-system
  entities:
  - entity:pangenome
  - entity:cluster-id-mapping
