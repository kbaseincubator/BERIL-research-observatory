  - source_project: acinetobacter_adp1_explorer
    source_doc: REPORT.md
    source_section: '2. Strong BERDL Connectivity: 4 of 5 Connection Types at >90% Match'
    quote: All 13 BERDL-format genomes belong to the species *s__Acinetobacter_baylyi* (clade `s__Acinetobacter_baylyi--RS_GCF_000368685.1`), which has a BERDL pangenome of 3,207 core and 1,684 accessory gene clusters.
    notebook: 02_berdl_connection_scan.ipynb
- id: stmt:adp1-fitness-unique-resource
  kind: claim
  text: Because A. baylyi ADP1 is absent from the Fitness Browser, the condition-specific mutant growth data in this database is a unique fitness resource not available elsewhere in BERDL.
  confidence: high
  topics:
