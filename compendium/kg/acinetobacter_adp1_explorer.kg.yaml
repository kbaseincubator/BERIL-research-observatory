- id: stmt:conserved-core-metabolism
  kind: finding
  text: Core metabolism is highly conserved across the 14 Acinetobacter genomes, with 1,248 of 1,330 unique reactions (94%) shared by all genomes and only 20 genome-unique.
  confidence: high
  topics:
  - topic:metabolic-pathways
