    refines: []
  evidence:
  - source_project: acinetobacter_adp1_explorer
    source_doc: REPORT.md
    source_section: 4. FBA and TnSeq Essentiality Agree 74% of the Time
    quote: Of 866 genes with both FBA flux predictions and TnSeq essentiality calls, 639 (73.8%) are concordant. The discordant 26% — genes where the metabolic model and experimental data disagree — are candidates for model refinement or may reflect regulatory effects not captured by FBA.
    notebook: 04_gene_essentiality_and_fitness.ipynb
    figure: figures/fba_tnseq_concordance.png
- id: stmt:essentiality-media-dependence
  kind: finding
  text: Gene essentiality in ADP1 is media-dependent, with 499 genes essential on minimal media versus 346 on LB, reflecting the additional biosynthetic burden of minimal media.
  confidence: high
  topics:
