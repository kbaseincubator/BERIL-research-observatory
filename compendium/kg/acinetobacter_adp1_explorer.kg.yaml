  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: acinetobacter_adp1_explorer
    source_doc: REPORT.md
    source_section: 1. Rich Multi-Omics Database with 6 Data Modalities
    quote: 'The user-provided SQLite database contains 15 tables with 461,522 total rows and 135 MB of data for *Acinetobacter baylyi* ADP1 and 13 related genomes. The central `genome_features` table has 5,852 genes with 51 annotation columns spanning six data modalities: TnSeq essentiality (58% coverage), FBA metabolic flux (15%), mutant growth fitness on 8 carbon sources (39%), proteomics across 7 strains (41%), pangenome classification (54%), and functional annotations via COG/KO/Pfam/UniRef (34-55%).'
    notebook: 01_database_exploration.ipynb
    figure: figures/data_coverage_by_modality.png
- id: stmt:berdl-connectivity
  kind: finding
  text: Four of five connection types between the ADP1 database and BERDL collections matched at over 90%, including 100% of genome IDs and compounds and 91% of reactions, demonstrating deep integration with the lakehouse.
  confidence: high
  topics:
  - topic:adp1-model-system
  - topic:metabolic-pathways
  entities:
