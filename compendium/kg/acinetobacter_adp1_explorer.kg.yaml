  - source_project: acinetobacter_adp1_explorer
    source_doc: REPORT.md
    source_section: 7. Highly Conserved Core Metabolism Across 14 Genomes
    quote: Of 1,330 unique metabolic reactions, 1,248 (94%) are shared across all 14 Acinetobacter genomes (core), 62 are variable (present in 2-13 genomes), and only 20 are genome-unique. Gapfilling accounts for 7.7% of reactions on average, with 243 missing functions cataloged.
    notebook: 05_metabolic_model_and_phenotypes.ipynb
    figure: figures/reaction_conservation.png
- id: stmt:gapfilling-dependence
  kind: caveat
  text: 87% of the 121,519 growth phenotype predictions rely on at least one gapfilled reaction, tightly coupling prediction accuracy to gapfilling quality.
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:fba
  - entity:gapfilling
  - entity:growth-predictions
  - entity:metabolic-model
