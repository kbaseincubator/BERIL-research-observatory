    quote: 'Essentiality also differs between growth conditions: 499 genes are essential on minimal media vs 346 on LB, reflecting the additional biosynthetic burden of minimal media.'
    notebook: 04_gene_essentiality_and_fitness.ipynb
    figure: figures/essentiality_overview.png
- id: stmt:condition-specific-fitness
  kind: finding
  text: Mutant growth fitness across 8 carbon sources was only moderately correlated (mean pairwise r = 0.44), with urea catabolism standing apart as nearly independent of quinate and other conditions.
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:metabolic-pathways
  entities:
