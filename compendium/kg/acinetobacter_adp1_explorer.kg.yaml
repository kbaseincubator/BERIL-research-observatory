project:
  id: acinetobacter_adp1_explorer
  title: 'Report: Acinetobacter baylyi ADP1 Data Explorer'
statements:
- id: stmt:adp1-multiomics-database
  kind: finding
  text: The Acinetobacter baylyi ADP1 explorer integrates a user-provided SQLite database of 15 tables (461,522 rows, 135 MB) whose central genome_features table holds 5,852 genes with 51 annotation columns spanning six data modalities.
  confidence: high
  topics:
  - topic:adp1-model-system
  - topic:metabolic-pathways
  entities:
  - entity:adp1
  - entity:genome-features
  - entity:multi-omics-database
