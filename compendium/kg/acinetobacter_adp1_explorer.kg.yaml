  - entity:berdl
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: acinetobacter_adp1_explorer
    source_doc: REPORT.md
    source_section: '3. Pangenome Cluster ID Bridge: 100% Mapping via Gene Junction Table'
    quote: All 4,891 BERDL clusters mapped successfully to 4,081 unique ADP1 clusters (100% gene-level match across 43,754 genes). The saved mapping table (`data/cluster_id_mapping.csv`) enables joining any BERDL pangenome annotation (eggNOG, functional predictions) to ADP1 genes.
    notebook: 03_cluster_id_mapping.ipynb
- id: stmt:fba-tnseq-concordance
  kind: finding
  text: FBA flux predictions and TnSeq essentiality calls agreed for 73.8% of the 866 genes with both measurements, with the discordant 26% flagged as candidates for model refinement or regulatory effects.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:metabolic-pathways
  entities:
  - entity:fba
  - entity:tnseq-essentiality
  - entity:adp1
