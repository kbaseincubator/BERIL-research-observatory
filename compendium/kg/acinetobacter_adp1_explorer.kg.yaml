    refines: []
  evidence:
  - source_project: acinetobacter_adp1_explorer
    source_doc: REPORT.md
    source_section: 8. 87% of Growth Predictions Depend on Gapfilled Reactions
    quote: Of 121,519 growth phenotype predictions across 14 genomes, 105,376 (87%) require at least one gapfilled reaction. This heavy dependence on gapfilling means that prediction accuracy is tightly coupled to gapfilling quality.
    notebook: 05_metabolic_model_and_phenotypes.ipynb
    figure: figures/gapfilling_impact.png
