  evidence:
  - source_project: acinetobacter_adp1_explorer
    source_doc: REPORT.md
    source_section: '5. Condition-Specific Fitness: Urea and Quinate Stand Apart'
    quote: Urea fitness is nearly uncorrelated with quinate (r = 0.11) and weakly correlated with all other conditions (r = 0.12-0.28), suggesting that urea catabolism involves a largely independent set of genes.
    notebook: 04_gene_essentiality_and_fitness.ipynb
    figure: figures/growth_condition_correlation.png
