    source_doc: REPORT.md
    source_section: The Lab_Field_Ecology Connection
    quote: The lab_field_ecology project found a suggestive but non-significant correlation between lab metal tolerance (Fitness Browser) and field abundance at Oak Ridge (rho=0.50, p=0.095, n=11 genera). The present analysis provides stronger evidence for the same hypothesis at much larger scale (n=10 for heavy metal, n=176 for all contamination, d=+0.43-1.00).
