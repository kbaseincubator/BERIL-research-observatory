    source_doc: REPORT.md
    source_section: '4. Metal Utilization Phenotypes: Inconclusive'
    quote: Only 24 BacDive metal utilization test records (iron, manganese, arsenate, chromate, cobalt, zinc) matched to strains with metal tolerance scores. With 8 positive and 16 negative results, the comparison is underpowered (Mann-Whitney p=0.14, d=-0.57).
    notebook: 03_metal_utilization.ipynb
    figure: figures/utilization_vs_score.png
- id: stmt:heavy-metal-group-at-detection-limit
  kind: caveat
  text: With only 10 heavy metal isolates, the analysis was at the detection limit (minimum detectable d about 0.93), so the observed d=1.00 effect size is imprecise.
  confidence: high
  topics:
  - topic:metal-resistance
