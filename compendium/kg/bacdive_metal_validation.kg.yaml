    source_section: Genome Content Predicts Environmental Metal Tolerance
    quote: The genome-based metal tolerance score, derived from cross-species RB-TnSeq fitness data and projected onto 27,702 pangenome species via KEGG functional annotations, captures real ecological signal.
- id: stmt:signal-holds-within-phyla
  kind: finding
  text: Contamination isolates retain significantly higher metal scores than environmental isolates within Pseudomonadota and Actinomycetota, showing the signal exceeds phylogenetic structure.
  confidence: high
