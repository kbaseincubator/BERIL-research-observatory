  evidence:
  - source_project: bacdive_metal_validation
    source_doc: REPORT.md
    source_section: '5. Power Analysis: The Heavy Metal Group Was At Detection Limit'
    quote: With n=10 heavy metal isolates vs ~5,000 environmental baseline, the minimum detectable effect size at 80% power is approximately d=0.93. The observed d=1.00 barely exceeds this threshold, meaning we had just enough power to detect the effect.
    notebook: 02_environment_metal_scores.ipynb
- id: stmt:core-genome-reconciliation
  kind: claim
  text: Although metal tolerance genes are largely core within species, between-species variation in the total number of metal tolerance genes creates the environmental signal.
  confidence: medium
  topics:
  - topic:metal-resistance
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:metal-tolerance-score
  - entity:metal-specificity
  links:
    supports:
    - stmt:atlas-prediction-validated
    contradicts: []
    refines: []
  evidence:
  - source_project: bacdive_metal_validation
    source_doc: REPORT.md
    source_section: Reconciling With the Core Genome Robustness Model
    quote: The answer is that core enrichment describes the *within-species* pattern (most metal genes are present in most genomes of a species), while the *between-species* variation in the total number of metal tolerance genes creates the environmental signal.
- id: stmt:host-associated-genome-size-confounding
  kind: finding
  text: Host-associated bacteria score slightly higher than environmental ones (d=+0.14), contrary to prediction, likely due to genome-size confounding from large-genome Pseudomonadota pathogens.
  confidence: medium
  topics:
  - topic:metal-resistance
  - topic:microbial-ecotypes
  entities:
  - entity:metal-tolerance-score
  - entity:genome-size
  - entity:pseudomonadota
  - entity:bacdive
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: bacdive_metal_validation
    source_doc: REPORT.md
    source_section: Host-Associated Bacteria Score Higher Than Expected
    quote: 'The data show the opposite: host-associated bacteria score slightly but significantly higher (d=+0.14, p<0.0001). This likely reflects genome size confounding: host-associated bacteria in BacDive are dominated by Pseudomonadota pathogens (e.g., *Pseudomonas*, *Klebsiella*, *Acinetobacter*) with large genomes and correspondingly more KEGG-annotated gene clusters, inflating the normalized metal score.'
