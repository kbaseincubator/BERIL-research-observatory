    source_doc: REPORT.md
    source_section: 2. The Signal Holds Within Major Phyla
    quote: Within **Pseudomonadota** (the dominant phylum), contamination isolates still show significantly higher metal scores than environmental isolates (delta=+0.040, p<0.001). The same holds for **Actinomycetota** (delta=+0.035, p<0.001).
    notebook: 02_environment_metal_scores.ipynb
- id: stmt:phylum-confounding-partial
  kind: caveat
  text: The metal tolerance signal is absent in Bacillota and Bacteroidota, so phylogenetic confounding is only partially controlled and may reflect both real biology and limited power.
  confidence: medium
