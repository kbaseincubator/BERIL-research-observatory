    source_doc: REPORT.md
    source_section: Limitations
    quote: Only 21/58 WoM metabolites (36%) could be tested against any other database, and only 3 metabolites achieved four-way coverage. Results are robust where data exists but the untested 64% may harbor additional discordances.
- id: stmt:condition-dependent-media-mismatch
  kind: caveat
  text: WoM exometabolomics was measured on rich R2A medium while Fitness Browser fitness used minimal single C/N-source media, so condition-dependent profiles mean some WoM metabolites may only be produced on rich media.
  confidence: medium
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:web-of-microbes
  - entity:fitness-browser
  - entity:growth-media
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:high-cross-database-concordance
  evidence:
  - source_project: fw300_metabolic_consistency
    source_doc: REPORT.md
    source_section: Limitations
    quote: WoM exometabolomics was measured on R2A (rich medium), while FB fitness was measured on minimal medium with single C/N sources. Metabolic profiles are condition-dependent, and some metabolites detected in WoM may only be produced on rich media.
