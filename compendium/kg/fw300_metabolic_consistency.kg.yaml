    source_section: 'Tryptophan: a cross-feeding candidate'
    quote: Tryptophan secretion by a prototroph that cannot re-assimilate it is a hallmark of cross-feeding potential — providing essential amino acids to auxotrophic community members (Fritts et al. 2021; Giri et al. 2021).
