- id: stmt:production-not-utilization
  kind: claim
  text: Metabolite production and utilization measure fundamentally different capabilities, so a bacterium can secrete a metabolite for ecological purposes without being able to catabolize it for energy.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:microbiome-engineering
  entities:
  - entity:overflow-metabolism
  - entity:metabolite-secretion
  - entity:cross-feeding
  links:
    supports:
    - stmt:tryptophan-overflow-discordance
    contradicts: []
    refines: []
  evidence:
  - source_project: fw300_metabolic_consistency
    source_doc: REPORT.md
    source_section: 'Production vs. utilization: not a contradiction'
    quote: A bacterium can produce a metabolite via overflow metabolism, biosynthetic byproduct release, or active secretion for ecological purposes (signaling, cross-feeding, antimicrobial) without being able to catabolize it for energy.
- id: stmt:tryptophan-cross-feeding-candidate
  kind: claim
  text: Tryptophan secretion by FW300-N2E3, a prototroph that cannot re-assimilate it, is a hallmark of cross-feeding potential that could supply essential amino acids to auxotrophic community members.
  confidence: medium
