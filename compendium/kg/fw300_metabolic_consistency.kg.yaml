    source_section: 'Three-way concordance: WoM + FB + BacDive + GapMind'
    quote: 'These represent the gold standard of cross-database consistency: the organism produces the metabolite, grows on it, the species utilizes it, and the pathway is computationally complete.'
- id: stmt:produced-metabolites-species-norm-utilization
  kind: finding
  text: Metabolites produced by FW300-N2E3 are utilized at the species baseline rate, with a binomial test showing no significant difference between produced-metabolite utilization (3/7) and the P. fluorescens baseline (22/80).
  confidence: medium
  topics:
  - topic:metabolic-pathways
  - topic:microbial-ecotypes
  entities:
  - entity:bacdive
  - entity:metabolite-utilization
  - entity:pseudomonas-fluorescens
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: fw300_metabolic_consistency
    source_doc: REPORT.md
    source_section: 1. High overall concordance across databases (94% mean concordance)
    quote: A binomial test comparing the BacDive utilization rate for WoM-produced metabolites (3/7 = 43%) against the overall *P. fluorescens* baseline (22/80 = 27.5%) shows no significant difference (p = 0.40), indicating that the metabolites FW300-N2E3 produces are utilized at a rate consistent with the species norm.
- id: stmt:novel-exometabolomics-fitness-integration
  kind: claim
  text: This project is the first to systematically compare Web of Microbes exometabolomic profiles with Fitness Browser gene fitness data, despite both datasets coming from the same ENIGMA/Arkin Lab research program.
  confidence: medium
  topics:
