    source_section: 4. Rich fitness landscapes for produced metabolites
    quote: Across 21 WoM metabolites with matching FB experiments, FW300-N2E3 showed significant gene fitness effects (|fit| > 1, |t| > 4) for 601 unique genes, with 4,764 total significant gene-condition hits.
    notebook: 02_wom_fb_integration.ipynb
    figure: figures/fitness_hits_per_metabolite.png
- id: stmt:pleiotropic-housekeeping-genes
  kind: claim
  text: The fitness genes shared across all metabolite conditions are essential amino acid biosynthesis enzymes representing housekeeping fitness rather than substrate-specific catabolism.
  confidence: high
