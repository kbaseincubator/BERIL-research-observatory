    source_doc: REPORT.md
    source_section: 3. All 13 GapMind-matched metabolites have complete pathways
    quote: All 13 also showed growth in Fitness Browser experiments. This perfect agreement between computational prediction and experimental measurement validates GapMind's accuracy for this organism.
    notebook: 03_consistency_matrix.ipynb
    figure: figures/consistency_heatmap.png
- id: stmt:rich-fitness-landscapes
  kind: finding
  text: Across 21 produced metabolites with matching Fitness Browser experiments, FW300-N2E3 showed significant fitness effects for 601 unique genes and 4,764 total significant gene-condition hits.
  confidence: high
