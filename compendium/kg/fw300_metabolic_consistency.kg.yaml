project:
  id: fw300_metabolic_consistency
  title: 'Report: Metabolic Consistency of Pseudomonas FW300-N2E3 Across Four BERDL Databases'
statements:
- id: stmt:high-cross-database-concordance
  kind: finding
  text: Across the testable metabolites produced by Pseudomonas FW300-N2E3, exometabolomic, fitness, utilization, and pathway databases agree at a 0.94 mean concordance score, with no fully discordant metabolites.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:gene-fitness
  entities:
  - entity:fw300-n2e3
  - entity:web-of-microbes
  - entity:fitness-browser
  - entity:metabolic-consistency
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: fw300_metabolic_consistency
    source_doc: REPORT.md
    source_section: 1. High overall concordance across databases (94% mean concordance)
    quote: Among these testable metabolites, 17/21 (81%) were fully concordant across all matched databases, 4/21 (19%) were partially concordant, and none were fully discordant. The mean concordance score was 0.94.
    notebook: 03_consistency_matrix.ipynb
    figure: figures/concordance_summary.png
- id: stmt:tryptophan-overflow-discordance
  kind: finding
  text: FW300-N2E3 produces tryptophan and grows on it as a sole carbon source while no BacDive P. fluorescens strain can catabolize it, marking the strongest biologically meaningful production-vs-utilization discordance, consistent with overflow metabolism for cross-feeding or signaling.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:microbiome-engineering
  entities:
  - entity:tryptophan
  - entity:fw300-n2e3
  - entity:overflow-metabolism
  - entity:cross-feeding
  - entity:bacdive
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: fw300_metabolic_consistency
    source_doc: REPORT.md
    source_section: '2. Tryptophan overflow: the strongest biologically meaningful discordance'
    quote: 'This is the most robust discordance in the dataset: the organism produces tryptophan and grows on it as a sole carbon source, but the species as a whole cannot catabolize it. This pattern is consistent with tryptophan overflow metabolism serving a cross-feeding or signaling function rather than a catabolic one.'
    notebook: 03_consistency_matrix.ipynb
- id: stmt:gapmind-pathways-validated
  kind: finding
  text: All 13 GapMind-matched metabolites had complete predicted pathways for FW300-N2E3 and all showed growth in Fitness Browser experiments, validating GapMind pathway prediction accuracy for this organism.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:gene-fitness
  entities:
