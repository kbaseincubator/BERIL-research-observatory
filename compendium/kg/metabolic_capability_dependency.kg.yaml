project:
  id: metabolic_capability_dependency
  title: 'Report: Metabolic Capability vs Metabolic Dependency'
statements:
- id: stmt:latent-capability-fraction
  kind: finding
  text: Across 1,695 pathway-organism pairs from 48 organisms, 15.8% of genomically complete pathways were classified as latent capabilities, encoded by the genome but showing no detectable fitness importance under tested conditions.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:gene-fitness
  entities:
  - entity:gapmind
  - entity:fitness-browser
  - entity:latent-capability
  - entity:metabolic-pathway
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: metabolic_capability_dependency
    source_doc: REPORT.md
    source_section: 'H1 Supported: A Substantial Fraction of Complete Pathways Are Functionally Neutral'
    quote: 15.8% of genomically complete pathways were classified as latent capabilities
    notebook: 03_classify_pathway_dependencies.ipynb
    figure: figures/nb03_stacked_bar.png
- id: stmt:carbon-vs-aa-latency
  kind: finding
  text: Pathway category strongly predicted dependency class, with carbon source utilization pathways most likely to be latent (24.3%) while amino acid biosynthesis pathways were predominantly active (63.5% active, 6.5% latent).
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:gapmind
  - entity:carbon-utilization
  - entity:amino-acid-biosynthesis
  - entity:latent-capability
  links:
    supports:
    - stmt:latent-capability-fraction
    contradicts: []
    refines: []
  evidence:
  - source_project: metabolic_capability_dependency
    source_doc: REPORT.md
    source_section: 'H1 Supported: A Substantial Fraction of Complete Pathways Are Functionally Neutral'
    quote: Pathway category strongly predicted dependency class (χ²=163.6, df=4, p=2.5×10⁻³⁴). Carbon source utilization pathways were most likely to be latent (24.3% latent, 39.8% active), while amino acid biosynthesis pathways were predominantly active (63.5% active, 6.5% latent).
    notebook: 03_classify_pathway_dependencies.ipynb
    figure: figures/nb03_stacked_bar.png
- id: stmt:latent-fraction-threshold-robust
  kind: claim
  text: The latent fraction is moderately sensitive to classification thresholds, ranging from 4.7% to 21.1% across 16 threshold combinations, but the qualitative conclusion that a non-trivial fraction of complete pathways are fitness-neutral holds across the full range tested.
  confidence: medium
  topics:
  - topic:metabolic-pathways
  - topic:gene-fitness
  entities:
  - entity:latent-capability
  - entity:classification-threshold
  - entity:fitness-browser
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:latent-capability-fraction
  evidence:
  - source_project: metabolic_capability_dependency
    source_doc: REPORT.md
    source_section: Classification Thresholds
    quote: the latent fraction ranged from 4.7% to 21.1% (SD = 5.9 percentage points across 16 threshold combinations). At the default thresholds the result is 15.8%.
    notebook: 03_classify_pathway_dependencies.ipynb
- id: stmt:pathway-conservation-undifferentiated
  kind: finding
  text: Pathway-level conservation rates did not differ between latent capabilities and active dependencies, so the Black Queen Hypothesis was not supported at the per-pathway conservation level (H2a).
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:metabolic-pathways
  entities:
  - entity:black-queen-hypothesis
  - entity:conservation-rate
  - entity:latent-capability
  - entity:pangenome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: metabolic_capability_dependency
    source_doc: REPORT.md
    source_section: 'H2 Mixed: Pathway-Level Conservation Undifferentiated; Pangenome Openness Correlated with Latent Rate'
    quote: Conservation rates (fraction of species genomes carrying a complete pathway) did not differ between latent capabilities and active dependencies
    notebook: 04_black_queen_test.ipynb
    figure: figures/nb04_conservation_boxplot.png
- id: stmt:openness-correlates-latent-rate
  kind: finding
  text: After aggregating 41 organisms to 22 unique species clades, the per-clade fraction of latent capabilities correlated positively with pangenome openness (Spearman rho = 0.69, p = 0.0004), supporting the Black Queen framework at the species level (H2b).
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:metabolic-pathways
  entities:
  - entity:black-queen-hypothesis
  - entity:pangenome-openness
  - entity:latent-capability
  - entity:species-clade
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: metabolic_capability_dependency
    source_doc: REPORT.md
    source_section: 'H2 Mixed: Pathway-Level Conservation Undifferentiated; Pangenome Openness Correlated with Latent Rate'
    quote: the fraction of latent capabilities per clade correlated positively with pangenome openness (Spearman ρ = 0.69, p = 0.0004, n = 22 clades). Clades with more fitness-neutral complete pathways tend to have more dynamic, less-conserved pangenomes — consistent with the Black Queen framework at the species level.
    notebook: 04_black_queen_test.ipynb
    figure: figures/nb04_openness_scatter.png
- id: stmt:black-queen-genome-dynamics-level
  kind: claim
  text: The contrast between supported clade-level openness and unsupported pathway-level conservation suggests the Black Queen signal operates at the level of genome dynamics and community context rather than in per-pathway cross-genome conservation ratios.
  confidence: medium
  topics:
  - topic:pangenome-architecture
