    contradicts: []
    refines: []
  evidence:
  - source_project: metabolic_capability_dependency
    source_doc: REPORT.md
    source_section: 'H3 Supported: All Target Species Show Distinct Metabolic Ecotypes'
    quote: Metabolic clusters correlated significantly with isolation environment in *Salmonella enterica* (χ²=1570.2, df=25, p<0.0001) and *Phenylobacterium* sp. (χ²=12.2, df=1, p=0.0005), but not in marine organisms (*Stutzerimonas*, *Alteromonas*).
    notebook: 05_metabolic_ecotypes.ipynb
- id: stmt:novel-latent-fraction-quantification
  kind: claim
  text: This work provides a systematic quantification of the latent capability fraction across diverse bacteria, yielding the testable prediction that carbon source utilization pathways are 3.7-fold more likely to be latent than amino acid biosynthesis pathways (24.3% vs 6.5%).
  confidence: medium
