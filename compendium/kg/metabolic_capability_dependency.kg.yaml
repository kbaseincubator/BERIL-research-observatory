  evidence:
  - source_project: metabolic_capability_dependency
    source_doc: REPORT.md
    source_section: 'H2: Mixed Results — Pangenome Openness Supports the Black Queen Framework; Pathway Conservation Does Not'
    quote: This divergence suggests that the Black Queen signal operates at the level of genome dynamics and community context, rather than being detectable in per-pathway cross-genome conservation ratios.
- id: stmt:metabolic-ecotypes-widespread
  kind: finding
  text: All 10 target species with at least 50 genomes and at least 15 variable pathways showed meaningful metabolic clustering (all silhouette scores > 0.2), demonstrating that within-species metabolic pathway heterogeneity is a general feature.
  confidence: high
  topics:
