    quote: All 10 target species (≥50 genomes, ≥15 variable pathways) showed meaningful metabolic clustering (all silhouette scores > 0.2).
    notebook: 05_metabolic_ecotypes.ipynb
    figure: figures/nb05_pca_all_species.png
- id: stmt:ecotypes-environment-linked-copiotrophs
  kind: finding
  text: Metabolic clusters correlated significantly with isolation environment in the copiotrophs Salmonella enterica and Phenylobacterium sp., but not in marine oligotrophs such as Stutzerimonas and Alteromonas.
  confidence: medium
  topics:
  - topic:microbial-ecotypes
  - topic:environment-biogeography
  entities:
  - entity:metabolic-ecotype
  - entity:salmonella-enterica
  - entity:isolation-source
  - entity:marine-bacteria
