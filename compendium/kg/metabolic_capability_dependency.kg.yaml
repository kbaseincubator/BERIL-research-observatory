    source_section: Limitations
    quote: 'Fitness experiments are biased toward laboratory conditions**: lab media may not reflect the full range of conditions under which pathways are expressed, inflating the latent fraction.'
- id: stmt:taxid-matching-failed-caveat
  kind: caveat
  text: Linking Fitness Browser organisms to GapMind species clades via NCBI taxonomy IDs returned zero matches because the gtdb_metadata taxid column contained boolean strings rather than numeric taxids, so analyses relied on organism-level aggregates without explicit clade linkage.
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
