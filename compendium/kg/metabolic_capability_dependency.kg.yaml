  evidence:
  - source_project: metabolic_capability_dependency
    source_doc: REPORT.md
    source_section: Limitations
    quote: an attempt to link Fitness Browser organisms to GapMind species clades via NCBI taxonomy IDs from `kbase_ke_pangenome.gtdb_metadata` returned zero matches because the relevant column contained boolean strings rather than numeric taxids.
- id: stmt:h2b-non-independence-caveat
  kind: caveat
  text: The H2b openness-latency correlation has a non-independence problem because multiple Fitness Browser organisms map to the same GapMind species clade and share an identical pangenome openness value.
  confidence: medium
  topics:
