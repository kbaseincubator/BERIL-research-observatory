- id: stmt:lab-condition-bias-caveat
  kind: caveat
  text: Fitness experiments are biased toward laboratory conditions, so lab media may not reflect the full range of conditions under which pathways are expressed, potentially inflating the latent fraction.
  confidence: high
  topics:
