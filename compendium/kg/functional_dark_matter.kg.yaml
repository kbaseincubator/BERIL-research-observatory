- id: stmt:top-100-prioritization
  kind: finding
  text: Multi-dimensional scoring across 6 evidence axes ranked 17,344 dark genes and produced 100 top candidates spanning 22 organisms, dominated by Shewanella MR-1, P. putida N2C3 and Marinobacter, with 82% having high-confidence functional hypotheses supported by 3 or more evidence types.
  confidence: high
