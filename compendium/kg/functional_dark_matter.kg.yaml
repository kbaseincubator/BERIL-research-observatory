    source_doc: REPORT.md
    source_section: Future Directions
    quote: '**Execute the dual-route experimental campaign** — Route A (NB09, evidence-weighted) identifies 42 organisms covering 95% of composite priority; start with MR-1 stress/nitrogen screens and *E. coli* CRISPRi for targeted hypothesis testing. Route B (NB11, conservation-weighted) identifies 42 organisms covering 95.6% of importance-weighted priority; start with *S. meliloti*, *P. putida*, and MR-1 broad phenotypic screens for novel function discovery.'
