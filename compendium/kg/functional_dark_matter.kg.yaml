    source_section: 'Finding 6: Within-species biogeographic analysis reveals 10 dark gene clusters with significant environmental enrichment'
    quote: Among 151 accessory dark gene clusters testable via carrier vs. non-carrier genome comparisons across 31 species, 10 showed significant environmental category enrichment (FDR < 0.05) and 1 showed significant AlphaEarth embedding divergence.
    notebook: 03_biogeographic_analysis.ipynb
    figure: figures/fig08_env_distribution.png
- id: stmt:lab-field-concordance-nmdc
  kind: finding
  text: Lab fitness phenotypes predict field environmental distribution for 61.7% of testable dark gene clusters, and independent NMDC metagenomic correlations confirmed all 4 pre-registered abiotic predictions (nitrogen, pH and oxygen), supporting a real lab-to-field link.
  confidence: medium
