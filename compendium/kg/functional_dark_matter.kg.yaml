    quote: Over half of dark gene OGs are pan-bacterial — present across multiple phyla and thousands of species — demonstrating that functional dark matter is not a minor annotation gap but a fundamental limitation in our understanding of broadly conserved biology.
    notebook: 11_conservation_classes.ipynb
    figure: figures/fig35_top_knowledge_gaps.png
- id: stmt:bakta-reannotation-overestimate
  kind: caveat
  text: Bakta v1.12.0 reclassifies 83.7% of pangenome-linked dark genes as not hypothetical and assigns all 100 top candidates product descriptions, indicating the 57,011 dark gene count overestimates the truly uncharacterized genes because many are annotated in databases the Fitness Browser vintage did not check.
  confidence: high
  topics:
