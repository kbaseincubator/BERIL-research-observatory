  evidence:
  - source_project: functional_dark_matter
    source_doc: REPORT.md
    source_section: 'Finding 1: One in four bacterial genes is functionally dark, and 17,344 have experimentally measurable phenotypes'
    quote: Across 48 Fitness Browser organisms (228,709 genes), 57,011 (24.9%) lack functional annotation ("hypothetical protein," DUF, or "uncharacterized"). Of these, 7,787 show strong fitness effects (|fitness| ≥ 2 in at least one condition), and 9,557 are essential (no viable transposon mutants). Together, these 17,344 genes represent the experimentally actionable "dark matter" — genes with clear biological importance but unknown function.
    notebook: 01_integration_census.ipynb
    figure: figures/fig01_annotation_breakdown.png
- id: stmt:dark-genes-pangenome-modules
  kind: finding
  text: Of 57,011 dark genes, 39,532 (69.3%) link to the pangenome and 6,142 belong to ICA fitness modules, enabling guilt-by-association function predictions, with 511 being both accessory and strong-fitness prime biogeographic candidates.
  confidence: high
  topics:
