- id: stmt:dual-route-experimental-campaign
  kind: opportunity
  text: 'A dual-route experimental campaign can characterize dark genes efficiently: Route A (evidence-weighted) starts with MR-1 stress/nitrogen RB-TnSeq screens and E. coli CRISPRi for hypothesis testing, while Route B (conservation-weighted) starts with S. meliloti, P. putida and MR-1 broad screens to discover functions of conserved knowledge gaps.'
  confidence: medium
