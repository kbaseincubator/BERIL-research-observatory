  kind: opportunity
  text: AlphaFold2 structure prediction offers a route to confirm functional hypotheses for the top 100 candidates and the 1,853 nearly-characterized T5 Dawn genes, and is the only remaining computational inference strategy for the 4,273 T1 Void genes that lack all other evidence.
