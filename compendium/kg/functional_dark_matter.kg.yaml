- id: stmt:biogeographic-enrichment
  kind: finding
  text: Within-species carrier vs non-carrier comparisons across 31 species identify 10 accessory dark gene clusters with significant environmental enrichment (FDR < 0.05), including Pseudomonas putida stress/nitrogen genes enriched in clinical isolates and P. syringae genes enriched in plant-associated genomes.
  confidence: medium
