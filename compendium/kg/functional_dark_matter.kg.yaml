- id: stmt:darkness-spectrum-tiers
  kind: finding
  text: A darkness spectrum classifies all 57,011 dark genes into 5 tiers from T1 Void (4,273 genes with zero evidence) to T5 Dawn (1,853 nearly-characterized genes), and a weighted set-cover of 42 organisms from 28 genera covers 95% of actionable dark gene priority.
  confidence: high
  topics:
