  title: 'Report: Functional Dark Matter — Experimentally Prioritized Novel Genetic Systems'
statements:
- id: stmt:dark-gene-census-actionable
  kind: finding
  text: Across 48 Fitness Browser organisms, 57,011 genes (24.9%) lack functional annotation and 17,344 of these have experimentally measurable phenotypes (strong fitness effects or essentiality), defining the actionable bacterial dark matter.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:gene-fitness
