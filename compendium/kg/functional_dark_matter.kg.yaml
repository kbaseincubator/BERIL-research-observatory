    quote: The spectrum ranges from T1 Void (4,273 genes, 0 evidence lines — truly unknown) through T5 Dawn (1,853 genes, 5–6 evidence lines — nearly characterized).
    notebook: 09_final_synthesis.ipynb
    figure: figures/fig25_darkness_spectrum.png
- id: stmt:pangenome-conservation-knowledge-gaps
  kind: claim
  text: Querying the full 27,690-species GTDB pangenome shows over half of dark gene ortholog groups are pan-bacterial (kingdom-level), demonstrating that functional dark matter is not a minor annotation gap but a fundamental limitation in understanding broadly conserved biology.
  confidence: medium
  topics:
