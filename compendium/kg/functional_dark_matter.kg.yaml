  kind: finding
  text: Cross-species synteny and co-fitness analysis identifies 10,150 dark gene-operon partner pairs conserved in three or more organisms and 998 double-validated pairs with both conserved synteny and strong co-fitness, the highest-confidence functional predictions in the study.
