    source_doc: REPORT.md
    source_section: 'Finding 15: Bakta reannotation reclassifies 83.7% of linked dark genes — all 100 top candidates gain functional descriptions'
    quote: Of 39,532 dark genes with pangenome links, **33,105 (83.7%) are reclassified by bakta as NOT hypothetical** — bakta's PSC/PSCC pipeline assigns them a product description where the Fitness Browser had only "hypothetical protein." This represents 58.1% of all dark genes.
    notebook: 12_bakta_enrichment.ipynb
    figure: figures/fig33_bakta_reclassification.png
- id: stmt:proteobacteria-bias-caveat
  kind: caveat
  text: The 48 Fitness Browser organisms are 77% Pseudomonadota, with Actinobacteria absent and Firmicutes critically underrepresented, biasing prioritization toward Gammaproteobacteria and leaving major bacterial phyla uncharacterized for dark gene discovery.
  confidence: high
