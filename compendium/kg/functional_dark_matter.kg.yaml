  evidence:
  - source_project: functional_dark_matter
    source_doc: REPORT.md
    source_section: 'Finding 2: 39,532 dark genes link to the pangenome; 6,142 belong to co-regulated fitness modules'
    quote: Of 57,011 dark genes, 39,532 (69.3%) have pangenome links via the `conservation_vs_fitness` project. Among these, 12,686 are accessory (environment-specific) and 511 are both accessory and have strong fitness effects — the prime candidates for biogeographic analysis. Additionally, 6,142 dark genes belong to ICA fitness modules from the `fitness_modules` project, providing guilt-by-association function predictions.
    notebook: 01_integration_census.ipynb
    figure: figures/fig03_dark_gene_coverage.png
- id: stmt:cross-organism-concordance
  kind: finding
  text: Among dark gene ortholog groups present in three or more Fitness Browser organisms, 65 show fitness concordance, meaning orthologs of the same unknown gene produce fitness effects under the same condition classes across different bacterial species.
  confidence: high
