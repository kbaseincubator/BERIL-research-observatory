    source_section: 'Finding 8: Top 100 prioritized candidates span 22 organisms with 82% high-confidence functional hypotheses'
    quote: 'The top 100 candidates (score range: 0.624–0.715) come from 22 organisms, with Shewanella MR-1 (25 candidates), *P. putida* N2C3 (18), and Marinobacter (9) most represented. 82% of top candidates have high-confidence functional hypotheses supported by 3+ evidence types, and 85/100 have module-based function predictions.'
    notebook: 05_prioritization_dossiers.ipynb
    figure: figures/fig14_top20_dossiers.png
- id: stmt:essential-dark-genes-crispri
  kind: finding
  text: The 9,557 essential dark genes, which make up 55% of the actionable dark matter, were ranked separately using gene-neighbor context and cross-organism conservation, yielding the top 50 CRISPRi-ready candidates since essential genes score poorly in the fitness-centric framework.
  confidence: high
  topics:
