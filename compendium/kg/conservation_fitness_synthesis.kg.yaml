    source_doc: README.md
    source_section: Overview
    quote: This synthesis connects two large-scale datasets -- the Fitness Browser (RB-TnSeq mutant fitness data for ~194,000 genes across 43 bacteria) and the KBase pangenome (gene cluster conservation across 27,690 microbial species) -- to ask whether "important" means "conserved."
- id: stmt:figure1-text-discrepancy
  kind: caveat
  text: 'The reported 16pp fitness-conservation gradient is undermined by a discrepancy: Figure 1 shows essential genes at 86% and always-neutral at 78% (an ~8pp gradient) rather than the 82% and 66% stated in the prose, because the notebook computed percentages only over successfully mapped genes.'
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:fitness-conservation-gradient
  - entity:gene-mapping
  - entity:core-genome
  links:
