  text: Connecting the Fitness Browser (RB-TnSeq fitness for ~194,000 genes across 43 bacteria) to the KBase pangenome (gene cluster conservation across 27,690 microbial species) shows that the conserved genome is the most functionally active part of the genome rather than the most inert.
  confidence: high
