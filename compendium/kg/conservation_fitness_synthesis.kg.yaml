    notebook: 01_summary_figures.ipynb
    figure: figures/core_genome_active.png
- id: stmt:accessory-not-streamlining-burden
  kind: finding
  text: Contrary to the streamlining hypothesis, accessory genes are LESS costly than core genes rather than systematically burdensome, and module families spanning more organisms do not have higher core fractions (rho=-0.01, p=0.91).
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:gene-fitness
  entities:
