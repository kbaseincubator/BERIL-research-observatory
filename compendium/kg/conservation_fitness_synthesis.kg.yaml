    contradicts: []
    refines: []
  evidence:
  - source_project: conservation_fitness_synthesis
    source_doc: REPORT.md
    source_section: What We Did Not Find
    quote: 'Family breadth doesn''t predict conservation**: Module families spanning more organisms don''t have higher core fractions (rho=-0.01, p=0.91). The baseline is already so high there''s no room for a gradient.

      - **Accessory genes are NOT systematically burdensome**: Contrary to the "streamlining" hypothesis, accessory genes are LESS costly than core genes, not more.'
