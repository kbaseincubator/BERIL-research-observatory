    contradicts:
    - stmt:fitness-conservation-gradient
    refines: []
  evidence:
  - source_project: conservation_fitness_synthesis
    source_doc: REVIEW.md
    source_section: Methodology
    quote: the actual Figure 1 shows Essential at **86%** and Always neutral at **78%** — a much narrower gradient of ~8 percentage points rather than the claimed 16pp. The gene counts in the figure also differ from the upstream table (e.g., 80,462 always-neutral in figure vs 94,889 upstream). This appears to result from the notebook computing percentages only over the 168,624 successfully mapped genes, while the upstream project included all 194,216 genes
- id: stmt:essential-core-rate-inconsistency
  kind: caveat
  text: 'The synthesis reports two essential-gene core rates without reconciling them: 82% (from fitness_effects_conservation across 43 organisms, counting unmapped essential genes as non-core) versus 86% (from conservation_vs_fitness across 33 organisms with high mapping coverage).'
  confidence: medium
  topics:
