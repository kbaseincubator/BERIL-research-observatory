    quote: Core genes are MORE likely to be burdens** -- 24.4% show positive fitness when deleted (mutant grows better) vs 19.9% for accessory genes
    notebook: 01_summary_figures.ipynb
- id: stmt:core-genes-condition-specific-tradeoffs
  kind: finding
  text: Core genes are 1.78x more likely to have strong condition-specific phenotypes and 1.29x more likely to be trade-offs that are both important and burdensome depending on conditions.
  confidence: high
