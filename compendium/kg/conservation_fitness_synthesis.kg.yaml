    figure: figures/core_genome_active.png
- id: stmt:burden-paradox-function-specific
  kind: finding
  text: 'The burden paradox is function-specific: motility and chemotaxis (+7.8pp), RNA metabolism (+12.9pp), and protein metabolism (+6.2pp) genes drive the core-burden excess, while cell wall genes reverse it because non-core cell wall genes are more burdensome.'
  confidence: high
