    contradicts: []
    refines: []
  evidence:
  - source_project: conservation_fitness_synthesis
    source_doc: REPORT.md
    source_section: The Gradient
    quote: There is a clear, quantitative gradient from essential genes (82% core) to always-neutral genes (66% core). More important genes are more conserved -- but the effect is modest. Even genes with no detectable fitness effect in any experiment are 66% core.
    notebook: 01_summary_figures.ipynb
    figure: figures/fitness_conservation_gradient.png
- id: stmt:burden-paradox-core-more-costly
  kind: finding
  text: Contrary to a housekeeping model, core genes are MORE likely to be burdens, with 24.4% showing positive fitness when deleted versus 19.9% for accessory genes, making the conserved genome the most functionally active part of the genome rather than the most inert.
  confidence: high
