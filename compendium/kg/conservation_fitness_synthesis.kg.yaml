  title: 'Report: Gene Conservation, Fitness, and the Architecture of Bacterial Genomes'
statements:
- id: stmt:fitness-conservation-gradient
  kind: finding
  text: A quantitative fitness-conservation gradient runs from essential genes (82% core) to always-neutral genes (66% core) across 194,216 protein-coding genes in 43 bacteria, so more important genes are more conserved but the effect is modest.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
