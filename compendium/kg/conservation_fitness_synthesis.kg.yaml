    source_doc: REPORT.md
    source_section: The Resolution
    quote: The 28,017 genes that are simultaneously **costly in the lab AND conserved in the pangenome** are the strongest evidence for purifying selection in natural environments -- nature maintains them despite their metabolic cost. The 5,526 genes that are costly AND dispensable are candidates for ongoing gene loss.
    notebook: 01_summary_figures.ipynb
    figure: figures/selection_signature.png
- id: stmt:fitness-modules-core-enriched
  kind: finding
  text: ICA decomposition identified 1,116 co-regulated fitness modules across 32 organisms that are significantly enriched in core genes (86% core vs 81.5% baseline, OR=1.46, p=1.6e-87), with 59% of modules being more than 90% core genes.
  confidence: high
