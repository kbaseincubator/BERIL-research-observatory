      - **Core genes are MORE likely to be trade-offs** -- genes that are both important AND burdensome (depending on conditions) are 1.29x more likely core'
    notebook: 01_summary_figures.ipynb
- id: stmt:lab-impoverished-proxy
  kind: claim
  text: Laboratory conditions are an impoverished proxy for natural selection because a gene that appears costly in rich media may be essential in soil, biofilm, host tissue, or other natural conditions, so the lab captures the cost of maintaining genes while the pangenome captures the evolutionary pressure to keep them.
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:environment-biogeography
  entities:
  - entity:gene-fitness
  - entity:purifying-selection
  - entity:pangenome
  links:
    supports:
    - stmt:selection-signature-purifying
    contradicts: []
    refines: []
  evidence:
  - source_project: conservation_fitness_synthesis
    source_doc: REPORT.md
    source_section: The Resolution
    quote: 'Lab conditions are an impoverished proxy for nature.**


      A gene that shows positive fitness when deleted in rich media may be essential for survival in soil, biofilm, host tissue, or any of the thousands of conditions bacteria face in their natural habitats. The lab captures the *cost* of maintaining these genes; the pangenome captures the *evolutionary pressure* to keep them.'
    notebook: 01_summary_figures.ipynb
- id: stmt:selection-signature-purifying
  kind: finding
  text: A selection-signature matrix identifies 28,017 genes that are simultaneously costly in the lab and conserved in the pangenome as the strongest evidence for purifying selection in natural environments, while 5,526 costly-and-dispensable genes are candidates for ongoing gene loss.
  confidence: high
  topics:
  - topic:gene-fitness
