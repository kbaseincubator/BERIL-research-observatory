    source_doc: REVIEW.md
    source_section: Methodology
    quote: The prose uses 82% (from `fitness_effects_conservation`, 43 organisms) while the methods table reports 86% (from `conservation_vs_fitness`, 33 organisms). Both are correct for their datasets, but the synthesis does not explain why these differ.
- id: stmt:unmapped-genes-percent-core
  kind: caveat
  text: Throughout the synthesis, percent core is computed as the fraction of all protein-coding genes (including unmapped genes of unknown conservation) that are core, which treats unmapped genes as not confirmed core and can shift reported gradients.
  confidence: medium
  topics:
