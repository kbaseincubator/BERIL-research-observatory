- id: stmt:cocontamination-confound
  kind: caveat
  text: All associations are observational and co-contamination by co-varying metals (Cr, Cu, Pb, Zn) in industrial soils confounds whether COG-metal associations are metal-specific or reflect a generic multi-metal stress response.
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:environment-biogeography
  entities:
  - entity:co-contamination
  - entity:soil-metals
  - entity:cog-categories
  links:
