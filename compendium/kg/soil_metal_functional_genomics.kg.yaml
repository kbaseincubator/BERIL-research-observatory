      associations; many may be statistically significant but biologically small.'
- id: stmt:conditional-r2-caveat
  kind: caveat
  text: The reported db-RDA R squared of 0.799 is conditional on project accession and may describe residual rather than total variance, so the unconditional R squared of metals alone must be reported alongside it.
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:environment-biogeography
  entities:
  - entity:db-rda
  - entity:batch-effects
  - entity:soil-metals
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:dbrda-variance
  evidence:
  - source_project: soil_metal_functional_genomics
    source_doc: REPORT.md
    source_section: Critical Assessment
    quote: 'If batch effects (project) account

      for the majority of community COG variance, the reported R² describes how well metals

      explain the *residual* variance, not the *total* variance. The unconditional R² of metals

      alone — without first removing project effects — is not reported and may be substantially

      lower.'
- id: stmt:fdr-anticonservative
  kind: caveat
  text: With a 60% discovery rate across 3,915 non-independent tests, Benjamini-Hochberg FDR correction is anti-conservative under positive correlation among co-contaminating metals, so the true FDR is likely higher than reported.
  confidence: medium
  topics:
  - topic:metal-resistance
  entities:
  - entity:fdr-correction
  - entity:co-contamination
  - entity:cog-categories
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:cog-metal-associations
  evidence:
  - source_project: soil_metal_functional_genomics
    source_doc: REPORT.md
    source_section: Critical Assessment
    quote: 'Metals co-contaminate (Cr, Pb,

      Zn, Cu co-vary in industrial soils), so tests are not independent — Benjamini-Hochberg

      FDR correction assumes independent tests and will be anti-conservative under positive

      correlation. True FDR is likely higher than reported.'
- id: stmt:copper-proximity-sensitivity
  kind: opportunity
  text: The copper analysis uses a 10 km proximity criterion to match samples to KBase genomes, and a sensitivity analysis at 5 km and 20 km thresholds is needed before COG-copper associations can be attributed to the measured sites.
  confidence: medium
  topics:
  - topic:metal-resistance
  - topic:environment-biogeography
  entities:
  - entity:copper
  - entity:kbase-genomes
  - entity:proximity-threshold
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:copper-trade-offs
  evidence:
  - source_project: soil_metal_functional_genomics
    source_doc: REPORT.md
    source_section: Critical Assessment
    quote: '**Copper-specific analysis uses a 10 km proximity criterion** to match soil samples to

      KBase genomes. At 10 km, many "nearby" genomes may not be co-located with the copper

      measurements. Sensitivity analysis at 5 km and 20 km thresholds is needed before

      COG-copper associations can be attributed to the measured sites.'
