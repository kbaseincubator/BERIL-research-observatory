  evidence:
  - source_project: soil_metal_functional_genomics
    source_doc: REPORT.md
    source_section: Interpretation
    quote: 'Co-contamination by multiple metals is a

      significant confound: Cr, Cu, Pb, Zn co-vary in many industrial soils. Whether

      individual COG-metal associations are metal-specific or reflect a generic stress

      response to multi-metal contamination is unresolved'
