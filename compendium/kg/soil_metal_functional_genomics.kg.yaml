- id: stmt:spatial-autocorrelation
  kind: caveat
  text: Soil samples within a region share geology and land use, so spatial autocorrelation in COG-metal residuals should be tested with Moran's I and corrected via spatial eigenvector filtering if significant.
  confidence: medium
  topics:
  - topic:environment-biogeography
  - topic:metal-resistance
