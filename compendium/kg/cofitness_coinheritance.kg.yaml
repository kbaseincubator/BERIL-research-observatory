    quote: '**Ralstonia excluded**: The two Ralstonia organisms (most phylogenetically diverse, lowest ANI) have zero co-fitness data in the Fitness Browser, excluding the species that would likely be most informative.'
- id: stmt:phylogenetic-control-caveat
  kind: caveat
  text: Phylogenetic distance stratification is limited to near and medium strata because most species lack genomes in the far stratum, constraining the ability to fully disentangle functional coupling from shared-ancestry signal.
  confidence: medium
  topics:
