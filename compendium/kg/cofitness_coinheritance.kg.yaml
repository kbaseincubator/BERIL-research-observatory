  evidence:
  - source_project: cofitness_coinheritance
    source_doc: REPORT.md
    source_section: Phylogenetic Distance Stratification
    quote: Cofit pair phi is higher among near genomes (mean=0.102) than medium genomes (mean=0.067), as expected from shared ancestry. Most species lack genomes in the "far" stratum (>0.05 branch distance), limiting the ability to fully disentangle functional coupling from phylogenetic signal.
    notebook: 02_cooccurrence.ipynb
    figure: figures/fig3_phylo_control.png
