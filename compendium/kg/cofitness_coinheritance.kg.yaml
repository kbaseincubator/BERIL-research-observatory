    source_doc: REPORT.md
    source_section: Interpretation
    quote: This suggests that coordinated regulation across multiple genes -- not just pairwise functional similarity -- is what most strongly constrains co-inheritance.
- id: stmt:operons-not-confound
  kind: finding
  text: Genomic adjacency (operons) does not confound the co-occurrence signal, since only 0.7% of cofit pairs are adjacent and excluding them does not change the result pattern.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:mobile-genetic-elements
