    source_doc: REPORT.md
    source_section: ICA Modules Show Co-inheritance, Especially Accessory Modules
    quote: Accessory (<50% core) | 11 | **+0.108** | **8/11 (73%)** | **4/11 (36%)** |
    notebook: 03_module_coinheritance.ipynb
- id: stmt:coordinated-regulation-constrains-coinheritance
  kind: claim
  text: Coordinated regulation across multiple genes, rather than pairwise functional similarity alone, is what most strongly constrains co-inheritance in bacterial pangenomes.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:gene-fitness
  entities:
