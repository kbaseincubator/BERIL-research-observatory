project:
  id: cofitness_coinheritance
  title: 'Report: Co-fitness and Co-inheritance in Bacterial Pangenomes'
statements:
- id: stmt:cofit-predicts-cooccurrence
  kind: finding
  text: Across 9 organisms, co-fit gene pairs show a weak but consistent positive co-occurrence signal, with 7 of 9 organisms showing a positive delta phi and the aggregate signal highly significant.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:cofitness
  - entity:fitness-browser
  - entity:pangenome
  - entity:phi-coefficient
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: cofitness_coinheritance
    source_doc: REPORT.md
    source_section: Pairwise Co-fitness Weakly Predicts Co-occurrence
    quote: Across 9 organisms with co-fitness data (2.25M cofit pairs vs 22.5M prevalence-matched random pairs), co-fit gene pairs show a weak but consistent positive co-occurrence signal. The mean delta phi (cofit - random) is +0.011 across organisms, with 7 of 9 organisms showing a positive effect and 8 of 9 significant at p<0.05 (Mann-Whitney two-sided).
    notebook: 02_cooccurrence.ipynb
    figure: figures/fig1_cofit_cooccurrence.png
- id: stmt:small-effect-size
  kind: finding
  text: The pairwise co-fitness to co-occurrence effect is small in magnitude, indicating lab-measured functional coupling explains only a tiny fraction of co-inheritance patterns.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:cofitness
  - entity:co-inheritance
  - entity:phi-coefficient
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:cofit-predicts-cooccurrence
  evidence:
  - source_project: cofitness_coinheritance
    source_doc: REPORT.md
    source_section: Interpretation
    quote: However, the effect size is small (delta=+0.003 overall, +0.011 mean across organisms), indicating that lab-measured functional coupling explains only a tiny fraction of co-inheritance patterns.
- id: stmt:modules-stronger-coinheritance
  kind: finding
  text: ICA-derived multi-gene modules show a substantially stronger within-module co-inheritance signal than pairwise co-fitness, with 195 modules across 6 organisms exceeding prevalence-matched null expectations.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:ica-modules
  - entity:co-inheritance
  - entity:phi-coefficient
  - entity:fitness-modules
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: cofitness_coinheritance
    source_doc: REPORT.md
    source_section: ICA Modules Show Co-inheritance, Especially Accessory Modules
    quote: At the module level, 195 ICA modules across 6 organisms show within-module co-occurrence (mean phi=0.229) significantly exceeding prevalence-matched null expectations (mean phi=0.177, 1000 permutations), with delta=+0.053 and 51/195 modules (26%) significant at p<0.05.
    notebook: 03_module_coinheritance.ipynb
    figure: figures/fig5_module_coinheritance.png
- id: stmt:accessory-modules-strongest
  kind: finding
  text: Accessory modules show the strongest co-inheritance signal, with a mean delta phi of +0.108 and 73% significant at p<0.05, exceeding core and mixed modules.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:gene-fitness
  entities:
