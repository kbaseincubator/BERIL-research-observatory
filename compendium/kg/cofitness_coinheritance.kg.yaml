    source_doc: REPORT.md
    source_section: Operons Are Not a Confound
    quote: Only 0.7% of cofit pairs are genomically adjacent (within 5 genes). Excluding them does not change the result pattern.
    notebook: 02_cooccurrence.ipynb
    figure: figures/fig2_operon_control.png
- id: stmt:cofit-strength-anticorrelates
  kind: finding
  text: Stronger co-fitness scores weakly predict lower co-occurrence phi, likely because the strongest co-fitness pairs are near-universal core genes with little variance for co-occurrence detection.
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:cofitness
  - entity:core-genome
  - entity:phi-coefficient
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: cofitness_coinheritance
    source_doc: REPORT.md
    source_section: Co-fitness Strength Weakly Anti-correlates with Co-occurrence
    quote: Stronger co-fitness scores weakly predict *lower* phi (Spearman rho=-0.109, p<1e-300 across 1.04M pairs). This likely reflects that the strongest co-fitness pairs are core genes with near-universal prevalence, leaving little variance for co-occurrence detection -- a prevalence ceiling effect.
    notebook: 02_cooccurrence.ipynb
    figure: figures/fig4_cofit_strength.png
- id: stmt:prevalence-ceiling-caveat
  kind: caveat
  text: A prevalence ceiling limits the analysis because most Fitness Browser genes map to core clusters above 95% prevalence, where phi approaches zero for both cofit and random pairs due to negligible presence/absence variance.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:fitness-browser
  - entity:prevalence
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:small-effect-size
  evidence:
  - source_project: cofitness_coinheritance
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Prevalence ceiling**: Most FB genes map to core clusters (>95% prevalence). At high prevalence, phi approaches 0 for both cofit and random pairs because there is almost no variance to correlate. The analysis is most informative for species with substantial auxiliary gene content.'
- id: stmt:ralstonia-excluded-caveat
  kind: caveat
  text: The two most phylogenetically diverse Ralstonia organisms have zero co-fitness data in the Fitness Browser, excluding the species that would likely be most informative.
  confidence: high
  topics:
