  - source_project: aromatic_catabolism_network
    source_doc: REPORT.md
    source_section: '5. Cross-species: Complex I dependency is on high-NADH substrates, not aromatics specifically'
    quote: Ortholog-transferred fitness data from the Fitness Browser (12,241 entries, 2,005 genes, 13 conditions) shows Complex I orthologs have significantly worse fitness on aromatic conditions (mean = -1.35 vs -0.77, Mann-Whitney p < 0.0001). However, per-condition analysis reveals that the largest Complex I defects relative to background are on acetate (-1.55) and succinate (-1.39) — non-aromatic substrates that also generate high NADH flux through the TCA cycle.
    notebook: 04_cross_species.ipynb
    figure: figures/complex_I_vs_background.png
