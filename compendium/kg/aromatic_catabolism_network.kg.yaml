    refines: []
  evidence:
  - source_project: aromatic_catabolism_network
    source_doc: REPORT.md
    source_section: 1. Aromatic catabolism requires a 51-gene support network spanning 4 metabolic subsystems
    quote: 'The 51 quinate-specific genes in ADP1 organize into a coherent metabolic dependency network around the β-ketoadipate pathway. Co-fitness analysis assigns 44/51 genes (86%) to four functional subsystems: the core aromatic degradation pathway (8 genes), Complex I / NADH dehydrogenase (21 genes), iron acquisition (7 genes), and PQQ biosynthesis (2 genes), plus 6 transcriptional regulators.'
    notebook: 01_metabolic_dependencies.ipynb
    figure: figures/support_network_categories.png
- id: stmt:complex-i-dominant-subsystem-finding
  kind: finding
  text: Complex I (NADH:ubiquinone oxidoreductase) is the dominant support requirement for aromatic catabolism, accounting for 21 of the 51 quinate-specific genes (41%).
  confidence: high
