- id: stmt:support-network-51-genes-finding
  kind: finding
  text: Aromatic (quinate) catabolism in Acinetobacter baylyi ADP1 requires a 51-gene support network whose genes organize into four functional subsystems beyond the core β-ketoadipate pathway.
  confidence: high
  topics:
