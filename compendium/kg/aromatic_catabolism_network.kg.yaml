- id: stmt:high-nadh-not-aromatic-finding
  kind: finding
  text: Cross-species ortholog-transferred fitness shows the Complex I dependency is on high-NADH-flux substrates generally, with the largest defects on the non-aromatic substrates acetate and succinate, not on aromatics specifically.
  confidence: high
