- id: stmt:fba-blind-spot-finding
  kind: finding
  text: The FBA model captures higher Complex I flux on aromatic substrates but predicts 0% essentiality, and 30 of the 51 quinate-specific genes have no FBA reaction mappings at all, revealing a systematic metabolic-model blind spot.
  confidence: high
  topics:
