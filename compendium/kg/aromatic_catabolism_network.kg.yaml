    refines: []
  evidence:
  - source_project: aromatic_catabolism_network
    source_doc: REPORT.md
    source_section: 3. Support subsystems are genomically independent but metabolically coupled
    quote: 'The four subsystems occupy distinct chromosomal locations: Complex I operon at 714–729 kb, pca/qui pathway at 1,709–1,724 kb, PQQ biosynthesis at 2,461 kb, and iron acquisition genes scattered across 4 loci. No cross-category operons exist (except one within the aromatic pathway itself). The metabolic dependency is not encoded by genomic co-localization — it emerges from the biochemistry of aromatic ring cleavage.'
    notebook: 02_genomic_organization.ipynb
    figure: figures/chromosome_map.png
