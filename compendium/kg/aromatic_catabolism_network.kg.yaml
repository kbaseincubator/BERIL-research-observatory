  evidence:
  - source_project: aromatic_catabolism_network
    source_doc: REPORT.md
    source_section: 2. Complex I is the largest support subsystem — and invisible to FBA
    quote: The FBA model captures 1.76× higher Complex I flux on aromatic substrates (0.55 vs 0.31), but predicts 0% essentiality — it sees the increased demand but not the bottleneck. Furthermore, 30/51 quinate-specific genes have no FBA reaction mappings at all — cofactor supply chains (PQQ, iron) and regulatory genes are invisible to the metabolic model.
    notebook: 01_metabolic_dependencies.ipynb
- id: stmt:genomic-independence-finding
  kind: finding
  text: The four support subsystems occupy distinct chromosomal locations with no cross-category operons, so the metabolic dependency is not encoded by genomic co-localization but emerges from the biochemistry of aromatic ring cleavage.
  confidence: high
  topics:
