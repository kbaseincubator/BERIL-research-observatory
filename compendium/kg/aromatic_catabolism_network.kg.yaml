    contradicts: []
    refines: []
  evidence:
  - source_project: aromatic_catabolism_network
    source_doc: REPORT.md
    source_section: The β-Ketoadipate Pathway and Its Cofactor Requirements
    quote: '1. **Quinate dehydrogenase (quiA)**: A PQQ-dependent quinoprotein — requires PQQ cofactor, explaining the 2 PQQ biosynthesis genes (pqqC, pqqD)

      2. **Protocatechuate 3,4-dioxygenase (pcaGH)**: A non-heme Fe²⁺-dependent ring-cleavage enzyme — requires iron, explaining the 7 iron acquisition genes (siderophore biosynthesis, ExbD/TolR transport, ferrichrome receptor, TonB-dependent receptor)

      3. **TCA cycle oxidation**: Succinyl-CoA and acetyl-CoA from β-ketoadipate are fully oxidized in the TCA cycle, generating NADH at multiple steps — requires Complex I for NADH reoxidation under high flux'
- id: stmt:pqq-shared-glucose-caveat
  kind: caveat
  text: The PQQ dependency is not exclusively aromatic because PQQ biosynthesis genes also appear as glucose-specific (PQQ-dependent glucose dehydrogenase), so PQQ requirement is shared with glucose catabolism.
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:pqq
  - entity:glucose
  - entity:adp1
