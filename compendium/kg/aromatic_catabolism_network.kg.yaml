- id: stmt:cofactor-requirements-claim
  kind: claim
  text: 'Three β-ketoadipate-pathway enzyme steps create the support dependencies: a PQQ-dependent quinate dehydrogenase requires PQQ biosynthesis, an Fe²⁺-dependent protocatechuate 3,4-dioxygenase requires iron acquisition, and TCA-cycle oxidation requires Complex I for NADH reoxidation.'
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:beta-ketoadipate-pathway
  - entity:pqq
  - entity:iron-acquisition
  - entity:complex-i
