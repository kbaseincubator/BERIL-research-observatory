    source_doc: REPORT.md
    source_section: Limitations
    quote: PQQ biosynthesis genes also appear as glucose-specific in the adp1_deletion_phenotypes project (PQQ-dependent glucose dehydrogenase), so the PQQ dependency is not exclusively aromatic — it's shared with glucose catabolism.
