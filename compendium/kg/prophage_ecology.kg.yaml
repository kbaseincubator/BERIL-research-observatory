  evidence:
  - source_project: prophage_ecology
    source_doc: REPORT.md
    source_section: Future Directions
    quote: '**Prophage induction signals**: Cross-reference environment-enriched modules with known prophage induction triggers (SOS response, pH stress, temperature shifts) to mechanistically explain the pH and temperature correlations observed in NMDC data.'
