    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Annotation sensitivity**: eggNOG Pfam annotations may miss divergent SNIPE homologues. The SNIPE nuclease domain is PF13455 (Mug113, GIY-YIG clan), not PF01541 (canonical GIY-YIG); only 54/4,572 DUF4041 clusters show Mug113 co-annotation, suggesting many SNIPE nuclease domains go undetected'
- id: stmt:caveat-duf4041-false-positives
  kind: caveat
  text: About 20% of DUF4041 clusters have non-defense primary annotations (e.g. histidine kinase, seryl-tRNA aminoacylation) that likely represent annotation noise where DUF4041 is a secondary domain, so a stricter T5orf172/DUF4041 description filter is needed for a high-confidence SNIPE set.
  confidence: medium
  topics:
  - topic:functional-dark-matter
  entities:
  - entity:duf4041
  - entity:snipe
  - entity:false-positives
