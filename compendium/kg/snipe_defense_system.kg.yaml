- id: stmt:snipe-distinct-environmental-niche
  kind: finding
  text: SNIPE-bearing species occupy statistically distinct environmental niches, with 22 of 64 AlphaEarth dimensions significantly different (Bonferroni-corrected p < 0.05) at small-to-medium effect sizes, indicating a consistent but modest environmental shift.
  confidence: medium
