- id: stmt:snipe-predominantly-accessory
  kind: finding
  text: SNIPE genes are predominantly accessory, with only 13.3% core and a combined 86.7% accessory-plus-singleton fraction, indicating SNIPE is typically gained or lost rather than vertically inherited.
  confidence: high
