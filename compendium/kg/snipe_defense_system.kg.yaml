    source_doc: REPORT.md
    source_section: 7. Functional annotations are consistent with SNIPE
    quote: The remaining ~20% (897 clusters) have primary annotations like Histidine kinase (319) and seryl-tRNA aminoacylation (238), suggesting DUF4041 was detected as a secondary/minor domain in multi-domain proteins whose primary function is unrelated to phage defense. These likely represent annotation noise rather than functional SNIPE proteins.
    notebook: 01_extract_snipe_domains.ipynb
