    source_section: 5. SNIPE-bearing species occupy distinct environmental niches
    quote: '- **22 of 64 dimensions** are significantly different (Bonferroni-corrected p < 0.05)

      - Largest effect: dimension A19 (Cohen''s d = 0.26, p = 5.0e-14)

      - Effect sizes are small-to-medium (|d| = 0.11–0.26), suggesting a consistent but modest environmental shift rather than strict habitat segregation'
    notebook: 03_environmental_analysis.ipynb
