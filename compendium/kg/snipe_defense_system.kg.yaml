    source_section: 3. SNIPE genes are predominantly accessory (86.7%)
    quote: The combined 86.7% accessory+singleton fraction strongly supports the defense island mobility hypothesis. Only 13.3% of SNIPE clusters are core genes within their species pangenome, indicating that SNIPE is typically gained or lost rather than vertically inherited.
    notebook: 01_extract_snipe_domains.ipynb
- id: stmt:snipe-nuclease-pf13455-not-pf01541
  kind: finding
  text: The SNIPE nuclease domain is PF13455 (Mug113), a distinct Pfam family within the GIY-YIG clan CL0418, not the canonical GIY-YIG family PF01541, so zero DUF4041 plus PF01541 co-occurrences is a genuine biological result rather than an annotation artifact.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:mobile-genetic-elements
  entities:
  - entity:snipe-nuclease
  - entity:pf13455-mug113
  - entity:pf01541-giy-yig
  - entity:duf4041
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: snipe_defense_system
    source_doc: REPORT.md
    source_section: 4. The SNIPE nuclease domain is PF13455 (Mug113), not PF01541 (GIY-YIG)
    quote: 'Zero gene clusters contained both DUF4041 and canonical GIY-YIG (PF01541) in their eggNOG Pfam annotations. InterPro/UniProt analysis of the *E. coli* SNIPE protein ([A0A0A1A5Z2](https://www.uniprot.org/uniprotkb/A0A0A1A5Z2)) reveals why: the SNIPE nuclease domain is actually **PF13455** (Mug113, "Meiotically up-regulated gene 113"), not PF01541.'
    notebook: 01_extract_snipe_domains.ipynb
