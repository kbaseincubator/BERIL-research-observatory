- id: stmt:caveat-annotation-sensitivity
  kind: caveat
  text: eggNOG Pfam annotations may miss divergent SNIPE homologues, since only 54 of 4,572 DUF4041 clusters show Mug113 (PF13455) co-annotation, suggesting many SNIPE nuclease domains go undetected.
  confidence: medium
  topics:
