- id: stmt:manyz-not-fructose-transporter
  kind: finding
  text: Fitness Browser data directly contradict UniProt's fructose-transporter annotation, showing ManXYZ mutants grow normally on fructose but are crippled on mannose and glucosamine, confirming ManYZ is a mannose/glucosamine-specific transporter.
  confidence: high
  topics:
