    source_section: 1. SNIPE resolves the phage resistance vs. metabolic cost trade-off
    quote: '**SNIPE resolves this trade-off**: rather than losing ManYZ entirely, SNIPE-bearing strains retain full transporter function while cleaving phage DNA during injection. SNIPE provides the phage resistance benefit of *man* knockouts **without the metabolic cost**.'
- id: stmt:manxyz-fitness-cost-mannose-glucosamine
  kind: finding
  text: RB-TnSeq fitness data from 168 E. coli K-12 experiments show ManXYZ knockouts incur severe substrate-specific defects (worst fitness -3.93 to -4.14) on mannose and glucosamine, quantifying the metabolic cost of losing the phage lambda receptor.
  confidence: high
