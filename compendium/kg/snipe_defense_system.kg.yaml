  evidence:
  - source_project: snipe_defense_system
    source_doc: REPORT.md
    source_section: 1. SNIPE resolves the phage resistance vs. metabolic cost trade-off
    quote: ManXYZ mutants grow normally on fructose (fitness ≈ 0) but are crippled on mannose and glucosamine. FruA (the actual fructose PTS) shows the opposite pattern — essential for fructose, dispensable for mannose. This clean substrate separation confirms ManYZ is a **mannose/glucosamine-specific** transporter, consistent with its role as the phage lambda entry receptor.
    notebook: 01_extract_snipe_domains.ipynb
- id: stmt:methanococcus-first-snipe-fitness
  kind: finding
  text: Methanococcus maripaludis JJ carries a full two-domain SNIPE protein (locus MMJJ_RS01635, PF13250 plus PF13455) with 129 experiments of fitness data, the first SNIPE homologue with genome-wide knockout phenotypes.
  confidence: high
