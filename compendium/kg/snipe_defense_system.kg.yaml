    quote: '**SNIPE (DUF4041/PF13250)**: One organism carries it — ***Methanococcus maripaludis* JJ** (locus `MMJJ_RS01635`), annotated with **both** PF13250 (DUF4041) **and** PF13455 (Mug113/GIY-YIG nuclease), plus PF10544 (DUF2525). This is a full two-domain SNIPE protein with **129 experiments** of fitness data.'
    notebook: 01_extract_snipe_domains.ipynb
- id: stmt:snipe-widespread-1696-species
  kind: finding
  text: The diagnostic SNIPE domain DUF4041 (PF13250) was detected in 4,572 gene clusters across 1,696 species spanning 33 bacterial and archaeal phyla, far exceeding the more-than-500 homologues reported in the original paper.
