  evidence:
  - source_project: gene_function_ecological_agora
    source_doc: REPORT.md
    source_section: Four honest limits documented in print
    quote: 'PSII rank-dependence**: genus n=2,350 d=0.08 STABLE → class n=21 d=1.50 INNOVATOR-EXCHANGE → phylum d=1.60 INNOVATOR-ISOLATED.'
- id: stmt:pangenome-openness-distinct-from-m22
  kind: caveat
  text: Recent between-species gain attribution and within-species pangenome openness are uncorrelated (Spearman r=-0.011 across 894 genera), so pangenome openness is not a valid cross-substrate validation of the acquisition-depth signal.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:mobile-genetic-elements
  entities:
  - entity:pangenome-openness
  - entity:hgt-atlas
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:hgt-innovation-atlas
  evidence:
  - source_project: gene_function_ecological_agora
    source_doc: REPORT.md
    source_section: Interpretation — M22 and pangenome openness measure distinct evolutionary phenomena
    quote: The atlas-wide null result (Spearman r = −0.011 across 894 genera) is informative, not falsifying.
- id: stmt:mycolic-niche-refinement
  kind: finding
  text: The mycolic-acid Innovator-Isolated signature is concentrated in host-pathogen-niche mycobacteria rather than soil mycobacteria, refining the original family-level finding.
  confidence: medium
  topics:
  - topic:microbial-ecotypes
  - topic:environment-biogeography
  entities:
