    source_doc: REPORT.md
    source_section: Limits — what the atlas does NOT settle
    quote: '**Donor identification at deep ranks** (M25 deferral): per-CDS sequence is not in BERDL queryable schemas; composition-based donor inference requires external FASTA + codon profiling that breaks the Phase 3 budget.'
- id: stmt:mge-context-mechanism-opportunity
  kind: opportunity
  text: Testing whether high-exchange KOs are mobile-element-mediated by flagging phage, plasmid, and integron context per gain event is an identified next step toward a mechanistic explanation of cross-clade gene flow.
  confidence: medium
