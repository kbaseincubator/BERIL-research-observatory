    quote: the mycolic-acid Innovator-Isolated signature is concentrated in *host-pathogen-niche* mycobacteria, not soil mycobacteria.
- id: stmt:composition-donor-inference-opportunity
  kind: opportunity
  text: Composition-based donor inference at deep ranks remains a future direction, blocked because per-CDS sequence is not in BERDL queryable schemas; tree-based donor inference shipped only as an exploratory layer.
  confidence: medium
  topics:
