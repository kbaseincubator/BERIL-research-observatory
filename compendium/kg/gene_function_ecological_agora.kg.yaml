statements:
- id: stmt:hgt-innovation-atlas
  kind: finding
  text: The project built a bacterial-domain HGT/innovation atlas of 13.7M producer/participation scores and 17M Sankoff gain events with recipient-rank acquisition attribution across 18,989 GTDB r214 species representatives.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:mobile-genetic-elements
  - topic:pangenome-architecture
  entities:
  - entity:gtdb
  - entity:hgt-atlas
