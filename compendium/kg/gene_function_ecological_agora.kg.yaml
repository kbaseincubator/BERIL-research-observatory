    source_doc: REPORT.md
    source_section: 'NB23: Biome enrichment for pre-registered atlas findings'
    quote: '**H2 NB12 mycolic-acid Innovator-Isolated** | Mycobacteriaceae (n=459) | host-pathogen | 16.6% | 2.1% | **7.88×** | < 10⁻⁴⁵ |'
- id: stmt:preregistered-kos-not-phage-borne
  kind: finding
  text: All three pre-registered hypothesis KO sets (PSII, mycolic-acid, PUL) show near-zero MGE-machinery rates against a 1.37% atlas baseline, meaning these gene families are not themselves phage, transposase, integrase, or plasmid genes.
  confidence: high
