    source_section: Three novel findings the project surfaced
    quote: 'Architectural promiscuity correlates with HGT propensity (NB15)**: mixed-category KOs show 46 architectures/KO median vs PSII''s 1; NB17 architectural-vs-KO concordance r=0.67 consumer-side; framed as the analog of Denise 2019 ("modular systems exchange more").'
- id: stmt:cyanobacteria-psii-innovator-exchange
  kind: finding
  text: Cyanobacteria are confirmed as Innovator-Exchange on photosystem II at the Cyanobacteriia class rank (producer d=+1.50, consumer d=+0.70), the appropriate rank since PSII predates Cyanobacteria diversification.
  confidence: high
  topics:
  - topic:mobile-genetic-elements
  - topic:metabolic-pathways
  - topic:microbial-ecotypes
  entities:
