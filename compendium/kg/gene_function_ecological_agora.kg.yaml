    source_section: Methodology contributions (M1–M26)
    quote: Producer × Participation (M5/M6)** — direction-agnostic per-clade categorization {Innovator-Isolated / Innovator-Exchange / Sink-Broker-Exchange / Stable} at deep ranks where DTL reconciliation is intractable. The atlas's organizing framework.
- id: stmt:recent-ancient-ratio-signature
  kind: finding
  text: The ratio of recent-to-ancient gain events is itself a function-class signature, with CRISPR-Cas highly recent-skewed (24.5x ratio, HGT-active) and strict housekeeping genes ancient-skewed (~1x, vertical inheritance).
  confidence: high
  topics:
  - topic:mobile-genetic-elements
  - topic:gene-fitness
  entities:
  - entity:crispr-cas
  - entity:housekeeping-genes
  - entity:hgt-atlas
  - entity:gtdb
  links:
    supports:
    - stmt:hgt-innovation-atlas
    contradicts: []
    refines: []
  evidence:
  - source_project: gene_function_ecological_agora
    source_doc: REPORT.md
    source_section: Three novel findings the project surfaced
    quote: 'Recent-to-ancient ratio is itself a function-class signature (NB10b/M22)**: CRISPR-Cas at 24.5× ratio (HGT-active); housekeeping-strict at ~1× (vertical inheritance). The atlas centerpiece per v2.9 reframe.'
  - source_project: gene_function_ecological_agora
    source_doc: REPORT.md
    source_section: M22 acquisition-depth attribution (NB10b)
    quote: The recent/ancient ratio for HGT-active classes is 4–10× higher than for clean housekeeping.
    figure: figures/p2_m22_acquisition_depth_per_class.png
- id: stmt:architectural-promiscuity-hgt
  kind: finding
  text: 'Architectural promiscuity correlates with HGT propensity: mixed-category KOs carry a median of 46 Pfam architectures per KO versus 1 for PSII, mirroring the ''modular systems exchange more'' pattern.'
  confidence: medium
  topics:
