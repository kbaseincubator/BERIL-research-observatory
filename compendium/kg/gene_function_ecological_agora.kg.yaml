    contradicts: []
    refines: []
  evidence:
  - source_project: gene_function_ecological_agora
    source_doc: REPORT.md
    source_section: Cyanobacteria × PSII Innovator-Exchange test — H1 SUPPORTED at class rank (NB16)
    quote: '**At the Cyanobacteriia class rank**, both pre-registered criteria pass at α/4 = 0.0125: producer above atlas non-housekeeping median (very large effect, d=1.50) AND consumer above median (moderate-large, d=0.70'
    figure: figures/p3_nb16_cyanobacteria_psii.png
- id: stmt:mycobacteriaceae-mycolic-innovator-isolated
  kind: finding
  text: Mycobacteriaceae are confirmed as Innovator-Isolated on the mycolic-acid pathway at family and order ranks (producer d=+0.31, consumer d=-0.19), indicating high paralog expansion with low cross-clade exchange.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:mobile-genetic-elements
  - topic:microbial-ecotypes
  entities:
  - entity:mycobacteriaceae
  - entity:mycolic-acid-pathway
  - entity:producer-participation
  links:
    supports:
    - stmt:hgt-innovation-atlas
    contradicts: []
    refines: []
  evidence:
  - source_project: gene_function_ecological_agora
    source_doc: REPORT.md
    source_section: 'Verdict: **H1 SUPPORTED at both family and order ranks**'
    quote: 'Both pre-registered criteria pass at both ranks after Bonferroni correction:

      - **Producer above atlas median** (more paralog expansion than typical non-housekeeping KO)

      - **Consumer below atlas median** (more phylogenetically clumped → less cross-clade exchange)'
    figure: figures/p2_nb12_mycobacteriota_mycolic.png
- id: stmt:three-substrate-convergence
  kind: claim
  text: 'Atlas-level innovation findings are made robust by convergence across three independent measurement substrates: Sankoff-parsimony effect size, sample-biome ecology metadata, and per-strain phenotype tables.'
  confidence: high
  topics:
