    contradicts: []
    refines: []
  evidence:
  - source_project: gene_function_ecological_agora
    source_doc: REPORT.md
    source_section: What the project measured
    quote: 'Atlas size: **13.7M (rank × clade × KO) producer/participation scores** + **17M Sankoff gain events with M22 recipient-rank attribution** + **3.9M (KO × genus) MGE-machinery fractions** across **18,989 P1B-qualified species reps spanning the bacterial domain of GTDB r214**.'
- id: stmt:producer-participation-framework
  kind: claim
  text: The Producer × Participation framework provides a direction-agnostic per-clade categorization (Innovator-Isolated / Innovator-Exchange / Sink-Broker-Exchange / Stable) usable at deep ranks where full DTL reconciliation is intractable.
  confidence: high
  topics:
