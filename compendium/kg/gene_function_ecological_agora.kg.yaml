    contradicts: []
    refines: []
  evidence:
  - source_project: gene_function_ecological_agora
    source_doc: REPORT.md
    source_section: Three convergent lines of evidence
    quote: A finding at any single layer would be circumstantial; the convergence across three independent substrates measured on different signals (Sankoff parsimony on species tree; sample-biome metadata at biosample level; per-strain phenotype tables) makes the atlas claims robust.
- id: stmt:biome-enrichment-grounding
  kind: finding
  text: Pre-registered atlas clades are significantly enriched in their expected biomes, including Mycobacteriaceae host-pathogen (7.88x, p<10^-45), Cyanobacteriia photic aquatic (2.77x, p<10^-52), and Bacteroidota gut/rumen (1.40x, p<10^-35).
  confidence: high
  topics:
