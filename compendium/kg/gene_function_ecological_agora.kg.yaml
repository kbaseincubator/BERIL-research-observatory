    source_doc: REPORT.md
    source_section: 'P4-D3: Alm 2006 r ≈ 0.74 reproduction — NOT REPRODUCED at GTDB scale'
    quote: All correlations are statistically significant (n = 18,989) but biologically modest (r = 0.10–0.29 vs Alm 2006's r ≈ 0.74 in 207 genomes).
- id: stmt:psii-rank-dependence
  kind: caveat
  text: The PSII Innovator verdict is strongly rank-dependent (STABLE at genus, Innovator-Exchange at class, Innovator-Isolated at phylum), so the class rank must be chosen on biological grounds rather than read off any single resolution.
  confidence: medium
  topics:
  - topic:mobile-genetic-elements
  - topic:microbial-ecotypes
  entities:
