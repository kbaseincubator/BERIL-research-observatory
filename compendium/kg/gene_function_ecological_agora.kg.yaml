    quote: All three pre-registered hypotheses show near-zero MGE-machinery rates** — meaning these KOs are not themselves phage / transposase / integrase / plasmid genes.
    figure: figures/p4d2_mge_context_panel.png
- id: stmt:alm-2006-not-reproduced
  kind: caveat
  text: The Alm 2006 r~0.74 correlation between histidine-kinase count and lineage-specific expansion is NOT reproduced at full GTDB scale, recovering only modest correlations (r=0.10-0.29) across 18,989 genomes.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
