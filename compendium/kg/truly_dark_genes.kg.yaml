    refines: []
  evidence:
  - source_project: truly_dark_genes
    source_doc: REPORT.md
    source_section: 'Finding 1: Only 16.3% of "dark matter" resists modern annotation'
    quote: 'Truly dark genes are concentrated in specific organisms: Methanococcus strains (S2 and JJ) account for 55% of all truly dark genes, reflecting the underrepresentation of archaea in annotation databases. Across organisms, 4–96% of dark genes resist bakta annotation, with archaeal organisms at the high end.'
    notebook: 01_truly_dark_census.ipynb
    figure: figures/fig01_organism_distribution.png
- id: stmt:structurally-distinct-novelty
  kind: finding
  text: Truly dark genes are shorter (median 121 vs 194 aa), less core (43.1% vs 72.7%), lower in GC, and far less likely to have orthologs (29.3% vs 63.7%) than annotation-lag genes, consistent with genuine biological novelty rather than database lag.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:pangenome-architecture
  entities:
  - entity:truly-dark-genes
  - entity:annotation-lag-genes
  - entity:gc-content
  - entity:core-genome
  links:
    supports:
    - stmt:truly-dark-census-16pct
    contradicts: []
    refines: []
  evidence:
  - source_project: truly_dark_genes
    source_doc: REPORT.md
    source_section: 'Finding 2: Truly dark genes are structurally distinct from annotation-lag genes (H1 supported)'
    quote: All effects exceed pre-registered thresholds (Cohen's d ≥ 0.2 or OR ≥ 1.5). Truly dark genes are shorter, less conserved, more taxonomically restricted, and have lower GC content — consistent with genuine biological novelty rather than database lag.
    notebook: 01_truly_dark_census.ipynb
    figure: figures/fig02_gene_length.png
- id: stmt:sequence-known-function-unknown
  kind: finding
  text: Although hypothetical, 79.4% of truly dark genes have UniRef50 links and 84.7% have database cross-references, yet only 4.0% have Pfam domains and 4.6% have KEGG KOs, showing databases contain the sequences but cannot assign function.
  confidence: high
  topics:
  - topic:functional-dark-matter
  entities:
  - entity:truly-dark-genes
  - entity:uniref50
  - entity:pfam
  - entity:eggnog
  links:
    supports:
    - stmt:structurally-distinct-novelty
    contradicts: []
    refines: []
  evidence:
  - source_project: truly_dark_genes
    source_doc: REPORT.md
    source_section: 'Finding 3: Annotation databases recognize the sequences but not the function'
    quote: 'Despite being "hypothetical," 79.4% of truly dark genes have UniRef50 links and 84.7% have database cross-references (RefSeq, UniParc). The paradox: databases contain these sequences but cannot assign function. Only 4.0% have Pfam domain hits, and only 4.6% have KEGG KOs — confirming they resist all standard functional annotation methods.'
    notebook: 02_spark_enrichment.ipynb
- id: stmt:partial-clue-coverage-tiers
  kind: finding
  text: A 12-dimensional clue matrix shows only 246 truly dark genes (3.8%) have zero annotation clues, while 96.2% carry partial evidence, stratifying into four tiers in which 2,314 Tier 3 and Tier 4 genes are most promising for functional characterization.
  confidence: high
  topics:
