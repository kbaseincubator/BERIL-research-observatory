    contradicts: []
    refines:
    - stmt:structurally-distinct-novelty
  evidence:
  - source_project: truly_dark_genes
    source_doc: REPORT.md
    source_section: Limitations
    quote: '- **Gene length confound**: Short genes are inherently harder to annotate (fewer domains, fewer homologs) AND harder to measure fitness for (fewer TA sites). The length difference (d = −0.432) may partially explain other observed differences.'
- id: stmt:bakta-false-negatives
  kind: caveat
  text: Some hypothetical-protein calls may be bakta false negatives — genes with known functions that did not match bakta's PSC database at the version tested — so the truly dark set may include genuinely annotatable genes.
  confidence: medium
