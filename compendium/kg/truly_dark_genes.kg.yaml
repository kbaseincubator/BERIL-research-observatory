- id: stmt:gene-length-confound
  kind: caveat
  text: Short genes are inherently harder to both annotate and measure fitness for, so the length difference between truly dark and annotation-lag genes may partially explain the other observed structural differences.
  confidence: medium
  topics:
  - topic:functional-dark-matter
  - topic:gene-fitness
  entities:
  - entity:truly-dark-genes
  - entity:gene-length
  - entity:annotation-lag-genes
  links:
