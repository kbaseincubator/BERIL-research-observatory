  evidence:
  - source_project: truly_dark_genes
    source_doc: REPORT.md
    source_section: 'Finding 5: Truly dark genes are enriched in accessory genomes and show HGT signatures (H3 supported)'
    quote: Truly dark genes are 4.2× less likely to have cross-organism orthologs (OR = 0.236) and when they do, their orthologs span fewer organisms (median 1 vs 4). Only 3 of 65 dark-gene ortholog groups with cross-organism concordance data contain truly dark genes — they are nearly invisible to cross-organism analysis.
    notebook: 04_cross_organism_concordance.ipynb
    figure: figures/fig06_ortholog_breadth.png
- id: stmt:stress-enrichment-rejected
  kind: finding
  text: Contrary to hypothesis H2, truly dark genes with strong fitness phenotypes are depleted in stress conditions and instead enriched in nutrient, mixed-community, and iron conditions, suggesting novel metabolic or community-interaction functions rather than stress responses.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:metabolic-pathways
  entities:
  - entity:truly-dark-genes
  - entity:fitness-phenotype
  - entity:stress-conditions
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: truly_dark_genes
    source_doc: REPORT.md
    source_section: 'Finding 6: Stress enrichment hypothesis rejected (H2 rejected)'
    quote: Contrary to H2, truly dark genes with strong fitness phenotypes (|f| ≥ 2) are *depleted* in stress conditions relative to annotation-lag genes (28.7% vs 43.2%, OR = 0.53, p < 0.001). Instead, truly dark genes are enriched in nutrient, mixed community, and iron conditions — suggesting they may encode novel metabolic or community-interaction functions rather than stress responses.
    notebook: 05_genomic_context.ipynb
    figure: figures/fig08_genomic_context.png
- id: stmt:dark-islands-neighbors
  kind: claim
  text: Within ICA organisms, 41% of the neighbors of truly dark genes are themselves hypothetical, indicating contiguous genomic dark islands that may be recently acquired genomic islands, phage-derived regions, or species-specific neighborhoods.
  confidence: medium
  topics:
  - topic:mobile-genetic-elements
  - topic:functional-dark-matter
  entities:
  - entity:truly-dark-genes
  - entity:dark-islands
  - entity:operon-context
  links:
    supports:
    - stmt:accessory-hgt-signatures
    contradicts: []
    refines: []
  evidence:
  - source_project: truly_dark_genes
    source_doc: REPORT.md
    source_section: Genomic context
    quote: 'Among truly dark genes in ICA organisms (4,394 genes):

      - 41% of neighboring genes are also hypothetical ("dark islands")

      - 12.0% are within 2 genes of a mobile element

      - 25.9% show operon-like cofitness (|r| ≥ 0.3) with adjacent genes

      - 594 genes belong to ICA fitness modules, with guilt-by-association revealing functions including phage integrases, metal transporters, chemotaxis systems, and iron regulation'
    notebook: 05_genomic_context.ipynb
- id: stmt:top-100-prioritization
  kind: finding
  text: A multi-criteria scoring system ranks all 6,427 truly dark genes and identifies 100 top candidates (scores 8–10) across 19 organisms, of which 34 are essential, 53 are in operons, and 30 are in ICA fitness modules.
  confidence: high
