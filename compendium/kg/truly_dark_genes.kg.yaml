    contradicts: []
    refines: []
  evidence:
  - source_project: truly_dark_genes
    source_doc: REPORT.md
    source_section: 'Finding 5: Truly dark genes are enriched in accessory genomes and show HGT signatures (H3 supported)'
    quote: GC content deviation from host genome mean is significantly higher for truly dark genes (mean |ΔGC| = 0.047 vs 0.038, d = 0.247, p = 1.3e-43). Strong GC deviation (|z| > 2) affects 9.2% of truly dark genes vs 4.0% of annotation-lag genes — consistent with recent horizontal gene transfer outpacing annotation databases.
    notebook: 04_cross_organism_concordance.ipynb
    figure: figures/fig07_gc_deviation.png
- id: stmt:invisible-cross-organism
  kind: claim
  text: Only 3 of 65 dark-gene ortholog groups with cross-organism concordance data contain truly dark genes, making them nearly invisible to cross-organism fitness analysis and limiting guilt-by-association inference.
  confidence: medium
  topics:
