project:
  id: truly_dark_genes
  title: 'Report: Truly Dark Genes — What Remains Unknown After Modern Annotation?'
statements:
- id: stmt:truly-dark-census-16pct
  kind: finding
  text: Of 39,532 Fitness Browser dark genes with pangenome links, bakta v1.12.0 reannotates 83.7%, leaving 6,427 (16.3%) truly dark genes where both the original pipeline and bakta agree they are hypothetical proteins.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:pangenome-architecture
  entities:
  - entity:truly-dark-genes
  - entity:bakta
  - entity:fitness-browser
  - entity:dark-genes
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: truly_dark_genes
    source_doc: REPORT.md
    source_section: 'Finding 1: Only 16.3% of "dark matter" resists modern annotation'
    quote: 'Of 39,532 Fitness Browser dark genes with pangenome links, bakta v1.12.0 reannotation reclassifies 33,105 (83.7%) — leaving just 6,427 "truly dark" genes where both the original pipeline and bakta agree: these are hypothetical proteins. An additional 17,479 dark genes lack pangenome links and could not be assessed.'
    notebook: 01_truly_dark_census.ipynb
    figure: figures/fig01_organism_distribution.png
- id: stmt:archaea-methanococcus-concentration
  kind: finding
  text: Truly dark genes are concentrated in specific organisms, with Methanococcus strains S2 and JJ accounting for 55% of all truly dark genes, reflecting the underrepresentation of archaea in annotation databases.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:environment-biogeography
  entities:
