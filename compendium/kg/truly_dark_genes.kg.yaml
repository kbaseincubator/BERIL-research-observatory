    source_doc: REPORT.md
    source_section: 'Finding 4: 96% of truly dark genes have at least one partial annotation clue (H4 supported)'
    quote: A 12-dimensional "clue matrix" reveals that only 246 genes (3.8%) have zero annotation clues. The remaining 96.2% have combinations of sequence identifiers, eggNOG hits, orthologs, module membership, and/or fitness phenotypes.
    notebook: 03_sparse_annotation_mining.ipynb
    figure: figures/fig04_clue_coverage.png
- id: stmt:accessory-hgt-signatures
  kind: finding
  text: Truly dark genes are 4.2x less likely to have cross-organism orthologs, show significantly higher GC deviation from host genome mean, and 12.0% sit within two genes of a mobile element, consistent with recent horizontal gene transfer outpacing annotation databases.
  confidence: high
  topics:
  - topic:mobile-genetic-elements
  - topic:pangenome-architecture
  entities:
  - entity:truly-dark-genes
  - entity:horizontal-gene-transfer
