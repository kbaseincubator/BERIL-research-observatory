    source_section: 'Finding 7: 100 top candidates prioritized for experimental characterization'
    quote: A multi-criteria scoring system (fitness importance, annotation clues, ortholog breadth, genomic context, tractability; max score 12) ranks all 6,427 truly dark genes and identifies 100 top candidates (scores 8–10) across 19 organisms.
    notebook: 06_experimental_prioritization.ipynb
