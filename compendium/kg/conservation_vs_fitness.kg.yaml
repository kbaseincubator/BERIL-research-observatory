    source_doc: REPORT.md
    source_section: Functional Profiles Differ by Conservation Category
    quote: Essential-core genes** are the most enzyme-rich (41.9%) and best-annotated (87% with known function). They are enriched in Protein Metabolism (+13.7 percentage points vs non-essential), Cofactors/Vitamins (+6.2%), Cell Wall (+3.9%), and Fatty Acid biosynthesis (+3.1%).
    notebook: 04_essential_conservation.ipynb
    figure: figures/essential_enzyme_breakdown.png
- id: stmt:essential-core-depleted-conditional
  kind: claim
  text: Essential-core genes are depleted in Carbohydrates, Amino Acids, and Membrane Transport functions that tend to be conditionally important rather than universally essential.
  confidence: medium
