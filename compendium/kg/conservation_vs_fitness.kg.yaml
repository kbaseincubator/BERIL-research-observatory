    source_section: Functional Profiles Differ by Conservation Category
    quote: 'Essential-auxiliary genes** (3,683 genes essential for viability but not in all strains) are poorly characterized (38.2% hypothetical) and less likely to be enzymes (13.4%). Top subsystems: ribosomes, DNA replication, type 4 secretion, plasmid replication -- suggesting strain-specific variants of core machinery plus mobile genetic elements.'
    notebook: 04_essential_conservation.ipynb
- id: stmt:essential-unmapped-dark-matter
  kind: finding
  text: Essential-unmapped genes (1,259 strain-specific essentials with no pangenome cluster match) are the least characterized category (44.7% hypothetical), dominated by divergent ribosomal proteins, translation factors, transposases, and DNA-binding proteins.
  confidence: medium
  topics:
