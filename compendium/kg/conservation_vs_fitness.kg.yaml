    source_section: Functional Profiles Differ by Conservation Category
    quote: Essential-unmapped genes** (1,259 strain-specific essentials with no pangenome cluster match) are the least characterized (44.7% hypothetical). Known functions include divergent ribosomal proteins (L34, L36, S11, S12), translation factors, transposases, and DNA-binding proteins -- likely recently acquired or highly divergent variants of core functions.
    notebook: 04_essential_conservation.ipynb
