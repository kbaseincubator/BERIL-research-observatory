- id: stmt:modest-enrichment-caveat
  kind: caveat
  text: The essential-in-core enrichment is modest (OR=1.56) because most genes in well-characterized bacteria are core regardless of essentiality, limiting the discriminative power of the core/auxiliary classification.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
