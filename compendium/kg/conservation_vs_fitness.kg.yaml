project:
  id: conservation_vs_fitness
  title: 'Report: Conservation vs Fitness -- Linking FB Genes to Pangenome Clusters'
statements:
- id: stmt:fb-pangenome-link-table
  kind: finding
  text: Mapping Fitness Browser genes to KBase pangenome clusters by DIAMOND blastp produced 177,863 gene-to-cluster links for 44 of 48 FB organisms at near-perfect identity, of which 82.0% fell in core clusters and 18.0% in auxiliary.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
