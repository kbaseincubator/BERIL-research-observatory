    refines: []
  evidence:
  - source_project: conservation_vs_fitness
    source_doc: REPORT.md
    source_section: Essential Genes Are Enriched in Core Clusters (Phase 2)
    quote: 'Median odds ratio 1.56** -- essential genes are 1.56x more likely to be in the core genome

      - **18 of 33 organisms** show statistically significant enrichment (Fisher''s exact test, BH-FDR q < 0.05)'
    notebook: 04_essential_conservation.ipynb
    figure: figures/essential_vs_core_forest_plot.png
- id: stmt:putative-essential-fraction
  kind: finding
  text: Defining essentiality as the absence of viable transposon mutants identified 27,693 putative essential genes, 18.6% of 148,826 protein-coding genes across 33 organisms, with 86.1% of essential genes core versus 81.2% for non-essential genes.
  confidence: high
