    source_doc: REPORT.md
    source_section: Literature Context
    quote: However, the enrichment is modest (OR=1.56), reflecting that most genes in well-characterized bacteria are core regardless of essentiality.
- id: stmt:essentiality-upper-bound-caveat
  kind: caveat
  text: The transposon-based essential gene set is an upper bound because short genes, low-complexity regions, or scaffold edges can lack insertions for non-essentiality reasons, and essential genes are slightly shorter on average, indicating insertion bias.
  confidence: high
  topics:
  - topic:gene-fitness
  entities:
  - entity:essential-genes
  - entity:rb-tnseq
  - entity:transposon-insertion-bias
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:putative-essential-fraction
  evidence:
  - source_project: conservation_vs_fitness
    source_doc: REPORT.md
    source_section: Limitations
    quote: 'Essential gene definition is an upper bound**: Genes without fitness data may lack transposon insertions due to being short, in low-complexity regions, or at scaffold edges -- not necessarily because they are essential. Gene length validation shows essential genes are slightly shorter on average, suggesting some insertion bias.'
- id: stmt:single-condition-caveat
  kind: caveat
  text: Essentiality here reflects a single set of RB-TnSeq library construction conditions, so genes essential only under stress conditions are not captured.
  confidence: high
  topics:
  - topic:gene-fitness
  entities:
  - entity:essential-genes
  - entity:rb-tnseq
  - entity:growth-conditions
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:putative-essential-fraction
  evidence:
  - source_project: conservation_vs_fitness
    source_doc: REPORT.md
    source_section: Limitations
    quote: 'Single growth condition for essentiality**: RB-TnSeq essentiality is defined under the specific library construction conditions. Genes essential only under stress conditions would not be captured.'
