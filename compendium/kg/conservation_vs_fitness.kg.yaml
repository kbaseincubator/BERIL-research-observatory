    source_section: Essential Genes Are Enriched in Core Clusters (Phase 2)
    quote: '27,693 putative essential genes** identified (18.6% of 148,826 protein-coding genes across 33 organisms; range 12.9-28.9% per organism)

      - Essential genes are **86.1% core** vs 81.2% for non-essential genes'
    notebook: 04_essential_conservation.ipynb
- id: stmt:essential-core-enzyme-rich
  kind: finding
  text: Essential-core genes are the most enzyme-rich (41.9%) and best-annotated category (only 13.0% hypothetical), enriched in Protein Metabolism, Cofactors/Vitamins, Cell Wall, and Fatty Acid biosynthesis.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:metabolic-pathways
