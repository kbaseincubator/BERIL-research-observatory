    figure: figures/conservation_breakdown.png
- id: stmt:essential-genes-enriched-in-core
  kind: finding
  text: Putative essential genes are modestly but significantly enriched in core pangenome clusters, with a median odds ratio of 1.56 and significant enrichment in 18 of 33 organisms after BH-FDR correction.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:essential-genes
  - entity:core-genome
  - entity:odds-ratio
