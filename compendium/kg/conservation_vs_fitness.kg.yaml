    source_section: Functional Profiles Differ by Conservation Category
    quote: They are depleted in Carbohydrates (-7.9%), Amino Acids (-5.6%), and Membrane Transport (-4.0%) -- functions that tend to be conditionally important rather than universally essential.
    notebook: 04_essential_conservation.ipynb
- id: stmt:essential-auxiliary-poorly-characterized
  kind: finding
  text: Essential-auxiliary genes (3,683 genes essential for viability but not present in all strains) are poorly characterized (38.2% hypothetical) and less enzyme-rich (13.4%), with top subsystems spanning ribosomes, DNA replication, type 4 secretion, and plasmid replication.
  confidence: high
  topics:
