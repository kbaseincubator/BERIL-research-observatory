    source_doc: REPORT.md
    source_section: Link Table (Phase 1)
    quote: '44 of 48** FB organisms mapped to pangenome species clades

      - **177,863 gene-to-cluster links** at 100.0% median protein identity, 94.2% median gene coverage'
    notebook: 03_build_link_table.ipynb
    figure: figures/identity_distributions.png
- id: stmt:conservation-breakdown
  kind: finding
  text: Across the linked genes, 145,821 (82.0%) were core and 32,042 (18.0%) auxiliary, with 7,574 singletons forming a subset of the auxiliary fraction.
  confidence: high
