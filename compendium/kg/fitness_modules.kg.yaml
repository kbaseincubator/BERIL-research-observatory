    quote: After switching to absolute weight thresholds, modules became biologically coherent (94% enriched, 2.8x correlation enrichment).
    notebook: notebooks/03_ica_modules.ipynb
- id: stmt:pfam-boosts-annotation-rate
  kind: finding
  text: Adding PFam domains and lowering the enrichment overlap threshold from 3 to 2 raised the module annotation rate from 8% to 80% (92 to 890 modules) and unlocked 7.6x more function predictions.
  confidence: high
