- id: stmt:ortholog-transfer-gold-standard
  kind: finding
  text: Ortholog transfer remains the gold standard for gene-level function prediction at 95.8% precision, while Module-ICA fills a different niche by identifying which biological processes an uncharacterized gene participates in.
  confidence: high
