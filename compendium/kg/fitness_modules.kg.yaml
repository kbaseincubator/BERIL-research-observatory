- id: stmt:ica-process-not-molecular-caveat
  kind: caveat
  text: Module-ICA has near-zero precision for predicting specific KEGG KO assignments because KO groups are gene-level (about 1.2 genes per unique KO); modules capture process-level co-regulation, not specific molecular function.
  confidence: high
