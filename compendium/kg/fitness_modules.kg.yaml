- id: stmt:conserved-module-families
  kind: finding
  text: Ortholog-fingerprint alignment across 32 organisms produced 156 module families spanning two or more organisms (28 spanning 5+, 7 spanning 10+, 1 spanning 21), revealing conserved fitness regulons across diverse bacterial phyla.
  confidence: high
