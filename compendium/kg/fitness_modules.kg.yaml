- id: stmt:cofitness-enrichment-validation
  kind: finding
  text: 94.2% of fitness modules show significantly elevated within-module cofitness (Mann-Whitney U, p < 0.05), with within-module mean |r| of 0.34 versus a background of 0.12 (a 2.8x enrichment).
  confidence: high
