- id: stmt:strict-weight-threshold-critical
  kind: finding
  text: Switching from a D'Agostino K-squared module definition to strict absolute weight thresholds (|weight| >= 0.3, max 50 genes) made modules biologically coherent, raising enrichment to 94% and cofitness correlation enrichment to 2.8x.
  confidence: high
  topics:
