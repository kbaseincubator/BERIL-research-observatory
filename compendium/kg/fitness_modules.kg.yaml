    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: fitness_modules
    source_doc: README.md
    source_section: Overview
    quote: This project applies robust Independent Component Analysis (ICA) to gene-fitness matrices from the Fitness Browser, decomposing them into latent functional modules of co-regulated genes.
- id: stmt:1116-stable-modules
  kind: finding
  text: Robust ICA across 32 bacterial organisms, each with at least 100 experiments, yielded 1,116 stable fitness modules.
  confidence: high
