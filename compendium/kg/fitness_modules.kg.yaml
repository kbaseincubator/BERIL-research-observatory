project:
  id: fitness_modules
  title: 'Report: Pan-bacterial Fitness Modules via Independent Component Analysis'
statements:
- id: stmt:ica-fitness-modules-approach
  kind: claim
  text: Robust Independent Component Analysis applied to RB-TnSeq gene-fitness matrices from the Fitness Browser decomposes them into latent functional modules of co-regulated genes, complementing sequence-based annotation by capturing process-level co-regulation.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:functional-dark-matter
  entities:
