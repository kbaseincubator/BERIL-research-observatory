project:
  id: metal_cross_resistance
  title: Gene-Resolution Metal Cross-Resistance Across Diverse Bacteria
statements:
  - id: stmt:metal-cross-universal-positivity-finding
    kind: finding
    text: "Gene-level metal cross-resistance is directionally conserved: metal-pair fitness correlations are overwhelmingly positive across organisms."
    confidence: high
    topics:
      - topic:metal-resistance
    entities:
      - entity:metal-stress
      - entity:cross-resistance
      - entity:fitness-browser
    links:
      supports:
        - stmt:metal-cross-two-layer-claim
      contradicts: []
      refines: []
    evidence:
      - source_project: metal_cross_resistance
        source_doc: REPORT.md
        source_section: Metal cross-resistance is universal and directionally conserved
        quote: "Across 317 organism-metal pair observations (28 organisms, 85 unique metal pairs), **98.1% of gene-level fitness correlations are positive** (311/317) and **99.1% are statistically significant** (p < 0.05)."
        notebook: 01_metal_experiment_inventory.ipynb
        figure: figures/dvh_cross_resistance_heatmap.png

  - id: stmt:metal-cross-two-layer-claim
    kind: claim
    text: Metal cross-resistance has a universal stress layer and a chemistry-specific magnitude layer, with divalent cations showing especially strong shared responses.
    confidence: high
    topics:
      - topic:metal-resistance
    entities:
      - entity:metal-stress
      - entity:cross-resistance
    links:
      supports: []
      contradicts: []
      refines:
        - stmt:metal-cross-universal-positivity-finding
    evidence:
      - source_project: metal_cross_resistance
        source_doc: REPORT.md
        source_section: The Two Layers of Cross-Resistance
        quote: "This study reveals that metal cross-resistance operates on two layers:"
      - source_project: metal_cross_resistance
        source_doc: REPORT.md
        source_section: The Two Layers of Cross-Resistance
        quote: "**Chemistry-specific layer (magnitude)**: The *degree* of cross-resistance varies by metal pair and reflects chemical similarity."

  - id: stmt:metal-cross-tier-architecture-finding
    kind: finding
    text: Metal-important genes form a conservation gradient from general stress genes through metal-shared genes to metal-specific genes.
    confidence: high
    topics:
      - topic:metal-resistance
    entities:
      - entity:metal-stress
      - entity:core-genome
      - entity:metal-specific-genes
    links:
      supports:
        - stmt:metal-cross-two-layer-claim
      contradicts: []
      refines:
        - stmt:metal-atlas-core-robustness-finding
    evidence:
      - source_project: metal_cross_resistance
        source_doc: REPORT.md
        source_section: Three-tier gene architecture
        quote: "The predicted gradient holds: general stress genes (pleiotropic, important across many conditions) are the most conserved in the pangenome, metal-shared genes (cross-resistance drivers, important for ≥2 metals) are intermediate, and metal-specific genes (important for exactly 1 metal) are least conserved."
        notebook: 04_shared_vs_specific_genes.ipynb
        figure: figures/core_enrichment_gradient.png

  - id: stmt:metal-cross-bacdive-caveat
    kind: caveat
    text: BacDive validation of multi-metal scores is underpowered at the Fitness Browser organism scale.
    confidence: high
