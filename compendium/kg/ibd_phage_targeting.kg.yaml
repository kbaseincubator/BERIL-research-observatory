    contradicts: []
    refines: []
  evidence:
  - source_project: ibd_phage_targeting
    source_doc: REPORT.md
    source_section: Within-ecotype × within-substudy meta-analysis defines ecotype-specific Tier-A (rigor-controlled)
    quote: Across the four IBD sub-studies (242 CD / 369 nonIBD pooled), the 14-species curated battery produces the expected canonical CD signature — pathobionts up, protective commensals down — with strong sign concordance
    notebook: NB04e_option_A_viability.ipynb
