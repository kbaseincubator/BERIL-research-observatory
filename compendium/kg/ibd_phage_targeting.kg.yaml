    contradicts: []
    refines: []
  evidence:
  - source_project: ibd_phage_targeting
    source_doc: REPORT.md
    source_section: Executive Summary
    quote: '**Phage cocktails designed at the cohort level will mismatch individual patients unless ecotype is known first.**'
- id: stmt:four-ibd-ecotypes
  kind: finding
  text: Two independent clustering methods on 8,489 metagenomic samples converge on four reproducible IBD microbiome ecotypes (E0-E3) with K=4 selected by a cross-method ARI parsimony rule.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  entities:
  - entity:microbiome-ecotype
  - entity:metaphlan3
  - entity:curated-metagenomic-data
  - entity:lda-gmm-clustering
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: ibd_phage_targeting
    source_doc: REPORT.md
    source_section: Four reproducible IBD ecotypes with clear disease stratification
    quote: which has a local maximum at K = 4 (ARI = 0.131) and a second peak at K = 7 (0.140). A parsimony rule — smallest K within 0.02 ARI of the maximum — selects K = 4.
    notebook: NB01b_ecotype_refit.ipynb
    figure: figures/NB01b_K_selection.png
- id: stmt:ucdavis-spans-ecotypes
  kind: finding
  text: The 23 UC Davis Crohn's patients distribute non-randomly across three ecotypes (none in the Prevotella E2), with active disease concentrated in the E1 and E3 ecotypes.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  - topic:microbiome-engineering
  entities:
  - entity:microbiome-ecotype
  - entity:crohns-disease
  - entity:uc-davis-cohort
  links:
    supports:
    - stmt:cohort-cocktail-mismatch
    contradicts: []
    refines: []
  evidence:
  - source_project: ibd_phage_targeting
    source_doc: REPORT.md
    source_section: UC Davis CD patients span three ecotypes, none in E2
    quote: χ²(3) vs uniform = 10.0, **p = 0.019**. The distribution is non-random. UC Davis looks Western (no E2 Prevotella-dominant patients), with active disease dominating (73 % E1 or E3).
    notebook: NB02_ecotype_projection.ipynb
    figure: figures/NB02_ucdavis_ecotype_assignment.png
- id: stmt:clinical-covariates-insufficient
  kind: finding
  text: Clinical covariates separate healthy from IBD samples but cannot distinguish the transitional (E1) from severe (E3) IBD ecotypes, so metagenomics remains required for ecotype assignment.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  - topic:microbiome-engineering
  entities:
  - entity:microbiome-ecotype
  - entity:clinical-classifier
  - entity:metagenomics
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: ibd_phage_targeting
    source_doc: REPORT.md
    source_section: Clinical covariates alone are insufficient for within-IBD ecotype assignment
    quote: clinical covariates distinguish HC vs IBD trivially (dominated by `is_ibd`) but do *not* separate IBD ecotypes (E1 transitional vs E3 severe). For UC Davis-type cohorts, **metagenomics remains required** for ecotype assignment.
    notebook: NB03_clinical_ecotype_classifier.ipynb
    figure: figures/NB03_h1c_auc.png
- id: stmt:substudy-nesting-unidentifiable
  kind: caveat
  text: In pooled curatedMetagenomicData, healthy and Crohn's samples come from disjoint source studies, making a pooled case-vs-control mixed model structurally unidentifiable and forcing a within-substudy CD-vs-nonIBD design.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  entities:
  - entity:curated-metagenomic-data
  - entity:differential-abundance
  - entity:confounding
  links:
    supports:
    - stmt:canonical-cd-signature
    contradicts: []
    refines: []
  evidence:
  - source_project: ibd_phage_targeting
    source_doc: REPORT.md
    source_section: Within-ecotype × within-substudy meta-analysis defines ecotype-specific Tier-A (rigor-controlled)
    quote: A pooled CD-vs-HC LME with substudy random effect is therefore structurally unidentifiable (the random effect perfectly predicts diagnosis)
    notebook: NB04c_rigor_repair_completion.ipynb
- id: stmt:canonical-cd-signature
  kind: finding
  text: A confound-free within-substudy CD-vs-nonIBD meta-analysis across four IBD cohorts recovers the canonical Crohn's signature of pathobionts up and protective commensals down with strong sign concordance.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  - topic:microbiome-engineering
  entities:
