- id: stmt:state-dependent-dosing
  kind: claim
  text: A single patient's ecotype can drift between E1 and E3 between visits, changing the optimal cocktail composition moderately (Jaccard 0.60) and motivating state-dependent cocktail re-design rather than a fixed prescription.
  confidence: medium
  topics:
  - topic:microbiome-engineering
  - topic:microbial-ecotypes
  entities:
