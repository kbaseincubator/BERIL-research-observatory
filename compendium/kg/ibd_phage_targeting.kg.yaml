    source_doc: REPORT.md
    source_section: NB16 — Patient 6967 longitudinal stability + state-dependent dosing strategy
    quote: '**Cocktail Jaccard (visit 1 × visit 2) = 0.60** — moderate overlap; ecotype drift implies non-trivial cocktail re-design, not a complete rewrite.'
    notebook: NB16_longitudinal_dosing.ipynb
    figure: figures/NB16_longitudinal_dosing.png
