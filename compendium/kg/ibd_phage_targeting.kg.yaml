statements:
- id: stmt:cohort-cocktail-mismatch
  kind: claim
  text: Phage cocktails designed at the cohort level will mismatch individual IBD patients unless each patient's microbiome ecotype is determined first.
  confidence: high
  topics:
  - topic:microbiome-engineering
  - topic:microbial-ecotypes
  entities:
