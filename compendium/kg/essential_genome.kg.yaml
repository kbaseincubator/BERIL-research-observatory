    contradicts: []
    refines: []
  evidence:
  - source_project: essential_genome
    source_doc: REPORT.md
    source_section: Only 5% of Ortholog Families Are Universally Essential
    quote: Of 17,222 ortholog families across 48 bacteria, 859 (5.0%) are universally essential.
    notebook: notebooks/02_essential_families.ipynb
    figure: figures/essential_families_overview.png
- id: stmt:variable-essentiality-is-norm
  kind: finding
  text: Variably essential families -- essential in some organisms but dispensable in others -- are the largest class at 4,799 families (27.9%), making context-dependent essentiality the norm rather than the exception.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:microbial-ecotypes
  entities:
  - entity:ortholog-family
  - entity:variable-essentiality
  - entity:essential-genome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: essential_genome
    source_doc: REPORT.md
    source_section: Only 5% of Ortholog Families Are Universally Essential
    quote: 4,799 families (27.9%) are variably essential -- essential in some organisms, non-essential in others. 11,564 (67.1%) are never essential.
    notebook: notebooks/02_essential_families.ipynb
- id: stmt:essentiality-strain-dependent-cross-species
  kind: claim
  text: Cross-species RB-TnSeq data extend the principle that the pan-genome makes essentiality strain-dependent and evolvable from within a single species to 48 phylogenetically diverse bacteria and archaea.
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:variable-essentiality
  - entity:pangenome
  - entity:rb-tnseq
  links:
    supports:
    - stmt:variable-essentiality-is-norm
    contradicts: []
    refines: []
  evidence:
  - source_project: essential_genome
    source_doc: REPORT.md
    source_section: Variable Essentiality Is the Norm, Not the Exception
    quote: This directly extends Rosconi et al. (2022), who demonstrated within *S. pneumoniae* that the pan-genome makes gene essentiality "strain-dependent and evolvable." Our analysis shows this principle holds across 48 phylogenetically diverse species spanning Proteobacteria, Bacteroidetes, Firmicutes, and Archaea.
- id: stmt:orphan-essentials-hypothetical-frontier
  kind: finding
  text: The 7,084 essential genes lacking orthologs in any other Fitness Browser organism are 58.7% hypothetical, far more uncharacterized than universally essential genes (8.2%), marking a frontier of unknown essential biology.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:gene-fitness
  entities:
  - entity:orphan-essential-genes
  - entity:essential-genome
  - entity:hypothetical-genes
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: essential_genome
    source_doc: REPORT.md
    source_section: Orphan Essential Genes Are 58.7% Hypothetical
    quote: 7,084 essential genes have no orthologs in any other FB organism. These are 58.7% hypothetical -- the least characterized yet most functionally important genes in each organism. By contrast, universally essential genes are only 8.2% hypothetical.
    notebook: notebooks/02_essential_families.ipynb
- id: stmt:module-transfer-function-predictions
  kind: finding
  text: Transferring functional context from non-essential orthologs in ICA fitness modules produced 1,382 family-backed function predictions for hypothetical essential genes (35.3% of predictable targets).
  confidence: high
  topics:
