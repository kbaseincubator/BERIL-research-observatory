    refines: []
  evidence:
  - source_project: essential_genome
    source_doc: REPORT.md
    source_section: Universally Essential Families Are Overwhelmingly Core
    quote: Universally essential genes are 91.7% core vs 80.7% for non-essential. 71% of universally essential families are 100% core across all genomes in their species. Orphan essentials are only 49.5% core -- strain-specific essential functions.
    notebook: notebooks/04_conservation_architecture.ipynb
    figure: figures/conservation_architecture.png
- id: stmt:universal-essentials-only-broad-spectrum-targets
  kind: claim
  text: Because most essential gene families are essential in only a minority of organisms, only the 859 universally essential families are reliable broad-spectrum antibiotic targets.
  confidence: medium
  topics:
