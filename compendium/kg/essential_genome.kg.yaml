- id: stmt:essentiality-upper-bound-caveat
  kind: caveat
  text: The transposon-based essential gene definition is an upper bound, since genes can lack insertions due to small size, AT-rich sequence, or scaffold edge effects rather than true essentiality.
  confidence: high
  topics:
  - topic:gene-fitness
  entities:
  - entity:rb-tnseq
  - entity:essential-genome
  - entity:essentiality-definition
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: essential_genome
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Essential gene definition is an upper bound**: Genes without transposon insertions may lack insertions due to small size, AT-rich sequence, or scaffold edge effects, not true essentiality.'
- id: stmt:bbh-over-merging-caveat
  kind: caveat
  text: 'Connected-component ortholog grouping can over-merge: transitive BBH-graph connections may combine unrelated genes into one ortholog group, especially for multi-domain proteins.'
  confidence: medium
  topics:
