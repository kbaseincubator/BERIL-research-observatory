project:
  id: essential_genome
  title: 'Report: The Pan-Bacterial Essential Genome'
statements:
- id: stmt:fifteen-pan-essential-families
  kind: finding
  text: Fifteen gene families -- dominated by ribosomal proteins plus groEL, pyrG, fusA, and valS -- are essential in every one of the 48 surveyed bacteria, forming the irreducible core of bacterial life.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:essential-genome
  - entity:ortholog-family
  - entity:ribosomal-proteins
  - entity:fitness-browser
  links:
    supports:
    - stmt:essential-genome-small-conserved
    contradicts: []
    refines: []
  evidence:
  - source_project: essential_genome
    source_doc: REPORT.md
    source_section: 15 Gene Families Are Essential in All 48 Bacteria
    quote: 'The absolute core of bacterial life: ribosomal proteins (rpsC, rplW, rplK, rplB, rplA, rplF, rps11, rpsJ, rpsI, rpsM), chaperonin (groEL), CTP synthase (pyrG), translation elongation factor G (fusA), valyl-tRNA synthetase (valS), and geranyltranstransferase (SelGGPS).'
    notebook: notebooks/02_essential_families.ipynb
- id: stmt:five-percent-universally-essential
  kind: finding
  text: Only 859 of 17,222 cross-organism ortholog families (5.0%) are universally essential, the great majority being strict single-copy families.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:ortholog-family
  - entity:essential-genome
  - entity:single-copy-family
  links:
