    source_doc: REPORT.md
    source_section: 1,382 Function Predictions for Hypothetical Essentials
    quote: Module transfer via non-essential orthologs in ICA fitness modules generated 1,382 function predictions for hypothetical essential genes (35.3% of predictable targets). All predictions are family-backed.
    notebook: notebooks/03_function_prediction.ipynb
- id: stmt:essentiality-tracks-core-conservation
  kind: finding
  text: 'Conservation breadth tracks essentiality: universally essential genes are 91.7% core versus 80.7% for non-essential, while orphan essentials are only 49.5% core, indicating strain-specific essential functions.'
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:gene-fitness
  entities:
