- id: stmt:essential-genome-small-conserved
  kind: claim
  text: The experimentally defined universally essential bacterial genome is small and deeply conserved, smaller than computational minimal-gene-set estimates because it requires transposon disruption to be lethal across all 48 tested organisms.
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
