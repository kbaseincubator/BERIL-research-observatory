project:
  id: amr_pangenome_atlas
  title: 'Report: Pan-Bacterial AMR Gene Landscape'
statements:
- id: stmt:amr-depleted-from-core
  kind: finding
  text: AMR genes are markedly depleted from the bacterial core genome, with only 30.3% core versus a 46.8% pangenome baseline (OR=0.49) and a 2.2x enrichment in the auxiliary genome.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:pangenome-architecture
  entities:
  - entity:amr-genes
  - entity:core-genome
  - entity:pangenome
  - entity:accessory-genome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: amr_pangenome_atlas
    source_doc: REPORT.md
    source_section: 1. AMR Genes Are Massively Depleted from the Core Genome
    quote: 'AMR genes are significantly less conserved than the pangenome average: only **30.3% are core** vs 46.8% baseline (OR=0.49, chi-squared=23,117, p≈0). The **auxiliary genome is 2.2x enriched** for AMR (33.6% vs 15.3%).'
    figure: figures/amr_conservation_vs_baseline.png
    notebook: 01_amr_census.ipynb
- id: stmt:amr-depletion-universal
  kind: finding
  text: The depletion of AMR genes from the core genome is consistent across species, with 63.7% of 4,252 tested species showing AMR less core than their own pangenome baseline.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:pangenome-architecture
  entities:
  - entity:amr-genes
  - entity:core-genome
  - entity:pangenome
  links:
