    source_doc: REPORT.md
    source_section: 3. AMR Hotspots Are Concentrated in Clinical Pathogens
    quote: At the genus level, **Klebsiella** leads with 206 AMR clusters per species, followed by Salmonella (198), Citrobacter (134), and Enterobacter (93). Gammaproteobacteria contain **45% of all AMR clusters** (37,752/83,008).
    figure: figures/amr_hotspot_families.png
    notebook: 03_phylogenetic_distribution.ipynb
- id: stmt:amr-cog-defense-enrichment
  kind: finding
  text: AMR clusters are functionally enriched for COG V Defense mechanisms (7.05x) and COG P Inorganic ion transport (1.93x), reflecting genuine defense systems plus large mercury and arsenic resistance gene families.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:metal-resistance
  entities:
  - entity:cog-category
  - entity:defense-systems
  - entity:eggnog
  - entity:metal-resistance
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: amr_pangenome_atlas
    source_doc: REPORT.md
    source_section: 4. AMR Genes Are Enriched in Defense and Ion Transport Functions
    quote: COG category analysis (77K AMR clusters with eggNOG annotations vs 86M baseline) reveals **COG V (Defense mechanisms) is 7.05x enriched** in AMR genes (14.9% vs 2.1%), confirming that AMR annotations target bona fide defense systems. **COG P (Inorganic ion transport) is 1.93x enriched** (10.7% vs 5.6%), reflecting the large mercury (merA, merP, merC) and arsenic (arsD, arsC) resistance gene families.
    figure: figures/amr_cog_enrichment.png
    notebook: 04_functional_context.ipynb
- id: stmt:clinical-species-more-amr
  kind: finding
  text: Human/clinical species carry 2.7x more AMR (10.6 clusters per species) than environmental species, and their AMR is less core (30.8%) than soil (58.1%) or plant (63.1%) AMR.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:environment-biogeography
  entities:
  - entity:clinical-isolates
  - entity:isolation-source
  - entity:amr-genes
  - entity:core-genome
