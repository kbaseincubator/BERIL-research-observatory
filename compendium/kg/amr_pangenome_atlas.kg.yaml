    quote: Mercury resistance genes (merA, merP, merC, merE, merF, merR, merD, merB, merT) collectively account for ~15,000 hits — 18% of all AMR annotations. Arsenic resistance (arsD, arsN1, arsN2, arsC) adds another ~6,000.
