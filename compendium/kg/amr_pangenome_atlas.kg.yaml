    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: amr_pangenome_atlas
    source_doc: REPORT.md
    source_section: 5. Clinical Species Carry 2.7x More AMR — and It's More Acquired
    quote: Species classified as **Human/Clinical carry 10.6 AMR clusters per species** (n=2,248), compared to 4.6 for Soil/Terrestrial (n=2,469), 3.9 for Aquatic (n=1,827), and 3.0 for Animal (n=959). This difference is highly significant (Kruskal-Wallis H=440, p=7.0e-93). Critically, clinical AMR is **less core** (30.8%) than soil AMR (58.1%) or plant AMR (63.1%)
    figure: figures/amr_by_environment.png
    notebook: 05_environmental_distribution.ipynb
- id: stmt:alphaearth-diversity-predicts-amr
  kind: finding
  text: AlphaEarth environmental-diversity embeddings strongly predict AMR count (Spearman rho=0.466), indicating that broader niche breadth enables accumulation of less-core resistance genes.
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:amr-resistome
