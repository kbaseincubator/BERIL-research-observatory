    source_doc: REPORT.md
    source_section: 6. AMR Genes Are Not a Fitness Burden in Lab Conditions
    quote: we identified **178 AMR genes across 37 Fitness Browser organisms**, yielding 29,386 fitness measurements. Surprisingly, AMR genes show **slightly less fitness cost** than the non-AMR baseline (median fitness -0.007 vs -0.012, Mann-Whitney p=3.7e-6).
    figure: figures/amr_fitness_distribution.png
    notebook: 06_fitness_crossref.ipynb
- id: stmt:metal-resistance-major-component
  kind: finding
  text: Heavy-metal resistance is a major component of the AMR census, with mercury resistance genes alone accounting for ~15,000 hits (18% of all AMR annotations) and arsenic resistance adding ~6,000 more.
  confidence: high
