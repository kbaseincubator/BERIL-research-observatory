    contradicts: []
    refines: []
  evidence:
  - source_project: amr_pangenome_atlas
    source_doc: REPORT.md
    source_section: 1. AMR Genes Are Massively Depleted from the Core Genome
    quote: 'This depletion is consistent across species: in a paired test of 4,252 species (each with ≥5 AMR clusters), 63.7% show AMR less core than their species baseline (Wilcoxon p=1.1e-130, mean difference -0.102).'
    notebook: 02_conservation_patterns.ipynb
- id: stmt:intrinsic-acquired-dichotomy
  kind: finding
  text: AMR mechanisms split into a conservation dichotomy, with intrinsic beta-lactamases 54.9% core while regulatory genes (6.5% core) and known mobile elements such as blaTEM, tet(C), and ant(2'')-Ia are 0% core.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:mobile-genetic-elements
  entities:
  - entity:beta-lactamase
  - entity:efflux-pump
  - entity:mobile-genetic-element
  - entity:core-genome
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:amr-depleted-from-core
  evidence:
  - source_project: amr_pangenome_atlas
    source_doc: REPORT.md
    source_section: 2. Intrinsic vs Acquired Resistance Creates a Conservation Dichotomy
    quote: '**Beta-lactamases are 54.9% core** (p=7.7e-74 for enrichment vs baseline) — these are intrinsic resistance genes present in the species'' chromosomal backbone. In contrast, **regulatory genes are only 6.5% core**, and known mobile elements like blaTEM, tet(C), and ant(2'''')-Ia are **0% core** (fully accessory/singleton).'
    figure: figures/amr_mechanism_conservation.png
    notebook: 02_conservation_patterns.ipynb
- id: stmt:amr-hotspots-clinical-pathogens
  kind: finding
  text: AMR gene density is strongly phylogenetically structured, with Klebsiella leading at 206 AMR clusters per species and Gammaproteobacteria carrying 45% of all AMR clusters.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:pangenome-architecture
