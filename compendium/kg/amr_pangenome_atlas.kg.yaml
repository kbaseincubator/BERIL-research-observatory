  - source_project: amr_pangenome_atlas
    source_doc: REPORT.md
    source_section: 5. Clinical Species Carry 2.7x More AMR — and It's More Acquired
    quote: '**AlphaEarth embedding analysis** (2,684 species with ≥3 genomes and embeddings) reveals that **environmental diversity strongly predicts AMR count** (Spearman rho=0.466, p=1.6e-144). Species sampled from more diverse environments carry more AMR genes, and those AMR genes are less core (rho=-0.173, p=1.8e-19).'
    figure: figures/amr_alphaearth_diversity.png
    notebook: 05_environmental_distribution.ipynb
- id: stmt:amr-not-fitness-burden
  kind: finding
  text: Across 178 AMR genes in 37 Fitness Browser organisms, AMR genes impose slightly less fitness cost than the non-AMR baseline (median fitness -0.007 vs -0.012) in standard lab conditions.
  confidence: medium
