    contradicts: []
    refines: []
  evidence:
  - source_project: enigma_contamination_functional_potential
    source_doc: REPORT.md
    source_section: Interpretation
    quote: This is compatible with contamination-driven taxonomic turnover that is functionally redundant or too fine-scale (species/strain/pathway level) for the present mapping.
