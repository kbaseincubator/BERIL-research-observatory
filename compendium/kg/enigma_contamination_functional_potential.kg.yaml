    notebook: 03_contamination_functional_models.ipynb
- id: stmt:species-proxy-coverage-limited
  kind: finding
  text: Restricting to a species-proxy mode of genera mapping to a single GTDB clade sharply reduced mean mapped abundance fraction (0.031 vs 0.343) and left the defense trend positive but non-significant.
  confidence: medium
  topics:
