- id: stmt:confirmatory-defense-null
  kind: finding
  text: Predeclared confirmatory Spearman tests of site defense score against the contamination index remained non-significant in both genus-level mapping modes (relaxed rho = 0.0587, q = 0.862; strict rho = 0.0682, q = 0.849).
  confidence: high
