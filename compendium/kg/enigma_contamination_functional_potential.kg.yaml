    source_section: Contamination index was broad but right-skewed
    quote: NB03 built contamination index from 8 metal columns (`arsenic`, `cadmium`, `chromium`, `copper`, `lead`, `nickel`, `uranium`, `zinc`) using per-metal `log1p` z-scoring and row-wise mean.
    notebook: 03_contamination_functional_models.ipynb
    figure: figures/contamination_index_distribution.png
- id: stmt:functional-redundancy-interpretation
  kind: claim
  text: Contamination gradients in this ENIGMA subset did not translate into a robust community-level shift in inferred stress functional potential at genus resolution, compatible with functionally redundant or too fine-scale taxonomic turnover.
  confidence: medium
  topics:
  - topic:metal-resistance
  - topic:microbial-ecotypes
  entities:
  - entity:enigma-coral
  - entity:functional-potential
  - entity:cog-categories
