    source_section: Species-proxy resolution sensitivity is limited by mapped coverage
    quote: This suggests that with current ENIGMA taxonomy granularity, stricter taxonomic resolution sharply reduces analyzable signal and does not strengthen inference yet.
    notebook: 02_taxonomy_bridge_functional_features.ipynb
    figure: figures/mapping_coverage_by_mode.png
  - source_project: enigma_contamination_functional_potential
