    notebook: 03_contamination_functional_models.ipynb
    figure: figures/confirmatory_defense_vs_contamination.png
  - source_project: enigma_contamination_functional_potential
    source_doc: REPORT.md
    source_section: Confirmatory Spearman tests remain null with confidence intervals and global FDR
    quote: '- `relaxed_all_clades`: rho = 0.0587, 95% bootstrap CI [-0.128, 0.250], Spearman p = 0.546, FDR q = 0.862'
