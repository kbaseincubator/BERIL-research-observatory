    source_doc: REPORT.md
    source_section: Data coverage
    quote: The AlphaEarth embeddings table covers 83,287 genomes (28.4% of 293,059 total in the pangenome database).
    figure: figures/coverage_bar.png
- id: stmt:coverage-bias-caveat
  kind: caveat
  text: Because AlphaEarth coverage is only 28.4% of genomes and the subset carries a 38% human/clinical bias, the embedded population may not represent the overall NCBI or pangenome population.
  confidence: high
  topics:
  - topic:environment-biogeography
  entities:
