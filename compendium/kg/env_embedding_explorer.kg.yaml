    refines: []
  evidence:
  - source_project: env_embedding_explorer
    source_doc: REPORT.md
    source_section: 6. Embedding space also shows taxonomic structure
    quote: Coloring the UMAP by phylum reveals some taxonomic clustering, though this is partially confounded with environment (e.g., Campylobacterota are predominantly gut-associated).
    notebook: 02_interactive_exploration.ipynb
    figure: figures/umap_by_phylum.png
- id: stmt:env-harmonization-mapping
  kind: finding
  text: A reusable harmonization mapped 5,774 unique free-text isolation_source values to 12 broad environment categories, capturing 71% of labeled genomes while 17% remained as an Other tail.
  confidence: medium
  topics:
  - topic:environment-biogeography
  entities:
  - entity:isolation-source
  - entity:environment-harmonization
  - entity:ncbi-metadata
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: env_embedding_explorer
    source_doc: REPORT.md
    source_section: Environment harmonization
    quote: 5,774 unique `isolation_source` free-text values were mapped to 12 broad categories via keyword matching. The mapping captures 71% of genomes with a label; 17% remain as "Other" and 12.5% are "Unknown" (missing/null isolation_source).
- id: stmt:alphaearth-coverage
  kind: finding
  text: AlphaEarth embeddings cover only 83,287 genomes (28.4% of the 293,059-genome pangenome database) and are biased toward genomes with valid lat/lon metadata.
  confidence: high
  topics:
  - topic:environment-biogeography
  entities:
