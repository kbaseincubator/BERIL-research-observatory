project:
  id: core_gene_tradeoffs
  title: 'Report: Core Gene Paradox -- Why Are Core Genes More Burdensome?'
statements:
- id: stmt:core-burden-paradox-claim
  kind: claim
  text: Core genome genes are more likely than accessory genes to show positive fitness effects when deleted (lab burden), contradicting the streamlining model that frames accessory genes as the metabolic burden.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:fitness-browser
  - entity:pangenome
  - entity:gene-fitness
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: core_gene_tradeoffs
    source_doc: README.md
    source_section: Overview
    quote: This project dissects why core genes are more burdensome than accessory genes -- a finding from `fitness_effects_conservation` that contradicts the "streamlining" model.
  - source_project: core_gene_tradeoffs
    source_doc: RESEARCH_PLAN.md
    source_section: Hypothesis
    quote: The `fitness_effects_conservation` project found that core genes are 1.3x more likely to be burdens than auxiliary genes (OR=0.77 for auxiliary vs core, p=5.5e-48) and that condition-specific fitness genes are more core (OR=1.78).
- id: stmt:function-specific-burden-finding
  kind: finding
  text: The core-gene burden paradox is function-specific, driven by Protein Metabolism (+6.2pp), Motility (+7.8pp), and RNA Metabolism (+12.9pp), while Cell Wall reverses with non-core genes being more burdensome (-14.1pp).
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:seed-annotations
  - entity:motility
  - entity:fitness-browser
  links:
    supports:
    - stmt:core-burden-paradox-claim
    contradicts: []
    refines: []
  evidence:
  - source_project: core_gene_tradeoffs
    source_doc: REPORT.md
    source_section: The Burden Paradox Is Function-Specific
    quote: 'Not all functional categories show the paradox. Core genes are disproportionately burdensome in Protein Metabolism (+6.2pp), Motility (+7.8pp), and RNA Metabolism (+12.9pp). But Cell Wall reverses: non-core cell wall genes are MORE burdensome (-14.1pp).'
    notebook: 01_burden_anatomy.ipynb
    figure: figures/burden_by_function.png
- id: stmt:tradeoff-genes-core-enriched-finding
  kind: finding
  text: True trade-off genes, important in some conditions and burdensome in others, number 25,271 (17.8%) and are 1.29x more likely to be core (OR=1.29, p=1.2e-44).
  confidence: high
  topics:
