- id: stmt:lab-proxy-interpretation-claim
  kind: claim
  text: The burden paradox resolves once lab conditions are recognized as an impoverished proxy for nature, since core genes encode energetically expensive functions like motility, ribosomal components, and RNA metabolism that are essential in natural environments.
  confidence: medium
  topics:
