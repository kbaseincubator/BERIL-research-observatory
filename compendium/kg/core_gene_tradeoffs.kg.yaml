    refines: []
  evidence:
  - source_project: core_gene_tradeoffs
    source_doc: REPORT.md
    source_section: Trade-Off Genes Are Enriched in Core
    quote: 25,271 genes (17.8%) are true trade-off genes -- important (fit < -1) in some conditions, burdensome (fit > 1) in others. These are 1.29x more likely to be core (OR=1.29, p=1.2e-44).
    notebook: 01_burden_anatomy.ipynb
    figure: figures/tradeoff_genes_conservation.png
