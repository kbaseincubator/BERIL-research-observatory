project:
  id: fitness_effects_conservation
  title: 'Report: Fitness Effects vs Conservation -- Quantitative Analysis'
statements:
- id: stmt:fitness-conservation-gradient
  kind: finding
  text: Pangenome conservation increases monotonically with gene fitness importance, forming a 16-percentage-point gradient from 82% core for essential genes to 66% core for always-neutral genes across ~194,000 genes in 43 bacteria.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:fitness-browser
  - entity:core-genome
  - entity:pangenome
  - entity:essential-genes
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: fitness_effects_conservation
    source_doc: REPORT.md
    source_section: Interpretation
    quote: This 16-percentage-point gradient spans ~194,000 genes across 43 diverse bacteria.
  - source_project: fitness_effects_conservation
    source_doc: REPORT.md
    source_section: Conservation Increases with Fitness Importance
    quote: 'The same gradient holds when binning by strongest fitness effect: essential -> 82.2% core, min_fit < -3 -> 77.7%, min_fit -1 to 0 -> 66.4%.'
    notebook: 02_fitness_vs_conservation.ipynb
    figure: figures/conservation_by_fitness_profile.png
- id: stmt:continuous-not-binary-claim
  kind: claim
  text: The relationship between fitness importance and conservation is a continuous gradient across the full essential-to-neutral spectrum, not a binary essential/non-essential distinction.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
