- id: stmt:core-genes-functionally-active-claim
  kind: claim
  text: Core genes are the most functionally active part of the genome, having the largest fitness effects in both directions because they are embedded in critical pathways, while accessory genes are functionally quieter under lab conditions.
  confidence: medium
  topics:
