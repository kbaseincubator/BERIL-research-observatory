    source_doc: REPORT.md
    source_section: Core Genes Are Not Burdens -- They're More Likely Beneficial
    quote: '**core genes are MORE likely to show positive fitness effects** when deleted (24.4% ever beneficial vs 19.9% for auxiliary, OR=0.77 for auxiliary vs core).'
    notebook: 02_fitness_vs_conservation.ipynb
    figure: figures/burden_genes_by_conservation.png
- id: stmt:specific-phenotype-genes-core
  kind: finding
  text: Genes with strong condition-specific phenotypes are more likely core (77.3% vs 70.3%; OR=1.78, p=1.8e-97), contradicting the naive expectation that condition-specific genes would be accessory.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:specific-phenotype
  - entity:fitness-browser
  - entity:condition-specific-fitness
