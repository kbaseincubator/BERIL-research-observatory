    source_doc: REPORT.md
    source_section: Specific-Phenotype Genes Are More Likely Core
    quote: Genes with strong condition-specific effects (tagged in `specificphenotype`) are 77.3% core vs 70.3% for genes without specific phenotypes (OR=1.78, p=1.8e-97). This contradicts the naive expectation that condition-specific genes would be accessory.
    notebook: 03_breadth_vs_conservation.ipynb
    figure: figures/conservation_by_condition_type.png
- id: stmt:ephemeral-niche-genes-core
  kind: finding
  text: Ephemeral niche genes (neutral overall but critical in one condition) account for 4,450 genes (2.7%) and are more common in core genes (3.0%) than in auxiliary (1.7%) or singleton (1.6%) genes.
  confidence: medium
  topics:
