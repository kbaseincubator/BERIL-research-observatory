  evidence:
  - source_project: fitness_effects_conservation
    source_doc: REPORT.md
    source_section: Interpretation
    quote: 'The results paint a consistent picture: **gene fitness importance and pangenome conservation are positively correlated across the full spectrum**. Essential genes are 82% core; always-neutral genes are 66% core.'
- id: stmt:breadth-predicts-conservation
  kind: finding
  text: Genes important in more experimental conditions are more likely to be core, with conservation rising from 66% (0 experiments) to 79% (20+ experiments) and a significant breadth-conservation correlation (Spearman rho=0.086, p=8.1e-230).
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:fitness-browser
  - entity:core-genome
  - entity:fitness-breadth
  links:
    supports:
    - stmt:fitness-conservation-gradient
    contradicts: []
    refines: []
  evidence:
  - source_project: fitness_effects_conservation
    source_doc: REPORT.md
    source_section: Breadth of Fitness Effects Predicts Conservation
    quote: 'Genes important in more conditions are more likely core (Spearman rho=0.086, p=8.1e-230):'
    notebook: 03_breadth_vs_conservation.ipynb
    figure: figures/fitness_breadth_vs_conservation.png
- id: stmt:core-genes-more-beneficial
  kind: finding
  text: Core genes are MORE likely than auxiliary genes to show positive (beneficial-when-deleted) fitness effects (24.4% vs 19.9% ever beneficial; OR=0.77 for auxiliary vs core), contradicting the expectation that accessory genes are the costly burden.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:accessory-genome
  - entity:fitness-browser
  - entity:burden-genes
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
