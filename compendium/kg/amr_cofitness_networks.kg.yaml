    source_doc: REPORT.md
    source_section: 1. AMR genes are embedded in larger-than-average co-regulated modules
    quote: Notably, 99% (208/209) of AMR gene-module assignments are in cross-organism conserved module families, indicating these are ancient regulatory relationships.
    notebook: 02_amr_in_modules.ipynb
- id: stmt:flagellar-biosynthesis-enrichment
  kind: finding
  text: AMR cofitness support networks are significantly enriched for flagellar motility and amino acid biosynthesis GO terms across multiple organisms (FDR < 0.05).
  confidence: medium
