    - stmt:dispensability-confound
    contradicts: []
    refines: []
  evidence:
  - source_project: amr_cofitness_networks
    source_doc: REPORT.md
    source_section: Limitations
    quote: Even without the dispensability confound, high cofitness implies shared fitness phenotypes, not direct transcriptional co-regulation.
- id: stmt:organism-specific-networks
  kind: finding
  text: 'AMR support networks are organism-specific rather than mechanism-specific: different AMR mechanisms within one organism share more cofitness partners (Jaccard 0.375) than the same mechanism across organisms (Jaccard 0.207).'
  confidence: high
