statements:
- id: stmt:amr-larger-modules
  kind: finding
  text: Only 24% of AMR genes fall into ICA fitness modules, but those modules are significantly larger than non-AMR modules (median 46 vs 27 genes), placing AMR genes within large multi-function cellular programs.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:gene-fitness
  entities:
