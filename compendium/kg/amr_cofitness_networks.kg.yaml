- id: stmt:cofitness-not-coregulation
  kind: caveat
  text: High cofitness implies shared fitness phenotypes rather than direct transcriptional co-regulation, so functional enrichment in cofitness neighborhoods can reflect shared experimental context rather than biology.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:functional-dark-matter
  entities:
  - entity:cofitness
  - entity:fitness-browser
  - entity:pearson-correlation
  links:
