    source_section: Organism regulatory architecture trumps resistance mechanism (robust finding)
    quote: This is a genuine structural finding about how genomes are organized, not an artifact of the enrichment categories.
- id: stmt:network-size-no-fitness-cost
  kind: finding
  text: Cofitness support network size shows no correlation with AMR gene fitness cost (Spearman rho = -0.006, p = 0.87, N = 769), so the uniform cost of resistance is not explained by co-regulatory neighborhood size.
  confidence: high
  topics:
  - topic:amr-resistome
