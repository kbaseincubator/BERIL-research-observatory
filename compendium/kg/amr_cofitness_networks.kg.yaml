  evidence:
  - source_project: amr_cofitness_networks
    source_doc: REPORT.md
    source_section: 1. AMR genes are embedded in larger-than-average co-regulated modules
    quote: 'Only 24% of AMR genes (192/801) are assigned to ICA fitness modules, but the modules they inhabit are significantly larger than non-AMR modules: median 46 vs 27 genes (MWU p = 1.7×10⁻⁸).'
    notebook: 02_amr_in_modules.ipynb
    figure: figures/amr_module_analysis.png
- id: stmt:amr-modules-conserved
  kind: claim
  text: Nearly all AMR gene-module assignments belong to cross-organism conserved module families, indicating these co-regulatory relationships are ancient.
  confidence: medium
