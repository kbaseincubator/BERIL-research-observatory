- id: stmt:fitness-matched-permutation-opportunity
  kind: opportunity
  text: A fitness-matched permutation test drawing random non-AMR genes matched on mean fitness level would distinguish whether the support-network enrichment is true co-regulation or a shared-dispensability artifact.
  confidence: high
  topics:
