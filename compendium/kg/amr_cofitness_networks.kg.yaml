    source_doc: REPORT.md
    source_section: 2. AMR support networks are enriched for flagellar motility and amino acid biosynthesis (H1 supported)
    quote: Using InterProScan GO annotations (68% gene coverage — 3.6× better than old SEED annotations), we detect significant functional enrichment in AMR cofitness neighborhoods.
    notebook: 03b_enrichment_interproscan.ipynb
    figure: figures/go_enrichment_interproscan.png
- id: stmt:dispensability-confound
  kind: caveat
  text: The flagellar and biosynthesis enrichment in AMR support networks may reflect shared dispensability under lab conditions rather than genuine mechanistic co-regulation.
  confidence: high
