- id: stmt:taxonomy-bridge-coverage
  kind: finding
  text: The NMDC-to-GTDB taxonomy bridge achieved a mean coverage of 94.6% across all 220 samples, with 92% of samples mapping at least 85% of community abundance to GTDB pangenome species.
  confidence: high
