    source_doc: REPORT.md
    source_section: Finding 2 — Community metabolic potential separates strongly by ecosystem type
    quote: 'PCA of the 220-sample × 80-pathway completeness matrix captured **49.4% of variance

      in PC1** and 16.6% in PC2 (83% total in PC1–5). Soil and Freshwater communities

      occupied nearly non-overlapping regions of PC space'
    notebook: 05_statistical_analysis.ipynb
    figure: figures/h2_pca.png
- id: stmt:carbon-utilization-primary-axis
  kind: claim
  text: Carbon utilization pathways, not amino acid pathways, load almost entirely on PC1, suggesting carbon substrate availability is the primary axis differentiating ecosystem metabolic type at the community level.
  confidence: medium
  topics:
