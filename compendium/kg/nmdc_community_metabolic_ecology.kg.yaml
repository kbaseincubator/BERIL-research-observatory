  evidence:
  - source_project: nmdc_community_metabolic_ecology
    source_doc: REPORT.md
    source_section: 'H1: Black Queen Signal'
    quote: 'The two FDR-significant pathways — leucine and arginine — are both energetically

      expensive to synthesise (leucine: 37 ATP equivalents; arginine: 26 ATP equivalents),

      consistent with the BQH prediction that costly functions are most likely to be lost

      when environmental supply is reliable.'
- id: stmt:ecosystem-metabolic-separation
  kind: finding
  text: PCA of the 220-sample x 80-pathway community completeness matrix captured 49.4% of variance in PC1, with Soil and Freshwater communities occupying nearly non-overlapping regions of PC space (Kruskal-Wallis p < 0.0001).
  confidence: high
