project:
  id: nmdc_community_metabolic_ecology
  title: 'Report: Community Metabolic Ecology via NMDC × Pangenome Integration'
statements:
- id: stmt:black-queen-community-signal
  kind: finding
  text: Across 13 testable amino acid biosynthesis pathways, 11 (85%) showed negative correlations between community pathway completeness and ambient amino acid metabolite intensity, the direction predicted by the Black Queen Hypothesis (binomial sign test p = 0.011).
  confidence: medium
  topics:
  - topic:metabolic-pathways
  - topic:gene-fitness
  entities:
  - entity:black-queen-hypothesis
  - entity:gapmind
  - entity:amino-acid-biosynthesis
  - entity:metabolomics
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: nmdc_community_metabolic_ecology
    source_doc: REPORT.md
    source_section: Finding 1 — Black Queen dynamics are detectable at community scale
    quote: 'Across 13 testable amino acid biosynthesis pathways, **11 of 13 (85%) showed negative

      Spearman correlations** between community pathway completeness and ambient amino acid

      metabolite intensity — the direction predicted by the Black Queen Hypothesis (BQH).'
    notebook: 05_statistical_analysis.ipynb
    figure: figures/h1_bqh_barplot.png
- id: stmt:leucine-arginine-fdr-significant
  kind: finding
  text: Leucine and arginine biosynthesis were the two amino acid pathways reaching FDR significance, both showing negative completeness-vs-metabolite correlations (leucine r = -0.390, q = 0.022; arginine r = -0.297, q = 0.049).
  confidence: high
  topics:
  - topic:metabolic-pathways
