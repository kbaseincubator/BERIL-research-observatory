    source_doc: REPORT.md
    source_section: Limitations
    quote: "**Freshwater samples absent from H1**: All 33 Freshwater samples lacked paired\n  metabolomics in NMDC, so H1 is effectively a soil-only test. Whether BQH dynamics\n  operate in freshwater communities at the same scale is untested."
- id: stmt:caveat-abiotic-features-missing
  kind: caveat
  text: Abiotic features such as pH, temperature, and total organic carbon were entirely absent for the 174-sample analysis matrix, preventing partial correlation tests controlling for environmental gradients that could confound the results.
  confidence: high
  topics:
  - topic:environment-biogeography
  entities:
