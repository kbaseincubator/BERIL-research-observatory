- id: stmt:first-gapmind-metabolomics-integration
  kind: claim
  text: This is the first application of GapMind community-weighted pathway completeness scores to predict environmental metabolomics across a large cross-habitat NMDC dataset, integrating 305M GapMind records with NMDC multi-omics for 220 samples.
  confidence: medium
