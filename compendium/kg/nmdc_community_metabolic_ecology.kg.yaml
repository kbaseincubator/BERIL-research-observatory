    source_doc: REPORT.md
    source_section: 'H2: Ecosystem Metabolic Niche'
    quote: 'The dominance of **carbon utilization pathways** on PC1 (not amino acid pathways)

      suggests that carbon substrate availability is the primary axis differentiating

      ecosystem metabolic type at the community level, with amino acid biosynthesis

      playing a secondary (PC2-level) role.'
- id: stmt:aa-pathways-differ-by-ecosystem
  kind: finding
  text: Per-pathway Kruskal-Wallis tests showed that 17 of 18 amino acid pathways have significantly different community completeness levels across ecosystem types, with only tyrosine not significantly differentiated.
  confidence: high
