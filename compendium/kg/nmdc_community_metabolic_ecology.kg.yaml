- id: stmt:single-study-robustness
  kind: finding
  text: 'The Black Queen signal is robust to sensitivity checks: it is unchanged when restricted to Soil-ecosystem samples, and the H1 dataset is effectively single-study (95% of samples from one NMDC study), so cross-study protocol heterogeneity is not a confounder for leucine.'
  confidence: medium
