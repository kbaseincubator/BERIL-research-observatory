  evidence:
  - source_project: nmdc_community_metabolic_ecology
    source_doc: REPORT.md
    source_section: Finding 1 — Black Queen dynamics are detectable at community scale
    quote: 'Two pathways reached significance after Benjamini-Hochberg FDR correction (q < 0.05):

      **leucine biosynthesis** (r = −0.390, q = 0.022, n = 62) and **arginine biosynthesis**

      (r = −0.297, q = 0.049, n = 80).'
    notebook: 05_statistical_analysis.ipynb
- id: stmt:costly-pathways-lost
  kind: claim
  text: The two FDR-significant Black Queen pathways, leucine and arginine, are both energetically expensive to synthesise, consistent with the prediction that costly biosynthetic functions are most likely to be lost when environmental supply is reliable.
  confidence: medium
  topics:
