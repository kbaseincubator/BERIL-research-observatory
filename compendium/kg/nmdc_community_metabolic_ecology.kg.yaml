    source_doc: REPORT.md
    source_section: Limitations
    quote: "**Abiotic feature coverage**: Abiotic features (pH, temperature, total organic carbon,\n  etc.) were absent (all NaN) for the 174-sample analysis matrix, preventing partial\n  correlation tests controlling for environmental gradients. These variables could\n  confound both H1 and H2 results."
