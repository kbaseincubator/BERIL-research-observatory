  evidence:
  - source_project: nmdc_community_metabolic_ecology
    source_doc: REPORT.md
    source_section: 'H1: Black Queen Signal'
    quote: 'the

      signal is robust in two sensitivity checks: it is unchanged when the analysis is

      restricted to Soil-ecosystem samples (soil-only: 11/13 negative, binomial p = 0.011;

      leu q = 0.022), and the dataset is effectively single-study — 95% of H1 samples come

      from one NMDC study (nmdc:sty-11-r2h77870), so cross-study LC-MS protocol heterogeneity

      is not a confounder for leu.'
- id: stmt:caveat-genomic-potential-not-expression
  kind: caveat
  text: GapMind pathway completeness indicates whether biosynthesis genes are present, not whether they are actively expressed, so transcriptomic data would be needed to determine whether expressed biosynthesis correlates more strongly with metabolite pools.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:functional-dark-matter
  entities:
  - entity:gapmind
  - entity:gene-expression
  - entity:amino-acid-biosynthesis
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:black-queen-community-signal
  evidence:
  - source_project: nmdc_community_metabolic_ecology
    source_doc: REPORT.md
    source_section: Limitations
    quote: "**GapMind represents genomic potential, not expression**: Pathway completeness\n  indicates whether the genes are present, not whether they are actively expressed.\n  Transcriptomic data would be needed to determine whether expressed biosynthesis\n  correlates more strongly with metabolite pools."
- id: stmt:caveat-freshwater-absent
  kind: caveat
  text: All 33 Freshwater samples lacked paired metabolomics in NMDC, so the Black Queen test is effectively a soil-only test and whether the dynamics operate in freshwater communities at the same scale is untested.
  confidence: high
  topics:
