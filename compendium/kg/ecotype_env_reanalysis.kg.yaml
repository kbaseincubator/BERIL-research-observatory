  - entity:isolation-source
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:ecotype-env-null-finding
  evidence:
  - source_project: ecotype_env_reanalysis
    source_doc: REPORT.md
    source_section: 1. Clinical bias does NOT explain the weak environment signal (H0 not rejected)
    quote: 'The result is the **opposite direction** from the hypothesis: human-associated species actually show slightly higher partial correlations.'
    notebook: 01_environmental_only_reanalysis.ipynb
- id: stmt:ecotype-continuous-spearman-finding
  kind: finding
  text: 'A continuous Spearman analysis confirmed the null result: the fraction of environmental genomes per species does not predict partial-correlation strength (rho=-0.085, p=0.25).'
  confidence: high
  topics:
