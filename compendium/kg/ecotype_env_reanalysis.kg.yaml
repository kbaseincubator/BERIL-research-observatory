    contradicts: []
    refines: []
  evidence:
  - source_project: ecotype_env_reanalysis
    source_doc: REPORT.md
    source_section: Literature Context
    quote: Our reanalysis with genome-level harmonized classifications confirms this null result (p=0.83) with a more systematic classification scheme.
- id: stmt:ecotype-embedding-ecology-claim
  kind: claim
  text: AlphaEarth embedding similarity may not equate to ecological relevance, since the environmental variation it captures (climate, vegetation, land use) may not strongly predict which genes a bacterium carries.
  confidence: medium
  topics:
  - topic:environment-biogeography
  - topic:microbial-ecotypes
  entities:
  - entity:alphaearth
  - entity:ecotype
  links:
    supports:
    - stmt:ecotype-env-null-finding
    contradicts: []
    refines: []
  evidence:
  - source_project: ecotype_env_reanalysis
    source_doc: REPORT.md
    source_section: Why the hypothesis was wrong
    quote: '**Embedding similarity ≠ ecological relevance**: Environmental embeddings are more geographically differentiated, but the environmental variation they capture (climate, vegetation, land use) may not strongly predict which genes a bacterium has.'
- id: stmt:ecotype-clinical-geographic-structure-claim
  kind: claim
  text: Human-associated pathogens may exhibit real geographic structure from global epidemiological patterns, producing environment-gene-content associations that are epidemiological rather than ecological.
  confidence: medium
  topics:
  - topic:environment-biogeography
  - topic:microbial-ecotypes
  entities:
  - entity:alphaearth
  - entity:isolation-source
  links:
    supports:
    - stmt:ecotype-opposite-direction-claim
    contradicts: []
    refines: []
  evidence:
  - source_project: ecotype_env_reanalysis
    source_doc: REPORT.md
    source_section: Why the hypothesis was wrong
    quote: The AlphaEarth embeddings may capture these regional patterns, creating environment–gene content associations that are real but epidemiological rather than ecological.
- id: stmt:ecotype-nan-bias-caveat
  kind: caveat
  text: Environmental species lose more species to NaN partial correlations (21%) than human-associated species (7%), which could bias the comparison but would only strengthen the null result given the observed direction.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  entities:
  - entity:ecotype
  - entity:isolation-source
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:ecotype-env-null-finding
  evidence:
  - source_project: ecotype_env_reanalysis
    source_doc: REPORT.md
    source_section: 3. NaN species are disproportionately environmental, not human-associated
    quote: This means the environmental group loses more species to NaN, which could slightly bias the comparison — but since human-associated species already show higher correlations even with this bias, addressing it would only strengthen the null result.
    notebook: 01_environmental_only_reanalysis.ipynb
- id: stmt:ecotype-27x-discrepancy-caveat
  kind: caveat
  text: Median partial correlations in this reanalysis are 27x higher than the original ecotype analysis (0.081 vs 0.003) because of the absence of downsampling, so absolute magnitudes are not comparable even though the group comparison remains valid.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  entities:
  - entity:ecotype
  - entity:downsampling
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:ecotype-env-null-finding
  evidence:
  - source_project: ecotype_env_reanalysis
    source_doc: REPORT.md
    source_section: 4. Overall partial correlations are 27x higher than the original analysis
    quote: The median partial correlation across all 183 species is 0.081 — compared to 0.003 in the original ecotype analysis.
    notebook: 01_environmental_only_reanalysis.ipynb
