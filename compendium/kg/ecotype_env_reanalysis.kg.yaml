    quote: 'The continuous Spearman analysis confirms this: fraction of environmental genomes per species does not predict partial correlation strength (rho=-0.085, p=0.25).'
    notebook: 01_environmental_only_reanalysis.ipynb
    figure: figures/frac_env_vs_partial_corr.png
- id: stmt:ecotype-clinical-sampling-bias-finding
  kind: finding
  text: Genome-level isolation-source classification of the ecotype species set found 47% majority human-associated and only 21% majority environmental, confirming a strong clinical sampling bias in the AlphaEarth subset.
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:microbial-ecotypes
  entities:
  - entity:isolation-source
  - entity:alphaearth
  - entity:env-category
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: ecotype_env_reanalysis
    source_doc: REPORT.md
    source_section: 2. 47% of ecotype species are human-associated, only 21% environmental
    quote: Of 224 species selected for the ecotype analysis (>=20 genomes with AlphaEarth embeddings, >=30% coverage), 106 (47%) are majority human-associated by genome-level isolation_source classification, 47 (21%) are majority environmental (Soil, Marine, Freshwater, Extreme, Plant), and 71 (32%) are mixed/other.
    notebook: 01_environmental_only_reanalysis.ipynb
    figure: figures/species_classification.png
- id: stmt:ecotype-bias-no-confound-claim
  kind: claim
  text: The clinical sampling bias in the AlphaEarth subset, while real and significant for embedding-based analyses, does not account for or confound the weak environment-gene-content relationship in the ecotype analysis.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  - topic:environment-biogeography
  entities:
