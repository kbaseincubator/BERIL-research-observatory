project:
  id: ecotype_env_reanalysis
  title: 'Report: Ecotype Reanalysis — Environmental vs Human-Associated Species'
statements:
- id: stmt:ecotype-env-null-finding
  kind: finding
  text: Restricting the ecotype analysis to environmental species did not yield stronger environment-gene-content correlations than human-associated species, with the Mann-Whitney U test far from significant (p=0.83).
  confidence: high
  topics:
  - topic:microbial-ecotypes
  - topic:environment-biogeography
  entities:
  - entity:ecotype
  - entity:alphaearth
  - entity:isolation-source
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: ecotype_env_reanalysis
    source_doc: REPORT.md
    source_section: 1. Clinical bias does NOT explain the weak environment signal (H0 not rejected)
    quote: Environmental species (n=37, median partial correlation 0.051) do NOT show stronger environment–gene content correlations than human-associated species (n=93, median 0.084). The Mann-Whitney U test is far from significant (U=1536, p=0.83, one-sided).
    notebook: 01_environmental_only_reanalysis.ipynb
    figure: figures/partial_corr_by_group.png
- id: stmt:ecotype-opposite-direction-claim
  kind: claim
  text: Contrary to the hypothesis, human-associated species showed slightly higher environment-gene-content partial correlations than environmental species, the opposite of the predicted direction.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  entities:
