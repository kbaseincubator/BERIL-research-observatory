  evidence:
  - source_project: ecotype_env_reanalysis
    source_doc: REPORT.md
    source_section: Novel Contribution
    quote: It demonstrates that the clinical sampling bias in AlphaEarth, while real and significant for embedding-based analyses, does not confound the ecotype environment–gene content relationship.
- id: stmt:ecotype-genome-level-classification-finding
  kind: finding
  text: Using a systematic genome-level harmonized isolation-source classification rather than coarse species-level manual assignment reproduced the prior null result (p=0.83 vs the original p=0.66) for the environment-versus-host comparison.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  entities:
  - entity:ecotype
  - entity:isolation-source
  - entity:env-category
  links:
    supports:
