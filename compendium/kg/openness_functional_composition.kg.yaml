    source_section: Expected Outcomes
    quote: '**If H1 supported**: Open pangenomes have stronger L/V enrichment -- HGT introduces more mobile/defense cargo in open genomes. This extends the "two-speed genome" to show it''s not just universal but scales with genome fluidity.'
- id: stmt:outcome-null-universal
  kind: opportunity
  text: If openness does not modulate enrichment, the two-speed pattern would be confirmed as truly universal and driven by the nature of HGT events rather than their frequency.
  confidence: low
  topics:
  - topic:pangenome-architecture
  - topic:mobile-genetic-elements
  entities:
