- id: stmt:outcome-extends-two-speed
  kind: opportunity
  text: If open pangenomes show stronger L/V enrichment, the result would extend the two-speed genome model to show the pattern is not merely universal but scales with genome fluidity.
  confidence: low
  topics:
  - topic:pangenome-architecture
