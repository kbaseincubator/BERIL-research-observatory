    source_section: Expected Outcomes
    quote: '**If H0 not rejected**: The two-speed pattern is truly universal and independent of openness -- even closed pangenomes have the same L/V enrichment magnitude. This would suggest the pattern is driven by the nature of HGT events, not their frequency.'
