- id: stmt:scales-with-openness-hypothesis
  kind: claim
  text: The project hypothesizes that species acquiring more novel genes (more open pangenomes) also show stronger mobile-element and defense enrichment, linking genome fluidity to functional specialization of the accessory genome.
  confidence: medium
