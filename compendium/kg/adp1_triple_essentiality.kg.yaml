project:
  id: adp1_triple_essentiality
  title: Triple Essentiality Concordance Analysis for *Acinetobacter baylyi* ADP1
statements:
- id: stmt:fitness-best-essentiality-predictor
  kind: finding
  text: Continuous RB-TnSeq fitness scores are the best predictor of gene essentiality in Acinetobacter baylyi ADP1 (AUC=0.70-0.73), whereas binary essentiality_fraction performs worse than random (AUC<0.5).
  confidence: high
  topics:
