    source_doc: REPORT.md
    source_section: From Both Studies
    quote: "Only 7.9% (18/229) of KO-essential genes are caught by TnSeq at optimal threshold\n   - 211 KO-essential genes are TnSeq-dispensable (tolerate partial function)\n   - 293 KO-dispensable genes are TnSeq-essential (fitness-important but not lethal)"
- id: stmt:proteomics-validates-essentiality
  kind: finding
  text: Protein expression strongly correlates with essentiality (r=0.35, AUC=0.74), with essential ADP1 genes expressed about 6.5-fold higher than dispensable genes (Mann-Whitney p=9.91e-59).
  confidence: high
