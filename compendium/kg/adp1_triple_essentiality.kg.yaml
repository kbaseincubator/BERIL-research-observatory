- id: stmt:methods-measure-different-biology
  kind: claim
  text: Knockout, FBA, RB-TnSeq, proteomics, and mutant growth assays each measure a distinct facet of gene importance (lethality, metabolic necessity, fitness cost, expression requirement, and condition-specific optimization), so no single method serves as ground truth.
  confidence: medium
