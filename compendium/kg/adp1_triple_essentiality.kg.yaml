- id: stmt:essentiality-fraction-worse-than-random
  kind: caveat
  text: Binary essentiality_fraction should not be used as an essentiality classifier because it performs worse than random against knockout truth (AUC=0.34-0.40), aggregating across too many diverse conditions.
  confidence: high
