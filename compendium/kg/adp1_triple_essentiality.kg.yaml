    source_doc: REPORT.md
    source_section: Executive Summary
    quote: '- **Fitness is the best predictor of essentiality** (AUC=0.70-0.73), outperforming binary essentiality_fraction (AUC<0.5). Use continuous fitness scores, not binary classifications, for TnSeq analysis.'
- id: stmt:fba-no-growth-defect-prediction
  kind: finding
  text: Among 478 TnSeq-dispensable, triple-covered ADP1 genes, FBA essentiality class was not significantly associated with measured growth-defect status (chi-squared=0.93, p=0.63).
  confidence: high
