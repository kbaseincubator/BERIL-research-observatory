    figure: figures/fba_comparison.png
- id: stmt:rbtnseq-systematic-discordance
  kind: finding
  text: RB-TnSeq systematically disagrees with knockout experiments across all tested thresholds (negative Cohen's kappa), capturing fitness cost rather than lethality.
  confidence: high
  topics:
  - topic:gene-fitness
