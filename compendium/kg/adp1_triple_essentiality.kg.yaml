    source_section: Key Findings
    quote: Among 478 triple-covered genes (all TnSeq-dispensable), FBA class was **not significantly associated** with growth defect status (chi-squared = 0.93, p = 0.63, 2 df).
    notebook: notebooks/02_concordance_analysis.ipynb
    figure: figures/fba_growth_concordance.png
- id: stmt:fba-null-robust-thresholds
  kind: finding
  text: The lack of association between FBA class and growth defects is robust to the growth-defect threshold, with chi-squared p>0.05 across Q10-Q35 cutoffs and a threshold-independent Kruskal-Wallis test also non-significant (H=1.67, p=0.43).
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:adp1-model-system
  entities:
  - entity:flux-balance-analysis
  - entity:growth-defect
  - entity:adp1
  links:
    supports:
    - stmt:fba-no-growth-defect-prediction
    contradicts: []
    refines: []
  evidence:
  - source_project: adp1_triple_essentiality
    source_doc: REPORT.md
    source_section: Key Findings
    quote: The chi-squared p-value remained above 0.05 for thresholds Q10–Q35. Only at Q40 did a marginal association appear (p = 0.048), driven by a slight divergence in FBA-essential vs FBA-blocked defect rates (90% vs 81%). The threshold-independent Kruskal-Wallis test on continuous mean growth rates confirms no association (H = 1.67, p = 0.43).
    figure: figures/threshold_sensitivity.png
- id: stmt:fba-moderate-ko-concordance
  kind: finding
  text: Across all genes, FBA shows moderate concordance with experimental knockout lethality (Cohen's kappa approximately 0.49, F1 approximately 0.62-0.67), making it a useful first-pass computational screen for essential genes.
  confidence: high
