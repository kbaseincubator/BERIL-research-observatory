    notebook: notebooks/02_concordance_analysis_refined.ipynb
    figure: figures/concordance_comprehensive.png
- id: stmt:tnseq-misses-essential
  kind: finding
  text: Only 7.9% (18/229) of knockout-essential ADP1 genes are flagged as essential by RB-TnSeq at the optimal threshold, with 211 KO-essential genes called TnSeq-dispensable and 293 KO-dispensable genes called TnSeq-essential.
  confidence: high
