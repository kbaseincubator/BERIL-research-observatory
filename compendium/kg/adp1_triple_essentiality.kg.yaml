- id: stmt:transposon-not-deletion-caveat
  kind: caveat
  text: 'Transposon insertion is not equivalent to gene deletion: some knockout-essential genes appear TnSeq-dispensable because partial or truncated protein function suffices, limiting RB-TnSeq as a lethality proxy.'
  confidence: medium
