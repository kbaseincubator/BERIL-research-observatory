- id: stmt:aromatic-fba-discordance
  kind: finding
  text: Aromatic degradation genes, including beta-ketoadipate pathway enzymes, are strongly enriched among FBA-discordant ADP1 genes (OR=9.70, q=0.012), revealing a systematic gap in the model's environmental assumptions.
  confidence: high
