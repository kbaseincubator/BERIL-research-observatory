    source_section: Genomic Discovery Index (GDI)
    quote: "**Highest GDI (genomic frontiers)**: Forest (902.36) and Cropland (890.82) soils —\n  high observed species richness but sparse genome reference databases.\n- **Lower GDI (relatively well-mapped)**: Grassland (503.42) and Wetland (525.13)."
- id: stmt:ph-discovery-bias
  kind: finding
  text: Genomic databases show a +0.8 pH unit discovery bias toward acidic soils (frontier areas mean pH 6.74 vs mapped areas 5.94), leaving alkaline-specialist microbes disproportionately as dark matter.
  confidence: medium
  topics:
  - topic:functional-dark-matter
  - topic:environment-biogeography
  entities:
  - entity:genomic-discovery-index
  - entity:ph-bias
  - entity:alkaline-soils
  - entity:microbial-dark-matter
  links:
