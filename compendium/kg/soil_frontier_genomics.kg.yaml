    source_section: Clay Shield Hypothesis — Null Result
    quote: "Clay content does not detectably buffer industrial or geochemical\n  stress effects on microbial functional potential at global scale."
- id: stmt:negative-out-of-sample-r2
  kind: finding
  text: All three predictive model families (soil/climate, geochemical, industrial) achieve negative out-of-sample R², meaning they predict microbial functional potential worse than the training mean.
  confidence: high
  topics:
  - topic:environment-biogeography
  entities:
  - entity:predictive-models
  - entity:cross-validation
  - entity:functional-potential
  links:
