  - source_project: soil_frontier_genomics
    source_doc: REPORT.md
    source_section: Key Findings
    quote: "**All predictive models have negative out-of-sample R²**:\n  - Soil & Climate: R² = −0.205 ± 0.197\n  - Geochemical: R² = −0.331 ± 0.071\n  - Industrial: R² = −0.221 ± 0.042"
- id: stmt:shield-efficiency-not-significant
  kind: finding
  text: The shield efficiency test shows low-clay and high-clay cross-validation R² differ by only 0.024 with a 95% confidence interval that includes zero, so the difference is not significant.
  confidence: high
  topics:
