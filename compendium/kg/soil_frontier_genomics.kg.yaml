- id: stmt:clay-shield-not-supported-claim
  kind: claim
  text: The clay shield hypothesis is not supported at global scale, with the functional potential variable being unpredictable from measured stressors likely due to spatial autocorrelation, batch effects, and unmeasured confounders.
  confidence: medium
