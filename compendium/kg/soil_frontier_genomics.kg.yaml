    source_section: Genomic Discovery Index (GDI)
    quote: "**GDI = OTU Richness / (Mean Genome Completeness + 1)** — quantifies the gap between\n  observed diversity and genomic reference coverage at 1° spatial bins (~11 km radius)."
- id: stmt:forest-cropland-frontiers
  kind: finding
  text: Forest (GDI 902.36) and Cropland (890.82) soils are the highest-GDI genomic frontiers, with high observed species richness but sparse genome reference databases, while Grassland (503.42) and Wetland (525.13) are relatively well-mapped.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:environment-biogeography
  entities:
