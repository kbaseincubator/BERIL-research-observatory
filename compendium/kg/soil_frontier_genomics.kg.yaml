    source_doc: REPORT.md
    source_section: Key Findings
    quote: "**Shield efficiency test**: low-clay CV R² = −0.268, high-clay CV R² = −0.292;\n  difference = 0.024 [95% CI: −0.423, 0.161] — **not significant, CI includes zero**."
- id: stmt:clay-feature-importance-no-accuracy
  kind: finding
  text: Clay appears as a consistent model feature (importance ≈ 0.14) but does not improve predictive accuracy in high-clay soils relative to low-clay soils.
  confidence: medium
