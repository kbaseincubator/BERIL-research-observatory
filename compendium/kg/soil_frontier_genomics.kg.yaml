    contradicts: []
    refines: []
  evidence:
  - source_project: soil_frontier_genomics
    source_doc: README.md
    source_section: Genomic Discovery Index (GDI)
    quote: "**pH discovery bias**: frontier areas (GDI > 1000) have mean pH = 6.74 vs. mapped\n  areas (GDI < 1000) mean pH = 5.94 — a **+0.8 pH unit gap**, indicating genomic\n  databases are biased toward acidic soils and alkaline-specialist microbes are\n  disproportionately dark matter."
- id: stmt:alkaline-sampling-gap-claim
  kind: claim
  text: The GDI results reveal a systematic alkaline-soil sampling gap in public genomic datasets, with implications for any study drawing functional inferences from genome reference databases in forest and cropland biomes.
  confidence: medium
  topics:
  - topic:functional-dark-matter
  - topic:environment-biogeography
