- id: stmt:gdi-definition
  kind: finding
  text: The Genomic Discovery Index (GDI = OTU Richness / (Mean Genome Completeness + 1)) quantifies the gap between observed microbial diversity and genomic reference coverage at 1° spatial bins.
  confidence: high
  topics:
