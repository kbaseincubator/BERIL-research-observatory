      datasets.'
- id: stmt:negative-r2-diagnosis-caveat
  kind: caveat
  text: The negative out-of-sample R² diagnosis is incomplete because distributional shift, outlier leverage, and genuine unpredictability have not been distinguished, and only true unpredictability supports a strong null result interpretation.
  confidence: high
  topics:
  - topic:environment-biogeography
  entities:
  - entity:predictive-models
  - entity:cross-validation
  - entity:spatial-autocorrelation
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:negative-out-of-sample-r2
  evidence:
  - source_project: soil_frontier_genomics
    source_doc: REPORT.md
    source_section: Critical Assessment
    quote: 'These three causes

      have different scientific implications — only (c) supports a strong null result

      interpretation. Causes (a) and (b) would indicate a modelling failure, not a biological

      null result.'
- id: stmt:gdi-formula-validity-caveat
  kind: caveat
  text: The GDI formula is a novel index without published precedent that conflates sampling gap and OTU richness into one number potentially dominated by the richness term, so separate reporting of richness and completeness would be more interpretable.
  confidence: high
  topics:
  - topic:functional-dark-matter
  entities:
  - entity:genomic-discovery-index
  - entity:otu-richness
  - entity:genome-completeness
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:gdi-definition
  evidence:
  - source_project: soil_frontier_genomics
    source_doc: REPORT.md
    source_section: Critical Assessment
    quote: 'GDI = Richness / (Mean_Completeness + 1) is a novel index

      without published precedent.'
- id: stmt:forest-cropland-not-distinguishable-caveat
  kind: caveat
  text: The Forest (902.36) vs Cropland (890.82) GDI difference is only 1.3% and without bootstrap confidence intervals these biomes are not meaningfully distinguishable, so the claim should be framed as jointly highest rather than a ranked ordering.
  confidence: high
  topics:
  - topic:functional-dark-matter
  entities:
  - entity:genomic-discovery-index
  - entity:forest-soils
  - entity:cropland-soils
  links:
