    source_section: Module-Level Conservation Shows No Field-Lab Difference (NB04)
    quote: The 9 "lab" modules (mean core fraction 0.516) are notably less conserved, containing genes in the accessory genome.
    notebook: 04_module_analysis.ipynb
    figure: figures/fig_ecological_vs_lab_modules.png
- id: stmt:resistance-genes-accessory-mge
  kind: claim
  text: Antibiotic-resistance (73.4% core) and heavy-metal-resistance (71.2% core) genes are the least conserved and fall below baseline, suggesting these resistance functions are disproportionately accessory traits carried on mobile genetic elements.
  confidence: medium
  topics:
  - topic:metal-resistance
