    source_doc: REPORT.md
    source_section: Threshold Sensitivity Analysis
    quote: Field-stress consistently has the highest conservation across all thresholds. Heavy-metals is consistently the lowest.
    notebook: 03_fitness_conservation.ipynb
- id: stmt:module-conservation-no-field-lab-difference
  kind: finding
  text: At the module level, ICA fitness module conservation shows no significant correlation with field condition activity (Spearman rho=0.071, p=0.62), so module-level conservation does not separate field from lab conditions.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
