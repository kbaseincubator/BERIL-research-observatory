    source_doc: REPORT.md
    source_section: Module-Level Conservation Shows No Field-Lab Difference (NB04)
    quote: No significant correlation exists between field condition activity and module conservation (Spearman rho=0.071, p=0.62).
    notebook: 04_module_analysis.ipynb
    figure: figures/fig_module_conservation_vs_activity.png
- id: stmt:lab-modules-accessory-genome
  kind: finding
  text: Nine low-field-activity "lab" ICA modules are notably less conserved (mean core fraction 0.516), showing that accessory-genome fitness modules exist and tend to respond to lab-type conditions.
  confidence: medium
  topics:
