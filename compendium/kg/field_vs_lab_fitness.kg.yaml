    source_doc: REPORT.md
    source_section: Novel Contribution
    quote: The finding that condition type matters less than fitness magnitude for conservation prediction was not anticipated and suggests that the core genome reflects general functional importance rather than niche-specific selection.
- id: stmt:single-organism-coarse-pangenome-caveat
  kind: caveat
  text: Results are limited to a single organism (DvH) whose pangenome has few genomes, producing a coarse core/auxiliary classification with a high 76.3% baseline core fraction that compresses effect sizes.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:gene-fitness
  entities:
  - entity:dvh
  - entity:pangenome
  - entity:core-genome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: field_vs_lab_fitness
    source_doc: REPORT.md
    source_section: Limitations
    quote: The *Nitratidesulfovibrio vulgaris* pangenome has relatively few genomes, creating a coarse core/auxiliary classification with a high baseline core fraction (76.3%), which compresses effect sizes
- id: stmt:small-specificity-sample-caveat
  kind: caveat
  text: The field-specific and lab-specific gene sets are small (n=50-52), limiting statistical power for the key field-versus-lab comparison.
  confidence: high
  topics:
  - topic:gene-fitness
  entities:
