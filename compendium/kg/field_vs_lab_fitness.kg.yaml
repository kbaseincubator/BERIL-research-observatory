    contradicts: []
    refines: []
  evidence:
  - source_project: field_vs_lab_fitness
    source_doc: REPORT.md
    source_section: Fitness Effects Are Weak Predictors of Core Status
    quote: Gene length is a much stronger predictor of core status than fitness effects from either field or lab conditions. Neither fitness dimension alone is informative (CV-AUC near 0.5).
    notebook: 03_fitness_conservation.ipynb
    figure: figures/fig_roc_conservation_prediction.png
- id: stmt:field-stress-robust-across-thresholds
  kind: finding
  text: Field-stress genes consistently show the highest conservation and heavy-metals genes the lowest across fitness thresholds from -1 to -3, confirming the pattern is robust to threshold choice.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
