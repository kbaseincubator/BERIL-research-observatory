    source_doc: REPORT.md
    source_section: Limitations
    quote: Gene length is confounded with both fitness measurement quality (short genes get fewer transposon insertions) and core status (core genes tend to be longer)
- id: stmt:quantitative-conservation-metric-opportunity
  kind: opportunity
  text: Replacing the binary core/auxiliary label with a quantitative conservation metric (fraction of genomes carrying each gene cluster) could increase statistical power for the fitness-conservation relationship.
  confidence: medium
