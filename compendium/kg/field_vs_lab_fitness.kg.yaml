project:
  id: field_vs_lab_fitness
  title: 'Report: Field vs Lab Gene Importance in *Desulfovibrio vulgaris* Hildenborough'
statements:
- id: stmt:enigma-coral-no-dvh-fitness
  kind: finding
  text: The ENIGMA CORAL database contains no Desulfovibrio vulgaris Hildenborough fitness data, so all gene-level fitness analysis relies on the Fitness Browser RB-TnSeq dataset.
  confidence: high
  topics:
  - topic:subsurface-genomics
  - topic:gene-fitness
  entities:
  - entity:enigma-coral
  - entity:dvh
  - entity:fitness-browser
  - entity:oak-ridge-frc
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: field_vs_lab_fitness
    source_doc: REPORT.md
    source_section: ENIGMA CORAL Contains No DvH Fitness Data (NB01)
    quote: 'Key finding: **DvH is completely absent** from the database.'
    notebook: 01_enigma_discovery.ipynb
- id: stmt:condition-classification-field-lab-split
  kind: finding
  text: DvH's 757 RB-TnSeq experiments were classified into six ecological-relevance categories, yielding a broad split of 337 field (44.5%) versus 420 lab (55.5%) conditions.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:environment-biogeography
  entities:
  - entity:dvh
  - entity:fitness-browser
  - entity:condition-classification
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: field_vs_lab_fitness
    source_doc: REPORT.md
    source_section: Condition Classification (NB02)
    quote: 'Broad split: 337 field (44.5%) vs 420 lab (55.5%).'
    notebook: 02_condition_classification.ipynb
    figure: figures/fig_condition_importance_heatmap.png
- id: stmt:field-stress-genes-more-conserved
  kind: finding
  text: Genes important under field-stress, field-core, and lab-nutrient conditions are significantly enriched in the core genome after BH-FDR correction, with field-stress genes the most conserved (83.6% core, OR=1.58, q=0.026).
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:dvh
  - entity:rb-tnseq
  - entity:gene-conservation
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: field_vs_lab_fitness
    source_doc: REPORT.md
    source_section: Genes Important for Field Conditions Are Significantly More Conserved (NB03)
    quote: Field-stress (q=0.026), field-core (q=0.026), and lab-nutrient (q=0.037) genes are significantly enriched in the core genome after BH-FDR correction.
    notebook: 03_fitness_conservation.ipynb
    figure: figures/fig_conservation_by_condition_class.png
- id: stmt:lab-specific-genes-surprisingly-core
  kind: finding
  text: Counter to the hypothesis, genes with fitness defects only under lab conditions are 96.0% core, slightly higher than field-specific genes at 88.5%, indicating that fitness importance predicts conservation regardless of ecological context.
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:gene-conservation
  - entity:lab-specific-genes
  - entity:field-specific-genes
  links:
    supports: []
    contradicts:
    - stmt:field-stress-genes-more-conserved
    refines: []
  evidence:
  - source_project: field_vs_lab_fitness
    source_doc: REPORT.md
    source_section: 'Specificity Analysis: Lab-Specific Genes Are Surprisingly More Core'
    quote: Counter to H1, genes with fitness defects **only under lab conditions** are 96% core (n=50), slightly higher than field-specific genes at 88.5% (n=52).
    notebook: 03_fitness_conservation.ipynb
    figure: figures/fig_field_vs_lab_specificity.png
- id: stmt:any-fitness-importance-predicts-conservation
  kind: claim
  text: 'The dominant signal is that any fitness importance, regardless of condition type, predicts pangenome conservation: universally important genes are significantly more core than neutral genes (OR=1.35, p=0.033).'
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:gene-conservation
  - entity:fitness-magnitude
  links:
    supports:
    - stmt:lab-specific-genes-surprisingly-core
    contradicts: []
    refines: []
  evidence:
  - source_project: field_vs_lab_fitness
    source_doc: REPORT.md
    source_section: 'Specificity Analysis: Lab-Specific Genes Are Surprisingly More Core'
    quote: Both are well above the 74.5% baseline, suggesting that any fitness importance -- regardless of ecological context -- predicts conservation.
    notebook: 03_fitness_conservation.ipynb
- id: stmt:gene-length-stronger-than-fitness
  kind: finding
  text: In logistic regression, gene length is a much stronger predictor of core-genome status (CV-AUC 0.645) than field or lab fitness effects, neither of which alone is informative (CV-AUC near 0.5).
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:gene-length
  - entity:logistic-regression
