- id: stmt:condition-type-vs-fitness-magnitude
  kind: claim
  text: This is the first analysis to stratify RB-TnSeq fitness effects by ecological relevance, finding that condition type matters less than fitness magnitude for predicting conservation, implying the core genome reflects general functional importance rather than niche-specific selection.
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:rb-tnseq
  - entity:core-genome
  - entity:fitness-magnitude
