- id: stmt:gene-length-confound-caveat
  kind: caveat
  text: Gene length is confounded with both fitness measurement quality and core status, since short genes receive fewer transposon insertions and core genes tend to be longer.
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
