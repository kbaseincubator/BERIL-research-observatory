  - entity:tca-cycle
  links:
    supports:
    - stmt:condition-specific-respiratory-wiring
    contradicts: []
    refines: []
  evidence:
  - source_project: respiratory_chain_wiring
    source_doc: REPORT.md
    source_section: 3. The quinate-Complex I paradox is resolved by NADH flux rate, not total yield
    quote: 'Quinate produces FEWER NADH per carbon atom (0.57) than glucose (1.50) or acetate (1.50), yet Complex I is MORE essential on quinate. The resolution: aromatic ring cleavage via the β-ketoadipate pathway produces succinyl-CoA + acetyl-CoA simultaneously, creating a concentrated NADH burst in the TCA cycle that exceeds NDH-2''s reoxidation capacity. Glucose distributes NADH production across Entner-Doudoroff pathway steps plus TCA, staying within NDH-2''s capacity.'
  - source_project: respiratory_chain_wiring
    source_doc: 03_stoichiometry.ipynb
    source_section: 3. The quinate-Complex I paradox is resolved by NADH flux rate, not total yield
    quote: '*(Notebook: 03_stoichiometry.ipynb)*'
- id: stmt:rate-vs-yield-principle
  kind: claim
  text: The rate-versus-yield principle—that substrates producing concentrated reducing equivalents demand high-capacity NADH reoxidation regardless of total NADH yield—should generalize to any carbon source whose catabolism concentrates reducing equivalents.
  confidence: medium
