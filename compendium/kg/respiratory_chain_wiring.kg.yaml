    source_doc: REPORT.md
    source_section: '4. Cross-species: NDH-2 presence does NOT predict reduced Complex I aromatic dependency'
    quote: Organisms WITH NDH-2 show LARGER Complex I aromatic deficits (mean = -0.297) than those WITHOUT (mean = -0.156), the opposite of the compensation prediction (p = 0.52, not significant). The NDH-2 compensation hypothesis is not supported by cross-species fitness data — NDH-2 presence does not predict whether Complex I is dispensable on aromatics. The ADP1 respiratory wiring pattern may be species-specific rather than a general rule.
  - source_project: respiratory_chain_wiring
