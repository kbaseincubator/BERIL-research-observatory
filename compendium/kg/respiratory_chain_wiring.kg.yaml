- id: stmt:quinate-complex-i-paradox-flux-rate
  kind: finding
  text: 'The paradox that quinate yields fewer NADH per carbon yet makes Complex I more essential is resolved by NADH flux rate: aromatic ring cleavage via the β-ketoadipate pathway creates a concentrated TCA-cycle NADH burst exceeding NDH-2''s reoxidation capacity.'
  confidence: high
  topics:
