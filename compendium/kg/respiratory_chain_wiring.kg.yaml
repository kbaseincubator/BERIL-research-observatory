  - entity:carbon-source
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: respiratory_chain_wiring
    source_doc: REPORT.md
    source_section: 1. Each carbon source uses a distinct respiratory chain configuration
    quote: ADP1's branched respiratory chain (62 genes across 8 subsystems) is wired in a condition-dependent manner. Quinate requires only Complex I; acetate requires Complex I, cytochrome bo3, ACIAD3522, and more; glucose requires no specific respiratory component. This is not a quantitative gradient — it's qualitatively different respiratory configurations per substrate.
  - source_project: respiratory_chain_wiring
    source_doc: 01_respiratory_chain_map.ipynb
    source_section: 1. Each carbon source uses a distinct respiratory chain configuration
    quote: '*(Notebook: 01_respiratory_chain_map.ipynb)*'
- id: stmt:three-parallel-nadh-dehydrogenases
  kind: finding
  text: ADP1 carries three parallel NADH dehydrogenases (Complex I, NDH-2, and ACIAD3522) with distinct, non-overlapping condition profiles, with ACIAD3522 being specifically lethal on acetate.
  confidence: high
