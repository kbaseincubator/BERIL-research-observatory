- id: stmt:condition-specific-respiratory-wiring
  kind: finding
  text: Acinetobacter baylyi ADP1's branched respiratory chain is wired in a condition-dependent manner, using qualitatively different respiratory configurations for each carbon source rather than a quantitative flux gradient.
  confidence: high
  topics:
  - topic:adp1-model-system
