    source_doc: REPORT.md
    source_section: Novel Contribution
    quote: The paradox that quinate (lower NADH yield) requires Complex I more than glucose (higher NADH yield) is resolved by NADH flux rate — concentrated TCA burst vs distributed production. This principle should apply to any substrate whose catabolism produces concentrated reducing equivalents.
- id: stmt:respiratory-wiring-is-metabolic-not-transcriptional
  kind: finding
  text: All three NADH dehydrogenases are constitutively co-expressed at similar protein levels, so condition-specific respiratory wiring operates as a passive flux-based system at the metabolic level rather than an active transcriptional switch.
  confidence: high
