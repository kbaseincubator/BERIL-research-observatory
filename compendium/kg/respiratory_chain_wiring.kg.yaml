  - entity:complex-i
  - entity:ndh-2
  - entity:metabolic-model
  links:
    supports:
    - stmt:respiratory-wiring-is-metabolic-not-transcriptional
    contradicts: []
    refines: []
  evidence:
  - source_project: respiratory_chain_wiring
    source_doc: REPORT.md
    source_section: FBA Model Limitations
    quote: The FBA model predicts zero flux through NDH-2 and ACIAD3522 on all standard media, because FBA optimizes for growth rate and preferentially routes NADH through Complex I (which generates more ATP per NADH). This is the fundamental reason FBA models fail to predict condition-specific respiratory requirements — they assume the optimal pathway is always used, missing the capacity constraints that force cells to use alternative, suboptimal pathways under high flux.
- id: stmt:cross-species-ndh2-compensation-not-supported
  kind: finding
  text: Across 14 fitness-browser organisms, those with validated NDH-2 show larger Complex I aromatic fitness deficits than those without (the opposite of the compensation prediction, not statistically significant), so the NDH-2 compensation pattern is not supported across species.
  confidence: medium
