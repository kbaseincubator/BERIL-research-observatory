- id: stmt:fba-misses-capacity-constraints
  kind: finding
  text: Flux balance analysis predicts zero flux through NDH-2 and ACIAD3522 on all standard media because it optimizes for growth and routes NADH through the more ATP-efficient Complex I, illustrating why FBA fails to capture the capacity constraints that drive condition-specific respiratory requirements.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:adp1-model-system
