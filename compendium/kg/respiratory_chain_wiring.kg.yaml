    source_doc: REPORT.md
    source_section: 2. ADP1 has three parallel NADH dehydrogenases with distinct condition profiles
    quote: NDH-2 (ACIAD_RS16420, KO K03885) is TnSeq-dispensable but missing from the deletion collection — it has no growth data. FBA predicts zero flux through NDH-2 on all standard carbon sources, routing all NADH through Complex I. NDH-2 is a standalone gene (not in a respiratory operon) and is core genome.
