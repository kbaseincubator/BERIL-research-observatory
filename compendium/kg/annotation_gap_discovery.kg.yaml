project:
  id: annotation_gap_discovery
  title: 'Report: Annotation-Gap Discovery via Phenotype-Fitness-Pangenome-Gapfilling Integration'
statements:
- id: stmt:triangulation-resolves-48pct
  kind: finding
  text: Integrating five evidence types resolved 47.8% (96 of 201) of gapfilled enzymatic reaction-organism pairs with candidate genes, exceeding the pre-specified 30% threshold.
  confidence: high
  topics:
