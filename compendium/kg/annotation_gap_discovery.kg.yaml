    source_doc: REPORT.md
    source_section: 6. GapMind and Gapfilling Show Partial Concordance
    quote: Of 104 GapMind-gapfill pathway pairings, GapMind pathway predictions partially corroborated the gapfilling results. GapMind identified pathways as incomplete (`not_present` or `steps_missing`) for many of the same carbon sources where ModelSEED required gapfilling.
    notebook: 04_gapmind_bakta_annotations.ipynb
    figure: figures/fig5_gapmind_concordance.png
- id: stmt:blast-high-identity-cluster
  kind: finding
  text: DIAMOND BLAST against 328 Swiss-Prot exemplars yielded 154 hits, with high-confidence hits (>=30% identity, >=70% coverage, e-value <=1e-10) concentrated in branched-chain amino acid biosynthesis and polyamine metabolism reactions.
  confidence: medium
