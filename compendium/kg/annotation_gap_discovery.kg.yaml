- id: stmt:phylogenetic-bias-caveat
  kind: caveat
  text: Twelve of 14 organisms are Proteobacteria, limiting generalizability, and the sole Bacteroidetes (B. thetaiotaomicron) had the lowest resolution rate, suggesting the approach may be less effective for phylogenetically distant clades.
  confidence: high
  topics:
