    source_section: Novel Contribution
    quote: '**Evidence complementarity**: The leave-one-out analysis quantifies each stream''s unique contribution, demonstrating that no single data type is sufficient'
- id: stmt:resolution-varies-by-organism
  kind: finding
  text: Per-organism resolution rates varied 3.5-fold, from 20% in Bacteroides thetaiotaomicron to 71% in Klebsiella michiganensis, tracking reference-genome annotation quality and Fitness Browser coverage.
  confidence: high
  topics:
