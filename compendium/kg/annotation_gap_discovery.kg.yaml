    source_doc: REPORT.md
    source_section: 4. Two Reactions Dominate High-Confidence Assignments
    quote: The reactions rxn02185 (2-acetolactate pyruvate-lyase, EC 2.2.1.6, branched-chain amino acid biosynthesis) and rxn03436 (acetohydroxy acid isomeroreductase, EC 1.1.1.86, valine/isoleucine biosynthesis) were each resolved with high confidence in 9 of 14 organisms.
    notebook: 06_exemplar_blast.ipynb
- id: stmt:dark-reactions-resist-resolution
  kind: finding
  text: EC-less "dark reactions" (50 of 201, 24.9%) were resolved only 16% of the time versus 58.3% for reactions with known EC numbers, making them the hardest annotation gaps.
  confidence: high
  topics:
  - topic:functional-dark-matter
