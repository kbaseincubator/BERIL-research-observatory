    source_section: 3. Resolution Varies 3.5-fold Across Organisms
    quote: Resolution rates ranged from 20% (*Bacteroides thetaiotaomicron*) to 71% (*Klebsiella michiganensis*). Organisms with better-annotated reference genomes and stronger Fitness Browser coverage showed higher resolution rates.
    notebook: 08_figures_report.ipynb
    figure: figures/fig3_organism_resolution.png
- id: stmt:bcaa-reactions-dominate
  kind: finding
  text: Two sequential branched-chain amino acid biosynthesis reactions (rxn02185 and rxn03436) were each resolved with high confidence in 9 of 14 organisms, with their co-resolution validating the triangulation approach.
  confidence: medium
  topics:
  - topic:metabolic-pathways
  - topic:functional-dark-matter
