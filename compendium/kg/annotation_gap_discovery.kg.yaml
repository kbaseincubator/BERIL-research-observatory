    source_section: Limitations
    quote: '**Phylogenetic bias**: 12 of 14 organisms are Proteobacteria, limiting generalizability. The sole Bacteroidetes (*B. thetaiotaomicron*) had the lowest resolution rate, suggesting the approach may be less effective for phylogenetically distant clades with divergent metabolism'
- id: stmt:knockout-validation-inconclusive
  kind: caveat
  text: FBA gene-knockout validation was inconclusive because models cannot grow on carbon-source minimal media without the gapfilled reactions, making single-gene knockout analysis circular.
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
