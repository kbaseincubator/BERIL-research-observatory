    refines: []
  evidence:
  - source_project: annotation_gap_discovery
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Gene knockout simulation**: The FBA knockout validation was inconclusive because the models cannot grow on carbon source minimal media without the gapfilled reactions — the gapfilled reactions are themselves required to enable growth, making single-gene knockout analysis circular in this context'
