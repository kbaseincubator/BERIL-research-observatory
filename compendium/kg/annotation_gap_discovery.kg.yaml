    contradicts: []
    refines: []
  evidence:
  - source_project: annotation_gap_discovery
    source_doc: REPORT.md
    source_section: 2. No Single Evidence Stream Achieves >35% Resolution
    quote: BLAST homology was the single most impactful stream (34.8% alone), but the full pipeline adds 13 percentage points over BLAST alone. Removing any single stream still keeps resolution above 36%, demonstrating robustness.
    notebook: 07_validation_analysis.ipynb
    figure: figures/fig2_cross_validation.png
- id: stmt:evidence-streams-complementary
  kind: claim
  text: Leave-one-out cross-validation shows each evidence stream contributes uniquely, demonstrating that no single data type is sufficient to resolve metabolic annotation gaps.
  confidence: high
