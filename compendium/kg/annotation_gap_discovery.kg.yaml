    source_doc: REPORT.md
    source_section: 5. "Dark Reactions" Resist Resolution
    quote: Of 201 gapfilled reactions, 50 (24.9%) had no EC number assigned by ModelSEED ("dark reactions"). Only 8 of these 50 (16%) were resolved, compared to 88 of 151 (58.3%) for reactions with known EC numbers.
    notebook: 07_validation_analysis.ipynb
    figure: figures/fig6_conservation.png
- id: stmt:gapmind-partial-concordance
  kind: finding
  text: GapMind pathway predictions partially corroborated gapfilling, flagging pathways as incomplete for many of the same carbon sources requiring gapfilling, though concordance was limited by GapMind's pathway-level granularity.
  confidence: medium
  topics:
