    source_section: 7. BLAST Hits Cluster at High Identity for Resolved Cases
    quote: Hits meeting high-confidence thresholds (>=30% identity, >=70% coverage, e-value <=1e-10) were concentrated in branched-chain amino acid biosynthesis and polyamine metabolism reactions.
    notebook: 06_exemplar_blast.ipynb
    figure: figures/fig4_blast_quality.png
- id: stmt:baseline-fba-asymmetry
  kind: finding
  text: Baseline FBA across 574 organism-carbon source combinations gave 42.5% accuracy with high recall (86.5%) but low precision (42.5%), reflecting overly permissive draft models that over-predict growth.
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:flux-balance-analysis
  - entity:metabolic-models
  - entity:modelseed
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: annotation_gap_discovery
    source_doc: REPORT.md
    source_section: Study Design
    quote: 'Baseline FBA across 574 organism-carbon source combinations yielded 42.5% overall accuracy — but this masks asymmetric performance: recall (sensitivity) was 86.5% (244 of 282 growth-positive conditions correctly predicted), while precision was only 42.5% (244 of 574 growth predictions were correct) due to 330 false positives from overly permissive draft models.'
    notebook: 02_model_building_fba.ipynb
