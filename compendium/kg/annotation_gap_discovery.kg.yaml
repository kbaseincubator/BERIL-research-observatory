  evidence:
  - source_project: annotation_gap_discovery
    source_doc: REPORT.md
    source_section: 1. Evidence Triangulation Resolves 47.8% of Annotation Gaps
    quote: Of 201 gapfilled enzymatic reaction-organism pairs across 14 Fitness Browser organisms and 18 carbon sources, 96 (47.8%) were assigned candidate genes with confidence scoring. This exceeds the pre-specified H1 threshold of 30%, supporting the hypothesis that integrating multiple evidence types can resolve a significant fraction of metabolic annotation gaps.
    notebook: 06_exemplar_blast.ipynb
    figure: figures/fig1_resolution_overview.png
- id: stmt:no-single-stream-sufficient
  kind: finding
  text: No single evidence stream resolved more than 35% of gaps; BLAST homology alone reached 34.8% while the full integrated pipeline added 13 percentage points to reach 47.8%.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:metabolic-pathways
  entities:
  - entity:evidence-triangulation
  - entity:blast-homology
  - entity:cross-validation
  links:
    supports:
