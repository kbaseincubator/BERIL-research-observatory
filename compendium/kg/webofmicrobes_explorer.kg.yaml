    refines: []
  evidence:
  - source_project: webofmicrobes_explorer
    source_doc: REPORT.md
    source_section: 5. ENIGMA Isolates Show Distinct "Metabolic Novelty Rates"
    quote: GW456-L13 produces the most novel metabolites (32.4%), while FW507-8R2A produces the fewest (15.2%). This "metabolic novelty rate" is a potential phenotype for cross-referencing with pangenome gene content.
    notebook: 01_database_overview.ipynb
- id: stmt:pangenome-clades-all-genera
  kind: finding
  text: Every WoM organism genus has corresponding pangenome species clades in BERDL, making gene-cluster, conservation, and functional-annotation context available for future genome-content versus metabolite-output analyses.
  confidence: medium
  topics:
  - topic:pangenome-architecture
