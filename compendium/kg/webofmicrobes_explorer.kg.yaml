- id: stmt:h1-partially-supported
  kind: claim
  text: The hypothesis that WoM provides actionable cross-collection links is partially supported, with real connections to Fitness Browser, ModelSEED, and the pangenome offset by the absence of consumption data and a small single-laboratory dataset.
  confidence: high
