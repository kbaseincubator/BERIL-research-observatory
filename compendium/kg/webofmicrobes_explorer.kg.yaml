- id: stmt:gapmind-link-blocked
  kind: opportunity
  text: The WoM-to-GapMind link is currently blocked by a naming-convention mismatch, and building a GapMind pathway-to-substrate/product metabolite lookup table would unblock pathway-level integration.
  confidence: medium
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:gapmind
  - entity:web-of-microbes
  - entity:pathway-mapping
  links:
