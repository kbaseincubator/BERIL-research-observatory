    quote: Pangenome context (gene clusters, conservation, functional annotations) is available for all WoM organism genera, enabling future genome-content ↔ metabolite-output analyses.
    notebook: 02_cross_collection_links.ipynb
- id: stmt:database-scale-unidentified
  kind: finding
  text: The 2018 WoM snapshot tracks 589 metabolites across 37 organisms in five ENIGMA-funded projects, but 332 (56.4%) of the metabolites remain unidentified with an "Unk_" prefix.
  confidence: high
