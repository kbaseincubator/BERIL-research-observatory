    source_doc: REPORT.md
    source_section: 3. 19 WoM-Produced Metabolites Are Tested as FB Carbon/Nitrogen Sources
    quote: Of the 19 matches, 5 are de novo products (E) and 14 are amplified metabolites (I).
    notebook: 02_cross_collection_links.ipynb
    figure: figures/enigma_metabolite_heatmap.png
- id: stmt:modelseed-definitive-links
  kind: finding
  text: Only 26.8% of identified WoM metabolites (69 compounds) have definitive 1:1 ModelSEED links by exact name match, while an additional 41.6% match by molecular formula alone at an average of 8.4 ModelSEED molecules per formula.
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:modelseed
  - entity:web-of-microbes
  - entity:metabolite-annotation
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: webofmicrobes_explorer
    source_doc: REPORT.md
    source_section: 4. 26.8% of WoM Metabolites Have Definitive ModelSEED Links (68.5% with Ambiguous Formula Matches)
    quote: Of 257 identified (non-unknown) WoM compounds, **69 (26.8%) have definitive ModelSEED links** by exact name match. An additional 107 match by molecular formula alone, but formula matches are inherently ambiguous — each WoM formula maps to an average of 8.4 ModelSEED molecules
    notebook: 02_cross_collection_links.ipynb
- id: stmt:formula-matches-ambiguous
  kind: caveat
  text: Formula-only metabolite matches to ModelSEED are inherently ambiguous and provide candidate sets for manual curation rather than definitive compound identifications.
  confidence: high
