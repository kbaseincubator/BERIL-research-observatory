    source_doc: REPORT.md
    source_section: Future Directions
    quote: '**Build a GapMind pathway ↔ metabolite lookup table**: Map each GapMind pathway to its substrate and product metabolites using the GapMind documentation, enabling the WoM ↔ GapMind link that failed in NB02.'
