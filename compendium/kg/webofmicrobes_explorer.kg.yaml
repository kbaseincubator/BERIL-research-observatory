project:
  id: webofmicrobes_explorer
  title: 'Report: Web of Microbes Data Explorer'
statements:
- id: stmt:wom-action-encoding-four-semantics
  kind: finding
  text: The 2018 Web of Microbes snapshot encodes metabolite observations with four distinct action semantics in which 'E' (emerged/de novo production) and 'I' (increased/amplification) are mutually exclusive across all 10,744 observations.
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:web-of-microbes
  - entity:exometabolomics
  - entity:metabolite-action-encoding
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: webofmicrobes_explorer
    source_doc: REPORT.md
    source_section: 1. WoM Action Encoding Uses Four Distinct Semantics, Not Three
    quote: '**''E'' and ''I'' are mutually exclusive** (zero overlap across all 10,744 observations). ''E'' encodes genuine de novo metabolite synthesis — the organism produced a metabolite that was absent from the starting medium.'
    notebook: 01_database_overview.ipynb
- id: stmt:wom-no-consumption-data
  kind: caveat
  text: The 2018 WoM snapshot records no consumption (decrease) action for any organism, so it captures only what organisms produce and cannot test whether consumed metabolites predict gene essentiality.
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:web-of-microbes
  - entity:exometabolomics
  - entity:metabolite-consumption
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:wom-action-encoding-four-semantics
  evidence:
  - source_project: webofmicrobes_explorer
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**No consumption data**: The most scientifically valuable WoM data (what organisms consume) is absent from this snapshot.'
- id: stmt:wom-fb-strain-overlap
  kind: finding
  text: Two WoM Pseudomonas ENIGMA groundwater isolates map directly to Fitness Browser strains (pseudo3_N2E3 and pseudo13_GW456_L13), each with over 5,000 genes and more than 100 fitness experiments, plus a same-strain E. coli and a genus-level Synechococcus match.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:environment-biogeography
  entities:
  - entity:fitness-browser
  - entity:web-of-microbes
  - entity:pseudomonas
  - entity:enigma-isolates
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: webofmicrobes_explorer
    source_doc: REPORT.md
    source_section: 2. Two Direct Fitness Browser Strain Matches Plus Two Genus-Level Matches
    quote: The two Pseudomonas direct matches are ENIGMA groundwater isolates with rich FB data.
    notebook: 01_database_overview.ipynb
- id: stmt:metabolites-bridge-to-fb-conditions
  kind: finding
  text: For Pseudomonas FW300-N2E3, curated matching identified 19 metabolites the organism produces in WoM that the Fitness Browser also tests as carbon or nitrogen sources, of which 5 are de novo products and 14 are amplified metabolites.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:gene-fitness
  entities:
