- id: stmt:metabolic-novelty-rate
  kind: finding
  text: The fraction of metabolite changes representing de novo production versus amplification varies roughly 2-fold across ENIGMA isolates in R2A medium, defining a 15-32% "metabolic novelty rate" as a potential phenotype.
  confidence: medium
  topics:
  - topic:metabolic-pathways
  - topic:environment-biogeography
