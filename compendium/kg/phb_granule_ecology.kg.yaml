    source_doc: REPORT.md
    source_section: 'Finding 1: PHB pathways are widespread but phylogenetically concentrated'
    quote: Notably, phaR (K18080) was absent from all 27K species in the eggNOG annotations, suggesting either poor annotation coverage or misassignment of this regulatory gene.
    notebook: 01_phb_gene_discovery.ipynb
