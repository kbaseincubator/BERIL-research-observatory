project:
  id: phb_granule_ecology
  title: 'Report: Polyhydroxybutyrate Granule Formation Pathways — Distribution Across Clades and Environmental Selection'
statements:
- id: stmt:phac-prevalence-21-percent
  kind: finding
  text: Across 27,690 GTDB species, 21.9% carry phaC (PHA synthase) and 21.7% have a complete PHB biosynthesis pathway, the first precise pan-bacterial prevalence estimate.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:metabolic-pathways
  entities:
  - entity:polyhydroxybutyrate
  - entity:phac
  - entity:pangenome
  - entity:gtdb
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: 'Finding 1: PHB pathways are widespread but phylogenetically concentrated'
    quote: Across 27,690 GTDB species, **21.9% carry phaC** (PHA synthase, the committed step for PHB biosynthesis) and **21.7% have a complete PHB pathway** (phaC + phaA/phaB).
    notebook: 01_phb_gene_discovery.ipynb
    figure: figures/phb_prevalence_by_phylum.png
- id: stmt:phb-phylogenetically-concentrated
  kind: finding
  text: PHB pathway distribution is highly uneven across the bacterial tree, with Pseudomonadota alone accounting for 74.9% of phaC-carrying species and several major phyla entirely lacking PHB.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:metabolic-pathways
  entities:
  - entity:polyhydroxybutyrate
  - entity:phac
  - entity:pseudomonadota
  - entity:gtdb
  links:
    supports:
    - stmt:phac-prevalence-21-percent
    contradicts: []
    refines: []
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: Phylogenetic Distribution (NB02)
    quote: Pseudomonadota alone accounts for 74.9% of all phaC-carrying species (4,544/6,067), driven by high prevalence across Alpha- and Gammaproteobacteria orders.
    notebook: 02_phylogenetic_mapping.ipynb
- id: stmt:phb-enriched-variable-environments
  kind: finding
  text: PHB prevalence follows a >10-fold gradient from temporally variable environments (plant 44%, soil 43.6%) to stable host-associated environments (clinical 7.4%, animal 3.3%), supporting environmental selection for PHB.
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:metabolic-pathways
  entities:
  - entity:polyhydroxybutyrate
  - entity:phac
  - entity:feast-famine-hypothesis
  - entity:isolation-source
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: 'Finding 2: PHB is enriched in environmentally variable habitats (H1a supported)'
    quote: 'This strongly supports H1a: PHB pathway genes are enriched in bacterial clades from temporally variable "feast/famine" environments and depleted in stable or host-associated environments.'
    notebook: 03_environmental_correlation.ipynb
    figure: figures/phb_by_environment.png
- id: stmt:environment-chi-squared
  kind: finding
  text: A chi-squared test of PHB presence against environmental variability category was highly significant (chi2 = 1,656.36, p ~ 0, dof = 2) across 27,690 species.
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:metabolic-pathways
  entities:
  - entity:polyhydroxybutyrate
  - entity:phac
  - entity:chi-squared-test
  links:
    supports:
    - stmt:phb-enriched-variable-environments
    contradicts: []
    refines: []
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: 'Finding 2: PHB is enriched in environmentally variable habitats (H1a supported)'
    quote: 'Chi-squared test for PHB presence x environmental variability category: **chi2 = 1,656.36, p ~ 0, dof = 2**.'
    notebook: 03_environmental_correlation.ipynb
- id: stmt:niche-breadth-confounded-genome-size
  kind: caveat
  text: The apparent association between PHB and broader environmental niche breadth largely disappears after controlling for genome size (partial rho = -0.047), making it a confounded artefact rather than independent evidence.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:environment-biogeography
  entities:
  - entity:polyhydroxybutyrate
  - entity:genome-size
  - entity:niche-breadth
  - entity:alphaearth-embeddings
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:phb-enriched-variable-environments
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: 'Finding 3: PHB-niche breadth association is largely explained by genome size (H1b qualified)'
    quote: 'After controlling for genome size via partial Spearman correlation, **the PHB-niche breadth association largely disappears**: partial rho = **-0.047** (p = 0.037), a **56.3% reduction** in effect size with a sign reversal compared to the raw correlation (rho = 0.106, p = 1.77e-06).'
    notebook: 03_environmental_correlation.ipynb
    figure: figures/genome_size_confound.png
- id: stmt:environment-enrichment-robust-to-size
  kind: finding
  text: PHB environmental enrichment is robust to genome size, holding within all four genome size quartiles with 1.4–4.6x fold enrichment in high-variability environments (all p < 1e-11).
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:pangenome-architecture
  entities:
