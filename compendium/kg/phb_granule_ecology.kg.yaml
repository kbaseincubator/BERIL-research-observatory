    contradicts: []
    refines:
    - stmt:niche-breadth-confounded-genome-size
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: 'Finding 3: PHB-niche breadth association is largely explained by genome size (H1b qualified)'
    quote: 'Critically, however, **the PHB-environment association (H1a) holds robustly within all four genome size quartiles**:'
    notebook: 03_environmental_correlation.ipynb
- id: stmt:subclade-heterogeneous-selection
  kind: finding
  text: Family-level Fisher tests across 248 families revealed heterogeneous selection within phyla, with 41 PHB-enriched families (skewing freshwater/wastewater) and 62 depleted families (skewing marine/host-associated).
  confidence: medium
  topics:
  - topic:microbial-ecotypes
  - topic:environment-biogeography
  entities:
  - entity:polyhydroxybutyrate
  - entity:fishers-exact-test
  - entity:pseudomonadota
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: 'Finding 4: Subclade enrichment reveals heterogeneous selection within phyla (H1d partially supported)'
    quote: Enriched families** skew toward freshwater (5/41) and wastewater (3/41)
    notebook: 05_subclade_enrichment.ipynb
    figure: figures/phb_enrichment_heatmap.png
- id: stmt:hgt-phac-acquisition
  kind: finding
  text: Phylogenetically discordant phaC distribution revealed 311 potential horizontal acquisition events and 278 potential loss events, evidencing widespread HGT of phaC across the bacterial tree.
  confidence: medium
  topics:
  - topic:mobile-genetic-elements
  - topic:pangenome-architecture
  entities:
  - entity:phac
  - entity:horizontal-gene-transfer
  - entity:accessory-genome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: 'Finding 5: Strong signal of horizontal gene transfer in phaC distribution'
    quote: '**311 potential HGT acquisition events**: species carrying phaC despite being in families with <20% phaC prevalence'
    notebook: 05_subclade_enrichment.ipynb
- id: stmt:hgt-accessory-rate
  kind: claim
  text: Discordant phaC-positive species carry phaC as accessory genome at nearly double the baseline rate (60.1% vs 32.3%), consistent with recent horizontal acquisition not yet fixed in the core genome.
  confidence: medium
  topics:
  - topic:mobile-genetic-elements
  - topic:pangenome-architecture
  entities:
  - entity:phac
  - entity:horizontal-gene-transfer
  - entity:accessory-genome
  - entity:core-genome
  links:
    supports:
    - stmt:hgt-phac-acquisition
    contradicts: []
    refines: []
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: 'Finding 5: Strong signal of horizontal gene transfer in phaC distribution'
    quote: Among the 311 discordant phaC-positive species, **60.1% carry phaC as accessory genome** (not present in all strains), compared to 32.3% accessory rate across all phaC-carrying species — nearly double.
    notebook: 05_subclade_enrichment.ipynb
    figure: figures/phb_core_vs_accessory.png
- id: stmt:nmdc-cross-validation
  kind: finding
  text: NMDC metagenomic cross-validation showed PHB-high genera have significantly higher abundance than PHB-low genera (Mann-Whitney p = 8.41e-22), with top genera including known producers like Pseudomonas and Cupriavidus.
  confidence: medium
  topics:
  - topic:environment-biogeography
  - topic:metabolic-pathways
  entities:
  - entity:polyhydroxybutyrate
  - entity:nmdc
  - entity:metagenome
  - entity:cupriavidus
  links:
    supports:
