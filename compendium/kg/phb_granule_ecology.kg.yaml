    contradicts: []
    refines: []
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: 'Finding 6: NMDC metagenomic cross-validation supports pangenome PHB patterns (H1c supported)'
    quote: PHB-high genera (>=50% phaC prevalence) had significantly higher abundance in NMDC samples than PHB-low genera (**Mann-Whitney p = 8.41 x 10^-22**).
    notebook: 04_nmdc_metagenomic_analysis.ipynb
    figure: figures/pangenome_vs_metagenome.png
- id: stmt:nmdc-abiotic-modest-effects
  kind: caveat
  text: NMDC abiotic correlations with PHB inference scores were statistically significant but modest in size (|rho| < 0.12), likely because abiotic measurements are point-in-time snapshots rather than measures of temporal variability.
  confidence: medium
  topics:
  - topic:environment-biogeography
  - topic:metabolic-pathways
  entities:
  - entity:polyhydroxybutyrate
  - entity:nmdc
  - entity:abiotic-features
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:nmdc-cross-validation
  evidence:
  - source_project: phb_granule_ecology
    source_doc: REPORT.md
    source_section: Limitations
    quote: The metagenomic cross-validation (H1c) yielded statistically significant but small abiotic correlations (|rho| < 0.12). NMDC abiotic measurements are point-in-time values, not measures of temporal variability, which limits their ability to test the feast/famine hypothesis directly.
    notebook: 04_nmdc_metagenomic_analysis.ipynb
- id: stmt:phar-absent-annotation
  kind: caveat
  text: The PHB regulator phaR (K18080) was absent from eggNOG annotations of all 27K species, indicating an annotation coverage gap or KO misassignment rather than true biological absence.
  confidence: medium
  topics:
  - topic:functional-dark-matter
  - topic:metabolic-pathways
  entities:
  - entity:phar
  - entity:eggnog-annotations
  - entity:kegg-ko
  links:
