- id: stmt:metal-specific-fraction
  kind: finding
  text: Across all organisms, 60.2% (6,517/10,821) of metal-important gene records are metal-specific—important for metals but not NaCl—while the remaining shared-stress genes tend to be important across more metals.
  confidence: high
