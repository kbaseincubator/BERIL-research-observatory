    refines: []
  evidence:
  - source_project: counter_ion_effects
    source_doc: REPORT.md
    source_section: 2. Counter Ions Are NOT the Primary Driver of the Overlap
    quote: Zinc sulfate (0 mM Cl⁻) shows 44.6% NaCl overlap — higher than most chloride-delivered metals including cobalt (41.3%, up to 500 mM Cl⁻), copper (41.0%), and nickel (39.3%).
    notebook: 02_metal_nacl_overlap.ipynb
    figure: figures/metal_nacl_overlap_by_counter_ion.png
- id: stmt:shared-stress-biology
  kind: claim
  text: The metal-NaCl gene overlap reflects shared stress biology—cell envelope damage, ion homeostasis disruption, and general stress response—rather than chloride counter ions.
  confidence: high
