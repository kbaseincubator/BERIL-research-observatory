project:
  id: counter_ion_effects
  title: 'Report: Counter Ion Effects on Metal Fitness Measurements'
statements:
- id: stmt:metal-nacl-overlap
  kind: finding
  text: Across 19 organisms and 14 metals, 39.8% (4,304/10,821) of metal-important gene fitness records are also important under NaCl stress, indicating substantial shared stress biology between metal and osmotic/ionic stress.
  confidence: high
  topics:
