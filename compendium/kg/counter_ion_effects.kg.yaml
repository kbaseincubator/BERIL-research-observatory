    quote: Across all organisms, 6,517 of 10,821 metal-important gene records (60.2%) are classified as metal-specific (important for metals but not NaCl).
    notebook: 03_profile_decomposition.ipynb
    figure: figures/gene_classification_by_metal.png
- id: stmt:shared-genes-uncharacterized
  kind: finding
  text: In DvH, metal-specific genes are more functionally annotated (90.5% with SEED annotations) than shared-stress genes (78.1%), suggesting shared-stress genes include more uncharacterized general stress proteins.
  confidence: medium
