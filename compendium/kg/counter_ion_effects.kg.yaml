- id: stmt:atlas-core-robust
  kind: finding
  text: After removing the ~40% shared-stress genes and restricting to metal-specific genes, core genome enrichment is fully preserved for 12 of 14 metals, so the Metal Fitness Atlas core enrichment is not an artifact of shared stress response.
  confidence: high
