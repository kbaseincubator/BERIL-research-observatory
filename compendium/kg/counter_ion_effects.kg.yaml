    source_doc: REPORT.md
    source_section: Limitations
    quote: NaCl delivers both Na⁺ and Cl⁻. The NaCl fitness profile includes sodium toxicity and osmotic stress effects beyond just chloride.
- id: stmt:single-organism-metals
  kind: caveat
  text: Seven metals (manganese, cadmium, selenium, mercury, iron, molybdenum, tungsten) are tested in only one organism (DvH), so their overlap statistics lack cross-organism replication.
  confidence: high
  topics:
