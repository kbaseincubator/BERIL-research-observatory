    source_section: Future Directions
    quote: Several FB organisms have choline chloride experiments (ChCl provides Cl⁻ without Na⁺/osmotic effects). Comparing metal-ChCl overlap vs metal-NaCl overlap would separate chloride from osmotic confounding.
- id: stmt:matched-salt-experiment
  kind: opportunity
  text: Running RB-TnSeq with matched metal chloride and metal sulfate concentrations in a single organism under identical growth conditions would definitively resolve counter ion effects by eliminating the aerobic/anaerobic confound.
  confidence: medium
