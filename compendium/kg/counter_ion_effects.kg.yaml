- id: stmt:toxicity-hierarchy
  kind: finding
  text: In DvH, the metal-NaCl whole-genome fitness correlation hierarchy follows toxicity mechanism rather than chloride dose, with zinc (delivered as sulfate, zero chloride) ranking first.
  confidence: high
