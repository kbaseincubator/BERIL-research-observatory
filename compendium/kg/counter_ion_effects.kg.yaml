    refines: []
  evidence:
  - source_project: counter_ion_effects
    source_doc: REPORT.md
    source_section: 1. 39.8% of Metal-Important Genes Are Also NaCl-Important
    quote: Across 19 organisms and 14 metals (86 organism × metal pairs), 4,304 of 10,821 metal-important gene records (39.8%) are also important under NaCl stress.
    notebook: 02_metal_nacl_overlap.ipynb
    figure: figures/nacl_metal_overlap_heatmap.png
- id: stmt:counter-ions-not-driver
  kind: finding
  text: Zinc sulfate (zero chloride) shows higher NaCl overlap (44.6%) than most chloride-delivered metals, so the metal-NaCl overlap does not scale with chloride delivered by the metal salt.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:metal-resistance
