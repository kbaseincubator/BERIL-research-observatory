    source_section: '5. Gene Classification: 60% of Metal Fitness Genes Are Metal-Specific'
    quote: In DvH, metal-specific genes are more functionally annotated (90.5% have SEED annotations) than shared-stress genes (78.1%), suggesting that the metal-specific set includes well-characterized metal homeostasis functions (Ni/Fe-hydrogenase, nitrogenase regulators, metal transporters) while shared-stress genes include more uncharacterized general stress proteins.
    notebook: 03_profile_decomposition.ipynb
- id: stmt:psrch2-confounded
  kind: caveat
  text: The only within-metal counter ion comparison (psRCH2 CuCl2 vs CuSO4) is severely confounded by aerobic/anaerobic growth, with hundreds of genes differing between conditions independent of copper.
  confidence: high
  topics:
