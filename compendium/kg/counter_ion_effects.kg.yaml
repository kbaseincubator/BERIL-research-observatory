- id: stmt:nacl-not-pure-chloride
  kind: caveat
  text: NaCl is not a pure chloride control because it delivers both sodium and chloride, so the NaCl fitness profile includes sodium toxicity and osmotic stress effects beyond chloride.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:metal-resistance
