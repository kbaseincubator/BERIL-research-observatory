- id: stmt:keyword-scanner-undercounts
  kind: caveat
  text: Keyword-based functional categorization undercounted the anaerobic-niche signal, leaving a large unannotated bucket that manual reclassification suggests holds roughly 80-100 truly anaerobic-respiration OGs.
  confidence: medium
