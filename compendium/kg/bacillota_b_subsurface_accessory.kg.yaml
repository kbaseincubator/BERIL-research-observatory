    quote: Combining curated PFAMs (PF02085, PF22678) with sequence-based CXXCH heme-motif counting on `gene_cluster.faa_sequence` is a reusable BERDL pattern for detecting multi-heme cytochromes when KEGG KO assignment is unreliable.
