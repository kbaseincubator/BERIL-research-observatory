- id: stmt:reusable-multiheme-detector
  kind: opportunity
  text: Combining curated PFAMs with sequence-based CXXCH heme-motif counting provides a reusable BERDL pattern for detecting multi-heme cytochromes when KEGG KO assignment is unreliable, applicable to future iron-reduction and electron-transfer questions across the pangenome.
  confidence: medium
