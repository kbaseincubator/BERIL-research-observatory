project:
  id: bacillota_b_subsurface_accessory
  title: 'Report: Subsurface Bacillota_B Specialization — What Distinguishes Deep-Clay Lineages from Soil Congeners?'
statements:
- id: stmt:h1-547-enriched-ogs
  kind: finding
  text: Per-OG Fisher's exact testing identified 547 eggNOG orthologous groups significantly enriched in deep-clay Bacillota_B versus soil-baseline Bacillota_B, far exceeding the pre-registered H1 prediction of at least 10.
  confidence: high
  topics:
