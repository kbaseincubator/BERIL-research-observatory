    source_section: Finding 2 — Deep-clay Bacillota_B genomes are SIGNIFICANTLY LARGER than soil-baseline Bacillota_B, with a 35% mean size difference and ~25% more eggNOG OGs per genome (H2 rejected, opposite direction)
    quote: Deep-clay Bacillota_B genuinely encode ~1 Mbp more genetic material than soil Bacillota_B at the same QC level.
    notebook: 05_h2_compactness.ipynb
- id: stmt:expansion-not-streamlining
  kind: claim
  text: Within cultivable Bacillota_B, deep-clay specialization correlates with gene-content expansion rather than the reductive streamlining seen in Patescibacteria, refuting a universal 'subsurface equals streamlining' model for this niche.
  confidence: medium
