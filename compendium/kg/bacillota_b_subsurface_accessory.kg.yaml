    source_doc: REPORT.md
    source_section: IR PFAM availability (NB01 gate)
    quote: Multi-heme cytochrome PFAMs are sparse within Bacillota_B (only ~6 clusters total across all four PFAMs); CXXCH motif counting on `gene_cluster.faa_sequence` carried most of the IR signal in NB06 — which is why the corrected IR rates (40–56%) are far higher than what PFAM-only detection would yield.
    notebook: 06_clay_h3_correction.ipynb
- id: stmt:small-cohort-limitation
  kind: caveat
  text: With only 10 anchor versus 62 baseline genomes, marginal enrichment effects resting on anchor counts of 3-5 should be treated descriptively rather than inferentially, and genus-level phylogenetic confounding is only partly mitigated.
  confidence: medium
  topics:
