    quote: The true anaerobic-respiration enriched-OG count is well above the keyword-scanner's 42; with manual reclassification of the "other" bucket the H1-relevant total is closer to 80–100 of 547.
- id: stmt:h2-genomes-larger
  kind: finding
  text: Deep-clay Bacillota_B genomes are significantly larger than soil-baseline congeners, encoding roughly 1 Mbp more genetic material at the same CheckM completeness, which rejects the H2 streamlining hypothesis in the opposite direction.
  confidence: high
