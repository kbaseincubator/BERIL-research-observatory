- id: stmt:molybdopterin-cofactor-signal
  kind: finding
  text: The molybdopterin-cofactor orthogroup COG1977, a cofactor source for anaerobic-respiration enzymes, was recovered in all ten anchor genomes versus only 11 of 62 baseline genomes, marking a strong subsurface-niche signal.
  confidence: medium
