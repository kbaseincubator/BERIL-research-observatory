- id: stmt:multiheme-pfams-sparse
  kind: caveat
  text: Multi-heme cytochrome PFAMs are sparse within Bacillota_B, so CXXCH heme-binding motif counting on protein sequences carried most of the corrected iron-reduction signal that PFAM-only detection would have missed.
  confidence: medium
