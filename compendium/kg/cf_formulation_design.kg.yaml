  kind: finding
  text: Genomic pathway comparison identifies sugar alcohols (xylitol, myoinositol) and pentoses (xylose, arabinose, fucose, rhamnose) as candidate prebiotics that formulation commensals can metabolize but PA14 cannot.
  confidence: medium
