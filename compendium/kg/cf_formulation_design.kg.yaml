    source_section: 3.7 Limitations
    quote: '**Planktonic culture only**: Our inhibition assays measure planktonic competition. PA14 in CF lungs grows primarily in biofilms, where metabolic dynamics, diffusion gradients, and spatial structure differ substantially.'
- id: stmt:lag-advantage-precolonization
  kind: finding
  text: Although commensals rarely exceed PA14's maximum growth rate, they begin growing before PA14 on 43.1% of substrate comparisons, suggesting pre-establishing commensals before pathogen exposure may matter more than raw growth rate.
  confidence: medium
