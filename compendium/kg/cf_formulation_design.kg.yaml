    source_doc: REPORT.md
    source_section: 2.7 PA14 Is a Metabolic Generalist — Amino Acid Prebiotics Don't Work
    quote: PA14 outgrows the average commensal on **every tested substrate**. The most selective substrates (cysteine, threonine, methionine) have ratios of only 0.77–0.96. There is no amino acid or simple sugar where commensals have a clear growth advantage.
    notebook: 06_prebiotic_pairing.ipynb
- id: stmt:five-organism-formulation
  kind: claim
  text: A five-organism FDA-safe formulation (Neisseria mucosa, Streptococcus salivarius, Micrococcus luteus, Rothia dentocariosa, Gemella sanguinis) achieves 100% coverage of PA14's amino acid niche with 78% mean inhibition.
  confidence: high
