    source_doc: REPORT.md
    source_section: 2.4 Growth Rate Matters, But Lag Advantage May Matter More
    quote: Commensals beat PA14's maximum growth rate on only **13.8%** of substrate comparisons — PA14 is generally the fastest grower. However, commensals start growing before PA14 on **43.1%** of comparisons (lag advantage > 0).
    notebook: 02_growth_kinetics.ipynb
