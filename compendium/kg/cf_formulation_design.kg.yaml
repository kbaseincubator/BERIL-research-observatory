- id: stmt:pa14-not-representative-cf
  kind: finding
  text: T3SS effector typing of 6,760 PA genomes shows CF isolates are overwhelmingly ExoS+ (94%), so the ExoU+ reference strain PA14 used in the inhibition assays represents only about 5% of CF P. aeruginosa.
  confidence: high
