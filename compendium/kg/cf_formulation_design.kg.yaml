    quote: Multi-criterion optimization identifies a five-organism FDA-safe formulation (*Neisseria mucosa*, *Streptococcus salivarius*, *Micrococcus luteus*, *Rothia dentocariosa*, *Gemella sanguinis*) that achieves 100% coverage of PA14's amino acid niche with 78% mean inhibition.
- id: stmt:k3-full-niche-coverage
  kind: finding
  text: Full amino-acid niche coverage of PA14 is first reached at a three-organism formulation (M. luteus, N. mucosa, S. salivarius), where at least one member grows on every amino acid PA14 can use.
  confidence: high
