    source_section: Summary
    quote: metabolic overlap with PA14 significantly predicts inhibition (r = 0.384, p = 2.3×10⁻⁶) but explains only 27% of variance — the strongest inhibitors combine metabolic competition with direct antagonism mechanisms.
- id: stmt:metabolic-model-overfits
  kind: caveat
  text: The multivariate metabolic-feature model of inhibition overfits the 142-isolate cohort, with cross-validated R-squared near 0.145 rather than the training R-squared of 0.274, so its true out-of-sample predictive power is closer to 15%.
  confidence: high
