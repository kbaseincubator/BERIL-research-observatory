- id: stmt:no-selective-amino-acid-prebiotic
  kind: finding
  text: PA14 outgrows the average commensal on every tested amino acid and simple sugar, so no single tested substrate works as a selective prebiotic that feeds commensals while starving the pathogen.
  confidence: high
