    source_doc: REPORT.md
    source_section: '2.12 PA Lung Adaptation: Metabolic Streamlining Toward Amino Acid Dependence'
    quote: 'Lung PA is undergoing metabolic streamlining: in the amino acid-rich sputum environment, sugar catabolism is dispensable and under relaxed selection. This validates that PA''s amino acid dependence is not just a preference — it is an **evolutionary adaptation**.'
    notebook: 10_pa_lung_adaptation.ipynb
