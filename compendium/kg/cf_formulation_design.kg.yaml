    quote: '**Sugar alcohols (xylitol, myoinositol) and pentoses (xylose, arabinose, fucose, rhamnose)** are strong prebiotic candidates. These substrates are: (a) genomically complete in our formulation species, (b) absent from PA14''s metabolic repertoire, (c) actively transported by commensals in patient airways'
    notebook: 09_genomic_carbon_extension.ipynb
- id: stmt:pa-lung-metabolic-streamlining
  kind: finding
  text: Lung-adapted P. aeruginosa undergoes metabolic streamlining, losing sugar-catabolism pathways under relaxed selection in the amino-acid-rich sputum environment, while its amino acid catabolism remains an invariant evolutionary adaptation.
  confidence: high
  topics:
