    quote: At k=3, the formulation achieves 100% niche coverage — meaning at least one member grows on every amino acid that PA14 can use. The strict filter costs roughly 15% inhibition ceiling but doubles engraftability.
    notebook: 05b_formulation_strict_safety.ipynb
- id: stmt:metabolic-traits-species-level
  kind: finding
  text: GapMind pangenome analysis across 499 genomes confirms that the formulation species' metabolic capabilities are species-level traits conserved (>95%) across hundreds of genomes, supporting strain-agnostic formulation design.
  confidence: high
