- id: stmt:pa14-strain-bias-caveat
  kind: caveat
  text: All inhibition assays used PA14, an ExoU+ Pel-only strain representing under 5% of CF PA isolates, so the measured inhibition has not been validated against the dominant ExoS+/PAO1-type clinical strains.
  confidence: high
  topics:
