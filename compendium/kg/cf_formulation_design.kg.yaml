project:
  id: cf_formulation_design
  title: Rational Design of Protective Microbiome Formulations for Competitive Exclusion of *Pseudomonas aeruginosa* in Cystic Fibrosis Airways
statements:
- id: stmt:metabolic-overlap-predicts-inhibition
  kind: finding
  text: Metabolic carbon-source overlap with Pseudomonas aeruginosa PA14 significantly predicts commensal planktonic inhibition (r = 0.384) but explains only about 27% of the variance.
  confidence: high
