    source_doc: REPORT.md
    source_section: 2.3 Metabolic Overlap Predicts Inhibition — But Only Partially
    quote: Five-fold cross-validation yields **CV R² = 0.145 ± 0.142**, below the training R² of 0.274, indicating the multivariate model overfits to the 142-isolate cohort. The true out-of-sample predictive power of metabolic features is closer to 15% than 27%.
    notebook: 03_explaining_inhibition.ipynb
- id: stmt:no-single-organism-outgrows-pa14
  kind: finding
  text: No individual commensal outgrows PA14 on any tested carbon substrate, so competitive exclusion of P. aeruginosa requires community-level niche coverage rather than a single dominant strain.
  confidence: high
