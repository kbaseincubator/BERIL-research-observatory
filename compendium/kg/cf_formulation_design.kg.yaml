    source_section: '2.8 Metabolic Capabilities Are Species-Level Traits: Pangenome Validation'
    quote: The metabolic capabilities we measured are species-level traits conserved across hundreds of genomes. *G. sanguinis* shows the most pathway variability (small pangenome, 7 genomes), suggesting strain selection matters most for this species.
    notebook: 07_pangenome_conservation.ipynb
- id: stmt:anchor-species-lung-adapted
  kind: finding
  text: Two formulation anchor species, Rothia dentocariosa and Neisseria mucosa, are naturally lung-adapted, with 33-38% of their pangenome genomes drawn from respiratory sources rather than being gut commensals repurposed for the airway.
  confidence: high
