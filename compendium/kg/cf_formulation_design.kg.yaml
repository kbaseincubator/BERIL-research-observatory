    source_doc: REPORT.md
    source_section: 3.7 Limitations
    quote: All inhibition assays used PA14, which is ExoU+ and Pel-only — representing <5% of CF PA isolates. While our pangenome analysis confirms AA catabolism is identical across ExoU+ and ExoS+ strains, the inhibition measurements themselves have not been validated against ExoS+/PAO1-type strains.
- id: stmt:planktonic-only-caveat
  kind: caveat
  text: All inhibition assays measure planktonic competition, whereas PA14 grows primarily in CF-lung biofilms where metabolic dynamics, diffusion gradients, and spatial structure differ substantially.
  confidence: high
  topics:
  - topic:microbiome-engineering
