  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: pgp_pangenome_ecology
    source_doc: REPORT.md
    source_section: H4 PARTIALLY SUPPORTED — trp completeness predicts ipdC, but ipdC regulation is aromatic-amino-acid-general
    quote: 'Tryptophan biosynthesis completeness (GapMind score ≥ 0.9) significantly predicts ipdC presence: species with complete trp pathway carry ipdC at 2.5% vs 0.9% in trp-incomplete species (Fisher OR = 2.81, p = 6.3e-10; Model 1 logit, trp only: OR = 2.81, 95% CI 1.97–4.01, p = 1.4e-08, n = 11,272; Model 2 adding soil covariate: OR_trp = 2.87, p = 7.0e-09).'
    notebook: 05_tryptophan_iaa.ipynb
    figure: figures/trp_iaa_contingency.png
- id: stmt:ipdc-regulation-aromatic-general
  kind: claim
  text: The trp–ipdC association is not trp-specific but reflects general aromatic-amino-acid regulation, because the tyrosine negative control predicts ipdC at similar effect size (OR = 3.62), consistent with TyrR-mediated induction of ipdC by all three aromatic amino acids.
  confidence: medium
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:ipdc
  - entity:tyrr
  - entity:aromatic-amino-acids
  - entity:tryptophan-biosynthesis
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:trp-completeness-predicts-ipdc
  evidence:
  - source_project: pgp_pangenome_ecology
    source_doc: REPORT.md
    source_section: H4 PARTIALLY SUPPORTED — trp completeness predicts ipdC, but ipdC regulation is aromatic-amino-acid-general
    quote: 'However, the tyrosine pathway (negative control) also predicts ipdC presence at similar effect size (OR = 3.62, p = 2.3e-11). This is not merely a statistical artifact — it is mechanistically expected: the ipdC gene in *Enterobacter cloacae* and related species is regulated by TyrR, a transcription factor activated by all three aromatic amino acids (tryptophan, phenylalanine, and tyrosine; Ryu & Patten 2008, PMID 18757531).'
    notebook: 05_tryptophan_iaa.ipynb
- id: stmt:trp-ipdc-soil-reversal
  kind: finding
  text: The trp→ipdC positive coupling holds in non-soil species (OR = 3.56) but reverses within soil/rhizosphere species (OR = 0.30), possibly because soil PGPB obtain tryptophan from plant root exudates and relax selection on autonomous trp biosynthesis.
  confidence: low
  topics:
  - topic:metabolic-pathways
  - topic:environment-biogeography
  entities:
  - entity:ipdc
  - entity:tryptophan-biosynthesis
  - entity:rhizosphere
  - entity:root-exudates
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:trp-completeness-predicts-ipdc
  evidence:
  - source_project: pgp_pangenome_ecology
    source_doc: REPORT.md
    source_section: H4 PARTIALLY SUPPORTED — trp completeness predicts ipdC, but ipdC regulation is aromatic-amino-acid-general
    quote: within soil/rhizosphere species (n = 1,039), the association **reverses** (OR = 0.30, p = 0.02), meaning trp-complete soil species are *less* likely to carry ipdC. In non-soil species (n = 10,233) the positive association holds strongly (OR = 3.56, p = 7.7e-13). This may reflect that soil-associated PGPB obtain tryptophan exogenously from plant root exudates, relaxing selective pressure to maintain autonomous trp biosynthesis, while retaining ipdC for IAA production from plant-supplied substrate.
    notebook: 05_tryptophan_iaa.ipynb
- id: stmt:pqqc-acds-niche-marker-claim
  kind: claim
  text: The canonical PGPB phenotype is built around a tightly co-selected, rhizosphere-enriched, vertically inherited pqqC + acdS module that represents a stable specialized niche adaptation rather than a recently acquired multi-trait package.
  confidence: high
