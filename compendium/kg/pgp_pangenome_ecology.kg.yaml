    source_doc: REPORT.md
    source_section: A non-diazotrophic PGP module dominates soil bacteria
    quote: the "canonical" PGPB phenotype — as selected in agricultural inoculant strains — is built around **pqqC + acdS**, not around nitrogen fixation. This pqqC–acdS module is tightly co-selected (OR = 7.24), strongly rhizosphere-enriched (acdS OR = 7.0), and vertically inherited as part of the core genome. The module represents a stable, specialized niche adaptation to the plant rhizosphere rather than a recently acquired multi-trait package.
- id: stmt:pqqd-hgt-outlier-caveat
  kind: caveat
  text: pqqD is an outlier to the vertical-inheritance pattern, with the lowest core fraction (55.5%) and highest singleton fraction (27.5%), suggesting it occasionally spreads horizontally as a standalone gene even though the functional pqqB–pqqC operon is predominantly core.
  confidence: medium
