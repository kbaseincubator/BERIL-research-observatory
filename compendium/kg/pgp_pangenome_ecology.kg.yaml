project:
  id: pgp_pangenome_ecology
  title: 'Report: PGP Gene Distribution Across Environments & Pangenomes'
statements:
- id: stmt:pgp-syndrome-pqqc-acds-module
  kind: finding
  text: Across 11,272 species carrying at least one PGP gene, plant growth-promoting traits co-occur non-randomly, with pqqC and acdS forming the strongest positive association (OR = 7.24) and an apparent coherent rhizosphere-effectiveness module.
  confidence: high
  topics:
  - topic:microbiome-engineering
  - topic:pangenome-architecture
  entities:
  - entity:plant-growth-promoting-bacteria
  - entity:pqqc
  - entity:acds
  - entity:pgp-syndrome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: pgp_pangenome_ecology
    source_doc: REPORT.md
    source_section: H1 SUPPORTED — PGP traits form a non-random syndrome, but nitrogen fixation is ecologically distinct
    quote: Across 11,272 species with at least one PGP gene, 8 of 10 focal-gene pairs were significantly associated after BH-FDR correction. Five pairs showed positive co-occurrence and three showed negative co-occurrence. The strongest positive association was **pqqC × acdS** (OR = 7.24, n = 286 co-occurring species, q = 1.2e-83), indicating that phosphate solubilization (PQQ cofactor biosynthesis) and ethylene reduction (ACC deaminase) are nearly always found together when either is present.
    notebook: 02_pgp_cooccurrence.ipynb
    figure: figures/cooccurrence_heatmap.png
- id: stmt:nifh-separate-guild
  kind: finding
  text: Nitrogen fixation (nifH) is negatively associated with the pqqC/acdS rhizosphere module, indicating that diazotrophs form an ecologically separate guild and that the classical PGPB suite is primarily a non-diazotrophic phenotype.
  confidence: high
  topics:
  - topic:microbiome-engineering
  - topic:microbial-ecotypes
  entities:
  - entity:nifh
  - entity:nitrogen-fixation
  - entity:diazotrophs
  - entity:plant-growth-promoting-bacteria
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:pgp-syndrome-pqqc-acds-module
  evidence:
  - source_project: pgp_pangenome_ecology
    source_doc: REPORT.md
    source_section: H1 SUPPORTED — PGP traits form a non-random syndrome, but nitrogen fixation is ecologically distinct
    quote: In contrast, nifH (nitrogen fixation) was significantly **negatively** associated with both hcnC (OR = 0.23, q = 5.8e-29) and pqqC (OR = 0.57, q = 2.9e-19), and showed no significant association with ipdC (OR = 1.13, q = 0.54). This means diazotrophs form an ecologically separate guild from pqqC/acdS-bearing rhizobacteria — the classical "PGPB" suite appears to be primarily a non-diazotrophic phenotype.
    notebook: 02_pgp_cooccurrence.ipynb
- id: stmt:soil-enriches-acds-pqqc
  kind: finding
  text: Soil/rhizosphere environment strongly selects for acdS (7× more prevalent than other environments, OR = 7.02) and pqqC (OR = 2.90), with the acdS enrichment surviving phylum-level fixed effects and a strict rhizosphere-only sensitivity analysis.
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:microbiome-engineering
  entities:
  - entity:acds
  - entity:pqqc
  - entity:rhizosphere
  - entity:soil
  links:
    supports:
    - stmt:pgp-syndrome-pqqc-acds-module
    contradicts: []
    refines: []
  evidence:
  - source_project: pgp_pangenome_ecology
    source_doc: REPORT.md
    source_section: H2 SUPPORTED — Soil/rhizosphere environment strongly selects for acdS and pqqC, but not nifH
    quote: 'The acdS enrichment is particularly striking: ACC deaminase is 7× more prevalent in soil/rhizosphere species than in other environments and the effect survives phylum-level fixed effects in logistic regression (OR = 6.98, p = 4.8e-61). The enrichment also holds in a strict rhizosphere-only sensitivity analysis using only genomes with "rhizosphere" or "root nodule" in their isolation source (acdS OR = 10.6, q = 7.6e-38).'
    notebook: 03_environmental_selection.ipynb
    figure: figures/env_enrichment_barplot.png
- id: stmt:nifh-depleted-in-soil
  kind: finding
  text: Contrary to naive expectation, nifH is significantly depleted in soil-classified species (OR = 0.60) because most database nitrogen fixers are aquatic/marine or host-associated rather than free-living soil diazotrophs.
  confidence: medium
  topics:
  - topic:environment-biogeography
  - topic:microbial-ecotypes
