    contradicts: []
    refines: []
  evidence:
  - source_project: pgp_pangenome_ecology
    source_doc: REPORT.md
    source_section: H2 SUPPORTED — Soil/rhizosphere environment strongly selects for acdS and pqqC, but not nifH
    quote: Unexpectedly, nifH is significantly **depleted** in soil-classified species (OR = 0.60). The phylum-stratified analysis reveals Bacillota_A as an exception (nifH enriched in soil; OR = ∞, q = 2.5e-4), reflecting anaerobic diazotrophs such as clostridia that are soil-specific. The overall nifH depletion reflects that the majority of nitrogen fixers in the database are aquatic/marine (cyanobacteria, Azotobacter) or host-associated (rhizobia).
    notebook: 03_environmental_selection.ipynb
- id: stmt:pgp-genes-predominantly-core
  kind: finding
  text: All 13 PGP genes have significantly higher core fractions than the genome-wide baseline of 46.8%, with a mean accessory fraction of 29.7% versus 53.2% genome-wide, rejecting the hypothesis that PGP genes spread predominantly by horizontal gene transfer.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:mobile-genetic-elements
  entities:
  - entity:core-genome
  - entity:accessory-genome
  - entity:horizontal-gene-transfer
  - entity:plant-growth-promoting-bacteria
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: pgp_pangenome_ecology
    source_doc: REPORT.md
    source_section: 'H3 REJECTED — PGP genes are predominantly core, not accessory: vertical inheritance dominates'
    quote: 'The mean accessory fraction across all PGP genes is **29.7%**, compared to the genome-wide 53.2%. The HGT hypothesis (H3) is clearly rejected: PGP genes are inherited vertically with the core genome, not acquired laterally.'
    notebook: 04_core_accessory_status.ipynb
    figure: figures/pgp_core_accessory_pie.png
- id: stmt:openness-negatively-correlates-pgp
  kind: finding
  text: Pangenome openness (singleton fraction) correlates negatively with PGP gene richness (Spearman ρ = −0.195, p = 2.0e-97), so PGP-rich species have more closed pangenomes consistent with stable specialized niches rather than generalist HGT-driven acquisition.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:microbial-ecotypes
  entities:
