    contradicts: []
    refines: []
  evidence:
  - source_project: pgp_pangenome_ecology
    source_doc: REPORT.md
    source_section: 'H3 REJECTED — PGP genes are predominantly core, not accessory: vertical inheritance dominates'
    quote: pangenome openness (singleton fraction) correlates **negatively** with PGP gene richness (Spearman ρ = −0.195, p = 2.0e-97, n = 11,272 species with ≥2 genomes). Species with more PGP genes have *more closed* pangenomes, consistent with stable, specialized ecological niches rather than generalist HGT-driven gene acquisition.
    notebook: 04_core_accessory_status.ipynb
    figure: figures/openness_vs_pgp.png
- id: stmt:trp-completeness-predicts-ipdc
  kind: finding
  text: Tryptophan biosynthesis completeness significantly predicts ipdC presence (2.5% vs 0.9% in trp-incomplete species; Fisher OR = 2.81, logit OR = 2.81, 95% CI 1.97–4.01).
  confidence: medium
  topics:
