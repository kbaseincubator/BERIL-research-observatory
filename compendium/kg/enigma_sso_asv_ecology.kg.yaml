project:
  id: enigma_sso_asv_ecology
  title: 'Report: SSO Subsurface Community Ecology — Spatial Structure, Functional Gradients, and Hydrogeological Drivers'
statements:
- id: stmt:distance-decay-meter-scale
  kind: finding
  text: Sediment microbial communities across the 9 SSO wells show significant distance-decay of similarity at meter scale, with community turnover aligned to the east-west axis rather than the hillslope.
  confidence: high
  topics:
  - topic:subsurface-genomics
  - topic:environment-biogeography
  entities:
  - entity:sso-grid
  - entity:bray-curtis
  - entity:mantel-test
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: enigma_sso_asv_ecology
    source_doc: REPORT.md
    source_section: 1. Community Similarity Tracks Spatial Arrangement at Meter Scale
    quote: 'Sediment-associated microbial communities across the 9 SSO wells (3×3 grid, ~6 m span) show significant distance-decay of similarity (Mantel test: Spearman ρ = 0.323, p = 0.029, 9,999 permutations).'
    notebook: 02_sediment_spatial.ipynb
    figure: figures/bc_heatmap_sediment.png
  - source_project: enigma_sso_asv_ecology
    source_doc: REPORT.md
    source_section: 1. Community Similarity Tracks Spatial Arrangement at Meter Scale
    quote: Critically, community turnover is **not** aligned with the hillslope (uphill-downhill Mantel ρ = −0.049, p = 0.580) but instead with the **east-west axis** (column Mantel ρ = 0.227, p = 0.092).
- id: stmt:column3-corridor
  kind: finding
  text: Wells U3, M6, and L7 form a diagonal community-similarity corridor from the northeast to the southwest that aligns with the expected contamination-plume flow path from the uphill Area 3 source.
  confidence: high
  topics:
  - topic:subsurface-genomics
  - topic:environment-biogeography
  entities:
  - entity:sso-grid
  - entity:contamination-plume
  - entity:bray-curtis
