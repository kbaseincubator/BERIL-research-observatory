    contradicts: []
    refines: []
  evidence:
  - source_project: enigma_sso_asv_ecology
    source_doc: REPORT.md
    source_section: '2. The Column 3 Corridor: A Plume Flow Path'
    quote: These wells trace a **diagonal corridor from the northeast (U3) to the southwest (L7)** that aligns with the expected flow path of the contamination plume from the Area 3 source (high nitrate, low pH, heavy metals) located uphill and northeast of the SSO.
    notebook: 02_sediment_spatial.ipynb
    figure: figures/nmds_vs_grid.png
- id: stmt:depth-dominates-zonation
  kind: finding
  text: PERMANOVA shows hydrogeological depth zone explains 27.5% of sediment community variance (p=0.0001) while well identity is not significant, so vertical zonation dominates over horizontal position.
  confidence: high
  topics:
  - topic:subsurface-genomics
  - topic:microbial-ecotypes
  entities:
