  evidence:
  - source_project: enigma_sso_asv_ecology
    source_doc: REPORT.md
    source_section: 3. Depth Dominates Over Horizontal Position
    quote: '**Hydrogeological zone** (VZ/VSZ/SZ1/SZ2) explains **27.5%** of community variance (F = 4.05, p = 0.0001)'
    notebook: 03_depth_zonation.ipynb
    figure: figures/nmds_samples_zone_well.png
  - source_project: enigma_sso_asv_ecology
    source_doc: REPORT.md
    source_section: 3. Depth Dominates Over Horizontal Position
    quote: '**Well identity** explains **19.2%** but is **not significant** (F = 0.80, p = 0.979)'
