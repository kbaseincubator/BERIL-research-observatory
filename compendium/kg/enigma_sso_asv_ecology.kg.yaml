- id: stmt:m5-denitrification-hotspot
  kind: finding
  text: The central well M5 hosts the highest denitrification potential (7.7% Rhodanobacter), consistent with a plume mixing zone where nitrate-rich contaminated groundwater meets native organic carbon.
