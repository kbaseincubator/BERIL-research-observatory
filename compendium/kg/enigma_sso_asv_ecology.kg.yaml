- id: stmt:no-direct-geochemistry-caveat
  kind: caveat
  text: All environmental inferences rest on community composition alone because SSO geochemistry has not been loaded into BERDL, so the plume model awaits geochemical confirmation.
  confidence: high
  topics:
  - topic:subsurface-genomics
  - topic:environment-biogeography
  entities:
  - entity:contamination-plume
  - entity:geochemistry
  - entity:coral
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:contamination-plume-model
  evidence:
  - source_project: enigma_sso_asv_ecology
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**No direct geochemistry**: SSO geochemistry (221 sample tubes registered in CORAL) has not been loaded into BERDL. All environmental inferences are from community composition alone.'
- id: stmt:genus-coverage-caveat
  kind: caveat
  text: Genus-level functional annotation covers only 21% of total reads, so process abundance estimates are lower bounds and the unclassified majority of reads could harbor additional functional capacity.
  confidence: high
  topics:
