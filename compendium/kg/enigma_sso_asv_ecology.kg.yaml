  evidence:
  - source_project: enigma_sso_asv_ecology
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Genus coverage uncertainty**: Genus-level functional annotation covers only 21% of total reads (65 of 1,038 genera). Process abundance estimates are lower bounds; the unclassified 56% of reads could harbor additional functional capacity.'
