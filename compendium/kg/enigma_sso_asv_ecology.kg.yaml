    source_doc: REPORT.md
    source_section: 5. Groundwater Carries a Plume-Associated Planktonic Community
    quote: Sediment-attached anaerobes (*Anaeromyxobacter*, *Arcobacter*, *Ca. Methanoperedens*) are depleted in groundwater, indicating distinct attached vs planktonic communities rather than simple detachment.
    notebook: 05_gw_vs_sediment.ipynb
    figure: figures/gw_vs_sediment_phylum.png
