- id: stmt:groundwater-planktonic-plume
  kind: finding
  text: Groundwater is enriched in plume-adapted denitrifiers and iron oxidizers while sediment-attached anaerobes are depleted, indicating distinct planktonic versus attached communities rather than simple detachment.
  confidence: medium
  topics:
  - topic:environment-biogeography
