- id: stmt:functional-redundancy-cooccurring-genera
  kind: finding
  text: Co-occurring plant-associated genera in soil communities are slightly less metabolically complementary
    than random genus pairs (Cohen d about -0.4, permutation p<0.001), supporting functional redundancy
    at a small effect size.
  confidence: medium
  topics:
