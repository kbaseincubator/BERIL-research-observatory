    notebook: 05_genomic_architecture.ipynb
    figure: figures/mobility_proxies.png
- id: stmt:markers-under-purifying-selection
  kind: caveat
  text: Despite frequent transposase association, plant-interaction marker genes as a class are less mobile
    than the genomic average (singleton enrichment ratio 0.78, Wilcoxon p<1e-300), indicating stronger
    purifying selection rather than ongoing high mobility.
  confidence: medium
