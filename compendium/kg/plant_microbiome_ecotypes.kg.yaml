- id: stmt:dual-nature-label-uninformative
  kind: finding
  text: All 14 experimentally confirmed beneficial and pathogenic ground-truth species were assigned to
    the dual-nature class, so the categorical cohort label cannot discriminate beneficial from pathogenic
    species; the continuous pathogenicity ratio is the discriminating signal (median 0.50 vs 0.60, p=0.027).
  confidence: medium
  topics:
