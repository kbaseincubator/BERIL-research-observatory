      small effect)
    quote: co-occurring plant-associated genera in NMDC soil communities are slightly **less** complementary
      than random genus pairs (Cohen's d ≈ −0.4, permutation p < 0.001), supporting the redundancy interpretation
      but at a small effect size
    notebook: 06_complementarity.ipynb
- id: stmt:cohen-d-formula-error
  kind: caveat
  text: The Phase 1 complementarity result of Cohen d=-7.54 was largely a formula error from dividing
    by the standard deviation of permutation means; the corrected effect size is about -0.4, with the
    redundancy direction robust under both aggregation methods.
  confidence: high
  topics:
