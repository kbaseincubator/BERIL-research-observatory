    source_doc: REPORT.md
    source_section: 4. Co-occurring genera show functional redundancy, not complementarity (H3 — not supported,
      small effect)
    quote: 'The Phase 1 NB06 result of "Cohen''s d = −7.54" was **largely a Cohen''s d formula error**:
      NB06 divided the mean difference by the SD of permutation means (which shrinks toward zero by CLT,
      asymptotically), while the correct denominator is the raw pair-level SD.'
    notebook: 14_deferred_controls.ipynb
- id: stmt:fifty-novel-plant-enriched-ogs
  kind: finding
  text: Of 5,341 eggNOG ortholog groups significantly associated with plant association, 50 retained significance
    after phylum-level phylogenetic control, identifying a robust set of plant-enriched gene families
    led by COG3569 (phylo-controlled OR=6.01).
  confidence: high
