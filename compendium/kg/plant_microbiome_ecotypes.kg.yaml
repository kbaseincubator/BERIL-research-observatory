    source_doc: REPORT.md
    source_section: 1. Plant compartments impose a small but real functional shift on microbial communities
      (H1, weakly supported)
    quote: '**most of the original 0.527 was a taxonomic-sampling artifact** of a few genome-rich species
      rather than a community-wide signal'
    notebook: 14_deferred_controls.ipynb
- id: stmt:beneficial-core-pathogenic-accessory
  kind: finding
  text: Beneficial plant-growth-promoting gene clusters are predominantly core-encoded (64.6% core fraction)
    while pathogenic clusters are accessory (45.2% core), a difference far exceeding the genome-wide baseline
    (Mann-Whitney p=3.38e-125).
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:microbiome-engineering
  entities:
