    quote: 'The combined three-tier verdict is: 3 markers species-level robust, 5 cassette-level (genus-acquired
      but not species-distinguishing), 6 not robust under any test.'
    notebook: 14_deferred_controls.ipynb
- id: stmt:mobilome-enrichment-genus-level
  kind: finding
  text: Plant-associated genera carry higher mobilome burden than non-plant genera (median 3.7 vs 2.8
    mobile elements per genome, Mann-Whitney p=1.49e-5), a genus-level enrichment that contrasts with
    genome-level studies reporting fewer mobile elements in plant-associated bacteria.
  confidence: medium
