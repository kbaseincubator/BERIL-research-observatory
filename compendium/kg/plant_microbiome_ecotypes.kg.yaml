- id: stmt:xanthomonas-pathovar-host-segregation
  kind: finding
  text: 'Within-species subclade analysis showed weak segregation in 5/17 testable species, with two canonical
    pathovar-host specializations confirmed genomically: Xanthomonas campestris segregating to Brassica
    hosts and X. vasicola to maize.'
