    quote: '**All 14 of the beneficial + pathogenic ground-truth species were assigned to the dual-nature
      class**, which means the categorical cohort label is uninformative at the species level — it cannot
      discriminate beneficial from pathogenic ground truth.'
    notebook: 13_validation_pfam_subclade.ipynb
    figure: figures/synthesis_overview.png
- id: stmt:refined-panel-dual-nature-persists
  kind: claim
  text: Even after KEGG-module gating reduced T3SS false positives by 86% and narrowed the panel to 17
    plant-specific markers, the dual-nature rate among plant-associated species rose to 78.7%, indicating
    genuine co-occurrence of PGP and pathogenic functions.
  confidence: medium
