project:
  id: plant_microbiome_ecotypes
  title: 'Report: Plant Microbiome Ecotypes — Compartment-Specific Functional Guilds and Their Genetic
    Architecture'
statements:
- id: stmt:compartment-functional-shift
  kind: finding
  text: Plant compartment identity explains only a small fraction (~6% of variance, db-RDA location-only
    R2=0.060, p=0.001) of microbial functional-profile variation once location and dispersion effects
    are separated, far below the original PERMANOVA R2 of 0.527.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  - topic:environment-biogeography
  entities:
  - entity:plant-compartment
  - entity:rhizosphere
  - entity:permanova
  - entity:db-rda
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: plant_microbiome_ecotypes
    source_doc: REPORT.md
    source_section: 1. Plant compartments impose a small but real functional shift on microbial communities
      (H1, weakly supported)
    quote: db-RDA (constrained ordination on PCoA scores of Jaccard distance over the refined 17-marker
      panel, n=607 plant-compartment species) gives **location-only R² = 0.060** (permutation p = 0.001,
      999 permutations)
    notebook: 04_compartment_profiling.ipynb
    figure: figures/nb01_compartment_census.png
- id: stmt:permanova-sampling-artifact
  kind: caveat
  text: 'The headline compartment effect (PERMANOVA R2=0.527) was largely a taxonomic-sampling artifact:
    excluding a handful of genome-rich rhizobial and Pseudomonas clades drops the residual R2 to 0.072.'
  confidence: high
  topics:
  - topic:microbial-ecotypes
  entities:
  - entity:plant-compartment
  - entity:permanova
  - entity:pseudomonas
  links:
    supports: []
