- id: stmt:three-tier-marker-robustness
  kind: finding
  text: 'Under combined cluster-robust GLM and within-genus permutation tests, plant-association markers
    split three ways: 3 are species-level robust (nitrogen fixation, ACC deaminase, T3SS), 5 are cassette-level
    (genus-acquired but not species-distinguishing), and 6 are not robust.'
  confidence: high
  topics:
  - topic:gene-fitness
