    source_doc: REPORT.md
    source_section: 2. Beneficial genes are core-encoded; pathogenic genes are accessory (H2)
    quote: Beneficial (PGP) gene clusters are predominantly core genome (64.6% core fraction), significantly
      exceeding both the genome-wide baseline of 46.8% and pathogenic gene clusters (45.2% core fraction).
    notebook: 05_genomic_architecture.ipynb
    figure: figures/core_vs_pathogenic.png
- id: stmt:pathogenic-transposase-cooccurrence
  kind: finding
  text: Plant-associated species carrying singleton marker gene clusters are 16x more likely to also carry
    transposase/integrase singletons (Fisher OR=15.95, p=8.8e-20), a co-occurrence signature consistent
    with horizontal gene transfer.
  confidence: medium
