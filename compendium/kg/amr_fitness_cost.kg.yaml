    source_doc: REPORT.md
    source_section: 4. Core and accessory AMR genes have identical fitness costs (H3 not supported)
    quote: 'Core (intrinsic, N=638) and accessory (acquired, N=163) AMR genes show virtually identical fitness distributions: mean −0.024 vs −0.024, Cohen''s d = 0.002, MWU p = 0.33.'
    notebook: 04_stratification.ipynb
    figure: figures/h3_core_vs_accessory.png
- id: stmt:amr-acquisition-not-random
  kind: claim
  text: The absence of a core-versus-accessory cost difference suggests horizontal transfer preferentially captures genes already cost-optimized in the donor lineage, or that the receiving genome rapidly compensates.
  confidence: medium
  topics:
