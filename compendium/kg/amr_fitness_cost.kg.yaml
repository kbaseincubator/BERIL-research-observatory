    contradicts: []
    refines: []
  evidence:
  - source_project: amr_fitness_cost
    source_doc: REPORT.md
    source_section: 1. Universal cost of resistance across 25 bacterial species (H1 supported)
    quote: Only 4.6% of AMR genes were absent from the fitness matrices (putatively essential), substantially lower than the ~14% background essential rate estimated in a prior analysis (`fitness_effects_conservation`, different organism set). AMR genes being less likely to be essential is consistent with the cost-of-resistance framework — these genes are more dispensable, not less.
- id: stmt:amr-antibiotic-flip
  kind: finding
  text: Under any antibiotic, 57% of AMR genes show a fitness flip, becoming relatively more important when knocked out compared to non-antibiotic conditions (Wilcoxon p = 0.0001, N = 797).
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:gene-fitness
  entities:
