    source_doc: REPORT.md
    source_section: 3. Resistance mechanism does not predict fitness cost (H2 not supported)
    quote: If all resistance mechanisms impose the same modest cost (~0.086 fitness units relative to background), it suggests that **only AMR genes whose cost has been minimized through compensatory evolution persist in these genomes**.
- id: stmt:amr-core-accessory-identical
  kind: finding
  text: Core (intrinsic) and accessory (acquired) AMR genes have virtually identical fitness distributions (mean -0.024 vs -0.024, Cohen's d = 0.002, MWU p = 0.33), refuting the prediction that recently acquired genes are costlier.
  confidence: high
  topics:
