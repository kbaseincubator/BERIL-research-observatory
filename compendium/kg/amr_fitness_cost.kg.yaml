    source_doc: REPORT.md
    source_section: 4. Core and accessory AMR genes have identical fitness costs (H3 not supported)
    quote: One interpretation is that acquisition of AMR genes is not random — horizontal transfer preferentially captures genes that have already been cost-optimized in their donor lineage, or that the receiving genome rapidly compensates.
- id: stmt:amr-mechanism-predicts-conservation
  kind: finding
  text: Resistance mechanism strongly predicts conservation status (chi-square = 69.3, p = 1.4e-13)-metal resistance genes are 44% accessory while efflux and enzymatic genes are overwhelmingly core-decoupling pangenome location from fitness cost.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:amr-resistome
  entities:
