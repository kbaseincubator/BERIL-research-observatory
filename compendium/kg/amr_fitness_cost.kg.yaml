  evidence:
  - source_project: amr_fitness_cost
    source_doc: REPORT.md
    source_section: 2. AMR genes become more important under antibiotic pressure (H4 partially supported)
    quote: 'Critically, this flip is **mechanism-dependent**: efflux genes (broad-spectrum) show a significantly stronger flip than enzymatic inactivation genes (narrow-spectrum): +0.094 vs −0.001, MWU p = 0.007.'
    notebook: 04b_followup_analyses.ipynb
- id: stmt:amr-mechanism-no-cost-difference
  kind: finding
  text: The baseline fitness cost of AMR genes does not vary by resistance mechanism (Kruskal-Wallis H = 0.65, p = 0.89), refuting the hypothesis that mechanism predicts cost.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:gene-fitness
  entities:
