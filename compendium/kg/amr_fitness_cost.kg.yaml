    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Lab adaptation bias**: All 25 organisms are lab-adapted strains. Compensatory evolution during laboratory maintenance may have reduced measurable costs below what wild strains experience. This makes our positive result more convincing but may underestimate the true cost in natural populations.'
- id: stmt:amr-essential-censoring-caveat
  kind: caveat
  text: Because ~4.6% of AMR genes are putatively essential and absent from the fitness matrices, the +0.086 cost estimate is a lower bound if those censored genes are the most costly.
  confidence: medium
