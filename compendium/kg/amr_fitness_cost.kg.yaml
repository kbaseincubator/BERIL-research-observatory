    refines: []
  evidence:
  - source_project: amr_fitness_cost
    source_doc: REPORT.md
    source_section: 5. Mechanism is strongly associated with conservation, even though cost is not
    quote: While mechanism doesn't predict fitness cost, it strongly predicts conservation status (χ² = 69.3, p = 1.4×10⁻¹³). Metal resistance genes are 44% accessory, while efflux (13%) and enzymatic inactivation (16%) genes are overwhelmingly core.
    notebook: 04b_followup_analyses.ipynb
    figure: figures/mechanism_x_conservation.png
