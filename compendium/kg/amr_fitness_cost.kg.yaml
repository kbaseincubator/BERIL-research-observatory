  evidence:
  - source_project: amr_fitness_cost
    source_doc: REPORT.md
    source_section: 3. Resistance mechanism does not predict fitness cost (H2 not supported)
    quote: Contrary to H2, the fitness cost of AMR genes does not vary by resistance mechanism. The Kruskal-Wallis test across four testable mechanisms (efflux N=254, enzymatic inactivation N=304, metal resistance N=144, unknown N=74) is not significant (H = 0.65, p = 0.89).
    notebook: 04_stratification.ipynb
- id: stmt:amr-uniform-cost-floor
  kind: claim
  text: The uniform modest cost across mechanisms may represent an irreducible floor of metabolic overhead, with only AMR genes whose cost has been minimized through compensatory evolution persisting in these genomes.
  confidence: medium
  topics:
  - topic:amr-resistome
  - topic:gene-fitness
