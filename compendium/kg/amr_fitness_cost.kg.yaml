project:
  id: amr_fitness_cost
  title: 'Report: Fitness Cost of Antimicrobial Resistance Genes'
statements:
- id: stmt:amr-universal-cost
  kind: finding
  text: AMR gene knockouts have systematically higher fitness than non-AMR gene knockouts under non-antibiotic conditions, with a pooled meta-analytic effect of +0.086 and all 25 of 25 organisms showing a positive shift.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:gene-fitness
  entities:
  - entity:fitness-browser
  - entity:amr-genes
  - entity:rb-tnseq
  - entity:meta-analysis
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: amr_fitness_cost
    source_doc: REPORT.md
    source_section: 1. Universal cost of resistance across 25 bacterial species (H1 supported)
    quote: 'AMR gene knockouts show systematically higher fitness than non-AMR gene knockouts under non-antibiotic conditions, confirming that resistance genes impose a metabolic burden. A DerSimonian-Laird random-effects meta-analysis across 25 organisms yields a pooled effect of **+0.086 [95% CI: +0.074, +0.098], z = 14.3, p ~ 0**. Remarkably, **all 25 of 25 organisms** show a positive shift (AMR > background), making this one of the most consistent signals observed across the Fitness Browser compendium.'
    notebook: 02_fitness_cost_analysis.ipynb
    figure: figures/forest_plot_amr_fitness.png
- id: stmt:amr-cost-is-small
  kind: claim
  text: The fitness cost of resistance is real but small, reconciling the persistence of resistance long after antibiotic withdrawal with its measurable cost under stewardship.
  confidence: medium
  topics:
  - topic:amr-resistome
  - topic:gene-fitness
  entities:
  - entity:amr-genes
  - entity:cost-of-resistance
  links:
