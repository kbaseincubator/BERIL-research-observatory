    - stmt:amr-universal-cost
    contradicts: []
    refines: []
  evidence:
  - source_project: amr_fitness_cost
    source_doc: REPORT.md
    source_section: The cost of resistance is universal but uniform
    quote: 'This reconciles two apparently contradictory observations in the AMR literature: fitness costs are real (supporting resistance decline under stewardship), but they are small (explaining why resistance persists long after antibiotic withdrawal).'
- id: stmt:amr-low-essential-rate
  kind: finding
  text: Only 4.6% of AMR genes were absent from the fitness matrices (putatively essential), substantially below the ~14% background essential rate, consistent with AMR genes being more dispensable than typical genes.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:amr-resistome
  entities:
