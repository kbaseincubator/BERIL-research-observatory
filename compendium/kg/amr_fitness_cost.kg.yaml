    refines: []
  evidence:
  - source_project: amr_fitness_cost
    source_doc: REPORT.md
    source_section: 2. AMR genes become more important under antibiotic pressure (H4 partially supported)
    quote: When tested under any antibiotic, 57% of AMR genes show a fitness flip — they become relatively more important (lower fitness when knocked out) compared to non-antibiotic conditions (Wilcoxon signed-rank p = 0.0001, N = 797).
    notebook: 03_antibiotic_validation.ipynb
    figure: figures/antibiotic_validation.png
- id: stmt:amr-efflux-mechanism-dependent-flip
  kind: finding
  text: 'The antibiotic-induced fitness flip is mechanism-dependent: broad-spectrum efflux genes flip significantly more strongly than narrow-spectrum enzymatic inactivation genes (+0.094 vs -0.001, MWU p = 0.007).'
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:gene-fitness
  entities:
