- id: stmt:add-statistical-test-opportunity
  kind: opportunity
  text: Adding a chi-squared or Fisher's exact test on module versus non-module genes by core versus non-core would strengthen the central core-enrichment claim, which currently lacks a reported significance test in the notebook analysis.
  confidence: medium
  topics:
