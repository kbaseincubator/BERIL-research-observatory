    contradicts: []
    refines: []
  evidence:
  - source_project: module_conservation
    source_doc: REPORT.md
    source_section: Interpretation
    quote: ICA fitness modules are enriched in core genes (86% vs 81.5% baseline, OR=1.46, p=1.6e-87), confirming that co-regulated functional units preferentially reside in the conserved genome.
- id: stmt:enrichment-modest-ceiling
  kind: caveat
  text: The observed core enrichment is modest because the baseline core rate is already ~81.5%, imposing a ceiling effect that limits the maximum observable enrichment.
  confidence: high
  topics:
  - topic:pangenome-architecture
  entities:
  - entity:core-genome
  - entity:pangenome
  - entity:ceiling-effect
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:module-genes-enriched-core
  evidence:
  - source_project: module_conservation
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Ceiling effect**: The baseline core rate is already ~81.5%, limiting the maximum observable enrichment. The +4.5pp difference to 86% is statistically significant but represents a modest absolute effect.'
- id: stmt:family-breadth-no-predict
  kind: finding
  text: Module families spanning more organisms do not have higher core fractions (Spearman rho=-0.01, p=0.914), a null result for the breadth-conservation hypothesis.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:microbial-ecotypes
  entities:
  - entity:module-families
  - entity:core-genome
  - entity:pangenome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: module_conservation
    source_doc: REPORT.md
    source_section: Family Breadth Does NOT Predict Conservation
    quote: Surprisingly, module families spanning more organisms do NOT have higher core fractions (Spearman rho=-0.01, p=0.914). Families are nearly all core regardless of how many organisms they span.
    notebook: 02_family_conservation.ipynb
    figure: figures/family_breadth_vs_conservation.png
- id: stmt:conservation-is-gene-property
  kind: claim
  text: Conservation is a property of individual genes rather than of the cross-organism scope of their regulatory module.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:gene-fitness
  entities:
  - entity:core-genome
  - entity:module-families
  - entity:ica-fitness-modules
  links:
