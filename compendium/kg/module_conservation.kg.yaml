project:
  id: module_conservation
  title: 'Report: Fitness Modules x Pangenome Conservation'
statements:
- id: stmt:module-genes-enriched-core
  kind: finding
  text: ICA fitness module genes are enriched in the conserved core genome, at 86.0% core versus 81.5% for all genes (a +4.5 percentage-point shift).
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:gene-fitness
  entities:
  - entity:ica-fitness-modules
  - entity:core-genome
  - entity:pangenome
  - entity:fitness-browser
  links:
    supports:
