    refines:
    - stmt:essential-genes-absent
  evidence:
  - source_project: module_conservation
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Essential genes excluded**: ICA requires fitness data, so essential genes (no transposon insertions) are absent from all modules. This means modules only capture the non-essential portion of the genome.'
- id: stmt:organism-subset-caveat
  kind: caveat
  text: Three module organisms (Cola, Kang, SB2B) lack pangenome links because their species had too few genomes in GTDB for pangenome construction, restricting the analysis to a 29/32 organism subset.
  confidence: medium
  topics:
