    contradicts: []
    refines: []
  evidence:
  - source_project: module_conservation
    source_doc: REPORT.md
    source_section: Interpretation
    quote: The surprising null result for family breadth vs conservation (rho=-0.01) suggests that conservation is a property of individual genes, not of the cross-organism scope of their regulatory module.
