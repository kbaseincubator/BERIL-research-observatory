- id: stmt:essential-genes-absent
  kind: finding
  text: No essential genes appear in any ICA module, confirming that the modules only capture non-essential genes with measurable fitness variation from transposon insertions.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:pangenome-architecture
  entities:
  - entity:essential-genes
  - entity:ica-fitness-modules
  - entity:rb-tnseq
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: module_conservation
    source_doc: REPORT.md
    source_section: Essential Genes Are Absent from Modules
    quote: 0 essential genes appear in any module, confirming that ICA modules only capture genes with measurable fitness variation (non-essential genes with transposon insertions).
- id: stmt:essential-genes-excluded-caveat
  kind: caveat
  text: Because ICA requires fitness data, essential genes (which lack transposon insertions) are absent from all modules, so the analysis only covers the non-essential portion of the genome.
  confidence: high
  topics:
  - topic:gene-fitness
  entities:
  - entity:essential-genes
  - entity:ica-fitness-modules
  - entity:rb-tnseq
  links:
    supports: []
