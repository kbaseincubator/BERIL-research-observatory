- id: stmt:median-module-core
  kind: finding
  text: The median module is 93.4% core, indicating that most co-regulated fitness response units are embedded in the conserved genome.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:gene-fitness
  entities:
