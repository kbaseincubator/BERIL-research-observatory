- id: stmt:core-enrichment-significant
  kind: claim
  text: The core enrichment of fitness modules is statistically significant (OR=1.46, p=1.6e-87), confirming co-regulated functional units preferentially reside in the conserved genome.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:gene-fitness
  entities:
  - entity:ica-fitness-modules
  - entity:core-genome
  - entity:pangenome
  links:
    supports:
