    contradicts: []
    refines: []
  evidence:
  - source_project: module_conservation
    source_doc: REPORT.md
    source_section: Module Genes Are More Core Than Average
    quote: '**Module genes: 86.0% core** vs all genes: 81.5% (+4.5 percentage points)'
    notebook: 01_module_conservation.ipynb
    figure: figures/module_core_distribution.png
- id: stmt:most-modules-are-core
  kind: finding
  text: Of 974 modules with at least three mapped genes, 577 (59%) are core modules (>90% core genes), 349 (36%) are mixed, and 48 (5%) are accessory.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:gene-fitness
