project:
  id: paperblast_explorer
  title: 'Report: PaperBLAST Data Explorer — Characterizing Literature Coverage Bias in Protein Sequence Space'
statements:
- id: stmt:human-dominates-literature
  kind: finding
  text: Homo sapiens alone accounts for 46.7% of all gene-paper records in PaperBLAST, and the top five organisms capture 72.8%, reflecting extreme organism-level literature concentration.
  confidence: high
  topics:
  - topic:functional-dark-matter
  entities:
  - entity:paperblast
  - entity:literature-coverage
  - entity:homo-sapiens
  - entity:model-organisms
  links:
    supports:
    - stmt:lorenz-gini-inequality
    contradicts: []
    refines: []
  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: 'Finding 1: One organism dominates nearly half of all literature'
    quote: '*Homo sapiens* alone accounts for **46.7%** of all gene-paper records in PaperBLAST. The top 5 organisms (*H. sapiens*, *M. musculus*, *R. norvegicus*, *A. thaliana*, *D. melanogaster*) capture **72.8%**.'
    notebook: 02_coverage_skew.ipynb
    figure: figures/organism_coverage_skew.png
- id: stmt:most-genes-one-paper
  kind: finding
  text: Of 841K genes with any text-mined paper link, 551K (65.6%) have exactly one paper, while just 6% of genes account for 57.7% of all gene-paper links.
  confidence: high
  topics:
