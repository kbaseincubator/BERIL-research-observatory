    contradicts: []
    refines: []
  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: 'Finding 4: Bacterial research is concentrated on pathogens'
    quote: 'Among 15,312 bacterial organisms, the top 100 capture **44.3%** of bacterial literature. The top 3 bacteria are all well-known pathogens or model organisms: *M. tuberculosis* H37Rv (9,079 papers), *E. coli* K-12 (8,860), and *P. aeruginosa* PAO1 (5,928). Environmental and non-pathogenic organisms are dramatically underrepresented.'
    notebook: 02_coverage_skew.ipynb
    figure: figures/top20_bacteria.png
- id: stmt:sequence-clustering-families
  kind: finding
  text: MMseqs2 clustering of 815,571 PaperBLAST protein sequences yields 628K clusters at 90% identity, 345K protein families at 50%, and 215K superfamilies at 30% identity.
  confidence: high
  topics:
  - topic:pangenome-architecture
  entities:
  - entity:paperblast
  - entity:mmseqs2
  - entity:protein-families
  - entity:sequence-clustering
