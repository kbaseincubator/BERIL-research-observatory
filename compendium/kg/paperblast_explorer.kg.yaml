  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: Database Scale and Structure
    quote: The `kescience_paperblast` collection on BERDL contains **12.4 million rows** across 14 tables. The core data structure links genes to papers through text mining of PubMed Central full-text articles, supplemented by curated annotations from 13 databases and structural data from the PDB.
    notebook: 01_paperblast_overview.ipynb
- id: stmt:larger-families-better-studied
  kind: finding
  text: Protein family size correlates positively with literature coverage, yet 4.6% of multi-member 50% identity clusters (5,218 families) remain genuinely unstudied, dominated by REBASE methyltransferases and biolip structural entries.
  confidence: medium
  topics:
  - topic:functional-dark-matter
  - topic:pangenome-architecture
  entities:
  - entity:paperblast
  - entity:protein-families
  - entity:rebase-methyltransferases
  links:
    supports:
    - stmt:dark-dim-families
    contradicts: []
    refines: []
  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: 'Clustering and Literature: Larger Families Are Better Studied'
    quote: 95.4% of multi-member 50% identity clusters have at least one member with a paper, but the remaining 4.6% (5,218 families) represent genuinely unstudied protein families. The "dark" families are dominated by REBASE methyltransferases and biolip structural entries — highly specialized proteins that lack published functional studies.
    notebook: 03_sequence_clustering.ipynb
    figure: figures/cluster_vs_literature.png
- id: stmt:dark-matter-quantification
  kind: claim
  text: This work provides the first protein-family-level characterization of the BERDL PaperBLAST collection, quantifying 5,218 multi-member protein families at 50% identity with zero literature coverage as the dark matter of protein biology.
  confidence: medium
  topics:
