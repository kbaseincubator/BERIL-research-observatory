    refines: []
  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: 'Finding 2: 65.6% of genes have exactly one paper'
    quote: Of 841K genes with any text-mined paper link, **551K (65.6%)** have exactly 1 paper. The median is 1, the mean is 3.8.
    notebook: 02_coverage_skew.ipynb
    figure: figures/gene_coverage_skew.png
- id: stmt:lorenz-gini-inequality
  kind: finding
  text: Literature attention is extremely unequal, with a Gini coefficient of 0.967 across organisms and 0.669 across genes, mirroring wealth-inequality patterns.
  confidence: high
  topics:
  - topic:functional-dark-matter
  entities:
  - entity:paperblast
  - entity:literature-coverage
  - entity:gini-coefficient
  - entity:lorenz-curve
  links:
