  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: 'Finding 5: 345K protein families from 816K sequences'
    quote: 'MMseqs2 clustering of 815,571 PaperBLAST protein sequences at three identity thresholds reveals: **628K clusters at 90%** (77% — low strain-level redundancy), **345K at 50%** (protein family level), and **215K at 30%** (superfamily level).'
    notebook: 03_sequence_clustering.ipynb
    figure: figures/sequence_space_reduction.png
- id: stmt:dark-dim-families
  kind: finding
  text: At 50% identity, 9.2% of protein families (31,653) have zero papers and 46.1% have exactly one, so 55% of protein families are functionally dark or dim in the literature.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:pangenome-architecture
  entities:
  - entity:paperblast
  - entity:protein-families
  - entity:dark-proteome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: 'Finding 6: 55% of protein families are dark or dim'
    quote: At 50% identity, **9.2% of protein families** (31,653) have **zero papers** across all members, and **46.1%** (159,046) have exactly 1 paper. Only **4.3%** of families (14,904) have 20 or more papers.
    notebook: 03_sequence_clustering.ipynb
    figure: figures/literature_coverage_landscape.png
- id: stmt:database-scale-structure
  kind: finding
  text: The kescience_paperblast collection on BERDL contains 12.4 million rows across 14 tables, linking genes to papers via text mining of PubMed Central full-text plus curated and structural annotations.
  confidence: high
  topics:
