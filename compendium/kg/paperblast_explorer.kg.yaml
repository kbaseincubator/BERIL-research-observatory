    contradicts: []
    refines: []
  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: 'Finding 3: Literature inequality is extreme — Lorenz curves'
    quote: For organisms, the Gini coefficient is **0.967** (where 1.0 is perfect inequality), indicating near-total concentration. For genes, the Gini is **0.669** — still very high.
    notebook: 02_coverage_skew.ipynb
    figure: figures/lorenz_curves.png
- id: stmt:bacterial-pathogen-concentration
  kind: finding
  text: Among 15,312 bacterial organisms the top 100 capture 44.3% of bacterial literature, led by pathogens and model organisms, leaving environmental and non-pathogenic bacteria dramatically underrepresented.
  confidence: high
  topics:
  - topic:functional-dark-matter
  - topic:microbial-ecotypes
  entities:
  - entity:paperblast
  - entity:literature-coverage
  - entity:bacterial-pathogens
  - entity:environmental-microbes
