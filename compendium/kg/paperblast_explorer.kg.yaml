    source_doc: REPORT.md
    source_section: Novel Contribution
    quote: The cross-database linkage analysis reveals that 129,823 VIMSS cross-references connect PaperBLAST to the Fitness Browser, creating a path from literature coverage to experimental fitness phenotypes — a resource for identifying functionally important but understudied genes.
- id: stmt:caveat-text-mining-not-function
  kind: caveat
  text: A text-mined gene-paper link does not imply functional characterization, and the 65.6% of genes with a single paper likely include many incidental mentions.
  confidence: high
  topics:
  - topic:functional-dark-matter
  entities:
  - entity:paperblast
  - entity:text-mining
  - entity:literature-coverage
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:most-genes-one-paper
  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Text mining ≠ functional characterization**: A gene mentioned in a paper may be tangential to the study. The 65.6% with 1 paper likely includes many incidental mentions.'
- id: stmt:caveat-pmc-open-access-bias
  kind: caveat
  text: PaperBLAST mines only PubMed Central open-access full text, so paywalled papers are missed, creating a systematic bias against fields and journals with lower open-access rates.
  confidence: high
  topics:
  - topic:functional-dark-matter
  entities:
  - entity:paperblast
  - entity:pubmed-central
  - entity:open-access
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**PMC open-access only**: PaperBLAST only mines full-text from PubMed Central. Papers behind paywalls are missed, creating a systematic bias against fields/journals with lower open-access rates.'
- id: stmt:caveat-swissprot-partial
  kind: caveat
  text: Only about 19% of SwissProt is present in PaperBLAST because many reviewed entries lack matching PMC full text, so curated knowledge exists for proteins PaperBLAST cannot connect to.
  confidence: medium
  topics:
  - topic:functional-dark-matter
  entities:
  - entity:paperblast
  - entity:swissprot
  - entity:pubmed-central
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: paperblast_explorer
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**SwissProt coverage is partial**: Only 19% of SwissProt is in PaperBLAST, likely because many SwissProt entries lack matching PMC full-text. This means curated knowledge exists for many proteins that PaperBLAST cannot connect to.'
