project:
  id: costly_dispensable_genes
  title: 'Report: The 5,526 Costly + Dispensable Genes'
statements:
- id: stmt:costly-dispensable-are-mge
  kind: finding
  text: The 5,526 costly+dispensable genes are overwhelmingly mobile genetic elements, being 7.45x more likely to carry mobile element keywords and 11.7x enriched in the SEED Phage/Transposon/Plasmid category versus costly+conserved genes.
  confidence: high
  topics:
  - topic:mobile-genetic-elements
  - topic:pangenome-architecture
  entities:
  - entity:mobile-genetic-elements
  - entity:costly-dispensable-genes
  - entity:seed-annotations
  - entity:pangenome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: costly_dispensable_genes
    source_doc: REPORT.md
    source_section: Costly+Dispensable Genes Are Mobile Genetic Elements
    quote: 'The 5,526 costly+dispensable genes are overwhelmingly associated with mobile genetic elements. They are **7.45x more likely** to contain mobile element keywords in their descriptions (transposase, integrase, phage, IS element, recombinase, prophage; OR=7.45, p=4.6e-71). SEED functional enrichment confirms this: the "Phages, Prophages, Transposable elements, Plasmids" category is 11.7x enriched (FDR=1.3e-17)'
    notebook: 02_functional_characterization.ipynb
    figure: figures/fig_seed_enrichment.png
- id: stmt:poorly-annotated
  kind: finding
  text: Costly+dispensable genes are poorly characterized, with only 50.8% carrying SEED annotations versus 74.9% for costly+conserved genes and 20.0% carrying KEGG annotations versus 42.7%.
  confidence: high
