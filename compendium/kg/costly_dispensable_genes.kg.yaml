- id: stmt:condition-specific-effects
  kind: finding
  text: Despite being burdensome and non-conserved, 14.1% of costly+dispensable genes have condition-specific phenotypes, far above neutral+dispensable genes (2.7%), indicating these genes are not inert and may persist under specific conditions.
  confidence: medium
