    notebook: 02_functional_characterization.ipynb
    figure: figures/fig_annotation_rate.png
- id: stmt:narrow-ortholog-breadth
  kind: finding
  text: Costly+dispensable genes are taxonomically restricted, with 44.5% being orphan genes (versus 13.1%) and a median ortholog breadth of 15 organisms versus 31 for costly+conserved genes.
  confidence: high
