- id: stmt:psrch2-outlier
  kind: finding
  text: Pseudomonas stutzeri RCH2 is an outlier, contributing 21.5% of its genes as costly+dispensable, far above the next organism (B. thetaiotaomicron at 14.0%), suggesting a strain-specific mobile element invasion.
  confidence: medium
