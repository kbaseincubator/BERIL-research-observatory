    source_doc: REPORT.md
    source_section: Novel Contribution
    quote: This is the first systematic characterization of genes that are simultaneously burdensome (fitness improves when deleted) and not conserved in the pangenome. While mobile element burden has been studied in individual organisms, the cross-organism scale (142,190 genes across 43 bacteria) and the pangenome dimension are new.
- id: stmt:burden-definition-caveat
  kind: caveat
  text: The classification of genes as burdensome is sensitive to noise because burden is defined as max_fit > 1 in any single experiment, so one experiment can label a gene as costly.
  confidence: medium
  topics:
  - topic:gene-fitness
  entities:
  - entity:costly-dispensable-genes
