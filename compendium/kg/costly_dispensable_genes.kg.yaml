    quote: The pangenome core/auxiliary classification is binary; a quantitative measure (fraction of genomes carrying the gene) would provide more resolution
- id: stmt:singleton-structural-caveat
  kind: caveat
  text: The high singleton fraction of costly+dispensable genes is partly structural because core genes cannot be singletons, and within the dispensable category costly genes are only slightly more likely to be singletons than neutral genes (OR=1.09).
  confidence: medium
  topics:
  - topic:pangenome-architecture
  entities:
