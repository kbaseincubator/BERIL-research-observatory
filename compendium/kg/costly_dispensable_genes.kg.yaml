    quote: '"Burden" is defined as max_fit > 1 in any experiment -- a single experiment can classify a gene as burdensome, making this sensitive to noise in the fitness data'
- id: stmt:binary-conservation-caveat
  kind: caveat
  text: The pangenome core/auxiliary classification is binary, so a quantitative measure of the fraction of genomes carrying each gene would provide more resolution than the current dispensability call.
  confidence: medium
  topics:
