    quote: The costly+dispensable genes represent the **genomic debris of horizontal gene transfer** -- insertion sequences, prophage remnants, transposases, and defense systems that impose metabolic cost on their host and are not conserved across the species pangenome.
- id: stmt:ongoing-gene-loss-candidates
  kind: claim
  text: Costly+dispensable genes are candidates for ongoing gene loss, having been acquired via HGT but imposing sufficient cost that they will likely be purged from the genome unless they provide a selective advantage in specific environments.
  confidence: medium
