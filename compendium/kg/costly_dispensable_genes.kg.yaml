    source_section: They Are Poorly Characterized Recent Acquisitions
    quote: 'no costly+conserved genes are singletons. Note: this is partly structural since core genes cannot be singletons by definition. Within the dispensable category, costly genes are only slightly more likely to be singletons than neutral genes (OR=1.09, p=0.02)'
    notebook: 03_evolutionary_context.ipynb
