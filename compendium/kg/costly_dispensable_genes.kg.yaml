    quote: Despite being burdensome and non-conserved, 14.1% of costly+dispensable genes have condition-specific phenotypes (vs 16.7% for costly+conserved). This is much higher than neutral+dispensable genes (2.7%), suggesting these genes are not inert
    notebook: 01_define_quadrants.ipynb
- id: stmt:hgt-debris-interpretation
  kind: claim
  text: Costly+dispensable genes represent the genomic debris of horizontal gene transfer -- insertion sequences, prophage remnants, transposases, and defense systems that impose metabolic cost and are not conserved across the species pangenome.
  confidence: high
  topics:
