- id: stmt:heated-mineral-fewer-metabolites
  kind: finding
  text: Heated mineral soils have significantly fewer detectable metabolites than controls (155 vs 167 ChEBI per sample, MW p=0.012), consistent with faster substrate turnover under warming.
  confidence: medium
  topics:
