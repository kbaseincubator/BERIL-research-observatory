    source_doc: REPORT.md
    source_section: Summary
    quote: Heated mineral samples also have **fewer detectable metabolites** (155 vs 167 ChEBI per sample, MW p=0.012).
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: What we showed
    quote: Heated mineral soils have **less metabolite richness**, which would be consistent with faster substrate turnover under warming.
    notebook: 07_metabolite_view.ipynb
    figure: figures/07_metabolite_heatmap.png
- id: stmt:caveat-single-timepoint-sample-size
  kind: caveat
  text: All samples come from a single timepoint (2017-05-24) and small omics cohorts (n=28 metagenome, n=39 metatranscriptome), limiting per-KO FDR power and precluding detection of seasonal effects.
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:metabolic-pathways
  entities:
  - entity:metagenome
  - entity:metatranscriptome
  - entity:soil-warming
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:methanotrophy-glyoxylate-up
    - stmt:heated-mineral-fewer-metabolites
  evidence:
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Single timepoint** (2017-05-24). Cannot detect seasonal effects (which Shinfuku et al. 2024 show are substantial at this site).

      - **Sample size** for omics-rich layers (n=28 metagenome, n=39 metatranscriptome) limits per-KO FDR power across 12-14K KOs.'
- id: stmt:caveat-unbalanced-coverage
  kind: caveat
  text: Coverage is unbalanced because the NMDC pipeline did not produce metagenomes for organic-direct samples, which confounds horizon with incubation and drives the H1 sensitivity caveat.
  confidence: high
  topics:
  - topic:environment-biogeography
  entities:
  - entity:metagenome
  - entity:organic-horizon
  - entity:nmdc
  links:
    supports: []
