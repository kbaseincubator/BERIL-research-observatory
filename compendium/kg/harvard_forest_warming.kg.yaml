  evidence:
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: Sample design
    quote: Coverage is unbalanced because the underlying NMDC pipeline did not produce metagenomes from organic-direct or some mineral-direct samples — this drives the H1 sensitivity caveat in Finding 2.
    notebook: 01_sample_design.ipynb
    figure: figures/01_design.png
- id: stmt:caveat-transcript-pool-composition
  kind: caveat
  text: Metatranscriptome KO counts are transcript-pool composition from contig annotations rather than TPM-quantified expression and are biased by assembly quality.
  confidence: medium
  topics:
  - topic:functional-dark-matter
  - topic:metabolic-pathways
  entities:
  - entity:metatranscriptome
  - entity:kegg-orthology
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:h1-dna-rna-comparable
  evidence:
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Metatranscriptome KO from contig annotations** is *transcript-pool composition*, not TPM-quantified expression. Contig-level annotation count ≈ relative transcript abundance, but is biased by assembly quality.'
- id: stmt:caveat-no-in-lakehouse-abiotic
  kind: caveat
  text: The abiotic_features table is all zeros for these samples, leaving the +5C treatment label as the only environmental contrast with no in-lakehouse soil temperature, pH, or nitrogen.
  confidence: high
  topics:
  - topic:environment-biogeography
  entities:
