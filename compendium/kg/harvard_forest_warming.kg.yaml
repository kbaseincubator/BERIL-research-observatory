  title: 'Report: Harvard Forest Long-Term Warming — DNA vs RNA Functional Response'
statements:
- id: stmt:community-actino-up-acido-down
  kind: finding
  text: After 25 years of +5C warming the soil community shows a real but modest compositional shift, with Actinobacteria up and Acidobacteria down, reproducing the published signal for this site.
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:microbial-ecotypes
  entities:
  - entity:harvard-forest-barre-woods
  - entity:actinobacteria
  - entity:acidobacteria
  - entity:soil-warming
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: Summary
    quote: shows a real but modest community-level warming response that **reproduces published findings** for this site (Actinobacteria up, Acidobacteria down — DeAngelis et al. 2015)
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: 1. Community composition reproduces the published Actinobacteria-up / Acidobacteria-down signal
    quote: The site's published compositional warming signal (Actinobacteria up, Acidobacteria down) is robustly recoverable from kraken2 read-based taxonomy at the q<0.05 level in 14+14 samples.
    notebook: 03_community_composition.ipynb
    figure: figures/03_phylum_bars.png
- id: stmt:h1-dna-rna-comparable
  kind: finding
  text: The DNA and RNA functional pools show comparable treatment R2 (10-13%) once a horizon-by-incubation confound is removed, so the transcript pool is not more warming-sensitive than the genome pool.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:environment-biogeography
  entities:
  - entity:metatranscriptome
  - entity:metagenome
  - entity:permanova
  - entity:soil-warming
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: 2. H1 is not supported — DNA and RNA functional pools respond comparably to warming
    quote: DNA and RNA pools show **comparable** treatment R² (10-13%). H1's premise that the transcript pool is more sensitive is not supported in this dataset.
    notebook: 04_dna_vs_rna_divergence.ipynb
    figure: figures/04_dna_vs_rna_pcoa.png
- id: stmt:novel-dna-rna-variance-comparison
  kind: claim
  text: This is the first explicit paired-sample comparison of DNA-pool and RNA-pool warming response variance at Harvard Forest, showing the apparent DNA-vs-RNA imbalance is largely a horizon-by-incubation artifact.
  confidence: medium
  topics:
  - topic:metabolic-pathways
  - topic:environment-biogeography
  entities:
  - entity:metatranscriptome
  - entity:metagenome
  - entity:harvard-forest-barre-woods
  links:
    supports:
    - stmt:h1-dna-rna-comparable
    contradicts: []
    refines: []
  evidence:
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: Novel contribution
    quote: To our knowledge, this is the **first explicit comparison of DNA-pool and RNA-pool warming response variance** in a paired-sample design at Harvard Forest, including the H1 sensitivity check that demonstrates the apparent DNA-vs-RNA imbalance is largely a horizon × incubation artifact.
- id: stmt:methanotrophy-glyoxylate-up
  kind: finding
  text: Methanotrophy genes pmoA/pmoB are upregulated in heated soils across both horizons and the glyoxylate cycle is upregulated in heated mineral soil, identifying specific carbon-cycling warming responses.
  confidence: medium
  topics:
  - topic:metabolic-pathways
  - topic:gene-fitness
  entities:
  - entity:methane-monooxygenase
  - entity:glyoxylate-cycle
  - entity:isocitrate-lyase
  - entity:soil-warming
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: Summary
    quote: methanotrophy genes pmoA/pmoB are upregulated** in heated soils across both horizons (RNA log2 FC +0.7 to +0.9, p=0.009-0.054 nominal), and the **glyoxylate cycle** (isocitrate lyase + malate synthase) is upregulated in heated mineral soil (p=0.037 each)
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: 4. Methanotrophy (pmoA/pmoB) and the glyoxylate cycle are upregulated under warming
    quote: These signals are biologically directional and consistent across horizons even though individual FDR significance is precluded by the multiple-testing burden across 14K KOs at this sample size.
    notebook: 05_c_cycling_enrichment.ipynb
    figure: figures/08_synthesis.png
- id: stmt:c-cycling-enriched-dna-organic
  kind: finding
  text: Curated C-cycling KOs are significantly enriched among heated-up genes in the DNA-organic samples (Fisher OR=2.78, p=0.042), partially supporting the carbon-degradation hypothesis.
  confidence: medium
