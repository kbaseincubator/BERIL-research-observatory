    source_doc: REPORT.md
    source_section: Limitations
    quote: '**`abiotic_features` is all zeros** for these samples (NMDC parsing artifact for this specific study) — no in-lakehouse soil temperature, pH, or nitrogen measurements. The +5°C treatment label is the only environmental contrast.'
