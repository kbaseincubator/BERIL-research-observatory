    source_doc: REPORT.md
    source_section: Summary
    quote: At the curated 62-KO C-cycling level, heated-up KOs are significantly enriched in DNA-organic samples (Fisher OR=2.78, p=0.042).
  - source_project: harvard_forest_warming
    source_doc: REPORT.md
    source_section: 3. H2 is partially supported — C-cycling KOs are enriched in heated DNA-organic; methanotrophy and glyoxylate genes UP in RNA
    quote: The DNA-organic enrichment is significant.
    notebook: 05_c_cycling_enrichment.ipynb
    figure: figures/05_c_cycling_volcano.png
- id: stmt:warming-responses-horizon-specific
  kind: finding
  text: Most warming responses are horizon-specific, with roughly 39% of DNA KOs being organic-only, mineral-only, or sign-flipping between horizons.
  confidence: high
