- id: stmt:caveat-alphaearth-coverage
  kind: caveat
  text: AlphaEarth structural embeddings cover only about 28% of genomes, so structural-distance analyses must filter to species with sufficient coverage and may be biased by underrepresented isolate types.
  confidence: high
