    source_doc: README.md
    source_section: Research Question
    quote: How do pangenome characteristics (open vs. closed) correlate with metabolic pathway completeness, phylogenetic distances, and species ecology?
- id: stmt:generalist-specialist-hypothesis
  kind: claim
  text: The central hypothesis tests whether open pangenomes indicate generalist species with broader niche adaptation and greater metabolic pathway diversity, while closed pangenomes indicate specialists with conserved core pathways.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:microbial-ecotypes
  entities:
  - entity:pangenome-openness
  - entity:generalist-specialist
  - entity:niche-adaptation
  links:
    supports:
    - stmt:research-question
    contradicts: []
    refines: []
  evidence:
