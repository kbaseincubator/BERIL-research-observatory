    source_doc: REVIEW.md
    source_section: Methodology
    quote: Uses relevant BERDL tables (`pangenome`, `gapmind_pathways`, `alphaearth_embeddings_all_years`, `phylogenetic_tree_distance_pairs`)
- id: stmt:scale-27690-species
  kind: finding
  text: The framework is designed to compute pangenome openness distributions and GapMind pathway coverage across all 27,690 microbial species in the pangenome resource.
  confidence: medium
