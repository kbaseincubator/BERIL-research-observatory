- id: stmt:phylogenetic-signal-control
  kind: finding
  text: The design controls for phylogenetic signal by relating openness to evolutionary distances using phylogenetic independent contrasts (PIC) or PGLS so that associations are independent of phylogeny.
  confidence: medium
