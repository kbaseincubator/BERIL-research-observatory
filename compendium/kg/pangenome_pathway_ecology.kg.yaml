    source_doc: README.md
    source_section: Overview
    quote: It tests whether open pangenomes indicate generalist species with broader niche adaptation and greater metabolic pathway diversity, while closed pangenomes indicate specialists with conserved core pathways.
- id: stmt:open-pangenome-hgt
  kind: claim
  text: Open pangenomes (high auxiliary/singleton gene ratios) are hypothesized to reflect generalist species with greater horizontal gene transfer within ecological niches and increased metabolic pathway flexibility.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:mobile-genetic-elements
  entities:
  - entity:pangenome-openness
  - entity:horizontal-gene-transfer
  - entity:accessory-genome
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:generalist-specialist-hypothesis
  evidence:
  - source_project: pangenome_pathway_ecology
    source_doc: RESEARCH_PLAN.md
    source_section: Hypothesis
    quote: Greater horizontal gene transfer within ecological niches
- id: stmt:closed-pangenome-conservation
  kind: claim
  text: Closed pangenomes (low auxiliary/singleton ratios) are hypothesized to reflect specialist species with reduced gene acquisition rates and core metabolic pathway conservation.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:metabolic-pathways
  entities:
  - entity:pangenome-openness
  - entity:core-genome
  - entity:niche-adaptation
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:generalist-specialist-hypothesis
  evidence:
  - source_project: pangenome_pathway_ecology
    source_doc: RESEARCH_PLAN.md
    source_section: Hypothesis
    quote: Specialist species with narrow niche adaptation
- id: stmt:openness-metric
  kind: finding
  text: Pangenome openness is operationalized as the ratio of variable genes to total genes, openness = (aux_genes + singleton_genes) / total_genes, a standard measure judged sound in independent review.
  confidence: high
  topics:
  - topic:pangenome-architecture
  entities:
  - entity:pangenome-openness
  - entity:gene-cluster
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: pangenome_pathway_ecology
    source_doc: REVIEW.md
    source_section: Methodology
    quote: The formula `(auxiliary_genes + singleton_genes) / total_genes` is a standard and appropriate measure of pangenome openness
- id: stmt:data-sources-berdl
  kind: finding
  text: The analysis draws on BERDL pangenome, GapMind pathway, AlphaEarth structural embedding, and phylogenetic-tree-distance tables from the kbase_ke_pangenome database.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:metabolic-pathways
  entities:
