project:
  id: pangenome_pathway_ecology
  title: Pangenome Openness, Metabolic Pathways, and Phylogenetic Distances
statements:
- id: stmt:research-question
  kind: claim
  text: The project asks how pangenome openness (open vs. closed) correlates with metabolic pathway completeness, phylogenetic distances, and species ecology across microbial species.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:metabolic-pathways
  entities:
  - entity:pangenome-openness
  - entity:gapmind
  - entity:phylogenetic-distance
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
