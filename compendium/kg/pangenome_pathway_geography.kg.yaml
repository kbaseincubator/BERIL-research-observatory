    notebook: 01_data_extraction_REVISED.ipynb
- id: stmt:low-data-coverage-caveat
  kind: caveat
  text: Only 6.8% of species (1,872/27,690) had complete data across all three datasets, because AlphaEarth embeddings cover just 28% of genomes (83K/293K), limiting generalizability.
  confidence: high
