- id: stmt:niche-breadth-pathway-strongest
  kind: finding
  text: Ecological niche breadth (AlphaEarth embedding diversity) was the strongest predictor of mean metabolic pathway completeness, with a moderate positive correlation (r=0.392, p=7.1e-70).
  confidence: high
