- id: stmt:gapmind-multirow-pitfall
  kind: caveat
  text: Correct GapMind pathway aggregation requires taking the best (MAX) score per genome-pathway pair, because GapMind stores multiple rows per genome-pathway pair (one per step) which can otherwise corrupt completeness counts.
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
