    source_section: 3. Resistance mechanism composition is strongly environment-dependent (H3 supported)
    quote: '**Target modification**: 44% in human gut, 28% in clinical, but only 6% in aquatic (η² = 0.100)'
    notebook: 02_resistome_vs_environment.ipynb
    figure: figures/h3_mechanism_by_environment.png
- id: stmt:mechanism-conservation-ecology-link
  kind: claim
  text: 'The mechanism-conservation pattern (metal resistance accessory, efflux core) is driven by ecology: efflux genes are core because they serve host-associated organisms across conditions, while metal resistance is accessory because it is only needed in metal-rich environments.'
  confidence: medium
  topics:
