    source_doc: REPORT.md
    source_section: 5. Phylogenetic control confirms environment effects are real
    quote: even within the same bacterial family, species in different environments carry different AMR profiles.
    notebook: 02_resistome_vs_environment.ipynb
- id: stmt:alphaearth-confirms-discrete
  kind: finding
  text: Continuous AlphaEarth environmental embeddings independently confirm the discrete environment findings, with a Mantel test showing that environmental distance predicts AMR profile distance (r = 0.098, p = 0.001) most strongly for clinical species.
  confidence: medium
  topics:
  - topic:environment-biogeography
  - topic:amr-resistome
  entities:
  - entity:alphaearth-embeddings
  - entity:mantel-test
  - entity:env-embedding-explorer
  links:
    supports:
    - stmt:clinical-amr-richness
    contradicts: []
    refines: []
  evidence:
  - source_project: amr_environmental_resistome
    source_doc: REPORT.md
    source_section: 6. AlphaEarth continuous environment embeddings confirm discrete findings (supplementary)
    quote: 'A Mantel test confirms that environmental distance (cosine distance of embeddings) predicts AMR profile distance (Bray-Curtis of mechanism fractions): r = 0.098, p = 0.001.'
    notebook: 04_alphaearth_analysis.ipynb
    figure: figures/nb04_alphaearth.png
- id: stmt:ncbi-sampling-bias
  kind: caveat
  text: The clinical-carries-more-AMR finding is partly confounded by NCBI sampling bias, because clinical isolates are massively overrepresented and clinical species are the ones sequenced precisely because they have AMR.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:environment-biogeography
  entities:
  - entity:ncbi-env
  - entity:sampling-bias
  - entity:resistome
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:clinical-amr-richness
  evidence:
  - source_project: amr_environmental_resistome
    source_doc: REPORT.md
    source_section: Limitations
    quote: The "clinical species carry more AMR" finding partly reflects that clinical species are the ones that get sequenced because they have AMR.
- id: stmt:correlation-modest-effects
  kind: caveat
  text: The analysis establishes correlation rather than causation between environment and AMR, and effect sizes are modest, with environment explaining only 2-13% of variance in AMR composition.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:microbial-ecotypes
  entities:
  - entity:resistome
  - entity:effect-size
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:niche-selects-mechanism
  evidence:
  - source_project: amr_environmental_resistome
    source_doc: REPORT.md
    source_section: Limitations
    quote: While all tests are highly significant (p ~ 0), the effect sizes are modest (η² = 0.02–0.13). Environment explains 2-13% of variance in AMR composition — phylogeny likely explains much more.
