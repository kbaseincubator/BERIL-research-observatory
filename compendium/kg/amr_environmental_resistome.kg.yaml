    quote: '*K. pneumoniae* is striking: 1,115 AMR gene clusters but only 7 are core — nearly the entire resistome is accessory, reflecting massive within-species AMR variation driven by HGT in clinical settings.'
    notebook: 03_within_species.ipynb
- id: stmt:environment-not-phylogeny-artifact
  kind: finding
  text: The environment-AMR relationship survives phylogenetic control, with 20 of 141 testable bacterial families showing significant within-family environment effects, demonstrating it is not simply a proxy for phylogeny.
  confidence: medium
  topics:
  - topic:microbial-ecotypes
  - topic:amr-resistome
  entities:
  - entity:gtdb-taxonomy
  - entity:resistome
  - entity:phylogenetic-control
  links:
