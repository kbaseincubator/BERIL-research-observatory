project:
  id: amr_environmental_resistome
  title: 'Report: Environmental Resistome at Pangenome Scale'
statements:
- id: stmt:clinical-amr-richness
  kind: finding
  text: Clinical and human gut bacterial species carry roughly 2.5x more AMR gene clusters (median 5) than soil, aquatic, and host-associated species (median 2), establishing ecological niche as a strong predictor of resistome size.
  confidence: high
  topics:
  - topic:amr-resistome
  - topic:microbial-ecotypes
  entities:
  - entity:resistome
  - entity:amr-gene-clusters
  - entity:pangenome
  - entity:isolation-source
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: amr_environmental_resistome
    source_doc: REPORT.md
    source_section: 1. Clinical species carry 2.5× more AMR gene clusters than environmental species (H1 supported)
    quote: Species from clinical sources have a median of **5 AMR gene clusters**, compared to 2 for soil, aquatic, and host-associated species (Kruskal-Wallis H = 781.9, p = 9.4×10⁻¹⁶⁷, η² = 0.056).
    notebook: 02_resistome_vs_environment.ipynb
    figure: figures/h1_amr_by_environment.png
- id: stmt:core-accessory-gradient
  kind: finding
  text: The intrinsic/acquired composition of the resistome varies quantitatively along an ecological gradient, from 43% accessory AMR in soil species up to 68% in clinical and 80% in human gut species.
  confidence: high
  topics:
  - topic:pangenome-architecture
  - topic:amr-resistome
  entities:
  - entity:core-genome
  - entity:accessory-genome
  - entity:resistome
  - entity:horizontal-gene-transfer
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: amr_environmental_resistome
    source_doc: REPORT.md
    source_section: 2. Clinical species have predominantly acquired resistance; soil/aquatic species have more intrinsic resistance (H2 supported)
    quote: '**Clinical species: 68% accessory (acquired) AMR** vs **soil species: 43% accessory** (Kruskal-Wallis H = 506.0, p = 4×10⁻¹⁰⁷, η² = 0.036).'
    notebook: 02_resistome_vs_environment.ipynb
    figure: figures/h2_core_accessory_by_env.png
- id: stmt:core-intrinsic-accessory-acquired
  kind: claim
  text: Soil and aquatic species retain ancient, chromosomally encoded (intrinsic) resistance, whereas clinical and human gut species have overwhelmingly acquired their AMR through horizontal gene transfer.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:mobile-genetic-elements
  entities:
  - entity:core-genome
  - entity:accessory-genome
  - entity:horizontal-gene-transfer
  - entity:resistome
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:core-accessory-gradient
  evidence:
  - source_project: amr_environmental_resistome
    source_doc: REPORT.md
    source_section: 2. Clinical species have predominantly acquired resistance; soil/aquatic species have more intrinsic resistance (H2 supported)
    quote: Clinical and human gut species have overwhelmingly acquired their AMR through horizontal gene transfer, while soil and aquatic species retain more ancient, chromosomally encoded resistance.
    notebook: 02_resistome_vs_environment.ipynb
- id: stmt:metal-resistance-soil-aquatic
  kind: finding
  text: Metal resistance is the most environment-discriminating AMR mechanism, comprising ~44-45% of AMR in soil and aquatic species but only 6% in human gut species (the largest mechanism effect, eta-squared = 0.107).
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:amr-resistome
  entities:
