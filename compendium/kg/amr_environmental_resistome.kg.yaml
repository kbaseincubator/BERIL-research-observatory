    quote: efflux genes are core because they serve host-associated organisms across conditions, while metal resistance is accessory because it's only needed in metal-rich environments.
    notebook: 02_resistome_vs_environment.ipynb
- id: stmt:within-species-clinical-fraction
  kind: finding
  text: Across 823 species sampled in multiple environments, the fraction of genomes from clinical sources strongly predicts total AMR cluster count (Spearman rho = 0.465), with clinical-dominated species carrying 4.4x more AMR clusters than environmentally dominated ones.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  - topic:amr-resistome
  entities:
  - entity:resistome
  - entity:isolation-source
  - entity:klebsiella-pneumoniae
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: amr_environmental_resistome
    source_doc: REPORT.md
    source_section: 4. Species with more clinical genomes carry more AMR (H4 proxy — species-level analysis)
    quote: Clinical-dominated species have **4.4× more AMR clusters** (mean 72.9 vs 16.4, MWU p = 2×10⁻¹⁸) and a higher fraction of accessory AMR in a grouped comparison (93.6% vs 81.7%, MWU p = 0.004).
    notebook: 03_within_species.ipynb
    figure: figures/h4_within_species.png
- id: stmt:kpneumoniae-accessory-resistome
  kind: finding
  text: Klebsiella pneumoniae exemplifies HGT-driven within-species AMR variation, carrying 1,115 AMR gene clusters of which only 7 are core, so nearly its entire resistome is accessory.
  confidence: high
  topics:
  - topic:mobile-genetic-elements
