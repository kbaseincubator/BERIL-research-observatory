    source_doc: REPORT.md
    source_section: 3. Resistance mechanism composition is strongly environment-dependent (H3 supported)
    quote: '**Metal resistance**: 45% of AMR in aquatic, 44% in soil, but only 6% in human gut (η² = 0.107 — the largest effect)'
    notebook: 02_resistome_vs_environment.ipynb
    figure: figures/h3_mechanism_by_environment.png
- id: stmt:niche-selects-mechanism
  kind: finding
  text: Different ecological niches select for fundamentally different resistance strategies, with target modification dominating in human gut (44%) and clinical (28%) species while only reaching 6% in aquatic species.
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:microbial-ecotypes
  entities:
