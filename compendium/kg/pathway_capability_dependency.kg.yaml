    source_section: Limitations
    quote: The RESEARCH_PLAN (H2) proposed correlating metabolic ecotypes with AlphaEarth environmental niche breadth, but this analysis was not executed. AlphaEarth embeddings cover only 28% of genomes (83K/293K), which would significantly limit the sample size. This remains a future direction.
- id: stmt:incomplete-but-important-opportunity
  kind: opportunity
  text: The 14.9% of pairs scored incomplete by GapMind yet fitness-important point to annotation gaps or salvage routes that GapMind misses, an opportunity to improve pathway annotation.
  confidence: medium
