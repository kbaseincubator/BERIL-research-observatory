    - stmt:latent-conditionally-active
  evidence:
  - source_project: pathway_capability_dependency
    source_doc: REPORT.md
    source_section: Limitations
    quote: The median-based importance threshold by construction splits pathways approximately 50/50 into important vs not-important categories. The finding that "all Latent Capabilities become important under some condition" should be interpreted with this in mind
    notebook: 02_tier1_pathway_classification.ipynb
- id: stmt:phylogeny-confound-caveat
  kind: caveat
  text: Correlations were controlled only for genome count and taxonomic grouping rather than full phylogenetic independent contrasts, so metabolic ecotypes may partly reflect intra-species phylogenetic structure given that phylogeny dominates gene content in most species.
  confidence: medium
  topics:
  - topic:microbial-ecotypes
  - topic:pangenome-architecture
  entities:
  - entity:metabolic-ecotype
  - entity:phylogeny
  - entity:ecotype-analysis
  links:
    supports: []
    contradicts: []
    refines:
    - stmt:metabolic-ecotypes
  evidence:
  - source_project: pathway_capability_dependency
    source_doc: REPORT.md
    source_section: Limitations
    quote: While correlations were controlled for genome count and checked within taxonomic groups, full phylogenetic independent contrasts were not computed. The ecotype_analysis project found that phylogeny dominates gene content in 60.5% of species, and metabolic ecotypes may partially reflect intra-species phylogenetic structure.
- id: stmt:alphaearth-niche-opportunity
  kind: opportunity
  text: Correlating metabolic ecotypes with AlphaEarth environmental niche breadth was planned but not executed and remains a future direction, constrained by AlphaEarth covering only 28% of genomes.
  confidence: medium
  topics:
