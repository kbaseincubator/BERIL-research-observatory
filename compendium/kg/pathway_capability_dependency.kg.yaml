    - stmt:amino-acid-accessory-dependence
    contradicts: []
    refines: []
  evidence:
  - source_project: pathway_capability_dependency
    source_doc: REPORT.md
    source_section: Accessory Genome as Metabolic Insurance
    quote: For the top 5 accessory-dependent pathways (leucine, valine, arginine, lysine, threonine), approximately 14% of species-level pathway completeness comes from accessory genes. This means that within a species, different strains have different biosynthetic capabilities -- a precondition for Black Queen dynamics where metabolic functions become community-level public goods.
- id: stmt:fb-gapmind-coverage-caveat
  kind: caveat
  text: Tier 1 classification rests on only 7 of 48 Fitness Browser organisms that have GapMind data, all well-annotated model organisms whose near-complete core genomes compress the conservation validation signal.
  confidence: high
  topics:
