    source_doc: REPORT.md
    source_section: Limitations
    quote: 'Fitness Browser coverage**: Only 7 of 48 FB organisms have GapMind data, limiting Tier 1 to a small set of model organisms. These organisms have near-complete core genomes, which compresses the conservation validation signal.'
- id: stmt:threshold-circularity-caveat
  kind: caveat
  text: The median-based importance threshold splits pathways roughly 50/50 by construction, so the claim that all Latent Capabilities become important under some condition is partly an artifact and would need an independent validation set for a defensible threshold.
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:metabolic-pathways
  entities:
  - entity:importance-score
  - entity:latent-capability
  - entity:essential-metabolome
  links:
