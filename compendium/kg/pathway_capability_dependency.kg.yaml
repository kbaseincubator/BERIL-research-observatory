  - entity:gut-commensals
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: pathway_capability_dependency
    source_doc: REPORT.md
    source_section: 6. Metabolic Ecotypes Correlate with Pangenome Openness
    quote: Among 225 species with sufficient genome diversity (50+ genomes and 3+ variable pathways), hierarchical clustering of binary pathway profiles (Jaccard distance) identifies a median of 4 metabolic ecotypes per species, with a maximum of 8.
    notebook: 04_metabolic_ecotypes.ipynb
    figure: figures/fig4_ecotype_openness.png
- id: stmt:accessory-as-insurance
  kind: claim
  text: Roughly 14% of species-level completeness for the top accessory-dependent pathways comes from accessory genes, so different strains carry different biosynthetic capabilities, a precondition for Black Queen public-good metabolism.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:metabolic-pathways
  entities:
  - entity:accessory-genome
  - entity:black-queen-hypothesis
  - entity:metabolic-insurance
  links:
