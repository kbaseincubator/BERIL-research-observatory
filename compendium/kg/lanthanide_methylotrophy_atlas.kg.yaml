  evidence:
  - source_project: lanthanide_methylotrophy_atlas
    source_doc: REPORT.md
    source_section: 1. xoxF (REE-dependent MDH) outnumbers mxaF (Ca-dependent MDH) by ~19:1 across the BERDL pangenome — H1 strongly supported
    quote: 'The GLMM (variational-Bayes binomial GLMM via `statsmodels.BinomialBayesMixedGLM`, with random intercepts for phylum and family) gives the *strongest* xoxF dominance signal — a phylogeny-corrected ratio of **~143 : 1** with 95% credible interval [122, 169] — because the random effects absorb phylum-level heterogeneity and reveal that *within typical phyla*, xoxF dominance is more extreme than the global pooled estimate suggests.'
    notebook: 08_phylogenetic_validation.ipynb
    figure: figures/h1_phylogenetic_validation.png
