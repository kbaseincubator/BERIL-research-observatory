  - source_project: lanthanide_methylotrophy_atlas
    source_doc: REPORT.md
    source_section: 5. REE-acid-mine-drainage MAGs are dominated by acidophiles, not methylotrophs
    quote: 'Only **4/37** REE-AMD MAGs carry any xoxF; **0/37** carry bakta-validated lanmodulin or xoxJ. The functional signature instead reads as a textbook acid-mine-drainage stress profile: high prevalence of DNA-repair enzymes (RecN 33, RadA 32, RecO 31, RecA 28, RadC 24), acid-resistance machinery (FtsH zinc metalloprotease 31, proton-translocating NAD(P)+ transhydrogenase 27), MerR-family heavy-metal-responsive transcriptional regulators (30), and oxidative-stress defense (thioredoxin reductase 25, glutathione peroxidase 24).'
    notebook: 06_ree_amd_case_study.ipynb
    figure: figures/ree_amd_marker_presence.png
- id: stmt:pqq-asymmetry-annotation-gaps
  kind: finding
  text: The apparent xoxF-without-PQQ asymmetry is largely an annotation artifact, as 59 percent of xoxF genomes lacking eggNOG PQQ annotations carry at least one bakta PQQ product that eggNOG misses.
  confidence: high
  topics:
