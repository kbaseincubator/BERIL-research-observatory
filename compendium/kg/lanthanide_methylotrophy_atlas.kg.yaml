  evidence:
  - source_project: lanthanide_methylotrophy_atlas
    source_doc: REPORT.md
    source_section: 6. The "PQQ-without-xoxF / xoxF-without-PQQ" asymmetry is dominated by annotation gaps
    quote: Of the 2,185 genomes with no eggNOG pqq, **1,288 (59 %) have ≥1 bakta PQQ product** — pure annotation gaps where bakta detects PQQ that eggNOG misses. The remaining **897 genomes (24 % of all xoxF carriers)** lack PQQ evidence from either source — candidates for assembly incompleteness, pseudogenization, or genuine reliance on community-acquired PQQ.
    notebook: 07_pqq_supply_asymmetry.ipynb
    figure: figures/pqq_supply_asymmetry.png
