- id: stmt:ree-amd-acidophiles-not-methylotrophs
  kind: finding
  text: The 37 REE-acid-mine-drainage MAGs are dominated by acidophilic and metal-tolerant lineages rather than methylotrophs, with only 4 of 37 carrying any xoxF and none carrying validated lanmodulin or xoxJ.
  confidence: high
  topics:
