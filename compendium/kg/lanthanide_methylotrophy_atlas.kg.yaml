    source_section: 3. Lanmodulin clade restriction is total; xoxF co-occurrence falls just short of the 80 % threshold
    quote: xoxF co-occurrence (any source) is **49 / 62 = 79.0 %**, just under the pre-registered 80 % threshold (one-sided binomial p = 0.65, **H3b not formally supported**).
    notebook: 05_lanmodulin_h3_test.ipynb
- id: stmt:soil-sediment-strongest-enrichment
  kind: finding
  text: Soil/sediment is the strongest broad-class environmental enrichment for xoxF presence (OR=1.92, p_BH=6e-39 across 13,779 genomes), consistent with methanol oxidation as a known soil process and soil REE mineral reservoirs.
  confidence: high
  topics:
