project:
  id: lanthanide_methylotrophy_atlas
  title: 'Report: Lanthanide Methylotrophy Atlas — Distribution and Environmental Context of REE-Dependent Methanol Oxidation Across 293K Genomes'
statements:
- id: stmt:xoxf-outnumbers-mxaf-19to1
  kind: finding
  text: Across 293K genomes the lanthanide-dependent methanol dehydrogenase xoxF outnumbers the calcium-dependent mxaF by roughly 19:1, strongly supporting that REE-dependent methanol oxidation dominates the canonical pathway.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:metal-resistance
  entities:
  - entity:xoxf
  - entity:mxaf
  - entity:lanthanides
  - entity:berdl-pangenome
  links:
    supports:
    - stmt:xoxf-dominance-phylogeny-robust
    - stmt:xoxf-high-rate-non-methylotrophs
    contradicts: []
    refines: []
  evidence:
  - source_project: lanthanide_methylotrophy_atlas
    source_doc: REPORT.md
    source_section: 1. xoxF (REE-dependent MDH) outnumbers mxaF (Ca-dependent MDH) by ~19:1 across the BERDL pangenome — H1 strongly supported
    quote: 'Across 293,059 GTDB-r214 genomes, eggNOG `KEGG_ko = K00114` (xoxF, lanthanide-dependent methanol dehydrogenase, EC 1.1.2.8) is annotated in **3,690 genomes**, while `K14028` (mxaF, Ca-dependent methanol dehydrogenase, EC 1.1.2.7) is annotated in **195 genomes** — a global xoxF:mxaF ratio of **18.92 : 1**, with a Clopper-Pearson 95% CI of [13.07, 27.69].'
    notebook: 03_h1_formal_test.ipynb
    figure: figures/xoxF_vs_mxaF_by_phylum.png
- id: stmt:xoxf-dominance-phylogeny-robust
  kind: claim
  text: xoxF dominance is robust to phylogenetic correction, with a Bayesian binomial GLMM yielding a phylogeny-corrected ratio of about 143:1 rather than an artifact of one large phylum.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:pangenome-architecture
  entities:
  - entity:xoxf
  - entity:mxaf
  - entity:gtdb
