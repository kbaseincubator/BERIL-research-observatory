- id: stmt:lanmodulin-clade-restriction-total
  kind: finding
  text: Bakta-validated lanmodulin is detected in 62 genomes, all 100 percent confined to three alpha-Proteobacterial methylotroph families, strongly supporting total clade restriction of this lanthanide-binding protein.
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:microbial-ecotypes
  entities:
  - entity:lanmodulin
  - entity:beijerinckiaceae
  - entity:acetobacteraceae
  - entity:methylotrophs
  links:
    supports:
    - stmt:bakta-product-trustworthy-lanmodulin
    contradicts: []
    refines: []
  evidence:
  - source_project: lanthanide_methylotrophy_atlas
    source_doc: REPORT.md
    source_section: 3. Lanmodulin clade restriction is total; xoxF co-occurrence falls just short of the 80 % threshold
    quote: 'Bakta-validated `product = ''Lanmodulin''` is detected in **62 genomes** (10 species). Every one of them — **62 / 62 = 100 %** — falls within Beijerinckiaceae, Acetobacteraceae, or Hyphomicrobiaceae, the three α-Proteobacterial methylotroph families pre-specified in H3. One-sided binomial test against the 80 % threshold: **p = 9.8 × 10⁻⁷** — **H3a strongly supported.**'
    notebook: 05_lanmodulin_h3_test.ipynb
    figure: figures/h3_lanmodulin_clade_restriction.png
- id: stmt:lanmodulin-xoxf-cooccurrence-short
  kind: caveat
  text: xoxF co-occurs with lanmodulin in only 79.0 percent of lanmodulin genomes, just below the pre-registered 80 percent threshold, so lanmodulin presence does not reliably predict a co-located lanthanide-MDH operon.
  confidence: medium
  topics:
