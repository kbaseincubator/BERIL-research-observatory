    source_doc: REPORT.md
    source_section: 4. Soil/sediment is the strongest environmental enrichment; REE-impacted sites are descriptively elevated
    quote: '**H2 is partially supported.** Soil/sediment is by far the strongest broad-class enrichment (OR=1.92, p_BH=6×10⁻³⁹ across 13,779 genomes), consistent with methanol oxidation as a known soil microbial process and the reservoir of lanthanide minerals in soil.'
    notebook: 04_environmental_association.ipynb
    figure: figures/h2_cassette_by_environment.png
