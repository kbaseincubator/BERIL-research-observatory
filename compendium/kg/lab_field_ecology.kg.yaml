    source_section: Genus Abundance Correlates with Uranium -- in Both Directions
    quote: '*Desulfovibrio* shows no correlation (rho=0.022, p=0.82) and *Pseudomonas* shows no correlation (rho=-0.059, p=0.55) despite both being ENIGMA model organisms.'
    notebook: 03_fitness_vs_field.ipynb
- id: stmt:lab-tolerance-not-significant-field-ratio
  kind: finding
  text: The correlation between lab-derived metal tolerance score and the high-uranium/low-uranium field abundance ratio is suggestive but not significant (Spearman rho=0.503, p=0.095, n=12 genera), with the trend in the predicted direction but limited statistical power.
  confidence: medium
  topics:
  - topic:gene-fitness
  - topic:metal-resistance
  entities:
