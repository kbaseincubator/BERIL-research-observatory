- id: stmt:metal-resistance-enriched-accessory-genome
  kind: finding
  text: Consistent with Rhodanobacter strains acquiring heavy metal resistance via horizontal gene transfer at Oak Ridge, metal resistance genes are enriched in the accessory genome rather than the core.
  confidence: medium
  topics:
  - topic:metal-resistance
  - topic:pangenome-architecture
  entities:
