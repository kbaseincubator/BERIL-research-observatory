    source_doc: REPORT.md
    source_section: Literature Context
    quote: This parallels our `costly_dispensable_genes` finding that metal resistance genes are enriched in the accessory genome.
- id: stmt:genus-resolution-limitation
  kind: caveat
  text: 16S amplicon data resolves only to genus level, so species- or strain-level matching of field taxa to specific Fitness Browser lab organisms is not possible.
  confidence: high
  topics:
