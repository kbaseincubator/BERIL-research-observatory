    source_doc: REPORT.md
    source_section: Genus Abundance Correlates with Uranium -- in Both Directions
    quote: 'Of 14 FB genera detected at Oak Ridge, 11 had sufficient prevalence (>=10 sites) for correlation analysis. After BH-FDR correction, 5 show significant correlations with uranium:'
    notebook: 03_fitness_vs_field.ipynb
    figure: figures/fig_abundance_vs_uranium.png
- id: stmt:model-organisms-no-uranium-correlation
  kind: finding
  text: Despite being ENIGMA model organisms, both Desulfovibrio and Pseudomonas show no correlation between genus abundance and site uranium concentration.
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:metal-resistance
  entities:
