project:
  id: lab_field_ecology
  title: 'Report: Lab Fitness Predicts Field Ecology at Oak Ridge'
statements:
- id: stmt:fb-genera-detected-oak-ridge
  kind: finding
  text: Of 26 unique genera represented in the Fitness Browser, 14 are detected in Oak Ridge groundwater communities via 16S amplicon sequencing, with Sphingomonas, Pseudomonas, and Caulobacter the most prevalent.
  confidence: high
  topics:
