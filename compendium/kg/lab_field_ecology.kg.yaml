    refines: []
  evidence:
  - source_project: lab_field_ecology
    source_doc: REPORT.md
    source_section: 14 of 26 Fitness Browser Genera Detected at Oak Ridge
    quote: Of 26 unique genera represented in the Fitness Browser, 14 are detected in Oak Ridge groundwater communities via 16S amplicon sequencing. The most prevalent are *Sphingomonas* (93% of 108 sites), *Pseudomonas* (91%), and *Caulobacter* (82%).
    notebook: 02_genus_abundance.ipynb
    figure: figures/fig_fb_genus_prevalence.png
- id: stmt:desulfovibrio-rare-low-abundance
  kind: finding
  text: Desulfovibrio, the primary ENIGMA model organism, is detected at only 34% of Oak Ridge sites and at very low abundance, making it an unreliable subject for correlation analysis.
  confidence: high
