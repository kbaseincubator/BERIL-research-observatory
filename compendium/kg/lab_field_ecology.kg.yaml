    quote: '*Desulfovibrio*, the primary ENIGMA model organism, is detected at only 34% of sites at very low abundance (max 0.09% relative abundance).'
    notebook: 02_genus_abundance.ipynb
- id: stmt:genus-abundance-correlates-uranium-bidirectional
  kind: finding
  text: Of 11 FB genera with sufficient prevalence, 5 show significant correlations with uranium after BH-FDR correction, with Herbaspirillum and Bacteroides increasing and Caulobacter, Sphingomonas, and Pedobacter decreasing at high-uranium sites.
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:metal-resistance
