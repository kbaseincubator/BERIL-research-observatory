  evidence:
  - source_project: lab_field_ecology
    source_doc: REPORT.md
    source_section: Lab Metal Tolerance Does Not Significantly Predict Field Abundance Ratio
    quote: The correlation between lab-derived metal tolerance score (negative mean fitness under stress, higher = more tolerant) and the high-uranium/low-uranium field abundance ratio is suggestive but not significant (Spearman rho=0.503, p=0.095, n=12 genera).
    notebook: 03_fitness_vs_field.ipynb
    figure: figures/fig_metal_tolerance_score.png
- id: stmt:community-composition-shifts-contamination
  kind: finding
  text: Oak Ridge sites split at the median uranium concentration show distinct community compositions, with rare-biosphere taxa and subsurface specialists becoming more prominent at contaminated sites.
  confidence: high
  topics:
  - topic:environment-biogeography
  - topic:microbial-ecotypes
