- id: stmt:first-link-fb-fitness-enigma-coral
  kind: claim
  text: This is the first study to directly link Fitness Browser lab fitness data with ENIGMA CORAL field community composition across a geochemical gradient, and it demonstrates the previously undocumented CORAL database holds analysis-ready ecological data.
  confidence: high
