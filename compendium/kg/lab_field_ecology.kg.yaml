    source_doc: REPORT.md
    source_section: Community Composition Shifts with Contamination
    quote: Sites split at the median uranium concentration show distinct community compositions. The top genera at high-uranium sites differ from low-uranium sites, with rare-biosphere taxa and subsurface specialists becoming more prominent at contaminated sites.
    notebook: 03_fitness_vs_field.ipynb
    figure: figures/fig_community_by_contamination.png
- id: stmt:lab-fitness-does-not-simply-predict-field
  kind: claim
  text: Lab metal tolerance does not simply predict field abundance because field niches are multidimensional, communities involve interactions, 16S resolves only to genus, and geochemistry snapshots miss temporal dynamics.
  confidence: high
  topics:
  - topic:gene-fitness
  - topic:environment-biogeography
