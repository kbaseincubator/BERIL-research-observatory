- id: stmt:ancestral-streamlining-claim
  kind: claim
  text: Much of the metabolic versatility loss in P. aeruginosa reflects ancestral metabolic streamlining of the lineage itself rather than loss acquired during chronic infection, since these pathways were already absent at the species level across thousands of isolates.
  confidence: medium
  topics:
  - topic:metabolic-pathways
  - topic:microbial-ecotypes
  entities:
  - entity:p-aeruginosa
  - entity:metabolic-streamlining
  - entity:cf-infection
  links:
    supports:
    - stmt:plant-sugar-pathways-lost
    contradicts: []
    refines: []
  evidence:
  - source_project: pseudomonas_carbon_ecology
    source_doc: REPORT.md
    source_section: Literature Context
    quote: Our results suggest that much of this "loss" is not acquired during infection but rather reflects the ancestral metabolic streamlining of the *P. aeruginosa* lineage itself — these pathways were already absent at the species level across thousands of isolates.
