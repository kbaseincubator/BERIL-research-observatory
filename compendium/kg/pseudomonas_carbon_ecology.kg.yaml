- id: stmt:caveat-sampling-bias
  kind: caveat
  text: P. aeruginosa comprises 53% of all genomes due to clinical importance while many environmental species have fewer than 10 sequenced genomes, an imbalance that limits the power of species-level comparisons.
  confidence: high
  topics:
