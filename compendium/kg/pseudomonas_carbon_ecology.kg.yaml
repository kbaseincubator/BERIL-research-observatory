project:
  id: pseudomonas_carbon_ecology
  title: 'Report: Carbon Source Utilization Predicts Ecology and Lifestyle in Pseudomonas'
statements:
- id: stmt:sugar-pathway-loss-host-associated
  kind: finding
  text: Host-associated Pseudomonas sensu stricto (the P. aeruginosa group) show near-complete loss of plant-derived sugar catabolism relative to Pseudomonas_E, with 43 of 62 GapMind carbon pathways differing significantly between the two subgenera.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:microbial-ecotypes
  entities:
  - entity:pseudomonas
  - entity:gapmind
  - entity:carbon-pathways
  - entity:p-aeruginosa
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: pseudomonas_carbon_ecology
    source_doc: REPORT.md
    source_section: 'Finding 1: Host-Associated Pseudomonas Show Dramatic Loss of Plant-Derived Sugar Pathways'
    quote: Of the 62 GapMind carbon pathways tested, **43 differ significantly** between the two subgenera (Mann-Whitney U, BH-FDR < 0.05).
    figure: figures/pathway_heatmap.png
    notebook: 03_pathway_lifestyle_analysis.ipynb
- id: stmt:plant-sugar-pathways-lost
  kind: finding
  text: The pathways most strongly lost in the P. aeruginosa group are plant-derived sugars and sugar alcohols such as xylose, arabinose, and myo-inositol (0% complete versus 59-74% in the P. fluorescens group).
  confidence: high
  topics:
  - topic:metabolic-pathways
  entities:
  - entity:xylose
  - entity:arabinose
  - entity:myo-inositol
  - entity:p-aeruginosa
  links:
    supports:
    - stmt:sugar-pathway-loss-host-associated
    contradicts: []
    refines: []
  evidence:
  - source_project: pseudomonas_carbon_ecology
    source_doc: REPORT.md
    source_section: Hypothesis Assessment
    quote: The *P. aeruginosa* group shows near-complete loss of xylose, arabinose, and myo-inositol catabolism (0% vs. 59-74% in *P. fluorescens* group), along with dramatic reductions in ribose, galacturonate, mannitol, and sorbitol pathways.
- id: stmt:amino-acid-pathways-retained
  kind: finding
  text: Amino acid and core organic acid catabolism (arginine, histidine, serine, glutamate, citrate, succinate, pyruvate) remain near-universal (>99%) in both subgenera, consistent with P. aeruginosa retaining amino acid catabolism for growth in host environments such as CF sputum.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:microbiome-engineering
  entities:
  - entity:amino-acid-catabolism
  - entity:p-aeruginosa
  - entity:cf-sputum
  links:
    supports:
    - stmt:sugar-pathway-loss-host-associated
    contradicts: []
    refines: []
  evidence:
  - source_project: pseudomonas_carbon_ecology
    source_doc: REPORT.md
    source_section: 'Finding 1: Host-Associated Pseudomonas Show Dramatic Loss of Plant-Derived Sugar Pathways'
    quote: In contrast, amino acid catabolism (arginine, histidine, serine, glutamate, etc.) and core organic acid pathways (citrate, succinate, pyruvate) remain near-universal (>99%) in both groups.
- id: stmt:carbon-profiles-environment-signal
  kind: finding
  text: Among 54 free-living and plant-associated species, carbon pathway profiles are significantly associated with isolation environment, with a permutation test yielding p = 0.006.
  confidence: medium
  topics:
  - topic:microbial-ecotypes
  - topic:environment-biogeography
  entities:
  - entity:carbon-pathways
  - entity:permanova
  - entity:isolation-source
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: pseudomonas_carbon_ecology
    source_doc: REPORT.md
    source_section: 'Finding 2: Carbon Pathway Profiles Distinguish Environment Types Among Free-Living Species'
    quote: A PERMANOVA-like permutation test (999 permutations) yielded **p = 0.006**, with between-group mean distance (2.054) exceeding within-group mean distance (1.890).
    figure: figures/pathway_pca_by_environment.png
    notebook: 04_ecology_prediction.ipynb
- id: stmt:random-forest-modest-accuracy
  kind: finding
  text: A Random Forest classifier predicting four environment classes from carbon pathway profiles achieved balanced accuracy of 0.408 +/- 0.169, above the 0.250 chance level but only modestly predictive.
  confidence: medium
  topics:
  - topic:microbial-ecotypes
  - topic:environment-biogeography
  entities:
  - entity:random-forest
  - entity:carbon-pathways
  - entity:environment-prediction
  links:
    supports:
