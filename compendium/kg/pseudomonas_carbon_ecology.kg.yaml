  evidence:
  - source_project: pseudomonas_carbon_ecology
    source_doc: REPORT.md
    source_section: Limitations
    quote: '**Phylogenetic confounding**: The dominant signal in PCA separates subgenera rather than lifestyles. Within *Pseudomonas_E*, lifestyle-associated differences are subtle, and the analyses do not explicitly control for phylogenetic non-independence among species.'
