    contradicts: []
    refines: []
  evidence:
  - source_project: pseudomonas_carbon_ecology
    source_doc: REPORT.md
    source_section: 'Finding 4: The Aeruginosa-Fluorescens Split Dominates Carbon Pathway Variation'
    quote: PCA of all species' pathway profiles reveals that the primary axis of variation separates *Pseudomonas* s.s. from *Pseudomonas_E*, driven by the dramatic sugar pathway loss described in Finding 1.
    figure: figures/pathway_pca_by_lifestyle.png
    notebook: 04_ecology_prediction.ipynb
