    source_doc: REPORT.md
    source_section: Limitations
    quote: The 62 GapMind carbon pathways cover common carbon sources but miss genus-specific catabolic capabilities, particularly aromatic degradation pathways (toluene, naphthalene, benzoate) that are central to *P. putida* ecology.
- id: stmt:caveat-phylogenetic-confounding
  kind: caveat
  text: The dominant signal in the analysis separates subgenera rather than lifestyles, and within Pseudomonas_E lifestyle-associated differences are subtle, with the analyses not explicitly controlling for phylogenetic non-independence among species.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  - topic:environment-biogeography
  entities:
