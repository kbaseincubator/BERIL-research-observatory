    source_section: Limitations
    quote: '**Sampling bias**: *P. aeruginosa* comprises 53% of all genomes (6,760/12,732) due to clinical importance, while many environmental species have <10 sequenced genomes.'
- id: stmt:caveat-gapmind-resolution
  kind: caveat
  text: The 62 GapMind carbon pathways miss genus-specific catabolic capabilities, particularly aromatic degradation pathways (toluene, naphthalene, benzoate) central to P. putida ecology.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:functional-dark-matter
