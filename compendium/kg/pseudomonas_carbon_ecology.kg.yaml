    figure: figures/pathway_richness_by_lifestyle.png
    notebook: 04_ecology_prediction.ipynb
- id: stmt:aeruginosa-fluorescens-split-dominates
  kind: finding
  text: The primary axis of carbon pathway variation across Pseudomonas separates P. aeruginosa (Pseudomonas s.s.) from Pseudomonas_E, driven by the dramatic sugar pathway loss, while within-subgenus lifestyle categories overlap substantially.
  confidence: high
  topics:
  - topic:microbial-ecotypes
