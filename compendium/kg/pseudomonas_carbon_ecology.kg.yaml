    contradicts: []
    refines: []
  evidence:
  - source_project: pseudomonas_carbon_ecology
    source_doc: REPORT.md
    source_section: 'Finding 2: Carbon Pathway Profiles Distinguish Environment Types Among Free-Living Species'
    quote: A Random Forest classifier trained on 4 environment classes (soil, freshwater, plant_surface, rhizosphere; 51 species total) achieved **balanced accuracy of 0.408 +/- 0.169**, substantially above the 0.250 chance level.
    figure: figures/rf_importance.png
    notebook: 04_ecology_prediction.ipynb
- id: stmt:free-living-greater-richness
  kind: finding
  text: Free-living and plant-associated species maintain higher carbon pathway richness (median 57 pathways) than host-associated species (median 55), a trend that persists within the Pseudomonas_E subgenus alone.
  confidence: medium
