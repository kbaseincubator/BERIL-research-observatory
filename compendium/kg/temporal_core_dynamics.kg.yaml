    quote: 'Compare multiple definitions to test robustness:

      - 90% presence (relaxed)

      - 95% presence (standard)

      - 99% presence (strict)'
- id: stmt:early-leavers-functional
  kind: claim
  text: The analysis aims to functionally characterize early-leaving core genes, expecting mobile elements among early-exit genes and housekeeping functions in the stable core.
  confidence: medium
