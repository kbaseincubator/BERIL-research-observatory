    quote: How does core genome composition change over sampling time, and do genes transition in and out of core status?
- id: stmt:core-not-static-hypothesis
  kind: claim
  text: The central hypothesis is that the core genome is not static and that genes transition in and out of core status over ecological and evolutionary time.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:microbial-ecotypes
  entities:
  - entity:core-genome
  - entity:gene-cluster
