    source_doc: RESEARCH_PLAN.md
    source_section: Species
    quote: Both species are semi-environmental (found in soil, water, biofilms) with clinical crossover, making them ideal models for temporal dynamics.
- id: stmt:collection-date-coverage
  kind: finding
  text: Roughly three-quarters of genomes carry collection dates (P. aeruginosa 73.4% of 6,760; A. baumannii 75.5% of 6,647), providing the dated genome sets for temporal analysis.
  confidence: high
