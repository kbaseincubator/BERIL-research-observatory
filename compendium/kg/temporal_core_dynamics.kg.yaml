    source_doc: RESEARCH_PLAN.md
    source_section: Hypothesis
    quote: The core genome is not static - genes transition in and out of core status over ecological/evolutionary time.
- id: stmt:heavily-sampled-smaller-cores
  kind: claim
  text: Species sampled over longer time periods are hypothesized to show smaller cores, potentially explaining why heavily-sampled species exhibit reduced core genomes.
  confidence: medium
  topics:
  - topic:pangenome-architecture
  - topic:microbial-ecotypes
  entities:
  - entity:core-genome
  - entity:pseudomonas-aeruginosa
  - entity:acinetobacter-baumannii
