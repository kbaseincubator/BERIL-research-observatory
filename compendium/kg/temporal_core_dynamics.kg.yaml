    contradicts: []
    refines: []
  evidence:
  - source_project: temporal_core_dynamics
    source_doc: RESEARCH_PLAN.md
    source_section: Research Question
    quote: Do genes "come and go" from core status, explaining why heavily-sampled species show smaller cores?
- id: stmt:semi-environmental-species-models
  kind: finding
  text: P. aeruginosa and A. baumannii were chosen as model species because both are semi-environmental with clinical crossover, making them ideal for temporal dynamics analysis.
  confidence: high
  topics:
  - topic:microbial-ecotypes
  - topic:environment-biogeography
  entities:
