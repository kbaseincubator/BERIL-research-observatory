- id: stmt:sliding-window-approach
  kind: finding
  text: 'Two complementary approaches are used: cumulative expansion sorting genomes chronologically and fixed 2-year time windows with a minimum of 30 genomes per window.'
  confidence: high
  topics:
  - topic:pangenome-architecture
  entities:
