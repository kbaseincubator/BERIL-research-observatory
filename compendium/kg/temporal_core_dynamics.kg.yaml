    source_doc: RESEARCH_PLAN.md
    source_section: 2. Sliding Window Analysis
    quote: '**Fixed Time Windows**: Group genomes into 2-year periods, calculate core within each window (minimum 30 genomes per window).'
  notebook: 02_sliding_window.ipynb
- id: stmt:multiple-core-thresholds
  kind: finding
  text: Core membership is tested at multiple presence thresholds (90% relaxed, 95% standard, 99% strict) to assess the robustness of temporal core erosion to definition choice.
  confidence: high
  topics:
  - topic:pangenome-architecture
  entities:
