project:
  id: temporal_core_dynamics
  title: Temporal Core Genome Dynamics
statements:
- id: stmt:core-genome-static-or-dynamic
  kind: finding
  text: The project asks how core genome composition changes over sampling time and whether genes transition in and out of core status.
  confidence: high
  topics:
