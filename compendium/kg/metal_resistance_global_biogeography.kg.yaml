    source_section: NB02 Spatial Analysis Results
    quote: "This is much lower than the 21.8% T4SS prevalence,\n  confirming that metal resistance genes (AMRFinderPlus) and HGT machinery (T4SS) are\n  distinct features not uniformly co-distributed."
- id: stmt:genome-resolved-vs-otu
  kind: claim
  text: Using genome-resolved MAGs with explicit AMRFinderPlus metal-resistance annotations and precise coordinates provides strain-level spatial resolution and direct gene presence/absence, complementing OTU-level 16S surveys rather than duplicating them.
  confidence: medium
  topics:
