    source_section: NB02 Spatial Analysis Results
    quote: '**ENA coordinate gap:** 0 of 532 MAG grid cells lack ENA coordinate coverage — the

      ENA coordinate file already covers all areas represented in the MAG coordinate dataset.

      The 30.8% gap (16,964/24,511 valid pairs) is a per-sample gap, not a geographic gap'
- id: stmt:metal-vs-t4ss-distinct
  kind: claim
  text: The 2.8% global metal-resistance prevalence is far below the 21.8% T4SS prevalence, confirming that metal resistance genes and HGT machinery are distinct features that are not uniformly co-distributed.
  confidence: medium
  topics:
  - topic:metal-resistance
