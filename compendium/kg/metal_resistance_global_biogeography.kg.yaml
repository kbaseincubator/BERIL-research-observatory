  title: 'Report: Global Biogeography of Environmental Bacterial Metal Resistance'
statements:
- id: stmt:mag-coordinate-coverage
  kind: finding
  text: Of 260,652 environmental MAGs extracted from MGnify, 22,356 carry usable geospatial coordinates, giving 73.3% coordinate coverage of the environmental MAG set.
  confidence: high
  topics:
