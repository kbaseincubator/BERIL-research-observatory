    source_section: Key Findings
    quote: "**ENA batch API retrieval**: 24,511 sample records; 16,964 (69.2%) have valid lat/lon\n  pairs — a **30.8% spatial data gap** in public metagenomic archives."
- id: stmt:coordinate-gap-data-quality
  kind: claim
  text: Roughly one third of publicly archived metagenomic samples lack usable geospatial coordinates, a systematic data-quality gap that subjects any global map of microbial metal resistance to substantial geographic blind spots.
  confidence: high
  topics:
  - topic:environment-biogeography
  entities:
  - entity:ena
  - entity:metagenome-archives
  - entity:geospatial-coordinates
  links:
    supports:
    - stmt:ena-spatial-data-gap
    contradicts: []
    refines: []
  evidence:
  - source_project: metal_resistance_global_biogeography
    source_doc: REPORT.md
    source_section: Interpretation
    quote: 'The 30.8% ENA coordinate gap is a data quality finding independent of the biological

      question: it implies that any global map of metal resistance distribution based on

      public archives is subject to substantial geographic blind spots.'
- id: stmt:low-global-prevalence
  kind: finding
  text: Only 2.8% of the 22,356 coordinate-bearing MAGs carry at least one metal resistance type, indicating that metal resistance is rare in the global environmental MAG pool.
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:environment-biogeography
  entities:
  - entity:mags
  - entity:metal-resistance-genes
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: metal_resistance_global_biogeography
    source_doc: REPORT.md
    source_section: NB02 Spatial Analysis Results
    quote: '**Global metal resistance prevalence:** 2.8% of 22,356 MAGs with coordinates carry

      ≥1 metal resistance type — substantially lower than implied by reporting on the 30,497

      filtered MAG set. Metal resistance is rare in the global environmental MAG pool.'
    figure: figures/fig_nb02_global_hotspot_map.png
- id: stmt:eleven-hotspots-atacama
  kind: finding
  text: A 5° grid Fisher's-exact analysis over 289 cells identified 11 significant metal-resistance hotspots and 3 coldspots, with the Atacama/Andean region of Chile the strongest (21.8% prevalence, OR=9.83, q=7.6e-12).
  confidence: high
  topics:
