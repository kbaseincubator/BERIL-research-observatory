      resistance annotations and precise lat/lon coordinates, enabling:

      - Strain-level (not OTU-level) spatial resolution'
- id: stmt:hotspots-provisional
  kind: caveat
  text: Hotspot results should be treated as provisional until sampling-effort normalisation is complete, since many apparent hotspots reflect sequencing effort in Europe, the USA, and East Asia.
  confidence: high
