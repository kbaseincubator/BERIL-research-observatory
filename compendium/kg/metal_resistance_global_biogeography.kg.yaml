    quote: "**22,356 MAGs with usable geospatial coordinates** (73.3% coordinate coverage of\n  environmental MAG set)."
- id: stmt:ena-spatial-data-gap
  kind: finding
  text: ENA batch API retrieval returned 24,511 sample records of which only 16,964 (69.2%) have valid lat/lon pairs, exposing a 30.8% per-sample spatial data gap in public metagenomic archives.
  confidence: high
  topics:
  - topic:environment-biogeography
  entities:
