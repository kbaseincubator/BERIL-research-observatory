    source_doc: REPORT.md
    source_section: NB02 Spatial Analysis Results
    quote: "**11 significant hotspots** (OR>2, q<0.05), **3 coldspots** (OR<0.5, q<0.05).\n- Top hotspot: Atacama/Andean region, Chile (lat=-25°, lon=-70°): 21.8% prevalence,\n  OR=9.83, q=7.6e-12, n=101 MAGs."
    figure: figures/fig_nb02_global_hotspot_map.png
- id: stmt:soil-enriched-marine-depleted
  kind: finding
  text: Biome-stratified analysis shows soil is significantly enriched for metal resistance (5.8% prevalence, OR=5.05) while marine MAGs are significantly depleted (1.2%, OR=0.20).
  confidence: high
