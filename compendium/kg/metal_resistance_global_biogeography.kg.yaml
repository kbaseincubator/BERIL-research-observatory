- id: stmt:gapmind-narrow-scope
  kind: caveat
  text: The low 2.8% metal-resistance prevalence may reflect a narrow GapMind pathway definition rather than true biological rarity, as the pathway set may not cover all known mechanisms such as efflux pumps, metallothioneins, and metal-sequestering operons.
  confidence: medium
  topics:
