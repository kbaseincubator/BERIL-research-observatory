- id: stmt:gap-is-per-sample-not-geographic
  kind: finding
  text: The 30.8% coordinate gap is a per-sample gap rather than a geographic one, since 0 of 532 MAG grid cells lack ENA coordinate coverage.
  confidence: high
  topics:
