    source_doc: REPORT.md
    source_section: 'Results: Track A (BERDL groundwater)'
    quote: 'The Spearman correlation (ρ = +0.112, p = 0.0019) and Mann-Whitney

      (p = 0.007) confirm that genera with broader metal-type resistance repertoires are significantly

      more prevalent in groundwater than genera with narrow resistance repertoires, at both the

      correlation and quartile-comparison level.'
- id: stmt:enigma-plume-wells-higher-cwm
  kind: finding
  text: In the ENIGMA ORFRC field dataset (PRJNA1084851), contamination-plume wells FW215/FW216 host communities with higher community-weighted mean metal-type diversity, which increases with time after carbon amendment (Spearman ρ = +0.383, p < 0.0001).
  confidence: medium
  topics:
