  - source_project: microbeatlas_metal_ecology
    source_doc: REPORT.md
    source_section: 'Finding 1: Bacterial niche breadth is moderately phylogenetically conserved; metal type diversity predicts it beyond phylogeny'
    quote: 'After

      controlling for this phylogenetic structure via PGLS (n = 606 genera with AMR data), the number

      of distinct metal types resisted per genus is the only metal AMR predictor that survives

      Bonferroni correction (β = +0.021, SE = 0.0056, p = 1.5×10⁻⁴; threshold p < 0.0083 for 6

      models).'
    notebook: notebooks/05_pgls_regression.ipynb
    figure: figures/fig3_synthesis.png
- id: stmt:niche-breadth-phylogenetically-conserved
  kind: finding
  text: Bacterial ecological niche breadth (Levins' B_std) is strongly phylogenetically conserved (Pagel's λ = 0.787), and habitat range is even more conserved (λ = 0.909).
  confidence: high
