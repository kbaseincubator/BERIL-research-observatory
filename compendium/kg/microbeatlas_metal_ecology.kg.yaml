    source_doc: REPORT.md
    source_section: Causation and directionality
    quote: 'It is equally consistent with metal diversity *facilitating* ecological generalism

      (genera tolerant of more metals can exploit more environments) and with ecological generalism

      *enabling* metal gene acquisition (broad-niche genera encounter more HGT donors and more

      metal-contaminated environments).'
- id: stmt:caveat-archaeal-underpowered
