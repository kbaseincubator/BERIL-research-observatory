    source_doc: REPORT.md
    source_section: 'Finding 1: Bacterial niche breadth is moderately phylogenetically conserved; metal type diversity predicts it beyond phylogeny'
    quote: 'Across 1,264 bacterial genera with ≥ 3 OTUs in MicrobeAtlas, Levins'' B_std shows strong

      phylogenetic signal (Pagel''s λ = 0.787, p = 7.9×10⁻¹⁰², LRT). Habitat range (number of

      environment categories detected) is even more conserved (λ = 0.909, p = 1.4×10⁻¹⁵⁷).'
    notebook: notebooks/04_pagel_lambda.ipynb
- id: stmt:metal-amr-intermediate-phylogenetic-signal
  kind: finding
  text: Metal AMR traits show intermediate, significantly non-zero phylogenetic signal (Pagel's λ = 0.26–0.44), with core resistance fraction more conserved than metal type diversity than cluster count, consistent with vertically inherited core resistance plus HGT-driven accessory expansion.
  confidence: high
