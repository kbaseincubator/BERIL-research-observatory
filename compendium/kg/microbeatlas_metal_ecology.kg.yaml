- id: stmt:metabolic-versatility-hypothesis
  kind: claim
  text: The positive association is consistent with a metabolic versatility hypothesis, in which broad metal tolerance is a proxy for overall environmental tolerance because multi-metal-stress environments are also chemically complex in other dimensions.
  confidence: medium
  topics:
  - topic:metal-resistance
  - topic:environment-biogeography
  entities:
