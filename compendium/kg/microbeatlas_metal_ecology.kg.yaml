    source_doc: REPORT.md
    source_section: 'Track B: PRJNA1084851 (ENIGMA ORFRC 16S — full pipeline)'
    quote: 'Contaminated plume wells (FW215, FW216) host communities with measurably higher

      metal-type diversity than background wells, and the temporal increase in CWM after carbon

      amendment points to active ecological selection for metal-diverse communities under

      geochemical stress.'
    figure: figures/fig_enigma_trackB.png
- id: stmt:caveat-niche-breadth-sequencing-proxy
  kind: caveat
  text: Niche breadth here is a sequencing-effort proxy inferred from OTU detection, not confirmed ecological range, and genus-level aggregation can make a genus appear broad-niched because different species occupy different habitats rather than any single organism being a true generalist.
  confidence: high
  topics:
