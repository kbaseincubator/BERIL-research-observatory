    source_doc: REPORT.md
    source_section: 'Finding 2: Metal AMR traits show intermediate phylogenetic signal — consistent with mixed vertical inheritance and HGT'
    quote: 'The ordering — core fraction λ > type diversity λ > cluster

      count λ — is consistent with a model in which constitutive (core) metal resistance is mainly

      vertically inherited, while accessory gene accumulation and metal type expansion are shaped by

      horizontal transfer and local metal exposure.'
    notebook: notebooks/04_pagel_lambda.ipynb
    figure: figures/fig1_lambda_heatmap.png
- id: stmt:breadth-not-depth-distinguishes-generalists
  kind: finding
  text: 'It is the breadth of the metal resistance repertoire, not its depth, that is associated with ecological versatility: total AMR gene cluster count and core AMR fraction do not predict niche breadth in PGLS models.'
  confidence: high
  topics:
  - topic:metal-resistance
  - topic:pangenome-architecture
