    source_doc: REPORT.md
    source_section: 1. Niche breadth is a sequencing-effort proxy, not confirmed ecological range
    quote: 'genus-level aggregation of OTU niche scores is a proxy: a genus may

      appear broad-niched because different species within it occupy different habitats, rather than

      any single organism being a true ecological generalist.'
- id: stmt:caveat-direction-not-established
  kind: caveat
  text: The cross-sectional observational design means the direction of the association cannot be established; it is equally consistent with metal diversity facilitating ecological generalism and with ecological generalism enabling metal gene acquisition.
  confidence: high
  topics:
  - topic:metal-resistance
