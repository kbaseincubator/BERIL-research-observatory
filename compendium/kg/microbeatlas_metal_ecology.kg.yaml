    contradicts: []
    refines: []
  evidence:
  - source_project: microbeatlas_metal_ecology
    source_doc: REPORT.md
    source_section: Biological meaning of the metal type effect
    quote: 'This co-occurrence is plausible because the environments that impose

      multi-metal stress — polymetallic mine tailings, estuarine sediments, biosolid-amended

      agricultural soils — are also chemically complex in other dimensions (redox gradients, salinity,

      organic carbon variation), so broad metal tolerance may be a proxy for overall environmental

      tolerance.'
- id: stmt:enigma-groundwater-validation
  kind: finding
  text: Independent validation in 1,624 BERDL groundwater samples confirms that genera with broader metal-type resistance repertoires are significantly more prevalent in groundwater (Spearman ρ = +0.112, p = 0.0019; Mann-Whitney p = 0.007).
  confidence: medium
  topics:
