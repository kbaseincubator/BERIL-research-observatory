    contradicts: []
    refines: []
  evidence:
  - source_project: microbeatlas_metal_ecology
    source_doc: REPORT.md
    source_section: Phylogenetic signal structure
    quote: 'Nitrification (λ = 0.94–1.00 in both domains) serves as a metabolic positive control:

      functional genes for ammonia and nitrite oxidation are deep, vertically inherited innovations

      that define major lineages (Nitrospirota, Thaumarchaeota), and their near-maximal λ contrasts

      sharply with the intermediate metal AMR signal.'
