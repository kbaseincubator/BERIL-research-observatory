- id: stmt:metal-type-diversity-predicts-niche-breadth
  kind: finding
  text: Across 606 bacterial genera, the number of distinct metal types resisted per genus is the only metal AMR predictor of ecological niche breadth that survives phylogenetic correction and Bonferroni correction (PGLS β = +0.021, p = 1.5×10⁻⁴).
  confidence: high
