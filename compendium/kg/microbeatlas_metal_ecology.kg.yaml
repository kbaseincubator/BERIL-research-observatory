- id: stmt:nitrification-positive-control
  kind: claim
  text: Nitrification serves as a metabolic positive control with near-maximal phylogenetic signal (λ = 0.94 bacteria, 1.00 archaea), contrasting sharply with the intermediate signal of metal AMR and strengthening confidence in the analytical pipeline.
  confidence: high
  topics:
  - topic:metabolic-pathways
  - topic:gene-fitness
  entities:
