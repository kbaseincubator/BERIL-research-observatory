  title: 'Report: COG Functional Category Analysis'
statements:
- id: stmt:two-speed-genome
  kind: finding
  text: Bacterial pangenomes show a universal 'two-speed genome' partitioning of COG functional categories across 32 species and 9 phyla, with distinct functional profiles for core versus novel genes.
  confidence: high
  topics:
  - topic:pangenome-architecture
  entities:
  - entity:pangenome
  - entity:cog-categories
  - entity:core-genome
  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
