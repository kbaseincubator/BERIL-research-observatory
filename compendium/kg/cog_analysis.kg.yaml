    source_doc: REPORT.md
    source_section: Universal Functional Partitioning in Bacterial Pangenomes
    quote: 'Analysis of 32 species across 9 phyla (357,623 genes) reveals a remarkably consistent "two-speed genome":'
    notebook: cog_analysis.ipynb
- id: stmt:novel-genes-mobile-enriched
  kind: finding
  text: Novel/singleton genes are most strongly enriched in mobile element functions (COG L), with +10.88% enrichment at 100% consistency across species, the strongest signal in the analysis.
  confidence: high
