- id: stmt:composite-cog-meaningful
  kind: finding
  text: Multi-function genes with composite COG assignments (e.g., 'LV' = mobile+defense) are biologically meaningful functional modules rather than annotation artifacts and should not be filtered as noise.
  confidence: medium
