- id: stmt:core-genes-metabolism-enriched
  kind: finding
  text: Core genes are consistently enriched in metabolic and biosynthetic functions, including nucleotide metabolism (COG F, -2.09%, 100% consistency) and coenzyme metabolism (COG H, -2.06%, 97% consistency) relative to novel genes.
  confidence: high
