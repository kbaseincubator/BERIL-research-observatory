- id: stmt:missing-genes-less-conserved
  kind: finding
  text: Of 2,593 TnSeq-dispensable ADP1 genes, the 272 (10.5%) lacking deletion-collection growth data are systematically shorter, less annotated, and less conserved (76.5% pangenome core vs 93.3%, p=1.4x10^-20) than genes with coverage.
  confidence: high
