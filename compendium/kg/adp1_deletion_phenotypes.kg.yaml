    figure: figures/pca_variance.png
- id: stmt:conditions-largely-independent
  kind: claim
  text: Each carbon source imposes a largely independent set of gene requirements in ADP1, reflecting the diverse metabolic entry points of the conditions tested.
  confidence: medium
