- id: stmt:dispensability-pangenome-link
  kind: claim
  text: Cross-referencing with BERDL pangenome data links gene dispensability to pangenome status, suggesting the least-conserved Acinetobacter genes are tied to dispensability through evolutionary retention pressure.
  confidence: medium
