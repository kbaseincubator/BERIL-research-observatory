- id: stmt:specific-genes-map-to-pathways
  kind: claim
  text: The top condition-specific genes for each carbon source correspond precisely to the expected metabolic pathways (e.g., urease subunits for urea, protocatechuate/quinate degradation for quinate), recovering ADP1's metabolic architecture from phenotype alone.
  confidence: high
