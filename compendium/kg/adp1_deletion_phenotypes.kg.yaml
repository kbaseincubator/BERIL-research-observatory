project:
  id: adp1_deletion_phenotypes
  title: 'Report: ADP1 Deletion Collection Phenotype Analysis'
statements:
- id: stmt:adp1-three-tier-landscape
  kind: finding
  text: Across the 8 carbon sources tested on the ADP1 deletion collection, conditions partition into demanding, moderate, and robust tiers, with urea most demanding (97.9% of genes defective) and quinate most robust (only 1.6% defective).
  confidence: high
  topics:
