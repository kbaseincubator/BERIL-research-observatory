    notebook: 03_gene_modules.ipynb
    figure: figures/silhouette_analysis.png
- id: stmt:quinate-aromatic-module
  kind: finding
  text: The sole discrete phenotypic module in the ADP1 dataset is a set of 24 aromatic-degradation-pathway genes with extreme quinate-specific growth defects (mean z-score -7.28 on quinate).
  confidence: high
