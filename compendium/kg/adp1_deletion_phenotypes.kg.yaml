    quote: Of 2,593 TnSeq-dispensable genes, 272 (10.5%) lack growth data from the deletion collection.
    notebook: 05_tnseq_gap.ipynb
    figure: figures/tnseq_gap_coverage.png
- id: stmt:missing-genes-hypotheticals
  kind: finding
  text: Hypothetical and unannotated proteins are massively enriched among the dispensable genes missing from the deletion collection, with 25 completely unannotated (q=2.4x10^-25) and 48 annotated as hypothetical protein (q=3.0x10^-4).
  confidence: high
