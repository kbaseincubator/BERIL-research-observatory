- id: stmt:phenotype-landscape-continuum
  kind: finding
  text: Hierarchical clustering of ADP1 genes by their 8-condition growth profiles yields only a weak K=3 structure (silhouette 0.24) with no FDR-surviving functional enrichment, indicating gene essentiality varies continuously rather than falling into discrete functional modules.
  confidence: high
