  links:
    supports: []
    contradicts: []
    refines: []
  evidence:
  - source_project: adp1_deletion_phenotypes
    source_doc: REPORT.md
    source_section: 1. Carbon sources define a three-tier essentiality landscape
    quote: Urea is the most demanding (97.9% of genes show severe defects at ratio < 0.5), while quinate is the most robust (only 1.6% defective).
    notebook: 01_data_extraction.ipynb
    figure: figures/condition_boxplots.png
- id: stmt:conditions-five-independent-dimensions
  kind: finding
  text: PCA of the 2,034x8 ADP1 growth matrix shows that 5 principal components capture 82% of the variance, so the 8 carbon sources provide roughly 5 independent dimensions of phenotypic information.
  confidence: high
  topics:
