concepts:

  - id: conc_core_genome
    name: Core genome
    definition: >-
      Genes present in >90% of genomes within a species pangenome.
      The most functionally active part of the genome.
    projects:
      - cog_analysis
      - conservation_vs_fitness
      - essential_genome
      - fitness_modules
      - module_conservation
      - field_vs_lab_fitness
      - metal_fitness_atlas
      - cofitness_coinheritance
      - core_gene_tradeoffs
      - costly_dispensable_genes
      - conservation_fitness_synthesis
      - fitness_effects_conservation
      - phb_granule_ecology
    related:
      - conc_accessory_genome
      - conc_essential_genes
      - conc_two_speed_genome

  - id: conc_accessory_genome
    name: Accessory genome
    definition: >-
      Genes present in 10-90% of genomes within a species pangenome.
      Enriched in defense (COG V) and mobilome (COG X/L).
    projects:
      - cog_analysis
      - cofitness_coinheritance
      - costly_dispensable_genes
      - phb_granule_ecology
    related:
      - conc_core_genome
      - conc_hgt

  - id: conc_essential_genes
    name: Essential genes
    definition: >-
      Genes required for organism viability under standard conditions.
      18.6% of genes across 48 organisms. Range: 12.2-29.7%.
      Only 5% of ortholog families are universally essential.
    projects:
      - essential_genome
      - conservation_vs_fitness
      - fitness_effects_conservation
      - adp1_deletion_phenotypes
      - adp1_triple_essentiality
      - acinetobacter_adp1_explorer
    related:
      - conc_core_genome
      - conc_variable_essentiality
      - conc_orphan_essential

  - id: conc_fitness_module
    name: Fitness modules
    definition: >-
      Co-regulated gene groups detected by ICA of fitness data.
      1,116 stable modules across 32 organisms. 94.2% show elevated
      within-module cofitness. Capture process-level co-regulation.
    projects:
      - fitness_modules
      - module_conservation
      - field_vs_lab_fitness
      - metal_fitness_atlas
      - cofitness_coinheritance
      - conservation_fitness_synthesis
      - essential_genome
    related:
      - conc_core_genome
      - conc_cofitness_coinheritance

  - id: conc_two_speed_genome
    name: Two-speed genome
    definition: >-
      Universal functional partitioning between core and novel genes.
      Core = metabolic engine (translation, energy, biosynthesis).
      Novel = ecological adaptation (mobile elements, defense).
    projects:
      - cog_analysis
    related:
      - conc_core_genome
      - conc_accessory_genome
      - conc_hgt

  - id: conc_variable_essentiality
    name: Variable/context-dependent essentiality
    definition: >-
      Genes essential in some organisms/conditions but not others.
      Largest category: 4,799 families (28%) with median penetrance 33%.
    projects:
      - essential_genome
      - conservation_vs_fitness
      - adp1_triple_essentiality
      - field_vs_lab_fitness
    related:
      - conc_essential_genes
      - conc_condition_specific_essentiality

  - id: conc_hgt
    name: Horizontal gene transfer
    definition: >-
      Primary mechanism of genome novelty. COG L (mobile elements)
      +10.88% enrichment in novel genes. Costly+dispensable genes
      7.45x enriched for mobile element keywords.
    projects:
      - cog_analysis
      - costly_dispensable_genes
      - phb_granule_ecology
      - cofitness_coinheritance
    related:
      - conc_accessory_genome
      - conc_two_speed_genome

  - id: conc_burden_paradox
    name: Core gene burden paradox
    definition: >-
      Core genes are MORE likely to show positive fitness when deleted
      (24.4% vs 19.9% for accessory). Resolved: lab conditions are
      impoverished — core genes encode functions costly in lab but
      essential in nature.
    projects:
      - core_gene_tradeoffs
      - conservation_fitness_synthesis
      - costly_dispensable_genes
      - fitness_effects_conservation
    related:
      - conc_core_genome
      - conc_selection_signature

  - id: conc_core_robustness
    name: Core genome robustness model
    definition: >-
      Metal tolerance reflects core genome vulnerabilities, not
      accessory resistance. Metal-important genes are 87.4% core
      (OR=2.08). Two-tier model: core = general stress response,
      accessory = specific metal resistance.
    projects:
      - metal_fitness_atlas
      - field_vs_lab_fitness
    related:
      - conc_core_genome
      - conc_essential_genes

  - id: conc_feast_famine
    name: Feast/famine hypothesis
    definition: >-
      PHB is advantageous under temporal carbon fluctuation.
      First quantitative genomic test across 27,690 species.
      PHB prevalence: plant (44%) > soil (43.6%) > marine (18.7%)
      > clinical (7.4%) > animal (3.3%).
    projects:
      - phb_granule_ecology
    related:
      - conc_pangenome_ecology

  - id: conc_pangenome_ecology
    name: Pangenome ecology
    definition: >-
      How environment shapes pangenome structure and gene content.
      Phylogeny dominates for most species (60.5% of 172 species).
    projects:
      - ecotype_analysis
      - pangenome_openness
      - phb_granule_ecology
      - field_vs_lab_fitness
    related:
      - conc_core_genome
      - conc_hgt

  - id: conc_pangenome_openness
    name: Pangenome openness
    definition: >-
      Degree to which a species continues to acquire novel genes.
      Not correlated with environment (rho=-0.05) or phylogeny
      (rho=+0.03) effect sizes on gene content.
    projects:
      - pangenome_openness
      - cog_analysis
      - ecotype_analysis
      - phb_granule_ecology
    related:
      - conc_core_genome
      - conc_hgt

  - id: conc_functional_dark_matter
    name: Functional dark matter
    definition: >-
      Essential or conserved genes of unknown function. 58.7% of
      orphan essential genes are hypothetical. 149 novel metal
      biology candidates.
    projects:
      - essential_genome
      - metal_fitness_atlas
      - aromatic_catabolism_network
      - functional_dark_matter
    related:
      - conc_essential_genes
      - conc_orphan_essential

  - id: conc_orphan_essential
    name: Orphan essential genes
    definition: >-
      Essential genes with no detectable orthologs in other FB organisms.
      7,084 genes; 58.7% hypothetical. Only 49.5% core within their
      own species.
    projects:
      - essential_genome
    related:
      - conc_essential_genes
      - conc_functional_dark_matter

  - id: conc_cofitness_coinheritance
    name: Co-fitness predicts co-inheritance
    definition: >-
      Genes with correlated fitness profiles tend to co-occur in
      pangenomes. Pairwise: 7/9 organisms positive (delta=+0.003).
      ICA modules: stronger signal (delta=+0.053, 26% significant).
      Accessory modules strongest (73% significant).
    projects:
      - cofitness_coinheritance
    related:
      - conc_fitness_module
      - conc_core_genome

  - id: conc_condition_specific_essentiality
    name: Condition-specific essentiality
    definition: >-
      70% of ADP1 genes show condition-specific growth defects.
      4,450 genes (2.7%) are neutral overall but critical in one
      condition. 3x more common in core than auxiliary.
    projects:
      - fitness_effects_conservation
      - field_vs_lab_fitness
      - adp1_deletion_phenotypes
      - adp1_triple_essentiality
    related:
      - conc_essential_genes
      - conc_variable_essentiality

  - id: conc_respiratory_wiring
    name: Condition-specific respiratory wiring
    definition: >-
      Each carbon source uses a qualitatively distinct respiratory
      chain configuration, not just quantitative flux adjustments.
      Driven by NADH flux rate, not yield. Wiring is metabolic,
      not transcriptional.
    projects:
      - respiratory_chain_wiring
      - aromatic_catabolism_network
    related:
      - conc_condition_specific_essentiality

  - id: conc_selection_signature
    name: Selection signature matrix
    definition: >-
      2x2 classification: costly/neutral x conserved/dispensable.
      Costly+Conserved (28,017 genes) = purifying selection.
      Costly+Dispensable (5,526 genes) = mobile element debris.
    projects:
      - core_gene_tradeoffs
      - costly_dispensable_genes
      - conservation_fitness_synthesis
    related:
      - conc_burden_paradox
      - conc_core_genome

  - id: conc_nadh_flux_rate
    name: NADH flux rate hypothesis
    definition: >-
      NADH production rate, not total yield, determines respiratory
      chain requirements. Aromatic ring cleavage produces concentrated
      NADH burst exceeding NDH-2 capacity.
    projects:
      - respiratory_chain_wiring
      - aromatic_catabolism_network
    related:
      - conc_respiratory_wiring

  - id: conc_module_transfer
    name: Module transfer for function prediction
    definition: >-
      Predicts function of hypothetical essential genes via non-essential
      orthologs in ICA modules. Benchmark precision 95.8%. 1,382
      predictions for hypothetical essential genes.
    projects:
      - essential_genome
      - fitness_modules
    related:
      - conc_fitness_module
      - conc_functional_dark_matter

  - id: conc_minimal_genome
    name: Minimal genome
    definition: >-
      15 gene families essential in all 48 bacteria = irreducible
      functional core. 859 universally essential families = broader
      pan-bacterial essential genome.
    projects:
      - essential_genome
      - conservation_vs_fitness
    related:
      - conc_essential_genes
