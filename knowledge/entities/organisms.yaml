organisms:

  - id: org_adp1
    name: Acinetobacter baylyi ADP1
    ncbi_taxid: 62977
    strain: ADP1
    projects:
      - acinetobacter_adp1_explorer
      - adp1_deletion_phenotypes
      - adp1_triple_essentiality
      - aromatic_catabolism_network
      - respiratory_chain_wiring
    role: >-
      Primary single-organism deep-dive subject. Naturally competent
      Gammaproteobacterium with complete deletion mutant collection (5,852 genes),
      FBA model, and condition-specific fitness data on 8 carbon sources.

  - id: org_dvh
    name: Desulfovibrio vulgaris Hildenborough
    ncbi_taxid: 882
    strain: Hildenborough (ATCC 29579)
    projects:
      - field_vs_lab_fitness
      - metal_fitness_atlas
      - essential_metabolome
      - counter_ion_effects
    role: >-
      Anaerobic sulfate-reducing bacterium. Most metal-profiled organism
      in Fitness Browser (149 experiments, 13 metals). Key subject for
      field vs lab fitness distinction.

  - id: org_ecoli
    name: Escherichia coli K-12
    ncbi_taxid: 679895
    strain: BW25113 (Keio)
    projects:
      - conservation_vs_fitness
      - essential_metabolome
      - metal_fitness_atlas
    role: >-
      Classic model organism. Absent from GTDB pangenome (too many genomes).
      Essential genome defined by Goodall et al. (2018) via TraDIS.

  - id: org_putida
    name: Pseudomonas putida KT2440
    ncbi_taxid: 160488
    strain: KT2440
    projects:
      - fitness_modules
      - cofitness_coinheritance
      - metal_fitness_atlas
      - essential_metabolome
    role: >-
      Aromatic degrader and bioremediation workhorse. Has FB fitness matrices
      but zero metal experiments — a critical gap.

  - id: org_pseudo3_n2e3
    name: Pseudomonas fluorescens FW300-N2E3
    ncbi_taxid: 1114970
    strain: FW300-N2E3
    projects:
      - metal_fitness_atlas
      - cofitness_coinheritance
      - conservation_vs_fitness
    role: >-
      ENIGMA Oak Ridge environmental isolate. Only P. fluorescens strain
      showing no metal-important gene core enrichment.

  - id: org_psrch2
    name: Pseudomonas stutzeri RCH2
    ncbi_taxid: 1123519
    strain: RCH2
    projects:
      - costly_dispensable_genes
      - metal_fitness_atlas
      - counter_ion_effects
    role: >-
      Outlier with 21.5% costly+dispensable genes, far above other organisms.
      Likely reflects recent mobile element invasion.

  - id: org_paeruginosa
    name: Pseudomonas aeruginosa PA01
    ncbi_taxid: 208964
    strain: PA01
    projects:
      - essential_metabolome
    role: Model pathogen with complete amino acid biosynthesis.

  - id: org_methanococcus_s2
    name: Methanococcus maripaludis S2
    ncbi_taxid: 267377
    strain: S2
    projects:
      - conservation_vs_fitness
      - essential_genome
      - metal_fitness_atlas
    role: >-
      Methanogenic archaeon with strongest essential-core enrichment (OR=5.21).
      54 novel metal gene candidates; only tested on iron.

  - id: org_caulo
    name: Caulobacter vibrioides CB15
    ncbi_taxid: 565050
    strain: CB15
    projects:
      - essential_genome
      - essential_metabolome
      - conservation_vs_fitness
    role: Alphaproteobacterium with complete amino acid biosynthesis.

  - id: org_smeli
    name: Sinorhizobium meliloti 1021
    ncbi_taxid: 266834
    strain: "1021"
    projects:
      - essential_metabolome
      - cofitness_coinheritance
      - conservation_vs_fitness
    role: Nitrogen-fixing alphaproteobacterium with complete amino acid biosynthesis.

  - id: org_btheta
    name: Bacteroides thetaiotaomicron VPI-5482
    ncbi_taxid: 226186
    strain: VPI-5482
    projects:
      - cofitness_coinheritance
      - essential_genome
      - costly_dispensable_genes
    role: >-
      Gut commensal with strong module co-inheritance signal
      (61% significant modules).

  - id: org_mr1
    name: Shewanella oneidensis MR-1
    ncbi_taxid: 211586
    strain: MR-1
    projects:
      - essential_metabolome
      - metal_fitness_atlas
    role: Metal-reducing bacterium with complete amino acid biosynthesis.

  - id: org_marinobacter
    name: Marinobacter adhaerens
    ncbi_taxid: 665099
    projects:
      - conservation_vs_fitness
      - metal_fitness_atlas
    role: >-
      Marine bacterium with third-highest essential-core enrichment (OR=3.08).

  - id: org_syne
    name: Synechococcus elongatus PCC 7942
    ncbi_taxid: 1140
    strain: PCC 7942
    projects:
      - metal_fitness_atlas
    role: >-
      Cyanobacterium, notably metal-sensitive — 33.6% of genes important
      across just 2 metals.

  - id: org_azobra
    name: Azospirillum brasilense
    ncbi_taxid: 192
    projects:
      - essential_metabolome
    role: Nitrogen-fixing alphaproteobacterium with highest GapMind prediction count.

  - id: org_magneto
    name: Magnetococcus sp.
    projects:
      - conservation_vs_fitness
      - essential_genome
    role: >-
      Magnetotactic bacterium with highest essentiality rate (29.7%)
      among 48 organisms tested.

  - id: org_syringae
    name: Pseudomonas syringae B728a
    ncbi_taxid: 205918
    strain: B728a
    projects:
      - cofitness_coinheritance
    role: Plant pathogen phyllosphere isolate analyzed for co-inheritance.

  - id: org_koxy
    name: Klebsiella oxytoca
    ncbi_taxid: 571
    projects:
      - cofitness_coinheritance
    role: Strong module co-inheritance signal (32% significant, 44 modules).

  - id: org_ralstonia_psi07
    name: Ralstonia syzygii PSI07
    projects:
      - conservation_vs_fitness
    role: Plant pathogen with second-highest essential-core enrichment (OR=3.41).

  - id: org_cupriavidus
    name: Cupriavidus necator
    ncbi_taxid: 106590
    projects:
      - phb_granule_ecology
    role: Model PHB-producing bacterium used in feast/famine competition studies.
