    tags: [ecotype, phylogeny, environment, gene-content]
    evidence_supporting:
      - project: ecotype_analysis
        finding: "Phylogeny dominates in 60.5% of 172 species (median partial r=0.0143 vs 0.0025)"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-01-20"
        event: proposed
        context: "Partial correlation analysis of gene content vs environment/phylogeny"
      - date: "2026-01-25"
        event: validated
        context: "Confirmed across 172 species; no difference by lifestyle"

  - id: H016
    statement: >-
      The ADP1 phenotype landscape under 8 carbon sources forms
      discrete functional modules rather than a continuous gradient.
    status: rejected
    origin_project: adp1_deletion_phenotypes
    origin_date: "2026-02-10"
    entities:
