hypotheses:

  - id: H001
    statement: >-
      Core genome genes are universally enriched for metabolic functions
      (COG J, F, H, E, C) while novel/singleton genes are enriched for
      mobile elements (L) and defense (V).
    status: validated
    origin_project: cog_analysis
    origin_date: "2026-01-15"
    entities:
      - conc_core_genome
      - conc_two_speed_genome
      - conc_hgt
    tags: [pangenome, core-genome, COG, metabolism, two-speed-genome]
    evidence_supporting:
      - project: cog_analysis
        finding: "COG enrichment confirmed across 32 species, 9 phyla, 357,623 genes"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-01-10"
        event: proposed
        context: "Initial observation during N. gonorrhoeae pangenome exploration"
      - date: "2026-01-15"
        event: validated
        context: "Systematic analysis confirms all 8 predictions across 32 species"
    spawned: [H002, H003]

  - id: H002
    statement: >-
      Accessory genome enrichment in defense (V) and mobilome (L/X)
      reflects horizontal gene transfer as the primary mechanism of
      genomic innovation.
    status: validated
    origin_project: cog_analysis
    parent: H001
    origin_date: "2026-01-15"
    entities:
      - conc_accessory_genome
      - conc_hgt
    tags: [HGT, defense, mobile-elements, pangenome]
    evidence_supporting:
      - project: cog_analysis
        finding: "COG L +10.88% enrichment in novel genes, 100% consistency"
        confidence: high
      - project: costly_dispensable_genes
        finding: "Costly+dispensable genes 7.45x enriched for mobile element keywords"
        confidence: high
      - project: phb_granule_ecology
        finding: "311 putative HGT acquisitions of PHB phaC gene"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-01-15"
        event: proposed
        context: "Derived from COG analysis core/novel partitioning"
      - date: "2026-02-01"
        event: validated
        context: "Confirmed by costly_dispensable and phb_granule projects"

  - id: H003
    statement: >-
      Essential genes are preferentially conserved in the core genome
      and enriched for translation, nucleotide metabolism, and energy
      production functions.
    status: validated
    origin_project: conservation_vs_fitness
    parent: H001
    origin_date: "2026-01-15"
    entities:
      - conc_essential_genes
      - conc_core_genome
      - path_translation_machinery
    tags: [essential-genes, core-genome, conservation]
    evidence_supporting:
      - project: conservation_vs_fitness
        finding: "Essential genes 86.1-91.7% core across 33 organisms (OR=1.51-5.21)"
        confidence: high
      - project: essential_genome
        finding: "15 universally essential gene families; 10 are ribosomal proteins"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-01-15"
        event: proposed
        context: "Initial DIAMOND mapping of FB proteins to pangenome clusters"
      - date: "2026-01-20"
        event: validated
        context: "Replicated across 33 organisms with Fisher's exact test"

  - id: H004
    statement: >-
      Core genome genes should show lower fitness cost (less burden)
      than accessory genes because they are under stronger purifying
      selection.
    status: rejected
    origin_project: core_gene_tradeoffs
    origin_date: "2026-01-25"
    entities:
      - conc_burden_paradox
      - conc_core_genome
      - conc_selection_signature
    tags: [burden, core-genome, fitness, selection]
    evidence_supporting: []
    evidence_contradicting:
      - project: core_gene_tradeoffs
        finding: "Core genes are MORE burdensome: 24.4% vs 19.9% for accessory"
        confidence: high
      - project: fitness_effects_conservation
        finding: "Conserved genes more likely to show positive fitness when deleted"
        confidence: high
    evolution:
      - date: "2026-01-25"
        event: proposed
        context: "Intuitive expectation from purifying selection theory"
      - date: "2026-01-28"
        event: rejected
        context: "Data shows the opposite — the burden paradox"
    spawned: [H005]

  - id: H005
    statement: >-
      The core gene burden paradox reflects lab conditions being
      impoverished relative to nature: core genes encode functions
      essential in natural environments but costly in nutrient-rich lab media.
    status: validated
    origin_project: core_gene_tradeoffs
    parent: H004
    origin_date: "2026-01-28"
    entities:
      - conc_burden_paradox
      - conc_core_genome
      - conc_condition_specific_essentiality
    tags: [burden, core-genome, lab-vs-field, selection]
    evidence_supporting:
      - project: core_gene_tradeoffs
        finding: "28,017 costly+conserved genes = purifying selection in natural environments"
        confidence: high
      - project: field_vs_lab_fitness
        finding: "Lab-important genes are less conserved than field-important genes"
        confidence: high
      - project: conservation_fitness_synthesis
        finding: "The gradient from conserved to dispensable parallels lab relevance"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-01-28"
        event: proposed
        context: "Resolution of the burden paradox"
      - date: "2026-02-01"
        event: validated
        context: "Confirmed by field_vs_lab_fitness and synthesis"

  - id: H006
    statement: >-
      Metal tolerance is primarily determined by accessory genome
      metal-resistance genes (efflux pumps, detoxification enzymes).
    status: rejected
    origin_project: metal_fitness_atlas
    origin_date: "2026-02-01"
    entities:
      - conc_core_robustness
      - conc_accessory_genome
    tags: [metal-stress, accessory-genome, resistance]
    evidence_supporting: []
    evidence_contradicting:
      - project: metal_fitness_atlas
        finding: "Metal-important genes are 87.4% core (OR=2.08), not accessory"
        confidence: high
    evolution:
      - date: "2026-02-01"
        event: proposed
        context: "Initial hypothesis based on classical metal resistance literature"
      - date: "2026-02-05"
        event: rejected
        context: "Pan-bacterial analysis shows core genome dominance"
    spawned: [H007]

  - id: H007
    statement: >-
      Metal fitness reflects a two-tier architecture: Tier 1 (core)
      provides general stress response and metal homeostasis; Tier 2
      (accessory) provides specific high-level resistance via efflux.
    status: validated
    origin_project: metal_fitness_atlas
    parent: H006
    origin_date: "2026-02-05"
    entities:
      - conc_core_robustness
      - conc_core_genome
      - conc_accessory_genome
    tags: [metal-stress, core-genome, robustness, two-tier]
    evidence_supporting:
      - project: metal_fitness_atlas
        finding: "87.4% of metal-important genes are core; accessory genes provide specific resistance"
        confidence: high
      - project: counter_ion_effects
        finding: "Metal fitness atlas core enrichment robust after counter-ion correction"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-02-05"
        event: proposed
        context: "Resolved by two-tier model of metal fitness architecture"
      - date: "2026-02-10"
        event: validated
        context: "Counter-ion analysis confirms robustness"

  - id: H008
    statement: >-
      Aromatic catabolism requires a large support network (>>pathway
      genes) spanning respiratory, iron, and cofactor subsystems,
      with a 7:1 support-to-pathway gene ratio.
    status: validated
    origin_project: aromatic_catabolism_network
    origin_date: "2026-02-01"
    entities:
      - path_beta_ketoadipate
      - gene_nuo_complex
      - gene_iron_acquisition
      - gene_pqq_biosynthesis
    tags: [aromatic-catabolism, support-network, metabolic-architecture]
    evidence_supporting:
      - project: aromatic_catabolism_network
        finding: "51 quinate-specific genes: 8 pathway + 43 support (Complex I, Fe, PQQ)"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-02-01"
        event: proposed
        context: "Quantification of quinate-specific genes in ADP1"
      - date: "2026-02-05"
        event: validated
        context: "Three biochemically rational subsystems identified"

  - id: H009
    statement: >-
      Complex I essentiality on aromatics is determined by NADH flux
      rate (concentrated TCA burst), not total NADH yield.
    status: validated
    origin_project: respiratory_chain_wiring
    origin_date: "2026-02-01"
    entities:
      - conc_nadh_flux_rate
      - gene_nuo_complex
      - conc_respiratory_wiring
    tags: [respiratory-chain, NADH, flux-rate, metabolic-wiring]
    evidence_supporting:
      - project: respiratory_chain_wiring
        finding: "Quinate (0.57 NADH/C) requires Complex I; glucose (1.50 NADH/C) does not"
        confidence: high
      - project: aromatic_catabolism_network
        finding: "Cross-species: Complex I defects largest on acetate/succinate, not aromatics per se"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-02-01"
        event: proposed
        context: "Resolution of quinate-glucose Complex I paradox"
      - date: "2026-02-05"
        event: validated
        context: "Cross-species data confirms flux rate, not chemistry, matters"

  - id: H010
    statement: >-
      Respiratory chain wiring is controlled by transcriptional regulation
      (different dehydrogenases expressed under different conditions).
    status: rejected
    origin_project: respiratory_chain_wiring
    origin_date: "2026-02-01"
    entities:
      - conc_respiratory_wiring
      - gene_nuo_complex
      - gene_ndh2
    tags: [respiratory-chain, transcription, regulation]
    evidence_supporting: []
    evidence_contradicting:
      - project: respiratory_chain_wiring
        finding: "All three NADH dehydrogenases co-expressed at similar proteomics levels (27.6, 27.0, 26.2)"
        confidence: high
    evolution:
      - date: "2026-02-01"
        event: proposed
        context: "Expected transcriptional control based on bacterial gene regulation paradigm"
      - date: "2026-02-03"
        event: rejected
        context: "Proteomics shows constitutive expression; wiring is metabolic, not transcriptional"

  - id: H011
    statement: >-
      NDH-2 compensates for Complex I loss on aromatic substrates
      in organisms that possess both dehydrogenases.
    status: rejected
    origin_project: respiratory_chain_wiring
    origin_date: "2026-02-03"
    entities:
      - gene_ndh2
      - gene_nuo_complex
    tags: [respiratory-chain, compensation, NDH-2]
    evidence_supporting: []
    evidence_contradicting:
      - project: respiratory_chain_wiring
        finding: "Organisms WITH NDH-2 show LARGER Complex I aromatic deficits (-0.297 vs -0.156)"
        confidence: high
    evolution:
      - date: "2026-02-03"
        event: proposed
        context: "Initial cross-species analysis suggested NDH-2 compensation"
      - date: "2026-02-05"
        event: rejected
        context: "Filtering NDH-2 false positives reversed the result — annotation artifact"

  - id: H012
    statement: >-
      PHB (polyhydroxybutyrate) prevalence is highest in feast/famine
      environments (soil, plant-associated) and lowest in stable
      environments (host-associated, clinical).
    status: validated
    origin_project: phb_granule_ecology
    origin_date: "2026-02-10"
    entities:
      - conc_feast_famine
      - gene_phac
      - conc_pangenome_ecology
    tags: [PHB, feast-famine, ecology, pangenome]
    evidence_supporting:
      - project: phb_granule_ecology
        finding: "Gradient: plant 44% > soil 43.6% > wastewater 34.5% > marine 18.7% > clinical 7.4% > animal 3.3%"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-02-10"
        event: proposed
        context: "First quantitative genomic test of Dawes & Senior (1973) hypothesis"
      - date: "2026-02-15"
        event: validated
        context: "Gradient confirmed across 27,690 species; holds within genome size quartiles"

  - id: H013
    statement: >-
      Co-fitness (correlated fitness profiles) predicts co-inheritance
      (co-occurrence in pangenomes), especially for accessory ICA modules.
    status: validated
    origin_project: cofitness_coinheritance
    origin_date: "2026-02-05"
    entities:
      - conc_cofitness_coinheritance
      - conc_fitness_module
    tags: [cofitness, co-inheritance, pangenome, modules]
    evidence_supporting:
      - project: cofitness_coinheritance
        finding: "7/9 organisms positive pairwise; 73% of accessory modules significant"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-02-05"
        event: proposed
        context: "Do functionally coupled genes travel together through evolution?"
      - date: "2026-02-10"
        event: validated
        context: "Pairwise weak but consistent; ICA modules show strong signal"

