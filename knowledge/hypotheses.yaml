        finding: "FBA essentiality class does not predict growth defect magnitude (p=0.63)"
        confidence: high
      - project: aromatic_catabolism_network
        finding: "FBA misses 59% of condition-specific essential genes"
        confidence: high
    evolution:
      - date: "2026-02-10"
        event: proposed
        context: "Can FBA break TnSeq ties for dispensable genes?"
      - date: "2026-02-15"
        event: rejected
        context: "Null result is robust across growth defect thresholds"

  - id: H015
