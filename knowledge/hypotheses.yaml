  - id: H017
    statement: >-
      Field-important genes (important under environmental conditions)
      are more conserved in the pangenome than lab-important genes.
    status: validated
    origin_project: field_vs_lab_fitness
    origin_date: "2026-02-01"
    entities:
      - conc_core_genome
      - conc_burden_paradox
      - conc_condition_specific_essentiality
    tags: [field-vs-lab, conservation, DvH, ecology]
    evidence_supporting:
      - project: field_vs_lab_fitness
        finding: "Sulfate/lactate genes 82.4% core (OR=1.46); heavy metal genes least conserved (71.2%)"
        confidence: high
    evidence_contradicting: []
    evolution:
      - date: "2026-02-01"
        event: proposed
        context: "If burden paradox reflects lab conditions, field-relevant genes should be more conserved"
      - date: "2026-02-05"
        event: validated
        context: "DvH field-core genes significantly more conserved than lab-specific"

  - id: H018
    statement: >-
