        confidence: high
    evolution:
      - date: "2026-01-10"
        event: proposed
        context: "Traditional view from single-organism essentiality studies"
      - date: "2026-01-20"
        event: rejected
        context: "Pan-bacterial analysis shows essentiality is highly context-dependent"
    spawned: [H003]

