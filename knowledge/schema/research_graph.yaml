id: https://w3id.org/beril/research_graph
name: research_graph
title: BERIL Research Observatory Knowledge Graph Schema
description: >-
  Layer 3 semantic knowledge graph schema for the BERIL Research Observatory.
  Captures biological entities, their relationships, hypothesis lifecycle,
  and research timeline to enable cross-project discovery and research continuity.
version: "1.0.0"

prefixes:
  linkml: https://w3id.org/linkml/
  research_graph: https://w3id.org/beril/research_graph/
  NCBITaxon: https://www.ncbi.nlm.nih.gov/taxonomy/
  KEGG: https://www.genome.jp/entry/
  UniProt: https://www.uniprot.org/uniprot/
  KEGG.PATHWAY: https://www.genome.jp/entry/map
  KEGG.KO: https://www.genome.jp/entry/K

imports:
  - linkml:types

default_range: string
default_prefix: research_graph

enums:

  EntityType:
    description: Types of biological entities tracked in the knowledge graph
    permissible_values:
      organism:
        description: A biological organism (species or strain)
      gene:
        description: A gene or gene group
      pathway:
        description: A metabolic or signaling pathway
      method:
        description: An analytical or experimental method
      concept:
        description: A scientific concept or theoretical framework

  RelationType:
    description: Types of relationships between entities
    permissible_values:
      has_essential_gene_data:
        description: Organism has essentiality data for genes
      enriched_for:
        description: Entity is statistically enriched for another
      requires_support_genes:
        description: Pathway requires support genes beyond core pathway genes
      applied_to:
        description: Method was applied to another entity
      studied_in:
        description: Entity was studied in a particular organism
      co_regulated_with:
        description: Entity is co-regulated with another
      contradicts:
        description: Finding contradicts expected relationship
      enables:
        description: Entity enables or is required for another
      predicts:
        description: Entity predicts behavior of another
      ortholog_of:
        description: Gene is orthologous to another across organisms
      component_of:
        description: Entity is a component of a larger entity
      measured_by:
        description: Entity is measured or assayed by a method
      enriched_in:
        description: Entity is enriched in a specific context
      absent_from:
        description: Entity is absent from a specific context
      condition_specific_for:
        description: Entity is specifically required under certain conditions

  HypothesisStatus:
    description: Lifecycle states for hypothesis tracking
    permissible_values:
      proposed:
        description: Hypothesis has been formulated but not yet tested
      refined:
        description: Hypothesis has been refined based on initial evidence
      testing:
        description: Hypothesis is actively being tested
      validated:
        description: Hypothesis has been supported by evidence
      rejected:
        description: Hypothesis has been contradicted by evidence
      merged:
        description: Hypothesis has been merged into another
      superseded:
        description: Hypothesis has been replaced by a more specific one

  EvidenceConfidence:
    description: Confidence levels for evidence backing a relation or hypothesis
    permissible_values:
      high:
        description: Strong statistical support, replicated across organisms/conditions
      medium:
        description: Moderate support, limited replication
      low:
        description: Suggestive but not conclusive
      preliminary:
        description: Initial observation, not yet systematically tested

  TimelineEventType:
    description: Types of research timeline events
    permissible_values:
      hypothesis_proposed:
        description: A new hypothesis was formulated
      hypothesis_validated:
        description: A hypothesis was validated
      hypothesis_rejected:
        description: A hypothesis was rejected
      hypothesis_refined:
        description: A hypothesis was refined
      discovery:
        description: A notable discovery was made
      cross_project_connection:
        description: A connection was found between projects
      method_applied:
        description: A method was applied in a new context
      project_completed:
        description: A project was completed

classes:

  KnowledgeGraph:
    description: Root container for the entire knowledge graph
    tree_root: true
    attributes:
      organisms:
        range: Organism
        multivalued: true
        inlined_as_list: true
      genes:
        range: Gene
        multivalued: true
        inlined_as_list: true
      pathways:
        range: Pathway
        multivalued: true
        inlined_as_list: true
      methods:
        range: Method
        multivalued: true
        inlined_as_list: true
      concepts:
        range: Concept
        multivalued: true
        inlined_as_list: true
      relations:
        range: Relation
        multivalued: true
        inlined_as_list: true
      hypotheses:
        range: Hypothesis
        multivalued: true
        inlined_as_list: true
      events:
        range: TimelineEvent
        multivalued: true
        inlined_as_list: true

  Entity:
    abstract: true
    description: Base class for all knowledge graph entities
    attributes:
      id:
        identifier: true
        description: Unique identifier (e.g., org_ecoli, path_tca)
        range: string
        required: true
      name:
        description: Human-readable name
        range: string
        required: true
      description:
        description: Brief description of the entity and its role
        range: string
      projects:
        description: Projects that reference this entity
        range: string
        multivalued: true
      tags:
        description: Free-form tags for search
        range: string
        multivalued: true

  Organism:
    is_a: Entity
    description: A biological organism (species or strain)
    attributes:
      ncbi_taxid:
        description: NCBI Taxonomy ID
        range: integer
      strain:
        description: Strain designation if applicable
        range: string
      role:
        description: Role of this organism in the research program
        range: string

  Gene:
    is_a: Entity
    description: A gene, gene family, or gene group
    attributes:
      kegg_ko:
        description: KEGG Orthology identifier(s)
        range: string
        multivalued: true
      uniprot_id:
        description: UniProt accession(s)
        range: string
        multivalued: true
      organisms:
        description: Organisms in which this gene is studied
        range: string
        multivalued: true
      locus_tags:
        description: Representative locus tags
        range: string
        multivalued: true

  Pathway:
    is_a: Entity
    description: A metabolic, signaling, or functional pathway
    attributes:
      kegg_id:
        description: KEGG pathway map identifier
        range: string
      organisms:
        description: Organisms in which this pathway is studied
        range: string
        multivalued: true

  Method:
    is_a: Entity
    description: An analytical or experimental method
    attributes:
      full_name:
        description: Full unabbreviated name
        range: string
      category:
        description: Method category (experimental, computational, statistical)
        range: string

  Concept:
    is_a: Entity
    description: A scientific concept, framework, or theoretical construct
    attributes:
      definition:
        description: Precise definition of the concept
        range: string
      related:
        description: IDs of related concepts
        range: string
        multivalued: true

  Relation:
    description: A typed, evidence-backed edge between two entities
    attributes:
      subject:
        description: ID of the subject entity
        range: string
        required: true
      predicate:
        description: Type of relationship
        range: RelationType
        required: true
      object:
        description: ID of the object entity
        range: string
        required: true
      evidence_project:
        description: Project providing evidence for this relation
        range: string
      confidence:
        description: Confidence level of the evidence
        range: EvidenceConfidence
      note:
        description: Brief explanation of the evidence
        range: string

  EvidenceItem:
    description: A piece of evidence supporting or contradicting a hypothesis
    attributes:
      project:
        description: Project providing this evidence
        range: string
        required: true
      finding:
        description: The specific finding
        range: string
        required: true
      confidence:
        description: Confidence level
        range: EvidenceConfidence

  HypothesisEvent:
    description: A state change in a hypothesis lifecycle
    attributes:
      date:
        description: Date of the event (YYYY-MM-DD)
        range: date
        required: true
      event:
        description: What happened (proposed, refined, validated, etc.)
        range: HypothesisStatus
        required: true
      context:
        description: Brief description of what triggered this change
        range: string

  Hypothesis:
    description: A scientific hypothesis with lifecycle tracking
    attributes:
      id:
        identifier: true
        description: Hypothesis identifier (e.g., H001)
        range: string
        required: true
      statement:
        description: The hypothesis statement
        range: string
        required: true
      status:
        description: Current lifecycle status
        range: HypothesisStatus
        required: true
      origin_project:
        description: Project where hypothesis originated
        range: string
      origin_date:
        description: Date hypothesis was first proposed
        range: date
      parent:
        description: Parent hypothesis ID (if derived from another)
        range: string
      spawned:
        description: Child hypothesis IDs
        range: string
        multivalued: true
      entities:
        description: Entity IDs relevant to this hypothesis
        range: string
        multivalued: true
      tags:
        description: Free-form tags
        range: string
        multivalued: true
      evidence_supporting:
        description: Evidence supporting the hypothesis
        range: EvidenceItem
        multivalued: true
        inlined_as_list: true
      evidence_contradicting:
        description: Evidence contradicting the hypothesis
        range: EvidenceItem
        multivalued: true
        inlined_as_list: true
      evolution:
        description: Chronological lifecycle events
        range: HypothesisEvent
        multivalued: true
        inlined_as_list: true

  TimelineEvent:
    description: A research timeline event
    attributes:
      date:
        description: Date of the event
        range: date
        required: true
      type:
        description: Type of event
        range: TimelineEventType
        required: true
      ref:
        description: Reference to a hypothesis or entity ID
        range: string
      project:
        description: Project associated with this event
        range: string
      projects:
        description: Multiple projects (for cross-project events)
        range: string
        multivalued: true
      summary:
        description: Brief description of the event
        range: string
        required: true
      entities:
        description: Entity IDs involved
        range: string
        multivalued: true
      spawned_hypothesis:
        description: Hypothesis ID spawned by this event
        range: string
