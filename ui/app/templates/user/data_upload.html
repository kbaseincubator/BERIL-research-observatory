{% extends "base.html" %}

{% block title %}Upload File — {{ app_name }}{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 640px">
  <h1>Upload File</h1>

  <form method="post" action="/user/data/upload" enctype="multipart/form-data">
    <div class="mb-3">
      <label for="project_id" class="form-label">Project</label>
      <select id="project_id" name="project_id" class="form-select" required>
        {% for project in projects %}
          <option value="{{ project.id }}">{{ project.title }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label for="file_type" class="form-label">File type</label>
      <select id="file_type" name="file_type" class="form-select">
        <option value="data">Data</option>
        <option value="notebook">Notebook</option>
        <option value="visualization">Visualization</option>
        <option value="readme">README</option>
        <option value="research_plan">Research Plan</option>
        <option value="report">Report</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="file" class="form-label">File</label>
      <input id="file" type="file" name="file" class="form-control" required>
    </div>

    <div class="mb-3 form-check">
      <input id="is_public" type="checkbox" name="is_public" value="true" class="form-check-input">
      <label for="is_public" class="form-check-label">Make file publicly accessible</label>
    </div>

    <button type="submit" class="btn btn-primary">Upload</button>
    <a href="/user/data" class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
