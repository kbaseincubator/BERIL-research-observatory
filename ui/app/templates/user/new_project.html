{% extends "base.html" %}

{% block title %}New Project — {{ app_name }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">New Project</h1>
  <p class="text-muted">Create a research project to organize your data and files.</p>
</div>

<div style="max-width: 640px;">
  <div class="card">
    <form method="post" action="/user/projects/create">

      <div class="mb-3">
        <label for="title" class="form-label" style="font-weight: 600;">Project name <span style="color: var(--color-accent);">*</span></label>
        <input id="title" name="title" type="text" class="form-control" placeholder="e.g. Nitrogen Cycling in Soil Microbiomes" required autofocus>
      </div>

      <div class="mb-4">
        <label for="research_question" class="form-label" style="font-weight: 600;">Research question <span class="text-muted" style="font-weight: 400;">(optional)</span></label>
        <textarea id="research_question" name="research_question" class="form-control" rows="3"
          placeholder="What scientific question does this project address?"></textarea>
      </div>

      <div style="display: flex; gap: var(--space-3); align-items: center;">
        <button type="submit" class="btn btn-primary">Create Project</button>
        <a href="/user/data" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
