- id: pathway_capability_dependency
  title: Metabolic Capability vs Dependency
  status: complete
  research_question: When a bacterium's genome encodes a complete biosynthetic or catabolic pathway, does the organism actually
    depend on it? Can we use fitness data to distinguish **active dependencies** from **latent capabilities** — and predict
    which pathways are candidates for evolutionary gene loss?
  key_findings:
  - Pathway Completeness Alone Is Insufficient to Predict Metabolic Dependency
  - All 'Latent Capabilities' Become Important Under Specific Conditions
  - 'Conservation Validation: Active Dependencies Have Near-Complete Core Genomes'
  - Variable Pathways Strongly Correlate with Pangenome Openness
  - Amino Acid Biosynthesis Pathways Show the Strongest Accessory Dependence
