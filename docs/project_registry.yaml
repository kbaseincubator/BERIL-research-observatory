- id: respiratory_chain_wiring
  title: Condition-Specific Respiratory Chain Wiring in ADP1
  status: complete
  research_question: How is *Acinetobacter baylyi* ADP1's branched respiratory chain wired across carbon sources — which NADH
    dehydrogenases and terminal oxidases are required for which substrates?
  key_findings:
  - Each carbon source uses a distinct respiratory chain configuration
  - ADP1 has three parallel NADH dehydrogenases with distinct condition profiles
  - The quinate-Complex I paradox is resolved by NADH flux rate, not total yield
  - Cross-species NDH-2 presence does NOT predict reduced Complex I aromatic dependency
  - Proteomics indicates respiratory wiring is metabolic, not transcriptional
