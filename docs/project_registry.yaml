- id: adp1_deletion_phenotypes
  title: ADP1 Deletion Collection Phenotype Analysis
  status: complete
  research_question: What is the condition-dependent structure of gene essentiality in *Acinetobacter baylyi* ADP1, as revealed
    by the de Berardinis single-gene deletion collection grown on 8 carbon sources?
  key_findings:
  - Carbon sources define a three-tier essentiality landscape
  - Conditions are largely independent — 5 PCs capture 82% of variance
  - The phenotype landscape is a continuum, not discrete modules
  - Condition-specific genes reveal the metabolic architecture of ADP1
  - Missing dispensable genes are shorter, less conserved, and enriched for hypotheticals
