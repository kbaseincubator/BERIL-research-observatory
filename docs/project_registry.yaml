- id: aromatic_catabolism_network
  title: Aromatic Catabolism Support Network in ADP1
  status: complete
  research_question: Why does aromatic catabolism in *Acinetobacter baylyi* ADP1 require Complex I (NADH dehydrogenase), iron
    acquisition, and PQQ biosynthesis when growth on other carbon sources does not?
  key_findings:
  - Aromatic catabolism requires a 51-gene support network spanning 4 metabolic subsystems
  - Complex I is the largest support subsystem — and invisible to FBA
  - Support subsystems are genomically independent but metabolically coupled
  - Co-fitness assigns 16 unknown genes to specific subsystems
  - 'Cross-species: Complex I dependency is on high-NADH substrates, not aromatics specifically'
