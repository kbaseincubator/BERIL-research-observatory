- id: truly_dark_genes
  title: Truly Dark Genes — What Remains Unknown After Modern Annotation?
  status: complete
  research_question: Among the ~6,400 Fitness Browser genes that remain functionally unannotated even after bakta v1.12.0
    reannotation, what distinguishes them from "annotation-lag" dark matter, and can their fitness phenotypes, genomic context,
    and sparse annotations prioritize them for experimental characterization?
  key_findings:
  - Only 16.3% of 'dark matter' resists modern annotation
  - Truly dark genes are structurally distinct from annotation-lag genes
  - Annotation databases recognize the sequences but not the function
  - 96% of truly dark genes have at least one partial annotation clue
  - Truly dark genes are enriched in accessory genomes and show HGT signatures
  - Stress enrichment hypothesis rejected
  - 100 top candidates prioritized for experimental characterization
