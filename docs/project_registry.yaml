- id: functional_dark_matter
  title: Functional Dark Matter — Experimentally Prioritized Novel Genetic Systems
  status: complete
  research_question: Which genes of unknown function across 48 bacteria have strong fitness phenotypes, and can biogeographic
    patterns, pathway gap analysis, and cross-organism fitness concordance — combined with existing function predictions and
    conservation data — prioritize them for experimental follow-up?
  key_findings:
  - One in four bacterial genes is functionally dark, and 17,344 have experimentally measurable phenotypes
  - 39,532 dark genes link to the pangenome; 6,142 belong to co-regulated fitness modules
  - GapMind identifies 1,256 organism-pathway pairs with metabolic gaps in species harboring dark genes
  - Cross-organism fitness concordance identifies 65 ortholog groups with conserved dark gene phenotypes
  - Dark gene families span diverse taxonomic breadth — 30,756 clusters mapped across 27,690 species
  - Within-species biogeographic analysis reveals 10 dark gene clusters with significant environmental enrichment
  - Lab-field concordance rate of 61.7%, with NMDC validation confirming 4/4 pre-registered abiotic predictions
  - Top 100 prioritized candidates span 22 organisms with 82% high-confidence functional hypotheses
