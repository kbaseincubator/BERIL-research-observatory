- id: snipe_defense_system
  title: 'SNIPE Defense System: Prevalence and Taxonomic Distribution in the BERDL Pangenome'
  status: complete
  research_question: How prevalent are SNIPE (Surface-associated Nuclease Inhibiting Phage Entry) homologues across the 293K-genome
    BERDL pangenome, and does their taxonomic distribution, environmental context, or pangenome status (core vs. accessory)
    reveal ecological patterns of phage defense?
  key_findings:
  - SNIPE resolves the phage resistance vs. metabolic cost trade-off
  - SNIPE is widespread (1,696 species, 33 phyla)
  - SNIPE genes are predominantly accessory (86.7%)
  - The SNIPE nuclease domain is PF13455 (Mug113), not PF01541 (GIY-YIG)
  - SNIPE-bearing species occupy distinct environmental niches
  - SNIPE detected in phage therapy target (Klebsiella)
  - Functional annotations are consistent with SNIPE
