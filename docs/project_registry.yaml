- id: prophage_ecology
  title: Prophage Gene Modules and Terminase-Defined Lineages Across Bacterial Phylogeny and Environmental Gradients
  status: complete
  research_question: How are prophage gene modules and terminase-defined prophage lineages distributed across bacterial phylogeny
    and environmental gradients, and which modules/lineages show environmental enrichment exceeding phylogenetic expectation?
  key_findings:
  - Prophage gene modules are universal but structurally variable across 27,702 bacterial species
  - Environment explains more variance in prophage composition than host phylogeny
  - Tail, head, and anti-defense modules are enriched in human-associated environments beyond phylogenetic expectation
  - TerL lineages are phylogenetically constrained but include both specialist and generalist strategies
  - NMDC metagenomic data independently validates module-level environmental signal
