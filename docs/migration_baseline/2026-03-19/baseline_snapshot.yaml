queries:
  metal stress: "### Results for \"metal stress\"\n\n**1. metal_fitness_atlas** (complete)\n\
    - **Q**: Across diverse bacteria subjected to genome-wide fitness profiling under\
    \ metal stress, what is the genetic architecture of metal tolerance \u2014 is\
    \ it encoded in the core or accessory genome, is it conserved across species,\
    \ and can fitness-validated metal tolerance genes predict capabilities across\
    \ the broader pangenome?\n- **Findings**: Metal-Important Genes Are Enriched in\
    \ the Core Genome, Essential Metals Show Stronger Core Enrichment Than Toxic Metals,\
    \ 559 Metal Experiments Across 31 Organisms and 16 Metals\n- **Tags**: co-occurrence,\
    \ conservation, dark-genes, enrichment, essential-genes, fitness, gene-annotation,\
    \ metabolism, metal-stress, mobile-elements, modules, pangenome, pathway-analysis\n\
    - **Data**: kbase_ke_pangenome, kescience_fitnessbrowser\n- [README](projects/metal_fitness_atlas/README.md)\
    \ | [REPORT](projects/metal_fitness_atlas/REPORT.md)\n\n### Findings Digest Hits\n\
    - `metal stress` appears in `docs/findings_digest.md`"
  essential genes: '### Results for "essential genes"


    **1. conservation_vs_fitness** (complete)

    - **Q**: Are essential genes preferentially conserved in the core genome, and
    what functional categories distinguish essential-core from essential-auxiliary
    genes?

    - **Findings**: Link Table (Phase 1), Essential Genes Are Enriched in Core Clusters
    (Phase 2), Functional Profiles Differ by Conservation Category

    - **Tags**: conservation, correlation, dark-genes, enrichment, essential-genes,
    fitness, gene-annotation, metabolism, mobile-elements, modules, pangenome

    - **Data**: kbase_ke_pangenome, kescience_fitnessbrowser

    - [README](projects/conservation_vs_fitness/README.md) | [REPORT](projects/conservation_vs_fitness/REPORT.md)


    **2. essential_genome** (complete)

    - **Q**: Which essential genes are conserved across bacteria, which are context-dependent,
    and can we predict function for uncharacterized essential genes using module context
    from non-essential orthologs?

    - **Findings**: 15 Gene Families Are Essential in All 48 Bacteria, Only 5% of
    Ortholog Families Are Universally Essential, Orphan Essential Genes Are 58.7%
    Hypothetical

    - **Tags**: conservation, correlation, dark-genes, defense, enrichment, essential-genes,
    fitness, gene-annotation, metabolism, mobile-elements, modules, pangenome, pathway-analysis

    - **Data**: kescience_fitnessbrowser

    - [README](projects/essential_genome/README.md) | [REPORT](projects/essential_genome/REPORT.md)


    **3. fitness_effects_conservation** (complete)

    - **Q**: Is there a continuous gradient from essential genes (core) to dispensable
    genes (accessory) across the full fitness spectrum, and what does the fitness
    landscape of novel genes look like?

    - **Findings**: Conservation Increases with Fitness Importance, Breadth of Fitness
    Effects Predicts Conservation, Core Genes Are Not Burdens -- They''re More Likely
    Beneficial

    - **Tags**: HGT, conservation, correlation, dark-genes, ecotype, essential-genes,
    fitness, gene-annotation, metabolism, mobile-elements, modules, pangenome, pathway-analysis

    - **Data**: kescience_fitnessbrowser

    - [README](projects/fitness_effects_conservation/README.md) | [REPORT](projects/fitness_effects_conservation/REPORT.md)


    **4. acinetobacter_adp1_explorer** (complete)

    - **Q**: What is the scope and structure of a comprehensive ADP1 database, and
    how do its annotations, metabolic models, and phenotype data intersect with BERDL
    collections (pangenome, biochemistry, fitness, PhageFoundry)?

    - **Findings**: Rich Multi-Omics Database with 6 Data Modalities, Strong BERDL
    Connectivity: 4 of 5 Connection Types at >90% Match, Pangenome Cluster ID Bridge:
    100% Mapping via Gene Junction Table

    - **Tags**: conservation, correlation, defense, enrichment, essential-genes, fitness,
    gene-annotation, metabolism, mobile-elements, modules, pangenome, pathway-analysis

    - **Data**: kbase_ke_pangenome, kbase_msd_biochemistry, kbase_uniref, kescience_fitnessbrowser,
    phagefoundry

    - [README](projects/acinetobacter_adp1_explorer/README.md) | [REPORT](projects/acinetobacter_adp1_explorer/REPORT.md)


    **5. module_conservation** (complete)

    - **Q**: Are ICA fitness modules enriched in core pangenome genes, and do cross-organism
    module families map to the core genome?

    - **Findings**: Module Genes Are More Core Than Average, Most Modules Are Core,
    Family Breadth Does NOT Predict Conservation

    - **Tags**: HGT, conservation, dark-genes, ecotype, enrichment, essential-genes,
    fitness, mobile-elements, modules, pangenome

    - **Data**: kbase_genomes, kescience_fitnessbrowser

    - [README](projects/module_conservation/README.md) | [REPORT](projects/module_conservation/REPORT.md)


    ### Findings Digest Hits

    - `essential genes` appears in `docs/findings_digest.md`'
