# Local reverse proxy that mirrors the SPIN/NGINX Ingress: serve the BERIL UI
# at / and route the /ov path to the OpenViking container, stripping the /ov
# prefix before forwarding (the OV server expects bare paths like /health).
# Service names (ui, openviking) resolve over the docker-compose network.

upstream beril_ui {
    server ui:8000;
}

upstream beril_openviking {
    server openviking:1933;
}

server {
    listen 8000;
    server_name localhost;

    # OpenViking, reachable at http://localhost:8000/ov/...
    # `/ov` (no trailing slash) and `/ov/...` both rewrite to the OV server
    # with the /ov prefix removed, matching the SPIN ingress rewrite-target.
    location ~ ^/ov(/.*)?$ {
        # $1 is the captured remainder (may be empty -> "/").
        rewrite ^/ov(/.*)?$ $1 break;
        proxy_pass http://beril_openviking;

        # $http_host is the verbatim incoming Host header, INCLUDING the port
        # (localhost:8000). $host drops the port, which makes the app generate
        # absolute URLs like http://localhost/static/... (port 80) and breaks
        # CSS/asset loading behind the proxy.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> the BERIL UI app.
    location / {
        proxy_pass http://beril_ui;

        # $http_host is the verbatim incoming Host header, INCLUDING the port
        # (localhost:8000). $host drops the port, which makes the app generate
        # absolute URLs like http://localhost/static/... (port 80) and breaks
        # CSS/asset loading behind the proxy.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
