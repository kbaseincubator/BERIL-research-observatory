version: '3.8'
services:
  ui:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Reach OpenViking over the compose network, not the .env localhost default.
      BERIL_OV_URL: http://openviking:1933
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      openviking:
        condition: service_started
    develop:
      watch:
        - action: sync+restart
          path: ./ui/app
          target: /repo/ui/app
          initial_sync: true
        - action: sync+restart
          path: ./ui/config
          target: /repo/ui/config
        - action: rebuild
          path: ./ui/pyproject.toml
        - action: rebuild
          path: ./ui/uv.lock
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./.env


  openviking:
    build:
      context: ./knowledge/openviking
    # Override the SPIN-oriented default if you want a different in-container
    # config location: pass OV_CONFIG_PATH as a build arg here.
    ports:
      - "1933:1933"   # OpenViking API (consumed by the ui service)
      - "8020:8020"   # OpenViking secondary port
    env_file:
      - .env
    environment:
      VERTEXAI_LOCATION: us-central1
      VERTEXAI_PROJECT: ${VERTEXAI_PROJECT}
      GOOGLE_APPLICATION_CREDENTIALS: /var/secrets/gcp-key.json
    volumes:
      # Provide the OpenViking config locally. Copy/author it before `up`.
      - ./knowledge/openviking/ov.conf:/var/openviking/ov.conf:ro
      - ./knowledge/openviking/gcp-key.json:/var/secrets/gcp-key.json:ro
      # Persist ingested content / embeddings across restarts.
      - ovworkspace:/ov/workspace
    restart: unless-stopped

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: beril_user       # Must match BERIL_DB_USER in .env
      POSTGRES_PASSWORD: changeme     # Must match BERIL_DB_PASSWORD in .env
      POSTGRES_DB: beril              # Must match BERIL_DB_NAME in .env
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beril_user -d beril"]
      interval: 2s
      timeout: 3s
      retries: 15
    # Uncomment for local development to allow psql/GUI access from the host.
    # Do not expose in production.
    # ports:
    #   - "5432:5432"

volumes:
  pgdata:
  ovworkspace:
