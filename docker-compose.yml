version: '3.8'
services:
  ui:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - claude_sessions:/home/beril/.claude/projects
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./ui/app
          target: /repo/ui/app
          initial_sync: true
        - action: sync+restart
          path: ./ui/config
          target: /repo/ui/config
        - action: sync+restart
          path: ./ui/alembic
          target: /repo/ui/alembic
        - action: rebuild
          path: ./ui/pyproject.toml
        - action: rebuild
          path: ./ui/uv.lock
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./.env


  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: beril_user       # Must match BERIL_DB_USER in .env
      POSTGRES_PASSWORD: changeme     # Must match BERIL_DB_PASSWORD in .env
      POSTGRES_DB: beril              # Must match BERIL_DB_NAME in .env
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beril_user -d beril"]
      interval: 2s
      timeout: 3s
      retries: 15
    # Uncomment for local development to allow psql/GUI access from the host.
    # Do not expose in production.
    # ports:
    #   - "5432:5432"

volumes:
  pgdata:
  claude_sessions:
