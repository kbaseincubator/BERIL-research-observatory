cross_project_deps:
- project: metal_fitness_atlas
  relationship: extends
  files: []
  description: Primary methodological template. Adopted cross-species conservation pipeline (fitness × conservation × Black
    Queen framework), pangenome-scale scoring methodology, and odds ratio enrichment tests for core genome enrichment validation.
- project: essential_metabolome
  relationship: data_input
  files:
  - data/fb_genome_mapping_manual.tsv
  description: Pilot study identifying 7 FB organisms with GapMind coverage and GapMind annotation gaps (E. coli absent).
    Provided initial data extracts and methodology.
- project: conservation_vs_fitness
  relationship: data_input
  files: []
  description: FB-pangenome link table construction (177K links, 44 organisms), essential gene classification, SEED annotation
    pipeline.
- project: fitness_effects_conservation
  relationship: data_input
  files: []
  description: Demonstrated that fitness breadth (number of conditions where gene is important) predicts conservation better
    than median fitness magnitude. Incorporated breadth as 30% component of composite importance score.
- project: core_gene_tradeoffs
  relationship: data_input
  files: []
  description: Identified 28,017 genes that are costly in laboratory conditions but conserved in nature. Motivated condition-type
    stratification (carbon/nitrogen/stress) to distinguish lab artifacts from true functional dependencies.
- project: field_vs_lab_fitness
  relationship: data_input
  files: []
  description: Field-important genes are 83.6% core vs 76.3% baseline. Adopted condition-type stratification approach (stress/carbon
    limitation/nitrogen limitation/antibiotic) for fitness aggregation.
- project: ecotype_analysis
  relationship: data_input
  files: []
  description: Found that phylogeny dominates gene content similarity in 60.5% of species. Added phylogenetic controls to
    all correlations and metabolic ecotype analyses to avoid confounding ancestry with independent metabolic variation.
- project: pangenome_openness
  relationship: data_input
  files: []
  description: 'Null result: pangenome openness does not correlate with environment or phylogeny effect sizes. Our pathway-variability
    metric provides a mechanistically interpretable correlate of openness.'
- project: cofitness_coinheritance
  relationship: data_input
  files: []
  description: Found 73% of accessory modules show co-inheritance with co-fitness. Validates pathway-level aggregation of
    gene-level fitness data.
- project: module_conservation
  relationship: data_input
  files: []
  description: 'Null result: module family breadth does NOT predict conservation. Our pathway-level conservation approach
    avoids breadth-based metrics in favor of variability-based metrics.'
- project: conservation_fitness_synthesis
  relationship: data_input
  files: []
  description: Established 16pp fitness-conservation gradient showing that conserved genes are functionally active. Provides
    evolutionary context for interpreting Active Dependencies as high-conservation phenotypes.
- project: cog_analysis
  relationship: data_input
  files: []
  description: 'Two-speed genome: core enriched in translation and central metabolism, novel enriched in mobile elements.
    Establishes baseline expectations for metabolic gene conservation patterns.'
findings:
- id: pathway_completeness_insufficient_for_dependency
  title: Pathway Completeness Alone Is Insufficient to Predict Metabolic Dependency
  notebook: 02_tier1_pathway_classification.ipynb
  figures:
  - fig1_four_category_overview.png
  - tier1_category_distribution.png
  - tier1_completeness_vs_importance.png
  data_files:
  - data/tier1_pathway_classification.csv
  references:
  - morris2012
  - price2020
  - price2022
  statistics:
    active_dependencies: 57/161 (35.4%)
    latent_capabilities: 66/161 (41.0%)
    incomplete_but_important: 24/161 (14.9%)
    missing: 14/161 (8.7%)
    organisms_tested: 7
    pathways_tested: 23
    composite_importance_weights: essentiality 40%, fitness breadth 30%, fitness magnitude 30%
- id: latent_capabilities_become_important_under_stress
  title: All 'Latent Capabilities' Become Important Under Specific Conditions
  notebook: 02_tier1_pathway_classification.ipynb
  figures:
  - fig5_condition_type_shifts.png
  - tier1_condition_type_shifts.png
  data_files:
  - data/tier1_condition_type_analysis.csv
  references:
  - morris2012
  statistics:
    latent_capabilities_with_conditions: 66/66 (100%)
    condition_types_tested: 4
    most_frequent_reclassification_triggers: '[''nitrogen limitation'', ''stress'', ''carbon limitation'']'
    genes_costly_in_lab_conserved_in_nature: 28017
- id: active_dependencies_core_genome_enriched
  title: 'Conservation Validation: Active Dependencies Have Near-Complete Core Genomes'
  notebook: 02_tier1_pathway_classification.ipynb
  figures:
  - fig2_conservation_by_category.png
  - tier1_conservation_validation.png
  data_files:
  - data/tier1_pathway_classification.csv
  references:
  - price2020
  statistics:
    active_dependency_core_completeness: '0.986'
    latent_capability_core_completeness: '0.975'
    completeness_gap: '0.011'
    core_enrichment_odds_ratio: '2.08'
- id: variable_pathways_pangenome_openness
  title: Variable Pathways Strongly Correlate with Pangenome Openness
  notebook: 03_tier2_pathway_conservation.ipynb
  figures:
  - fig3_core_accessory_pathways.png
  - pathway_conservation_vs_openness.png
  - pathway_conservation_by_genus.png
  - pathway_conservation_by_phylum.png
  data_files:
  - data/species_pathway_metrics.csv
  - data/core_vs_all_pathway_completeness.csv
  references:
  - morris2012
  statistics:
    species_analyzed: 2810
    raw_spearman_rho: '0.327'
    raw_p_value: '7.2e-71'
    partial_spearman_rho_genome_controlled: '0.530'
    partial_p_value: '2.83e-203'
    genera_significant_at_p_05: 5/18
    genera_signal_positive_direction: 13/18
    strongest_genus_clostridium_rho: '0.534'
    strongest_genus_eubacterium_rho: '0.506'
- id: amino_acid_accessory_dependence
  title: Amino Acid Biosynthesis Pathways Show the Strongest Accessory Dependence
  notebook: 03_tier2_pathway_conservation.ipynb
  figures:
  - fig3_core_accessory_pathways.png
  data_files:
  - data/core_vs_all_pathway_completeness.csv
  references:
  - morris2012
  statistics:
    leucine_all_genes_completeness: '0.614'
    leucine_core_completeness: '0.468'
    leucine_gap: '0.146'
    valine_gap: '0.146'
    arginine_gap: '0.141'
    lysine_gap: '0.140'
    threonine_gap: '0.140'
- id: metabolic_ecotypes_pangenome_correlation
  title: Metabolic Ecotypes Correlate with Pangenome Openness
  notebook: 04_metabolic_ecotypes.ipynb
  figures:
  - fig4_ecotype_openness.png
  - ecotype_count_vs_openness.png
  data_files:
  - data/metabolic_ecotypes.csv
  - data/ecotype_summary.csv
  references: []
  statistics:
    species_analyzed: 225
    median_ecotypes_per_species: 4
    maximum_ecotypes: 8
    species_with_8_ecotypes: '[''Alistipes onderdonkii'', ''Barnesiella intestinihominis'']'
    raw_ecotype_openness_spearman: '0.262'
    raw_p_value: '6.8e-05'
    partial_spearman_genome_controlled: '0.322'
    partial_p_value: '8.0e-07'
