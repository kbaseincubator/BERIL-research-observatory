  description: AlphaEarth embeddings were previously used in ecotype_analysis to test environment vs phylogeny effects on
    gene content. This project characterizes the embedding space to support interpretation of those results.
findings:
- id: environmental_samples_stronger_geographic_signal
  title: Environmental samples show 3.4x stronger geographic signal than human-associated samples
  notebook: 02_interactive_exploration.ipynb
  figures:
  - geo_vs_embedding_by_env_group.png
  data_files: []
  references:
  - pearman2024
  - wang2024
  statistics:
    environmental_nearby_cosine_distance: '0.27'
    environmental_intercontinental_cosine_distance: '0.90'
    environmental_ratio: 3.4x
    human_nearby_cosine_distance: '0.37'
    human_intercontinental_cosine_distance: '0.75'
    human_ratio: 2.0x
- id: embeddings_encode_real_geographic_signal
  title: AlphaEarth embeddings encode real geographic signal — not noise
  notebook: 02_interactive_exploration.ipynb
  figures:
  - geo_vs_embedding_binned.png
  data_files: []
  references: []
  statistics:
    sample_size: 50,000 genome pairs
    relationship_type: monotonic
    plateau_distance: '>5,000 km'
- id: clinical_human_sampling_bias
  title: Strong clinical/human sampling bias in the AlphaEarth subset
  notebook: 02_interactive_exploration.ipynb
  figures:
  - env_categories.png
  data_files: []
  references: []
  statistics:
    total_genomes: 83,287
    human_clinical_percent: 20%
    human_gut_percent: 16%
    human_other_percent: 2%
    total_human_percent: 38%
    soil_percent: 7%
    marine_percent: 7%
    freshwater_percent: 7%
    other_category_percent: 17%
- id: coordinates_flagged_institutional_addresses
  title: 36% of coordinates flagged as potential institutional addresses
  notebook: 02_interactive_exploration.ipynb
  figures:
  - coord_quality_map.png
  data_files: []
  references: []
  statistics:
    flagged_genomes: 30,469
    flagged_percent: 36.6%
    threshold: '>50 genomes and >10 species at same coordinate'
- id: umap_reveals_embedding_structure
  title: UMAP reveals fine-grained embedding structure with environment-correlated clusters
  notebook: 02_interactive_exploration.ipynb
  figures:
  - umap_by_env_category.png
  - cluster_env_heatmap.png
  - env_cluster_distribution.png
  data_files: []
  references: []
  statistics:
