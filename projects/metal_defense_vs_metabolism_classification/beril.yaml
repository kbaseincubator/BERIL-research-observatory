project_id: metal_defense_vs_metabolism_classification
status: complete
title: "Metal Defense vs. Metal Metabolism: A Classification Framework for Bacterial Metal Proteins"
description: >
  Pangenome-scale classification of bacterial metal-related proteins into defense
  (toxic metal resistance) vs. metabolism (adaptive utilization and critical mineral
  acquisition) categories. Characterizes phylogenetic distributions and ecological
  signatures of each class across ~27,000 species, then applies the classifier to
  ENIGMA isolates to identify experimental candidates.
