project_id: enigma_isolate_mycothiol_isomerase
title: "ENIGMA Isolate Survey: Mycothiol-Dependent Malonylpyruvate Isomerase"
description: >
  Targeted query of the Enigma Genome Depot to identify which ENIGMA lab isolates
  carry the mycothiol-dependent malonylpyruvate isomerase flagged as phylogenetically
  enriched in Actinobacteria, and to rank candidates for experimental validation of
  adaptive metal function.
