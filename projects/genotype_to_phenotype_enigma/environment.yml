name: genotype_to_phenotype_enigma
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  # Core data processing
  - pandas>=2.0
  - numpy>=1.24
  - pyarrow>=12.0
  # Growth curve fitting (NB01)
  - scipy>=1.10
  # Visualization
  - matplotlib>=3.7
  # Machine learning (Act II: NB05-NB09)
  - scikit-learn>=1.3
  - lightgbm>=4.0
  - shap>=0.42
  # Molecular descriptors (NB05 condition features — optional; conda is the
  # reliable install path for rdkit, which is notoriously fragile via pip)
  # - rdkit>=2023.03
  # Notebook execution
  - jupyter>=1.0
  - nbformat>=5.9
  - nbconvert>=7.0
  # BERDL access (on-cluster only — provided by the JupyterHub kernel):
  #   pyspark, berdl_notebook_utils. Do not install locally.
  - pip
  - pip:
      # Fallback if any package above is unavailable via conda-forge
      - pandas>=2.0
      - scipy>=1.10
      - lightgbm>=4.0
      - shap>=0.42
