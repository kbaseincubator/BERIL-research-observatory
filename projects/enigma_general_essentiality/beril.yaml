description: 'Re-implementation of general gene essentiality prediction with corrected
  methodology. Predicts whether a protein is conditionally essential (fitness < -2
  in ANY stressor) from sequence composition features alone, using organism-stratified
  train/test splits and true leave-one-genus-out cross-validation. Addresses critical
  methodological flaws (protein-level splits, LOOO mislabeled as LOGO, biologically
  implausible positive rates) found in the prior refocus implementation. Data source:
  FitnessBrowser RB-TnSeq (same 60 ENIGMA organisms as enigma_stress_phenotype_ml),
  binarized via fitness < -2 union threshold across all stressors.

  '
