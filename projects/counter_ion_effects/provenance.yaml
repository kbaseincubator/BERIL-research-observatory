findings:
- id: metal_nacl_overlap_40percent
  title: 39.8% of Metal-Important Genes Are Also NaCl-Important
  notebook: 02_metal_nacl_overlap.ipynb
  figures:
  - nacl_metal_overlap_heatmap.png
  data_files: []
  references:
  - price2018
  - danilova2020
  statistics:
    overall_overlap: 39.8% (4,304/10,821 metal-important gene records)
    range_by_metal: 9.2% (molybdenum) to 57.6% (manganese)
    outlier_correction: Excluding SynE reduces to 36.7%
    organism_metal_pairs: '86'
- id: counter_ions_not_primary
  title: Counter Ions Are NOT the Primary Driver of the Overlap
  notebook: 02_metal_nacl_overlap.ipynb
  figures:
  - metal_nacl_overlap_by_counter_ion.png
  - cl_concentration_vs_overlap.png
  data_files: []
  references:
  - danilova2020
  statistics:
    zinc_sulfate_overlap: 44.6% (zero chloride)
    cobalt_chloride_overlap: 41.3% (up to 500 mM Cl⁻)
    chloride_metals_mean: 41.6%
    non_chloride_metals_mean: 37.8%
- id: dvh_metal_nacl_correlation
  title: DvH Metal-NaCl Correlation Follows Toxicity Mechanism, Not Chloride Dose
  notebook: 02_metal_nacl_overlap.ipynb
  figures:
  - dvh_nacl_metal_correlation.png
  data_files: []
  references:
  - price2018
  - nies2003
  statistics:
    zinc_correlation: r=0.715
    manganese_correlation: r=0.545
    iron_correlation: r=0.086
    metals_tested_dvh: '13'
- id: metal_atlas_robust
  title: Metal Fitness Atlas Core Enrichment Is Robust After Correction
  notebook: 04_corrected_atlas.ipynb
  figures:
  - atlas_original_vs_corrected.png
  data_files: []
  references:
  - dehal2026
  statistics:
    metals_preserved: 12 of 14
    essential_metals_stronger: Molybdenum +0.132→+0.145, Tungsten +0.129→+0.134, Mercury +0.116→+0.133, Selenium +0.115→+0.131
- id: gene_classification_metal_specific
  title: 'Gene Classification: 60% of Metal Fitness Genes Are Metal-Specific'
  notebook: 03_profile_decomposition.ipynb
  figures:
  - gene_classification_by_metal.png
  data_files: []
  references:
  - price2018
  statistics:
    metal_specific_fraction: 60.2% (6,517/10,821 across all organisms)
    dvh_metal_specific: 85.3% (422/495 unique genes)
    dvh_shared_stress: 14.7% (73/495 unique genes)
    mean_metals_shared: 4.1 per gene
    mean_metals_specific: 2.5 per gene
    annotation_rate_shared: 78.1% with SEED
    annotation_rate_specific: 90.5% with SEED
- id: psrch2_copper_comparison
  title: 'psRCH2: The Only Within-Metal Counter Ion Comparison'
  notebook: 05_psrch2_comparison.ipynb
  figures:
  - psrch2_copper_comparison.png
  data_files: []
  references:
  - price2018
  statistics:
    cross_salt_correlation: r=0.439
    cucl2_within_replicate: r=0.720
    cuso4_within_replicate: r=0.859
    cuso4_nacl_correlation: r=0.450
    cucl2_nacl_correlation: r=0.212
