findings:
- id: phb_phylogenetic_concentration
  title: PHB pathways are widespread but phylogenetically concentrated
  notebook: 01_phb_gene_discovery.ipynb
  figures:
  - phb_prevalence_by_phylum.png
  - phb_pathway_completeness.png
  data_files:
  - data/phb_gene_clusters.tsv
  - data/phb_species_summary.tsv
  - data/phb_by_taxonomy.tsv
  references:
  - anderson1990
  statistics:
    phaC_prevalence: 21.9% (6,067/27,690 species)
    complete_pathway_prevalence: 21.7% (6,005/27,690 species)
    total_gene_clusters: 118,513 across 19,496 species
    pseudomonadota_prevalence: 60.9% (4,544/7,456 species)
    myxococcota_prevalence: 52.9% (83/157 species)
    halobacteriota_prevalence: 34.4% (89/259 species)
- id: phb_environmental_enrichment
  title: PHB is enriched in environmentally variable habitats (H1a supported)
  notebook: 03_environmental_correlation.ipynb
  figures:
  - phb_by_environment.png
  data_files:
  - data/species_environment.tsv
  references:
  - masonjones2023
  statistics:
    plant_phb_prevalence: 44.0%
    soil_phb_prevalence: 43.6%
    wastewater_phb_prevalence: 34.5%
    marine_phb_prevalence: 18.7%
    clinical_phb_prevalence: 7.4%
    animal_phb_prevalence: 3.3%
    chi2_test: chi2=1656.36, p~0, dof=2
- id: phb_niche_breadth_genome_confound
  title: PHB-niche breadth association is largely explained by genome size (H1b qualified)
  notebook: 03_environmental_correlation.ipynb
  figures:
  - embedding_variance_phb.png
  - genome_size_confound.png
  data_files:
  - data/phb_embedding_analysis.tsv
  - data/species_genome_size.tsv
  references:
  - vieiirasilva2010
  - barberan2014
  - bentkowski2015
  statistics:
    phb_plus_embedding_variance: 0.3295 (median, n=531)
    phb_minus_embedding_variance: 0.2472 (median, n=1477)
    mannwhitney_u: '446546'
    mannwhitney_p: '1.88e-06'
    phb_plus_median_genome: 4.34 Mbp
    phb_minus_median_genome: 2.44 Mbp
    genome_size_r: '-0.592'
    genome_size_niche_rho: '0.302'
    partial_rho_after_confound: '-0.047'
    p_value_partial: '0.037'
    effect_reduction: 56.3%
- id: phb_subclade_enrichment
  title: Subclade enrichment reveals heterogeneous selection within phyla (H1d partially supported)
  notebook: 05_subclade_enrichment.ipynb
  figures:
  - phb_enrichment_heatmap.png
  data_files:
  - data/subclade_enrichment.tsv
  references:
  - pieja2011
  - kalia2007
  statistics:
    families_tested: 248 (Fisher's exact, Bonferroni-corrected)
    families_enriched: '41'
    families_depleted: '62'
    families_not_significant: '145'
- id: phb_horizontal_gene_transfer
  title: Strong signal of horizontal gene transfer in phaC distribution
  notebook: 05_subclade_enrichment.ipynb
  figures:
  - phb_core_vs_accessory.png
  data_files:
  - data/phb_gene_clusters.tsv
  references:
  - kalia2007
  - catone2014
  - cai2011
  statistics:
    hgt_acquisition_events: '311'
    hgt_loss_events: '278'
    accessory_rate_discordant: 60.1%
    accessory_rate_overall: 32.3%
    core_phaC_species: '5371'
    accessory_phaC_species: '1959'
- id: nmdc_cross_validation
  title: NMDC metagenomic cross-validation supports pangenome PHB patterns (H1c supported)
  notebook: 04_nmdc_metagenomic_analysis.ipynb
  figures:
  - nmdc_phb_by_environment.png
  - nmdc_phb_vs_abiotic.png
  - pangenome_vs_metagenome.png
  data_files:
  - data/nmdc_phb_prevalence.tsv
  - data/nmdc_abiotic_correlations.tsv
  - data/pangenome_vs_metagenome.tsv
  references:
  - viljakainen2021
  statistics:
    nmdc_samples: '6365'
    nmdc_taxon_mapping: 3014/3492 (86.3%)
    median_phb_inference_score: '137.7'
    depth_rho: '-0.119'
    depth_p: '1.14e-21'
    temperature_rho: '0.088'
    temperature_p: '1.86e-12'
    genus_level_matches: '693'
    phb_high_vs_low_mannwhitney_p: '8.41e-22'
